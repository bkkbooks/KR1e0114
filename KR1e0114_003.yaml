body:
  text: 春秋大事表卷二之四國子監司業顧棟髙撰昭公名稠附春秋通經閏數哀十五年閏十二月逆數至十四年閏二月相去凡二十三月見續經左傳十五年閏月衛渾良夫與太子入舍于孔氏之外圃上冇冬及齊平知為閏十二月哀十四年閏二月逆數至十年閏五月相去凡四十六月哀十年閏五月逆數至七年閏十二月相去凡三十月哀七年閏十二月逆數至五年閏十二月相去凡二十五月見經冬閏月葬齊景公哀五年閏十二月逆數至二年閏十一月相去凡三十八月哀二年閏十一月逆數至定十四年閏十二月相去凡三十六月定十四年閏十二月逆數至十二年閏十一月相去凡二十六月定十二年閏十一月逆數至十年閏六月相去凡三十月定十年閏六月逆數至八年閏二月相去凡二十九月定八年閏二月逆數至四年閏十月相去凡四十一月定四年閏十月逆數至二年閏五月相去凡三十月定二年閏五月逆數至昭三十年閏五月相去凡四十九月昭三十年閏五月逆數至二十八年閏五月相去凡二十五月昭二十八年閏五月逆數至二十五年閏十二月相去凡三十月昭二十五年閏十二月逆數至二十二年閏十二月相去凡三十七月見傳閏月取前城上有十二月則知閏在十二月也昭二十二年閏十二月逆數至二十年閏八月相去凡二十九月見傳閏月戊辰殺宣薑上有八月則知閏在八月也昭二十年閏八月逆數至十八年閏正月相去凡三十二月昭十八年閏正月逆數至十五年閏九月相去凡二十九月昭十五年閏九月逆數至十二年閏正月相去凡四十五月昭十二年閏正月逆數至十年閏五月相去凡二十一月昭十年閏五月逆數至六年閏七月相去凡四十七月昭六年閏七月逆數至四年閏四月相去凡二十八月昭四年閏四月逆數至元年閏十月相去凡三十一月昭元年閏十月逆數至襄二十九年閏八月相去凡三十九月襄二十九年閏八月逆數至二十七年兩閏杜因左傳辰在申再失閏之文頓置兩閏十一月二十九年閏八月距二十七年之後閏十一月相去凡二十二月襄二十七年之前閏十一月距二十六年閏十二月相去凡十二月襄二十六年閏十二月逆數至二十四年閏三月相去凡三十四月襄二十四年閏三月逆數至二十一年閏八月相去凡三十二月襄二十一年閏八月逆數至十九年閏九月相去凡二十四月襄十九年閏九月逆數至十六年閏十月相去凡三十六月襄十六年閏十月逆數至十三年閏八月相去凡三十九月襄十三年閏八月逆數至十年閏十二月相去凡三十三月襄十年閏十二月逆數至七年閏十月相去凡三十九月襄七年閏十月逆數至五年閏四月相去凡三十一月襄五年閏四月逆數至二年閏四月相去凡三十七月襄二年閏四月逆數至成十七年閏十二月相去凡二十九月見傳閏月乙卯晦欒書中行偃殺胥童上有十二月則知閏在十二月也成十七年閏十二月逆數至十四年閏七月相去凡四十二月成十四年閏七月逆數至十二年閏五月相去凡二十七月成十二年閏五月逆數至九年閏十一月相去凡三十一月見傳冬十一月城中城長厯推此年閏十一月杜以為此閏月城之成九年閏十一月逆數至七年閏八月相去凡二十八月成七年閏八月逆數至四年閏七月相去凡三十八月成四年閏七月逆數至元年閏三月相去凡四十一月成元年閏三月逆數至宣十五年閏十一月相去凡四十一月宣十五年閏十一月逆數至十二年閏五月相去凡四十三月宣十二年閏五月逆數至十年閏五月相去凡二十五月宣十年閏五月逆數至六年閏五月相去凡四十九月宣六年閏五月逆數至二年閏五月相去凡四十九月宣二年閏五月逆數至文十六年閏五月相去凡四十九月文十六年閏五月逆數至十二年閏十一月相去凡四十三月文十二年閏十一月逆數至九年閏七月相去凡四十一月文九年閏七月逆數至六年閏十二月相去凡三十二月見經閏月不告朔猶朝于廟文六年閏十二月逆數至四年閏三月相去凡三十四月文四年閏三月逆數至二年閏正月相去凡二十七月文二年閏正月逆數至元年閏三月相去凡十一月見傳于是閏三月非禮也文元年閏三月逆數至僖三十年閏九月相去凡四十三月僖三十年閏九月逆數至二十五年閏十二月相去凡五十八月僖二十五年閏十二月逆數至二十四年閏四月相去凡二十月僖二十四年閏四月逆數至二十年閏二月相去凡五十一月僖二十年閏二月逆數至十七年閏十二月相去凡二十七月僖十七年閏十二月逆數至十二年閏二月相去凡七十一月僖十二年閏二月逆數至九年閏七月相去凡三十二月僖九年閏七月逆數至七年閏十一月相去凡二十一月見傳閏月惠王崩僖七年閏十一月逆數至五年閏十二月相去凡二十四月僖五年閏十二月逆數至元年閏十一月相去凡五十月僖元年閏十一月逆數至閔二年閏五月相去凡十九月閔二年閏五月逆數至莊三十二年閏三月相去凡二十七月莊三十二年閏三月逆數至三十年閏二月相去凡二十六月莊三十年閏二月逆數至二十八年閏三月相去凡二十四月莊二十八年閏三月逆數至二十四年閏七月相去凡四十五月莊二十四年閏七月逆數至二十年閏十二月相去凡四十四月莊二十年閏十二月逆數至十七年閏六月相去凡四十三月莊十七年閏六月逆數至十四年閏五月相去凡三十八月莊十四年閏五月逆數至十一年閏三月相去凡三十九月莊十一年閏三月逆數至九年閏八月相去凡二十月莊九年閏八月逆數至七年閏四月相去凡二十九月莊七年閏四月逆數至四年閏四月相去凡三十七月莊四年閏四月逆數至元年閏十月相去凡三十一月莊元年閏十月逆數至桓十六年閏六月相去凡四十一月桓十六年閏六月逆數至十三年閏正月相去凡四十二月桓十三年閏正月逆數至十一年閏正月相去凡二十五月桓十一年閏正月逆數至七年閏十二月相去凡三十八月桓七年閏十二月逆數至四年閏十二月相去凡三十七月桓四年閏十二月逆數至元年閏十二月相去凡三十七月桓元年閏十二月逆數至隱九年閏十月相去凡三十九月隱九年閏十月逆數至七年閏十二月相去凡二十三月隱七年閏十二月逆數至五年閏十二月相去凡二十五月隱五年閏十二月逆數至二年閏十二月相去凡三十七月案自隱元年至哀十六年孔子卒止通計二百四十四年論常厯法當有九十閏今據經傳月日推校得八十七閏杜注于襄二十七年頓置兩閏十一月以應天正合來凡八十九閏通計少一閏又左傳襄九年十二月下有閏月戊寅濟于隂阪侵鄭杜注謂此年不得有閏月當是門五日之訛除此不算外通計表內閏月見經者二見傳者七凡長厯失不置閏今增置者三桓四年閏十二月莊二十年閏十二月成十二年閏五月長厯錯置閏今削去者一莊二十九年閏二月其置閏稍有後先今改正者五僖八年閏十一月今改九年閏七月文八年閏七月今移在九年昭元年閏十二月今改閏十月八年閏八月今改十年閏五月哀五年閏十月今作閏十二月皆據經傳上下月日參校不敢曲為遷就餘悉同長厯附春秋經傳朔數晦數隱三年春王二月己巳日有食之不書朔史失之桓三年秋七月壬辰朔日有食之桓十七年冬十月朔日有食之不書日官失之長厯庚午朔莊十八年春王三月日有食之不書日與朔官失之長厯癸未朔莊二十五年六月辛未朔日有食之莊二十六年冬十有二月癸亥朔日有食之莊三十年九月庚午朔日有食之僖五年九月戊申朔日有食之僖十二年春王三月庚午日有食之不書朔官失之僖十五年夏五月日有食之不書日與朔官失之長厯壬子朔文元年二月癸亥日有食之不書朔官失之文十五年六月辛丑朔日有食之既宣八年秋七月甲子日有食之不書朔官失之宣十年夏四月丙辰日有食之不書朔官失之宣十七年六月癸卯日有食之不書朔官失之成十六年六月丙寅朔日有食之成十七年十有二月丁巳朔日有食之襄十四年二月乙未朔日有食之襄十五年秋八月丁巳日有食之不書朔官失之襄二十年冬十月丙辰朔日有食之襄二十一年九月庚戌朔日有食之冬十月庚辰朔日有食之襄二十三年春王二月癸酉朔日有食之襄二十四年秋七月甲子朔日有食之既八月癸巳朔日有食之襄二十七年冬十有二月乙亥朔日有食之昭七年夏四月甲辰朔日有食之昭十五年六月丁巳朔日有食之昭十七年夏六月甲戌朔日有食之昭二十一年秋七月壬午朔日有食之昭二十二年十有二月癸酉朔日有食之昭二十四年夏五月乙未朔日有食之昭三十一年十有二月辛亥朔日有食之定五年春王二月辛亥朔日有食之定十二年十有一月丙寅朔日有食之定十五年八月庚辰朔日有食之哀十四年五月庚申朔日有食之續經巳上春秋所書日食三十七惟宣八年七月甲子杜以為月三十日餘皆朔日無論經書不書僖五年春正月辛亥朔日南至傳冬十二月丙子朔晉滅虢傳僖十五年九月己卯晦震夷伯之廟經三是月之十日僖十六年夏五月戊申朔隕石于宋五經僖二十二年己巳朔宋楚戰于泓經僖二十四年三月己丑晦公宫火傳十是月之二九日文元年五月辛酉朔晉師圍戚傳成十六年六月甲午晦晉楚戰于鄢陵經十是月之二九日成十七年閏十二月乙卯晦欒書中行偃殺胥童傳月是之三十日成十八年正月甲申晦齊侯使士華免殺國佐于內宫之朝傳十是月之二九日成十八年二月乙酉朔晉悼公即位于朝傳襄十八年冬十月丙寅晦齊師夜遁傳三是月之十日十一月丁卯朔入平隂傳襄十九年夏五月壬辰晦齊靈公卒傳十是月之二九日襄二十六年三月甲寅朔鄭伯賞入陳之功傳襄二十七年六月丁未朔宋人享趙孟傳昭元年十二月甲辰朔趙孟蒸于溫傳昭十二年冬十月壬申朔周原輿人逐原伯絞傳昭二十年六月丁巳晦衛侯與北宫喜盟傳三是月之十日秋七月戊午朔遂盟國人傳昭二十三年春正月壬寅朔二師圍郊傳昭二十三年秋七月戊辰晦吳楚戰于雞父傳二是月之十九日已上除日食外其餘經傳書朔者凡十三經二傳十一書晦者凡九經二傳七案公榖二傳説晦朔多難信公羊于僖十六年春正是月六鷁退飛過宋都云何以不日晦也是非晦而謂之晦又云朔有事則書晦雖有事不書因于僖十五年九月己卯晦震夷伯之廟成十六年六月甲午晦晉楚戰于鄢陵俱云晦冥也是實晦而謂之非晦何休又云非卓佹之事無取乎言晦朔若趡盟奚戰是也謂桓十七年二月丙午及邾婁儀父盟于趡春秋説以丙午為二月晦五月丙午及齊師戰于奚春秋説以丙午為五月朔今案二月無丙午丙午是三月初四日五月丙午是月之初五日公羊何氏言朔晦者俱謬穀梁于僖十五年己卯晦震夷伯之廟亦云晦冥同公羊于成十六年甲午晦鄢城之戰又云遇晦曰晦同左氏俱無憑凖故朔閏表不録二傳趙氏匡曰公榖于僖十五年己卯晦震夷伯之廟並云晦冥也據十六年戊申朔隕石于宋五成十六年甲午晦晉楚戰于鄢陵並書晦朔則知此言晦者亦晦朔之晦爾古史之體應合書日而遇晦朔必書之以為厯數之證穀梁于成十六年傳云事遇晦書晦何得於此獨名晦冥乎春秋大事表卷二之四欽定四庫全書春秋大事表卷三國子監司業顧棟髙撰長歷拾遺表余既輯春秋朔閏表懼後人不之信因命施生龍淵就注疏中採出杜氏長歷凡百餘條都為一卷嗚呼長歷一書意當唐初孔氏頴達世猶存今已不可得見獨其吉光片羽流傳于斷楮殘墨之間學者得因是以考見當時之日月誠不可不寶愛而珍惜之也余嘗觀其前後歎杜氏用心精細千年來未有及者顧余嘗疑之僖九年九月戊辰諸侯盟于葵邱甲子晉侯佹諸卒杜云甲子九月十一日戊辰十五日也如此則九月當為甲寅朔經有七月乙酉伯姬卒乙酉先甲寅二十九日其年有閏七月無疑杜長歷于八年十一月置閏則是年七月安得有乙酉乎據傳七年冬閏月惠王崩既七年有閏足知八年無閏此杜置閏之一失也昭元年十一月己酉楚子麇卒杜云己酉十二月六日經傳皆言十一月月誤是年傳十二月晉既蒸趙孟適南陽甲辰朔蒸于溫杜云甲辰十二月朔晉蒸當在甲辰之前傳言十二月月誤不知是年當閏十月而長歷誤作閏十二月故反疑經傳為誤己酉實十一月五日而甲辰為來年正月朔由晉用夏正本十一月事故傳繫之今年耳此杜置閏之再失也昭九年四月陳災傳曰火出而火陳杜長歷以為八年不應有閏而悮置閏八月故四月得火見今考上下傳文八年實無閏如八年有閏則九年二月安得有庚申十年五月安得有庚辰是閏在十年五月以後明矣周之四月夏正二月昏弧中旦建星中則夜半時大火得見東南不必前有閏月此杜置閏之三失也僖十五年十一月壬戌晉侯及秦伯戰于韓傳在九月明是晉用夏正故經傳互異而杜以為從赴以傳之壬戌為九月十三日以經之壬戌為十一月十四日傳紀晉事往往與經先後兩月凡經書春者傳皆在前年之冬豈得盡以為從赴此由不知經從周正傳從夏正誤混為一致令時日違錯此又杜之四失也夫日月之差訛其小小者耳而聖人之書法其宏綱大指未必不係于是是可不為鄭重而推究之歟以杜氏之精細猶不免差繆若此恨不能起先生于九原而為之指正其闕失也雖然杜氏迄今二千年其長歷之存于今者千百之十一耳然即此十一求之以考見當時之日月先生有知應引為繼起之有人則余小子曷敢多讓謹就此百餘條內其標明日月者推明是月為某朔以余所推合之其不同者既具論如右其同者識明一同字與閏朔表相表裏俾學者知今日之推求非無根據而先生之長歷幾如碎鼎之復完晉唐以來不獲睹之書至此復燦然大明于世好古之士有不歎為千年法物一旦復出矣乎輯春秋長歷拾遺表第三附録長歷及大衍歷置閏同異趙東山先生原本長歷置閏大衍歷置閏合朔議曰大衍歷視長歷朔每差一月亦有差二月者其日月得失本非所以釋經也趙東山氏曰以長歷考春秋日月失三十六日朔三晦二日食不入限者四頻月食者二大衍歷失一百二十六日朔三日食不入限十七先一月者六先二月者二先三月者一先五月者一後一月者六閏月一頻月食者二蓋杜氏據左傳屢譏周歷失閏所以長歷前却閏月求與春秋相符故所失少大衍歷自以三十二月閏率追算不計與經文合否故所失多又曰長歷視大衍歷少六閏自隱二年至宣十年三失閏自宣末年至春秋之冬復三失閏果若是則四時寒暑皆當反易不止以申為戌而巳恐周歷雖差未必如是之繆按經傳有曠數年不書日者前後屢見之長歷于此既無所據豈能無失至言頓置兩閏以應天正則臆決尤甚并及大衍歷者所以見周歷置閏無凖致日月不與天合也今按隱二年至宣十年長歷比大衍歷止少二閏宣末年至春秋之終止少一閏通計少三閏又言頓置兩閏之謬按襄二十七年十一月乙亥朔日有食之左傳曰辰在申司歷過也再失閏矣明年春經文即書無冰若不頓置兩閏則明年春正月乃是戌月係夏之九月安得以無冰為災而書乎欲以左傳求合經文不得不如此不得以杜為臆決也梅定九氏曰閏月之説大旨不出兩端其一謂無中氣為閏月此據左氏舉正于中為説乃歷家之法也其一謂古閏月俱在嵗終此據左氏歸餘于終為説乃經學家之詁也蓋古今歷法原自不同推步之理踵事加密故自今日言歷則以無中氣置閏為安而論春秋閏月則以歸餘之説為長何則治春秋者當主經文今考本經書閏月俱在年終此其據矣按此但據文六年閏月不告月及哀五年閏月葬齊景公俱在嵗終十二月而為言耳昭二十年閏八月戊辰殺宣薑文元年閏三月其餘傳文閏在中間者甚多不得謂春秋閏月都是歸餘于終也定九氏又曰交食之説有宜知者二端其一古者只用平朔平朔者一大月一小月相間故漢晉史志往往有日食不在朔而在朔之二日或晦日者唐李淳風麟德歷始用定朔至一行大衍歷又發明之始有四大三小之月而食必在朔此是一層道理其一自北齊張子信積候合食加時立入氣加減唐宣明歷本之立氣刻時三差至今遵用即授時歷之時差及東西南北差也前二説其根在天蓋以日纒有盈縮月離有遲疾天上行度應有之差天下所同也後一説其根在地蓋以日髙月卑正相掩時中間尚有空隙人所居地面不同而所見虧復之時刻與食分之淺深隨處各異謂之視差非天上行度有殊而生于人之目一方所獨也古疏今密大概可見新唐書律歷志大衍合朔議曰春秋日食有甲乙者三十四殷歷魯歷先一日者十三後一日者三周歷先一日者二十二先二日者九其偽可知矣莊公三十年九月庚午朔襄公二十一年九月庚戌朔定公五年三月辛亥朔當以盈縮遲疾為定朔殷歷雖合適然耳非正也僖公五年正月辛亥朔十二月丙子朔十四年三月己丑朔文公元年五月辛酉朔十一年三月甲申晦襄公十九年五月壬辰晦昭公元年十二月甲辰朔二十年二月己丑朔二十三年正月壬寅朔七月戊辰晦皆與周歷合其所記多周齊晉事蓋周王所頒齊晉用之僖公十五年九月己卯晦十六年正月戊申朔成公十六年六月甲午晦襄公十八年十月丙寅晦十一月丁卯朔二十六年三月甲寅朔二十七年六月丁未朔與殷歷魯歷合比非合食故仲尼因循時史而所記多宋魯事與齊晉不同可知矣昭公十二年十月壬申朔原與人逐原伯絞與魯歷周歷皆差一日此邱明即其所聞書之也僖公二十二年十一月己巳朔宋楚戰于泓周殷魯歷皆先一日楚人所赴也昭公二十年六月丁巳晦衛侯與北宫喜盟七月戊午朔遂盟國人三歷皆先二日衛人所赴也此則列國之歷不可以一術齊矣而長歷日子不在其月則改易閏餘欲以求合故閏月相距近則十餘月逺或七十餘月此杜預所甚謬也夫合朔先天則經書日食以糾之中氣後天則傳書南至以明之其在晦二日則原乎定朔以得之列國之歷或殊則稽于六家之術以知之此四者皆治歷之大端而預所未曉故也附元史歷志所推春秋日食三十七事隱公三年辛酉嵗春王二月己巳日有食之杜預云不書日史官失之公羊云日食或言朔或不言朔或日或不日或失之前或失之後失之前者朔在前也失之後者朔在後也穀梁云言日不言朔食晦日也薑岌校春秋日食云是嵗二月己亥朔無巳巳似失一閏三月己巳朔去交分入食限大衍與薑岌合今授時歷推之是嵗三月己巳朔加時在晝去交分二十六日六千六百三十一入食限桓公三年壬申嵗七月壬辰朔日有食之既薑岌以為是嵗七月癸亥朔無壬辰亦失閏其八月壬辰朔去交分入食限大衍與薑岌合以今歷推之是嵗八月壬辰朔加時在晝食六分一十四秒桓公十七年丙戌嵗冬十月朔日有食之左氏云不書日史官失之大衍推得在十一月交分入食限失閏也以今歷推之是嵗十一月加時在晝交分二十六日八千五百六十入食限莊公十八年乙巳嵗春王三月日有食之穀梁云不言日不言朔夜食也大衍推是嵗五月朔交分入食限三月不應食以今歷推之是嵗三月朔不入食限五月壬子朔加時在晝交分入食限蓋誤五為三莊公二十五年壬子嵗六月辛未朔日有食之大衍推之七月辛未朔交分入食限以今歷推之是嵗七月辛未朔加時在晝交分二十七日四百八十九入食限失閏也莊公二十六年癸丑嵗冬十有二月癸亥朔日有食之今歷推之是嵗十二月癸亥朔加時在晝交分十四日三千五百五十一入食限莊公三十年丁巳嵗九月庚午朔日有食之今歷推之是嵗十月庚午朔加時在晝去交分十四日四千六百九十六入食限失閏也大衍同僖公五年丙寅嵗九月戊申朔日有食之元史缺此一年僖公十二年癸酉嵗春王三月庚午朔日有食之薑氏云三月朔交不應食在誤條其五月庚午朔去交分入食限大衍同今歷推之是嵗五月庚午朔加時在晝去交分二十六日五千一百九十二入食限蓋誤五為三僖公十五年丙子嵗夏五月日有食之左氏云不書朔與日史官失之也大衍推四月癸丑朔去交分入食限差一閏今歷推之是嵗四月癸丑朔交分一日一千三百一十六入食限文公元年乙未嵗二月癸亥日有食之薑氏云二月甲午朔無癸亥三月癸亥朔入食限大衍亦以為然今歷推之是嵗三月癸亥朔加時在晝去交分三十六日五千九百十七分入食限失閏也文公十五年己酉嵗六月辛丑朔日有食之今歷推之是嵗六月辛丑朔加時在晝交分二十六日四千四百七十三分入食限宣公八年庚申嵗秋七月甲子日有食之既杜預以七月甲子晦食薑氏云十月甲子朔食大衍同今歷推之是嵗十月甲子朔加時在晝食九分八十一秒蓋十誤為七宣公十年壬戌嵗夏四月丙辰日有食之今歷推之是月丙辰朔加時在晝交分十四日九百六十八分入食限宣公十七年己巳嵗六月癸卯日有食之薑氏云六月甲辰朔不應食大衍云是年五月在交限六月甲辰朔交分已過食限蓋誤今歷推之是嵗五月乙亥朔入食限六月甲辰朔泛交二日巳過食限大衍為是成公十六年丙辰嵗六月丙寅朔日有食之今歷推之是嵗六月丙寅朔加時在晝去交分二十六日九千八百三十五分入食限成公十七年丁亥嵗十有二月丁巳朔日有食之薑氏云十二月戊子朔無丁巳似失閏大衍于十一月丁巳朔交分入食限今歷推之是嵗十一月丁巳朔加時在晝交分十四日二千八百九十七分入食限與大衍同襄公十四年壬寅嵗二月乙未朔日有食之今歷推之是嵗二月乙未朔加時在晝交分十四日一千三百九十三入食限也襄公十五年癸卯嵗秋八月丁巳日有食之薑氏云七月丁巳朔食失閏也大衍同今歷推之是嵗七月丁巳朔加時在晝去交分二十六日三千三百九十四分入食限襄公二十年戊申嵗冬十月丙辰朔日有食之今歷推之是嵗十月丙辰朔加時在晝交分十三日七千六百分入食限襄公二十一年己酉嵗九月庚戌朔日有食之今歷推之是月庚戌朔加時在晝交分十四日三千六百八十二分入食限冬十月庚辰朔日有食之薑氏云比月而食宜在誤條大衍亦以為然今歷推之十月巳過交限不應頻食薑説為是襄公二十三年辛亥嵗春王二月癸酉朔日有食之今歷推之是月癸酉朔加時在晝交分二十六日五千七百三分入食限襄公二十四年壬子嵗秋七月甲子朔日有食之既今歷推之是月甲子朔加時在晝日食九分六秒八月癸巳朔日有食之漢志董仲舒以為比食又既大衍云不應頻食在誤條今歷推之立分不叶不應食大衍説是襄公二十七年乙卯嵗冬十有二月乙亥朔日有食之薑氏云十一月乙亥朔交分入限應食大衍同今歷推之是嵗十一月乙亥朔加時在晝交分初日八百二十五分入食限昭公七年丙寅嵗夏四月甲辰朔日有食之今歷推之是月甲辰朔加時在晝交分二十七日二百九十八分入食限昭公十五年甲戌嵗六月丁巳朔日有食之大衍推五月丁巳朔食失一閏今歷推之是嵗五月丁巳朔加時在晝交分十三日九千五百六十七分入食限昭公十七年丙子嵗夏六月甲戌朔日有食之薑氏云六月乙巳朔交分不叶不應食當誤大衍云當在九月朔六月不應食薑氏是也今歷推之是嵗九月甲戌朔加時在晝交分二十六日七千六百五十分入食限昭公二十一年庚辰歲七月壬午朔日有食之今歷推之是月壬午朔加時在晝交分二十六日八千七百九十四分入食限昭公二十二年辛巳嵗十有二月癸酉朔日有食之今歷推之是月癸酉朔交分十四日一千八百入食限杜預以長歷推之當為癸卯非是昭公二十四年癸未嵗夏五月乙未朔日有食之今歷推之是月乙未朔加時在晝交分二十六日三千八百三十九分入食限昭公三十一年庚寅嵗十有二月辛亥朔日有食之今歷推之是月辛亥朔加時在晝交分二十六日六千一百二十八分入食限定公五年丙申嵗春三月辛亥朔日有食之今歷推之三月辛亥朔加時在晝交分十四日三百三十四分入食限定公十二年癸卯嵗十有一月丙寅朔日有食之今歷推之是嵗十月丙寅朔加時在晝交分十四日二千六百二十二分入食限蓋失一閏定公十五年丙午嵗八月庚辰朔日有食之今歷推之是月庚辰朔加時在晝交分十三日七千六百八十五分入食限哀公十四年庚申嵗五月庚申朔日有食之今歷推之是月庚申朔加時在晝交分二十六日九千二百一分入食限右春秋所載三十有七事以授時歷推之惟襄公二十一年十月庚辰朔及二十四年八月癸巳朔不入食限蓋自有歷以來無比月而食之理其三十五食食皆在朔經或不書日不書朔公羊穀梁以為食晦二者非左氏以為史官失之者得之其間或差一月二月者蓋古厯疏濶置閏失當之弊薑岌一行已有定説孔子作書但因時厯以書非大義所關故不必致詳也春秋大事表卷三
