body:
  text: 春秋大事表卷六上國子監司業顧棟髙撰列國地形犬牙相錯表先王建國各有分地紛若列碁界如分畛其後列侯争相侵奪務據勢勝而春秋列國之疆域繁然亂矣如山東濮州范縣為晉士㑹邑楚之子西為商公為今陕西商州之雒南縣學者多所不曉以此讀傳譬若矮人觀塲余竊病之今詳考輿圖各據今之州府而列春秋當日之地形犬牙錯互處以左氏經傳附註其下其在大國者無論即如鄭衛魯宋以一國而錯列㡬府邾滕郳薛以四國而並處一縣今兖州府滕縣他如吳楚徐越界在蠻夷未收版籍今日而欲知其交兵苦戰者在何地使命通接者在何方晉之通吳以制楚也滅偪陽以與宋通吳晉往來之道而今之沛縣實當南北之衝偪陽在今沛縣楚之通越以制吳也越大夫胥犴勞王于豫章之汭歸王乘舟且帥師從王而今之饒州實居楚越之界饒之鄱陽為楚饒之餘干為越以至山東不當有晉地觀隨武子之稱范在宣十五年滅潞之後而知其皆赤狄遺疆另有攷晉之封域彌大于景公之世陕西不當有楚地觀子西之為商公在文十年商臣之世而知少習武關早為楚有商城在武關西北百二十里楚之問鼎㡬成于踐土之前楚之順大江而直下也吳不能勝楚而盛兵以瞰東北多在廬壽潁亳之間晉之據桃林以西拒也秦不敢抗晉而竊出以窺東南多出上雒析城之界觀笠澤為吳越接戰之區則知苕霅為兩國莫居之地觀黄池為吳晉㑹盟之地則知運河早已合江淮沂濟之流黄池在今河南封邱縣吳既溝通江淮復闕為深溝于商魯之間北屬之沂西屬之濟以㑹晉于黄池沂水入泗濟在封邱縣南葢其水道自江入淮自淮入泗自泗入沂復穿魯宋之境連屬水道冇不通者鑿而通之以達于封邱之濟起揚州至封邱千有餘里即今日運河之故迹庶茫茫千載厯厯可見如審星以識度撫掌而指螺而凡行師道里之迂直逺近盟㑹徴調之疎數繁簡靡不曉然確知其故斯亦學春秋者之所必講也輯春秋列國地形犬牙相錯表第六河南河南府今府城西偏故河南縣為周王城即周公所營洛邑平王東遷居此府城東二十里洛陽故城為成周即周公所營下都敬王遷都于此狄泉本在下都城北定元年城成周繞狄泉于城内鞏縣西南七十里有轘轅山又洛水于鞏縣入河亦名什谷隋于此置洛口倉春秋謂之洛汭襄二十一年使候出諸轘轅昭元年趙孟舘于雒汭葢周晉往來必由之道昭二十五年尹文公涉于鞏杜註于鞏縣涉洛水也府城南三十里有闕塞山昭二十六年晉師納王使女寛守闕塞即此偃師縣南二十里有緱氏城為滑國僖公三十三年為秦所滅後屬晉成十七年鄭子駟侵晉虛滑後又屬周定六年鄭伐周馮滑胥靡皆此滑國也周人又謂之侯氏昭二十二年子朝之亂晉師軍于侯氏即此又偃師縣西二十里尸鄉亭為西亳春秋時係鄭地襄十一年同盟于亳城北即此澠池縣界有蚌為虢邑莊二十一年王巡虢守虢公為王宫于蚌即此永寧縣北六十里有崤山春秋時謂之二殽東北入渑池縣界本虢地後屬晉僖三十三年晉人敗秦師于殽即此詳見險要嵩縣本周之伊川地僖二十二年秦晉遷陸渾之戎于此昭十七年陸渾滅于晉陕州州南二里有焦城即焦國後并于晉為邑州西南三十二里有曲沃城為晉之瑕邑文十三年晉使詹嘉處瑕以守桃林之塞即此州硖石鎮西十五里有莘原為虢之莘地莊三十二年有神降于莘即此閿鄉縣東三十里有稠桑驛為虢桑田地僖二年虢公敗戎于桑田後入晉成十年傳晉景公召桑田巫即此靈寳縣為晉之桃林塞晉守之以拒秦處後為秦函谷關詳見險要盧氏縣有隂地城為晉之隂地宣二年趙盾自隂地率諸侯之師以侵鄭哀四年蠻子赤奔晉隂地杜俱註晉河南山北自上洛以東至陸渾上洛今陜西商州雒南縣陸渾今河南府嵩縣其地南阻終南北臨大河所謂河南山北也而盧氏縣乃命大夫屯戍之所猶南陽為河南之總名而别有南陽城則在修武也開封府今儀封封邱二縣為衛地祥符蘭陽中牟陽武鄢陵洧川尉氏鄭州河隂汜水滎陽滎澤一州十一縣皆鄭地陳留為陳地杞縣為宋雍邱地又鄭之圉地在杞縣南五十里與楚接界修干戈以虞患故曰圉昭五年韓起自楚至鄭鄭伯勞諸圉葢以此地為楚鄭接壤也又杞縣北四十里有鳴鴈亭為鄭鳴鴈地成十六年晉侯伐鄭至于鳴鴈即此又蘭陽縣東北二十里為宋户牖地哀十三年㑹于黄池吳人囚子服景伯而還及户牖歸之即此城東四十里有鄭時來地隠十一年公㑹鄭伯于時來即此又尉氏縣西南四十里有向城為鄭向地襄十一年諸侯師于向杜註鄭地即此又縣西北四十里菟氏城係鄭地昭五年鄭伯勞屈生于菟氏即此又為鄭大夫尉氏邑縣因以得名封邱縣為魯衛宋鄭四國錯壤在衛者曰平邱在魯者曰黄池在宋者曰長邱在鄭者曰蟲牢昭十三年㑹于平邱係衛地在封邱縣東四十里哀十三年㑹于黄池係魯地在封邱縣西南黄池為魯地從趙匡說胡文定謂為衛地者非文十一年傳鄋瞞伐宋宋敗之于長邱係宋地在封邱縣南八里即白溝也孟康曰長邱今翟溝是白音轉為翟又縣北三里有桐牢一名蟲牢係鄭地成五年同盟于蟲牢襄八年楚侵鄭至于蟲牢即此滎陽縣東二十里有隴城春秋時謂之垂隴係鄭地文二年盟于垂隴襄二十年鄭伯享趙孟于垂隴即此滎澤縣西北十五里有王宫城城内東北隅有踐土臺係鄭地僖二十八年盟于踐土即此去衡雍三十餘里括地志云原武縣西北七里有卷縣故城即衡雍城也虎牢在汜水縣南二里莊二十一年恵王與鄭以武公之略自虎牢以東後入晉襄十年諸侯戍鄭虎牢即此敖山在河隂縣西二十里宣十二年晉師在敖鄗之間即此敖山也秦于其地沿河置倉名曰敖倉北臨汴水酈生說漢髙據敖倉之粟即此宣十二年晉楚戰于邲邲城在鄭州東六里成十六年晉楚戰于鄢陵鄢陵城在今鄢陵縣西南四十里皆鄭地亦曰鄢隠元年鄭伯克段于鄢即此葢鄢本古國武公滅之初仍故名後乃改為鄢陵洧川縣南有鄭曲洧地成十七年諸侯伐鄭自戱童至于曲洧杜註新汲縣治曲洧城臨洧水在今縣南又縣西有鄭隂口地襄九年諸侯濟于隂阪次于隂口而還杜註隂阪洧津隂口鄭地名陽武縣北十里有鄭城棣地襄五年諸侯㑹于城棣以救陳杜註鄭地寰宇記有南棣城北棣城在縣北十里二棣城之間有博浪沙亭即子房擊始皇處陳留縣東北四十里有老邱城為宋老邱地定十五年鄭敗宋師于老邱即此陳州府今府治淮寧縣即陳宛邱地商水縣舊名南頓縣為古頓國定十四年為楚所滅光武父欽為南頓令項城縣為古項國僖十七年魯滅項後亦并于楚項氏世為楚將封于項即此又府治西北有犖城為宋地僖元年㑹于檉左傳一作犖即此西華縣西南有閻倉城為宋鬼閻地昭二十年八公子之徒與華氏戰于鬼閻杜註潁川長平縣西北有閻亭是也沈邱縣東有養城為楚養邑昭三十八年吳公子掩餘燭庸奔楚楚子大封而定其徙逆吳公子使居養是也扶溝縣為鄭桐邱地莊二十八年鄭人將奔桐邱今縣西二十里有桐邱亭許州府故許城在府治東三十里今為新設石梁縣故許國也成十五年許靈公畏鄭遷于葉鄭有其地仍謂之舊許襄十一年諸侯伐鄭東侵舊許即此地臨潁襄城長葛三縣皆鄭地臨潁即鄭莊公置母姜氏處長葛即繻葛隠五年宋人伐鄭圍長葛桓五年戰于繻葛皆其地也襄城為鄭南氾以周襄王出居于此故名又府治西北為鄭陽陵地當鄭國之南襄十年諸侯伐鄭至于陽陵即此郾城縣東四十五里為楚召陵地僖四年齊伐楚盟召陵昭十四年楚屈罷簡東國之兵于召陵即此禹州為鄭櫟地桓十五年鄭伯突入于櫟杜註櫟為鄭别都今禹州治後入楚昭元年楚靈王為令尹始城之至平王初立使子躬致鄭犫櫟之田事畢弗致禹州終為楚地宻縣新鄭皆鄭地宻縣為鄭新宻亦曰新城僖六年齊桓公伐鄭圍新城即此新鄭為鄭滅檜國地以别于初封之鄭故號曰新鄭縣北十三里有函陵僖三十年晉秦圍鄭晉軍函陵即此又縣東北有制城成十六年伐鄭諸侯遷于制田是也歸徳府宋全有商邱寧陵鹿邑夏邑永城虞城睢州考城柘城一州八縣之地今鹿邑縣西十三里為陳鳴鹿地成十六年諸侯之師侵陳至于鳴鹿即此睢州接寧陵縣境為衛首止地僖五年㑹王世子于首止即此又寧陵縣西南七十里有大棘城為春秋時宋鄭戰處後為楚莊所并今大棘城有楚太子建墳及伍員釣臺睢州境内有衛襄牛地僖二十八年衛侯出居于襄牛杜註云衛地即此又州東南有鄭鄫地襄元年諸侯之師次于鄫杜註鄭地在陳留襄邑縣東南考城縣東有葵邱係宋地僖九年㑹于葵邱即此縣西三十六里有黄溝為宋黄地隠元年傳恵公之季年敗宋師于黄即此僖二十二年宋楚戰于泓泓水名在今柘城縣北三十里夏邑縣西南有曹黍邱地哀七年宋人伐曹築五邑于其郊曰黍邱揖邱大城鍾䢴杜註梁國下邑縣西南有黍邱亭案下邑漢縣金改曰夏邑今仍之汝州楚文王封畛于汝楚地止于汝水之南成十六年楚以汝隂之田求成于鄭髙氏曰汝水出汝州魯山縣至潁州入淮其在汝州郟縣及裕州葉縣間者汝隂田也郟自是入鄭後復入楚昭元年楚靈王為令尹城郟十九年令尹子瑕復城之郟復為楚地魯山縣有鄭繞角地成六年晉欒書救鄭與楚師遇于繞角即此杜佑通典汝州魯山縣東南繞角城伊陽縣為周邥垂地文十七年甘􅍦敗戎于邥垂葢即伊洛之戎與伊陽接境昭二十九年晉趙鞅荀寅帥師城汝濱杜註即晉所取陸渾地陸渾在河南府嵩縣地相接又州東南五十里有鄭魚齒山襄十八年楚師伐鄭涉于魚齒之下杜註魚齒山下有滍水故言涉又州西南有蠻城為春秋時戎蠻子國昭十六年楚誘戎蠻子嘉殺之哀四年晉執戎蠻子赤歸于楚自是地滅于楚矣懐慶府鄭氏詩譜曰周東都畿内方六百里北得河陽河陽在河之北即懐慶府也隠十一年桓王與鄭蘇忿生之田十二邑鄭不能有復歸周桓七年王遷盟向之民于郟僖二十五年襄王賜晉文公以陽樊溫原攢茅之田晉始啟南陽由是懐慶所屬七縣原武屬鄭濟源修武孟縣溫縣屬晉王所有者河内武陟二縣而已僖二十五年殺大叔于隰城即隰郕在懐慶府河内縣成十一年卻至與周争鄇田鄇即鄇人亭在懐慶府武陟縣案僖二十八年晉敗楚師于城濮城濮為衛地在今山東曹州府濮州南七十里甲午至于衡雍作王宫于踐土踐土在今開封府滎澤縣西北十五里衡雍在原武縣西北七里皆鄭地天王狩于河陽河陽城在孟縣西南三十里㑹于溫溫城在今溫縣西南三十里皆晉地葢文公伐衛致楚因而勝之還師由衛歴鄭及周渡河而北返于河陽道里歴歴可見衛輝府今淇縣為衛朝歌康叔始封都此汲縣為衛河内輝縣為衛百泉後俱屬晉延津縣為鄭廪延邑亦曰酸棗隠元年傳大叔收貳以為己邑至于廪延襄三十年㳺吉奔晉駟帶追之及酸棗廪延酸棗同一地滑縣為衛漕邑戴公廬曹即此縣東六十里有衛南故城為衛楚邱文公遷都于此濬縣為晉雍榆及牽地襄二十三年叔孫豹救晉次于雍榆定十四年㑹于牽皆在濬縣境新鄉縣為晉厥憖昭十一年晉㑹諸侯于厥憖謀救蔡即此彰徳府今安陽縣有衛商任地襄二十一年㑹于商任以錮欒氏即此内黄縣北有衛戯陽城昭九年晉荀寅如齊逆女還卒于戯陽即此林縣西北林慮山洹水所出經臨漳安陽内黄而入衛水亦曰安陽河成十七年聲伯夢渉洹即此水也汝寧府江國在汝寧府真陽縣東道國在確山縣北二十里有道城柏國在西平縣西有柏亭房國在今遂平縣西北百里楚後以封吳夫概王謂之吳房沈國在今汝寧府治東南皆滅于楚蔡始封上蔡縣昭十三年平侯徙新蔡至哀二年冬吳更遷蔡于州來由是汝寧一府全境皆楚地信陽州為楚大隧直轅𡨕阨三關之地吳兵陸行入楚之隘道𡨕阨一名平靖關在州東南九十里大隧一名武陽關在州東南一百五十里直轅一名黄峴關在州南九十里俱與湖廣徳安府應山縣接界所謂義陽三關之塞也詳見險要光州今光州西十二里有黄城息縣西南七里有息城賴在息縣東北商城縣南有賴城固始縣西北七十里有期思城為蔣國又蓼國在今固始縣東北蓼城岡即文五年楚所滅之蓼國也五國皆滅于楚全境皆楚地息縣東有白城楚白公封邑哀十六年𫝊子西召太子建之子勝于吳使處吳境為白公杜註白楚邑今汝隂褒信縣西南有白亭是也在今息縣東北七十里南陽府故申城在府治南陽縣故吕城在府城西三十里蓼國在唐縣南八十里此蓼為楚武王克州蓼之蓼桓十一年傳所謂隨絞州蓼伐楚師者也與文五年所滅之蓼不同三國皆滅于楚南陽唯犨邑屬鄭後仍屬楚昭元年楚靈王為令尹城犨即此由是南陽一府皆為楚地矣又南陽縣北為楚武城地僖六年許僖公見楚子于武城襄九年秦人侵晉楚子師于武城為秦援楚有事于中國恒出兵于此又淅川縣境有豐鄉城地與鄖陽之上津接為楚豐邑哀四年司馬起豐析與狄戎以臨上雒杜註析縣屬南鄉郡析南有豐鄉皆楚邑又内鄉縣西南有三户亭哀四年晉執蠻子與其五大夫以卑楚師于三户杜註今丹水縣北三户亭是也裕州為楚方城築連城以拒中國處齊晉伐楚必及此地方城山在今裕州東北四十里北連葉縣楚人因山爲固起葉縣至唐縣築城連接數百里國語齊桓公伐楚濟汝踰方城左傳文三年晉陽處父伐楚以救江門于方城襄十六年荀偃伐楚侵方城之外為楚之重鎮受兵處山東兖州府魯有曲阜滋陽寧陽泗水金鄉魚臺汶上及濟寧州嘉祥縣凡一州八縣之地後兼涉滕鄒嶧三縣境嘉祥縣西二十五里有獲麟堆哀十四年傳西狩于大野獲麟杜註大野在髙平鉅野縣東北大澤是也案今嘉祥縣即鉅野縣之所分金皇統中析置金鄉縣東北二十里為宋緡邑僖二十三年齊侯伐宋圍緡二十六年楚人伐宋圍緡即此為宋邊境數被齊楚侵伐鄒縣東南二十六里為邾國地文十三年邾文公遷于繹繹即鄒山後改國號曰鄒以此滕縣為滕薛郳三國滕城在縣西南十四里薛城在縣南四十里郳城在縣東六里又縣北為邾絞邑哀二年伐邾將伐絞即此陽穀縣為齊地僖三年齊宋江黄㑹于陽穀即此又縣東有阿澤為衛地與東阿縣接界為今運道所經有七級上下二閘即襄十四年孫氏敗公徒于阿澤處嶧縣東八十里為鄫地濟寧州治為任國又州東南有邿城為邿國襄十三年并于魯又滕縣南十五里有漷河為邾田襄十九年取邾田自漷水哀二年季孫斯伐邾取漷東田由是魯地兼涉滕縣之境濟南府今府治歴城縣南十里為齊之鞌地成二年齊晉戰處髙氏曰穀梁傳鞌去齊五百里括地志及通典並以鞌在平隂縣今平隂至臨淄果得五百餘里以傅㑹穀梁之說似可信乃以本傳考之壬申晉師至于靡笄之下癸酉師陳于鞌自始合以至齊敗三周華不注止為一日事甚明案華不注山在濟南城北見于水經無可疑者若云鞌在平隂則去濟南二百三十里何由一奔遂至此近志云鞌即古之歴下殆不易之論也史記云戰于靡下徐廣云靡當作歴葢因靡笄之下省文為靡下靡字又譌而為歴耳按髙氏之說極精鞌當在歴城無疑又今歴城縣西南有小清河春秋時謂之濼水桓十八年公㑹齊侯于濼即此其源即趵突泉濟水伏流重𤼵處志云濟之南源也又東北合大清河即濟瀆水經注濼水出歴城縣故城西南泉源上湧若輪春秋桓公㑹齊侯于濼是也其水北為大明湖引瀆入西郭北流逕歴城東引水為流桮池州僚賓燕多萃其上又北注濼水今濼水並城北流大明湖在城内自城北水門合濼水又東北經華不注山合華泉又東北合大清河齊河縣境有大清河自泰安府平隂縣流入長清縣又東北入齊河縣境春秋時謂之濟水隠二年齊鄭盟于石門鄭伯之車僨于濟即此石門在長清縣西南濟水之門也舊有石門在岸側去水三百步今圯于水又齊河縣北有晏城為晏平仲采邑縣東有齊野井昭二十五年齊侯唁公于野井即此又長清縣西南二十五里有盧城為齊公子髙徯采邑成十七年齊髙弱以盧叛襄十八年晉趙武韓起以上軍圍盧即此又歴城縣東三十里有鮑城在鮑山下為鮑叔牙采邑山因城名又長清縣豐齊鎮北二里有故祝柯城襄十九年諸侯盟于祝柯即此左傳謂之督揚唐乾元二年史思明侵濟南守將李銳于長清邊家口决大河東至縣縣遂淪陷移治于遷善鎮即今禹城縣治又禹城縣北四十里有故髙唐城襄十九年夙沙衛入于髙唐以叛即此二十五年祝佗父祭于髙唐杜註髙唐有齊别廟為齊之宗邑猶宋之亳晉之曲沃齊景公母穆孟姬為陳氏請髙唐陳氏始大又禹城縣西北有轅城為齊轅邑哀十年晉趙鞅伐齊取犂及轅即此章邱縣西北三十里有賴亭為齊賴邑哀六年胡姬以安孺子居賴即此西北六十里有崔氏城為崔杼邑襄二十七年崔成請老于崔即此長山縣西南二十里有於陵城為齊於陵邑左傳謂之夫于昭十年陳桓子召子周與之夫于即此戰國時陳仲子所居臨邑縣西十里為齊犂邑即哀十年晉趙鞅伐齊所取者武定府今海豐縣為齊之無棣邑水經注清河入南皮縣界分為無棣溝流逕髙城入海今河間府滄州之慶雲縣及武定府之海豐縣皆有無棣溝舊合鬲津河入海通魚鹽之利今淤泰安府今府治泰安縣城北五里有泰山史記貨殖傳其陽則魯其隂則齊萊蕪縣東二十里為牟國地通典牟國在登州蓬萊縣似誤此漢之東牟縣也新泰縣為魯平陽宣八年城平陽即此東阿縣為齊阿邑亦曰柯莊十三年齊桓為柯之盟即此又縣東北有清亭為衛清邑隠四年公及宋公遇于清即此縣西二十五里有桃城為衛桃邱邑桓十年公㑹衛侯于桃邱即此肥城縣為齊平隂地襄十八年諸侯伐齊齊侯禦諸平隂今故城在縣東北三十五里又平隂縣東南為齊京兹邑縣西為齊邿邑荀偃士匄以中軍克京兹魏絳欒盈以下軍克邿即其地東平州東二十里為㝛國莊十年宋人遷㝛更為宋地又州東六十里為鄣國紀附庸也莊三十年降齊為齊地沂州府今府治北十五里有開陽城故鄅國後入魯為啓陽邑哀三年季孫叔孫城啓陽即此費縣為魯費邑僖公賜季友為采邑沂水縣東南有牟縣為東夷根牟國宣九年取根牟更為魯地昭八年蒐于紅自根牟至于商衛革車千乘商即宋宋衛在魯西葢由魯極東以至極西舉全境而言也又沂水縣治西北四十里有古鄆城為魯之東鄆莒魯所争者文十二年季孫行父帥師城諸及鄆此時鄆葢屬魯後入于莒成九年楚子重圍莒莒潰楚遂入鄆即此鄆也至昭元年季孫㝛伐莒取鄆自是鄆常為魯有矣莒州為莒國戰國時入齊為邑齊湣王走莒即此郯城縣為郯國與江南邳州接界宣四年公㑹齊侯平莒及郯葢二國本鄰近也蒙隂縣西北堂阜溪上有夷吾亭為管仲稅囚處係齊地曹州府定陶縣為曹都詩譜云在雷夏荷澤之野夾于魯衛之間今府治荷澤縣是其地也又濮州西南五十里有洮城為曹地僖三十一年晉文公分曹地自洮以南東傅于濟齊桓公嘗盟諸侯于此曹縣南八十里為曹南山僖十九年宋人曹人邾人盟于曹南范氏曰曹南曹之南鄙是也詳見曹山川又曹縣境内有鄭武父地桓十二年公㑹鄭伯盟于武父杜註武父鄭地即此又曹縣西十里為宋貫地僖二年齊侯宋公江人黄人盟于貰杜註宋地又縣北三十里為宋穀邱地桓十二年公㑹宋公燕人盟于穀邱即此曹縣東南四十里為衛楚邱邑隠七年戎伐凡伯于楚邱以歸襄十年宋公享晉侯于楚邱即此其地葢在曹宋之間是為衛之南楚邱與滑縣之楚邱有别又曹縣東北八十里為曹重邱邑襄十七年衛孫蒯田于曹隧飲馬于重邱重邱人訽之遂伐曹取重邱杜註重邱曹地髙氏云案六韜周志古亡國三十其中有重邱國以美女遺青陽路史曰在曹州寰宇記重邱在乘氏縣東北三十一里漢乘氏縣隋以後俱屬曹州今故城在曹縣東北五十里或云在東昌府東南跨茌平縣界乃襄二十五年諸侯同盟之重邱此係齊地杜氏明註兩國不可混方輿紀要混而一之似誤又縣北有大鄉城為曹鄸邑昭二十年曹公孫㑹自鄸出奔宋杜註鄸曹邑即此又曹縣東北為宋鹿上地僖二十一年宋人齊人楚人盟于鹿上杜註宋地又縣東北三十里為魯生竇地為齊魯交界莊九年殺子糾于生竇即此濮州南七十里有臨濮城為衛城濮地僖二十七年晉敗楚師于城濮即此所謂伐衛以致楚是也觀城縣為衛五鹿地與直𨽻大名府開州接界晉文公還自南河濟侵曹伐衛取五鹿即此詳見開州鄆城縣為魯西鄆成四年城鄆杜註公欲叛晉故城之以為備葢與晉接界昭二十六年齊取之以居公者城武縣東北三十二里有梁邱城為魯地莊三十二年齊侯宋公遇于梁邱即此又縣東南有北郜城為郜國有南郜城為宋邑隠十年歸于魯單縣即魯單父縣宓子賤鳴琴而治者范縣為晉士㑹邑今縣東三里有士㑹墓後范入齊為邑孟子自范之齊即此葢春秋之末范氏叛晉齊衛助之而范因以入齊耳據此則范在齊衛之間益信季氏私考疑濮州衛地晉不應以封其大夫士氏本居隨疑范為隨之别名者非也又范縣東南七十里有廪邱故城為齊之廪邱邑又有羊角城為衛之羊角邑鄆城東北與范縣接界為魯之髙魚邑襄二十六年齊烏餘以廪邱奔晉又襲衛羊角襲魯髙魚又取地于宋明年晉悉以其地還諸侯則范縣鄆城之境為齊晉宋魯衛五國之交界地最分錯又范縣南二里有秦亭為魯地莊三十一年築臺于秦杜註東平范縣西北有秦亭是也又范縣東南五十里有顧城為齊地哀二十一年公及齊侯盟于顧杜註顧齊地詩云韋顧既伐昆吾夏桀即此顧也東昌府今府治聊城縣為齊聊聶晏子所謂聊聶以東也堂邑縣為齊棠邑棠公為棠邑大夫孟子勸齊王𤼵棠即此後譌為棠茌平縣為齊重邱襄二十五年同盟于重邱即此又大隧在今髙唐州境襄十九年齊及晉平盟于大隧即此皆齊地又縣西南十二里有夷儀聚為邢國地僖二年邢遷于夷儀即此衛滅邢地入于衛後又入晉定九年齊伐晉夷儀葢齊晉衛三國接壤地冠縣為晉冠氏邑哀十五年齊伐晉取冠氏即此邱縣為晉乾侯邑昭公出居于乾侯即此係晉地桓十六年傳衛使公子伋如齊使盗待諸莘杜註衛地成二年戰于鞌傳晉師從齊師于莘杜註齊地今案東昌府莘縣西去府治七十里從東昌府治至濟南府治歴城縣中經茌平長清齊河三縣共二百四十里鞌為歴城縣從莘至鞌約計三百一十里髙氏疑其太逺遂疑莘非今日之莘縣然愚嘗就傳文考之上云及衛地韓獻子將斬人云云下遂云師從齊師于莘六月壬申師至于靡笄之下則知莘與鞌中間原隔幾日觀其特志月日可見葢當日莘地必有齊之偏師侵略衛疆而未返者晉師適遇遂與交戰縁是偏師零卒望風披靡故不言勝負至六月壬申遂長驅至靡笄之下則傳所云從齊師者乃是志前月事耳考今日之地理細案傳文之時日可以瞭然無疑莘應專屬衛地杜兩注者猶屬騎牆之見也恩縣為晉東陽地襄二十三年齊伐晉趙勝帥東陽之師追之獲晏氂又昭二十二年晉荀吳略東陽以滅皷杜兩註俱云東陽晉之山東廣平以北王氏曰自漢以前東陽大抵為晉太行山東地非有城邑楚漢之間始置東陽郡漢置東陽縣屬清河郡今恩縣西北六十里東陽故城是也據此則東陽之地極廣今直𨽻之冀州及廣平府之清河縣皆晉東陽之境青州府今臨淄縣為太公始封之營邱博興縣為齊薄姑左氏作蒲姑本殷末薄姑氏國成王時薄姑與四國作亂成王滅之以益太公之封後胡公徙都于此一名姑棼莊八年齊襄公逰于姑棼即其地臨淄縣西五十里為齊葵邱莊八年齊侯使連稱管至父戍葵邱杜註臨淄縣西有地名葵邱是也葢二人以久戍而怨非以逺戍而怨若僖九年㑹于葵邱此係宋地在河南考城縣東又博興縣南五里有貝中聚為齊貝邱京相璠曰博昌縣南有地名貝邱即齊襄公田處府治益都縣西南為齊馬陘史記作馬陵成二年齊晉戰于鞌晉師追齊師入自邱輿擊馬陘即此齊乘淄水出益都岳陽山北經萊蕪谷又北經長峪道亦曰馬陵即卻克追齊侯處邱輿亦在益都界博山縣東有萊蕪故城為魯夾谷邑定十年齊魯㑹于夾谷即此臨朐縣東南一百五里大峴山上有齊穆陵關山髙七十丈周圍二十里道徑危惡僅容一軌為齊南天險劉裕伐南燕慕容超兵過大峴舉手指天喜形于色即此詳見險要僖四年管仲對楚使曰齊地南至于穆陵葢齊之南境止此過此為莒魯二國境又杜氏通典臨朐縣東有東陽城為齊東陽邑襄二年晏弱城東陽以逼萊子即此案此係齊地與晉之東陽有别安邱縣東北三十里有廢淳于城為故淳于國春秋桓五年冬淳于公如曹度其國危遂不復後入杞為杞都昌樂縣東南五十里有廢營陵城春秋謂之縁陵僖十四年淮夷病杞齊桓遷杞縁陵即此後杞復遷淳于又安邱縣西南有防亭為莒防邑昭五年莒牟夷以牟婁及防兹來奔遂屬魯案此防本屬莒地與魯之東防西防有别諸城縣東北有婁鄉城為把牟婁邑隠三年莒人伐把取牟婁自是遂屬莒杜註城陽諸縣東北有婁鄉是也昭五年莒牟夷又以奔魯亦與安邱接境葢二縣本連壤又諸城縣西有兹亭為莒兹邑昭五年莒牟夷以防兹來奔即此兹也又諸城縣治西南三十里有古諸城為魯諸邑莊二十九年城諸及防杜註諸今城陽諸縣是也又文十二年季孫行父城諸及鄆又安邱縣東北十里有渠邱亭為莒渠邱邑成九年楚子重伐莒圍渠丘渠邱城惡衆潰奔莒楚師圍莒莒城亦惡莒潰楚遂入鄆浹辰之間楚克其三城葢地相近也莒為莒州鄆為今沂水縣向俱屬青州府今改屬沂州府登州府今黄縣東二十里有萊子城即萊國襄六年齊滅之為邑二十八年慶封田于萊即此通典萊州治掖縣春秋萊子國亦為東萊郡以在齊國之東故曰東萊葢萊之幅員廣逺由萊跨登以至于海也萊州府今髙密縣西有黔陬城為介國地膠州南七十里又有介亭葢髙密與膠州連壤也即墨縣有棠鄉為萊之棠邑左傳齊入萊萊共公奔棠晏弱圍棠滅之按史記營邱邊萊萊地甚廣亘登萊二府之境自是齊地東盡于海矣又髙密縣為晏子封邑葢亦以晏弱滅萊棠之故又髙密縣東四十里有計斤城春秋時謂之介根莒兹輿期始封邑也春秋初徙于莒此為莒别邑襄二十四年齊侯伐莒取介根杜註莒邑今城陽黔陬縣東北計基城是也漢置計斤縣春秋大事表卷六上欽定四庫全書春秋大事表卷六中國子監司業顧棟髙撰直𨽻順天府今大興縣為古薊燕所都史記曰武王封帝堯之後于薊張守節正義曰召公始封葢在北平無終縣以燕山為名後漸强盛乃并薊徙居之至王喜二十九年秦攻拔我薊燕始亡永平府今玉田縣治西有古無終城為春秋時無終子國盧龍縣有舊肥如縣城應劭曰肥子奔燕燕封之于此保定府今唐縣北八里有唐山為燕唐邑亦曰陽昭十二年齊髙偃帥師納北燕伯于陽左傳作唐一地二名又唐縣東北十三里有中人城為鮮虞中人邑昭十二年晉荀吳帥師侵鮮虞及中人即此完縣東南三十里為晉逆畤邑哀四年齊國夏伐晉取逆畤酈道元以為即曲逆也張晏曰濡水于城北曲而西流故名漢封陳平為曲逆侯即此易州今易州為燕之下都記曰易者燕桓侯之别都又曰燕文公遷易二君皆在春秋時是燕之有易猶夫晉之曲沃齊之髙唐以先君所常居而謂之下都又燕昭王築黄金臺在易水東南十八里子丹踵其迹荆軻歌風蕭蕭兮易水寒是其地也又寰宇記燕召公始封即今淶水縣後徙于薊河間府任邱縣為燕濡上地昭七年齊侯次于虢燕人行成盟于濡上杜註濡水出髙陽縣東北至河間鄚縣入易水鄚縣在今任邱縣境則濡上當在今安州任邱間皇輿表以景州為晉條邑左傳晉穆侯以條之役生太子案穆侯時晉地不應到此疑未敢信天津府今滄州境有燕虢地昭七年齊侯次于虢杜註虢燕境即此慶雲縣為春秋時齊之無棣案杜氏通典鹽山春秋時之無棣邑也元分其地置兩無棣縣一屬河間路之滄州一屬濟南路之棣州明改河間之無棣為慶雲改濟南之無棣為海豐葢二縣皆與鹽山接壤也今慶雲屬天津府海豐屬山東武定府真定府今府治西北四十里有鮮虞亭為春秋時鮮虞國左傳亦曰中山晉州治為鼓國又州東南為春秋時昔陽昭二十二年晉荀吳略東陽使師偽糴者負甲以息于昔陽之門外遂襲鼓滅之昔陽即鼓子都藳城縣西南七里為肥國昭十二年晉滅肥即此欒城縣為晉欒邑欒武子所封哀四年齊國夏伐晉取欒即此平山縣為晉蒲邑在真定府西九十里趙州今州城中有棘蒲社為晉棘蒲地哀元年師及齊師衛孔圉鮮虞人伐晉取棘蒲即此柏鄉縣北十二里有古鄗城為晉鄗邑哀四年齊國夏伐晉取鄗讀若郭光武即位于鄗南更名曰髙邑北齊天保六年移治于房子縣東北去舊城三十里即今髙邑縣臨城縣治東有古臨城為晉之臨邑哀四年趙鞅圍邯鄲邯鄲降荀寅奔鮮虞趙稷奔臨即此冀州今州治為晉之東陽地荀吳略東陽以滅鼓即此順徳府今邢臺縣西南為邢國後入晉為邢邑晉以申公巫臣為邢大夫哀四年齊國夏伐晉取邢即此任縣東南為晉任邑襄三十年鄭羽頡奔晉為任大夫哀四年齊國夏伐晉取任即此唐山縣西十二里有柏人故城為晉之柏人邑皇甫謐曰柏人城堯所都也哀四年齊弦施㑹鮮虞納荀寅于柏人即漢高帝過柏人心動處廣平府今邯鄲縣為晉之邯鄲邑向屬衛後屬晉定十三年趙鞅殺邯鄲午午子趙稷以邯鄲叛即此又縣西為晉五氏邑亦曰寒氏為邯鄲午之食邑襄二十七年衛侯之弟鱄出奔晉託于木門杜註木門晉邑高氏按穀梁傳曰織絇邯鄲終身不言衛木門當在邯鄲之境成安縣東南十三里為晉乾侯邑昭二十八年公如晉次于乾侯即此漢為斥邱縣闞駰曰地多斥鹵因名或又以乾侯為山東東昌府之邱縣意當與成安接壤或以斥邱而誤脫一斥字也清河縣治東杜佑曰齊地亦為晉東陽之境孔穎達曰東陽是寛大之語總謂晉之太行山東地永年縣東北為晉曲梁邑本赤狄之地宣十五年晉荀林父敗赤狄于曲梁遂滅潞又晉侯之弟揚干亂行于曲梁即此又襄三年諸侯同盟于雞澤杜註在廣平曲梁縣西南當亦在永年縣境若今之雞澤縣乃隋析廣平縣所置非春秋時雞澤也大名府今開州治西南三十里有濮陽城為衛帝邱僖三十一年衛成公遷都于此又州西北為衛澶淵與河南彰徳府内黄縣接界襄二十年晉及諸侯㑹于澶淵即此又州北五里為衛鐵邱哀二年晉趙鞅鄭罕達戰于鐵即此又二里為衛孫氏之戚邑文元年晉侯疆戚田即此又州東南為衛歛盂僖二十八年晉侯齊侯盟于歛盂即此東南三十里為衛清邱宣十二年同盟于清邱即此東南六十里為衛鹹地僖十三年㑹于鹹即此又州東有衛圉城襄二十六年孫蒯敗衛師于圉即此又東二十五里為昆吾觀哀十七年衛侯夢于北宫見人登昆吾之觀即此又戚東鄙為衛茅氏襄二十六年晉戍茅氏即此俱在開州境為㑹盟要地孫氏之難晉助孫氏衛之受師亦多于此葢開州瀕河東與東昌觀城縣接界北與内黄縣接界據中國要樞不獨衛之重地抑亦晉鄭吳楚之孔道也府東四十五里有晉沙鹿山僖十四年沙鹿崩杜註陽平元城縣東有沙鹿土山是也又府東有沙亭為衛沙地定七年齊侯衛侯盟于沙杜註陽平元城縣東有沙亭又府東四十五里為衛五鹿邑杜註陽平元城縣東亦有五鹿晉文公過衛乞食野人處也僖二十八年晉伐衛取之後仍入衛最後復入于晉哀元年齊衛救邯鄲午之子稷于邯鄲圍五鹿四年齊衛救范氏圍五鹿即此案晉之沙鹿與衛之五鹿及沙三地杜註俱云在元城縣東且名亦相近穀梁云沙山名林屬于山為鹿杜註云沙鹿土山也豈五鹿亦沙鹿之旁地而沙亦以山得名歟且五鹿迭屬晉衛葢為兩國之接壤而齊衛伐晉首先交兵之地定七年傳衛侯欲叛晉諸大夫不可乃使北宫結如齊而私于齊侯曰執結以侵我齊侯從之乃盟于瑣瑣即沙也齊侯結叛晉公然于晉之近地無所忌憚猶晉悼公㑹十二國諸侯于楚之柤地葢欲張其聲勢以觀其應敵何如耳是時晉伯極衰政在大夫怙然置不為意而哀元年及四年齊衛遂屢次連兵以伐五鹿矣觀此則沙與五鹿之為近地益信又府治東南為衛馬陵地成七年公㑹諸侯同盟于馬陵即此戰國時孫臏射殺龎㳙處魏縣南二十里為衛新築地成二年齊衛戰于新築即此長垣縣治為衛寗氏之蒲邑桓三年齊侯衛侯胥命于蒲即此又縣東北有祭城為祭仲邑又縣西北六十里與河南衛輝府滑縣接界為衛訾婁地僖十八年邢狄伐衛衛侯師于訾婁即此又縣西南十五里為衛之匡邑僖十五年諸侯盟于牡邱遂次于匡文八年晉侯使解揚歸匡戚之田于衛論語子畏于匡即此陜西西安府今咸陽縣北五里有畢原係畢公髙所封竹書穆王十四年狄人侵畢後不知何以亡春秋時裔孫畢萬仕晉臨潼縣東二十里為春秋時驪戎國國語云晉滅驪戎史記年表稱在獻公之五年實魯莊公之二十二年也其地亦曰櫟陽史記秦獻公二年徙都櫟陽櫟陽城在臨潼縣北三十里據此則驪戎地當入于秦又縣竟為秦侯麗地路史云麗與驪通即驪戎國成十三年晉及諸侯之師伐秦濟涇及侯麗而還則此時驪戎之地已為秦有距晉滅驪戎之歲凡九十五年其由晉入秦之年則不可考矣舊以為晉之櫟邑非也襄十一年秦晉戰于櫟左傳庶長武濟自輔氏與鮑交伐晉師則櫟當為河以東之地櫟陽去河絶逺不得牽混鄠縣為西周豐邑今縣東五里有酆宫又二十五里有靈囿囿中有靈臺髙二丈周一百二十步僖十五年秦獲晉侯舍諸靈臺即此鄠縣東有酆國左傳所謂畢原酆郇文之昭也即文王所宅之酆邑本崇侯虎國文王克崇而居之故詩云既伐于崇作邑于豐武王既遷鎬京封其弟于此竹書成王十九年巡狩侯甸正百官黜酆侯葢絶封久矣宣元年晉趙穿帥師侵崇杜註秦與國葢復居酆而襲崇之舊號者渭南縣北五十里有下邽城秦武公所置又涇水自乾州永夀縣來南歴西安府醴泉縣之谷口又東南過涇陽至髙陵縣西南十里合于渭水涇陽有睢城渡即諸侯濟涇秦人毒涇上流處又縣西南有麻隧地晉秦戰于麻隧即此商州今州治為晉之上雒邑及莬和倉野之地哀四年蠻子赤奔晉隂地楚起豐析與狄戎以臨上雒左師軍于莬和右師軍于倉野水經注丹水自倉野東歴莬和山又東至商縣上雒春秋時晉地即今商州治也今州南百四十里有倉野聚雒南縣為楚之商邑文十年傳楚子西為商公杜註商楚邑今上雒商縣上雒廢城在今商州東九十里古商邑本契所封春秋時屬楚葢近河南南陽府界盛𢎞之荆州記武關西北百二十里有商城又哀四年楚使謂隂地之命大夫曰將通于少習以聽命杜註商縣武關也春秋時武關屬楚在商州東少習山下故亦名少習同州府今朝邑縣西二里有故臨晉城為秦之王城僖十五年晉隂飴甥㑹秦伯盟于王城二十四年晉文公濳㑹秦伯于王城是也本芮國地竹書秦穆公二年滅芮築壘以臨晉地故曰臨晉亦曰大茘城史記厲共公十六年塹河旁以兵二萬攻大茘取其王城葢厲共公在春秋之末地失于戎而秦復取之也今新設府治大茘縣亦以此得名又縣西北十三里有輔氏城為晉之輔氏地宣十五年秦伐晉次于輔氏襄十一年庶長武濟自輔氏為晉濱河以西要地韓城縣舊為韓梁二國地韓在春秋前為晉文侯所滅後為桓叔子韓萬食邑僖十五年晉惠公獲于韓即此梁于僖十九年秦穆公滅之為少梁邑後亦入于晉文十年晉人取少梁韓在縣東南二十里少梁城在縣南二十里澄城縣南二十二里為晉北徴邑後入于秦文十年秦伐晉取北徴即此又縣有泉出匱谷中造酒極美名曰酒泉莊二十一年王與虢公酒泉杜註周邑由是虢地跨河東西晉滅虢因有其地又縣東北二十里為秦之新城邑即梁國之新里秦取之謂之新城文四年晉侯伐秦圍刓新城即此白水縣東北六十里與郃陽接界有彭衙古城為秦之彭衙邑本戎地史記秦武公元年伐彭戯氏至于華山正義云彭戯即彭衙也後入于晉文二年晉伐秦取汪及彭衙而還汪亦在白水縣界郃陽縣東南有刳首坑為秦刳首地與山西蒲州府猗氏縣接界文七年晉敗秦于令狐至于刳首杜註從刳首去也闞駰曰令狐即猗氏其處猶名狐村今猗氏縣西十五里有令狐城係晉地在河之東與秦之刳首隔河相接華州為秦棫林襄十四年晉師伐秦至棫林即此舊為宣王弟友采邑為畿内咸林地後鄭東徙秦因有之亦曰舊鄭史記秦武公十一年初縣杜鄭是也時當魯莊公之七年後嘗屬晉葢晉獻公取之至僖十五年晉惠公賂秦伯以河外列城五南至華山即舊鄭之地自是棫林長為秦有矣又州城東北十三里爲晉之武城邑文公八年秦伐晉取武城即此一名武平城華隂縣為晉之隂晉邑華山在縣南十里髙氏曰晉賂秦東盡虢略南至華山葢隂晉亦在五城之中矣案春秋時晉有桃林為函關而隂晉更在函關西百里楚有少習為武關而商邑更在武關西北百二十里俱在今同州府及華州之境是時秦地蹙狹迫于晉楚南出滅鄀而鄀終為楚有東出襲鄭滅滑而滑適為晉有扼秦之吭幾二百年逮孝公據殽函之地惠王兼武關而有之秦遂虎視以雄列國矣乾州今武功縣南有秦終南山左傳作中南昭四年司馬侯曰荆山中南九州之險杜註在始平武功縣南又涇水自平涼府涇州來經州及長武邠州淳化永夀之境俱詳見秦山川鳳翔府今府治鳳翔縣城南有故雍城為秦雍都史記年表秦徳公元年卜居雍後子孫飲馬于河時當春秋莊公之十七年後世世都之僖十三年秦輸粟于晉自雍及絳相繼杜註雍秦國都是也至戰國初獻公始徙都櫟陽然雍仍為故都昭襄王五十四年郊見上帝于雍始皇九年上㝛雍槖泉蘄年棫陽諸宫俱在故雍都岐山縣為周西岐之地幽王末陷于犬戎秦襄公逐戎即有其地寳雞縣東五十里為古小虢案西虢君隨平王東遷王别封之于河南陜縣其支庶之留于雍者謂之小虢亦曰桃虢城秦武公十一年滅之時當春秋莊公之七年又縣東二十里有故陳倉城為秦文公所築其孫武公増搆徙都之又有陳倉山即文公獲陳寳處其地在汧水之南渭水之北所云汧渭之間郿縣西四十六里為秦平陽史記年表秦寧公二年遷平陽春秋隠公之九年也興安州皇輿表以興安州為庸國地文十六年楚人秦人巴人滅庸即此自是地屬楚葢接湖廣鄖陽府竹山縣之境延安府髙氏曰晉文公初伯攘白翟開西河魏得之為河西上郡至戰國惠王六年魏始納隂晉八年納河西地十年納上郡十五縣隂晉今華隂縣河西孔氏曰同丹二州丹州今延安府宜川縣上郡為延安以北案晉地至此疑其太逺然惠公于韓之戰已曰寇深矣若之何韓為今韓城縣濱河為秦晉接界無宼深之理而延安府治東去山西黄河界四百五十里晉之幅員廣逺在惠公時早已至此合之寇深之言理當有之鞏昌府今伏羌縣為古冀戎地史記秦武公初縣冀戎即此時春秋莊公之六年也秦州今州西六十里有上邽城為古邽戎邑秦武公初縣邽戎即此時春秋莊公之六年又州西百二十里有西縣城為秦之先大駱地後莊公復都焉清水縣西有故秦城為非子始封江南江寧府寰宇記六合縣為古之棠邑襄十四年楚子囊師于棠以伐吳即此後伍奢長子棠公尚為棠邑大夫太平府襄三年子重克鳩兹至于衡山鳩兹城在今太平府蕪湖縣東三十里衡山當塗縣東北六十里有横山横與衡通今自長江東下先蕪湖當塗而後至六合六合為楚棠邑觀襄十四年子囊師于棠以伐吳則二縣之終為楚地可知矣又府隔江相對為和州係楚地昭十七年長岸之戰獲吳乗舟餘皇其地在今太平府西南三十里和州南七十里號曰天門山則楚地已軼入太平府界常州府今無錫縣東南三十里有泰伯城地曰梅李鄉乃㤗伯始逃荆蠻所居處闔廬以上皆都之詳都邑府治武進縣為春秋時延陵邑吳季札所封詳都邑蘇州府今府城為闔閭所都因城西三十里姑蘇山為名城西十里有虎邱即闔閭墓府西南八十五里有西洞庭山一名包山春秋時所云夫椒也哀元年吳王夫差敗越處通典蘇州理吳長洲二縣春秋吳國之都其南百四十里與越分境吳伐越越禦之于檇李則今嘉興縣之地鎮江府今府治丹徒縣為吳朱方邑襄二十八年齊慶封奔吳吳句餘與之朱方即此詳都邑揚州府淮安府哀九年吳城䢴溝通江淮即今之漕河起于揚州府城東南二里歴邵伯湖髙郵湖寳應湖北至黄浦接淮其合淮處為末口在淮安府城北五里今為新城之北水關自江達淮南北長三百餘里又哀十三年晉侯及吳子㑹于黄池杜註封邱縣南有黄亭近濟水國語云吳王夫差起師北征闕為深溝于商魯之間北屬之沂西屬之濟以㑹晉公午于黄池沂水入泗濟水在封邱縣南葢既溝通江淮遂率舟師自淮入泗自泗入沂復穿魯宋之境連屬水道有不通者鑿而通之以達于封邱之濟即杜氏所云近濟水也其道極回逺由今考城過把縣北境歴蘭陽而至于封邱案吳城䢴溝自揚州至淮安三百里闕深溝于宋魯接界自河南歸徳府考城至開封府之封邱又四百里今日之漕河夫差時已及其半連屬江淮沂濟即今日治漕借山東汶沂諸水之法通州哀十二年公㑹衛侯宋皇瑗于鄖左傳衛侯㑹吳于鄖公及衛侯宋皇瑗盟而卒辭吳盟杜注鄖𤼵陽也廣陵海陵縣東南有𤼵繇口髙氏曰𤼵陽无可考今通州如臯縣亦晉海陵地縣南十里有㑹盟原相傳為吳楚㑹盟處考春秋吳楚始終無㑹盟事意必指此海州皇輿表以海州為魯地左傳成九年城中城杜註在東海廩邱縣西南廩丘是厚丘之譌後漢志東海郡厚邱縣註引此傳文為証云縣西南有中鄉城今海州之沭陽縣也魯之南境至是止又一說中城為魯之内城諸儒多從其說又莒紀鄣城在海州贛榆縣北七十五里昭十九年齊髙𤼵伐莒莒子奔紀鄣杜註莒邑東海贛榆縣東北有紀城是也後漢志贛榆縣引此傳文為証今山東泝州府莒州與贛榆縣接界徐州府今新設府治銅山縣為宋彭城邑成十八年楚子伐宋宋魚石復入于彭城西鉏吾曰今將崇諸侯之姦而披其地以塞夷庚杜註夷庚晉吳往來之要道葢吳晉往來必由彭城故杜云然沛縣為春秋時偪陽國與山東兖州府嶧縣南接界襄十年晉悼公滅之以與宋通吳晉往來之道又楚柤地亦在沛縣境是年㑹吳于柤遂滅偪陽是也蕭縣為宋附庸蕭國宋以封蕭叔大心宣十二年楚莊滅之後仍為宋邑定十一年宋公之弟辰入于蕭以叛是也又成十八年楚子辛鄭皇辰侵城郜取幽邱杜註皆宋地在今徐州府蕭縣界碭山縣為楚之麻邑昭四年吳伐楚取棘櫟麻魏收志碭郡安陽縣治麻城彚纂曰碭山縣有安陽城即故麻城也以楚之東鄙言之近是邳州北六十里有良城為吳良地昭十三年晉侯㑹吳子于良水道不可吳子辭正義云吳地水行故以水路不通辭此時吳未溝通江淮故也㝛遷縣西南有司吾城應劭曰古鍾吾國也昭二十七年吳公子燭庸奔鍾吾三十年為吳闔閭所滅縣志以為隠元年宋人遷宿于此因謂之宿遷非也宿遷本名宿豫晉元帝督運軍儲于此立邸閣因名安帝遂立宿豫縣唐寳應初避代宗諱改為宿遷與宿國無與安慶府今桐城縣為春秋時桐國楚附庸也定二年桐叛楚吳子使舒鳩氏誘敗楚人漢朱邑為桐鄉令謂子孫死必葬我桐鄉即此案安慶亦春秋時羣舒地山縣為古舒州宋封王安石為舒王今山有安石讀書臺嘗質諸桐城劉畊南畊南云詩云荆舒是懲荆以東即為舒地葢舒之種類甚多今皖城連接廬州府之廬江舒城二縣皆是居吳楚之界迭為向背是時吳强楚弱故桐叛楚春秋傳所謂蠻夷屬于楚者吳盡取之是也又大江東流自湖廣黄州府之廣濟縣黄梅縣流入江南安慶府之㝛松縣界南岸為江西九江府之徳化縣楚地止此則安慶一府自㝛松以東皆為吳地矣故江南之安慶江西之南康九江皆謂之吳頭楚尾廬州府及六安州羣舒及宗國俱在今廬江舒城二縣境文十二年羣舒叛楚子孔執舒子平及宗子遂圍巢葢宗巢二國皆羣舒之屬也英氏在六安州西六在六安州北諸國皆臯陶之後界在蠻夷成七年傳吳始伐楚伐巢伐徐蠻夷屬于楚者吳盡取之葢指廬州及安慶二府之境統前後而言之也襄十三年庸浦之戰在今廬州府無為州昭五年鵲岸之戰在今廬州舒城縣西北杜註廬江舒縣有鵲尾渚是也昭二十七年吳師圍濳濳在今六安州霍山縣東北三十里案春秋傳楚滅舒蓼舒庸舒鳩及宗四國杜皆不能明其處但云廬江南有舒城及龍舒城約略四國所居在此兩城之間舒城即今舒城縣龍舒城在今廬江縣巢縣東北五里有故巢城為春秋時楚之巢邑按巢本古國楚滅之為邊邑昭四年楚城巢五年使沈尹射待命于巢至二十四年平王為舟師以略吳疆吳人踵楚而邊人不備遂滅巢及鍾離巢縣西北六十里有柘臯鎮俗名㑹吳城為吳槖臯地哀十二年公㑹吳于槖臯杜註在淮南逡遒縣東南逡遒故城在今府治合肥縣東與巢縣相接又無為州境有楚駕釐二邑廬江縣境有楚虺邑成十七年吳人圍巢伐駕取釐虺杜註巢駕釐虺楚四邑鳳陽府夀州為楚之州來案州來本小國後屬于楚自成七年吳始争州來至昭二十三年雞父之戰楚師大奔州來遂為吳地以封季札號延州來季子哀二年遷蔡于此更謂之下蔡戰國時為楚地考烈王遷都夀春在淮之南下蔡城在淮之北相距三十里二城對據翼蔽淮濱宋時謂之南北夀春定四年吳入郢舍舟淮汭自豫章與楚夾漢淮汭即州來葢吳既得州來即屯㝛重兵為歸計故留舟船于此楚司馬戌曰我悉方城外以毁其舟亦知吳為必死之計欲用大衆以争之以絶吳師之後也雞父在夀州西南府治鳳陽縣為楚之鍾離按鍾離本小國屬于楚昭四年楚始患吳使箴尹宜咎城鍾離薳啓疆城巢然丹城州來皆沿淮要害處葢楚師自大江東下吳人仰攻不能敵楚故其侵擾楚疆多從淮右北道鳳陽以西夀霍光固之間皆近淮壖築此三城以斷其北來之路而吳亦置楚南道之師于不問克鳩兹克朱方逼近吳都吳之報楚則取駕取棘櫟麻日争鬭于廬之無為及碭山汝寧之境葢舍水從陸以避楚長江直下之險至昭二十三年吳滅州來二十四年滅鍾離及巢淮之藩籬盡撤而吳遂長驅以入郢矣懷逺縣東北四十五里有向城為春秋時向國隠二年莒人入向即此又宣四年公伐莒取向此在今山東兖州府嶧縣境係兩地虹縣北有蒲姑陂為徐蒲隧地昭十六年齊師伐徐至于蒲隧即此又縣東北有婁亭為徐婁林地僖十五年楚人敗徐于婁林即此徐國在徐僮間僮縣故城在今虹縣境泗州今州北八十里有古城與鳳陽府虹縣接境相傳為徐偃王築括地志徐城縣西四十里有大徐城即古徐國也隋時屬泗州昭三十年冬吳闔閭伐徐防山而水之遂滅徐葢决泗水也盱眙縣為吳善道地襄五年晉悼公欲通吳先使魯衛㑹吳于此告以㑹期南兖州記盱眙本吳善道地秦置盱眙縣許慎曰張目為盱舉目為眙城居山上可以矚逺因名又襄三年晉㑹諸侯于雞澤使荀㑹逆吳子于淮上吳子不至淮上亦在臨淮泗州之境潁州府今蒙城縣界有吳房鍾地昭六年楚令尹子蕩伐吳吳敗之于房鍾即此縣北有楚瑕地成十六年鄢陵之戰楚師還及瑕即此潁水入淮處謂之潁尾為楚地昭十二年楚子狩于州來次于潁尾在今潁州府潁上縣與夀州接界亳州東南有乾谿為楚地昭十二年楚遣兵圍徐以懼吳楚子次于乾谿以為之援明年就弑即此又州東南七十里有城父城本陳夷地後為楚邑僖二十三年楚伐陳取焦夷杜註夷一名城父昭九年楚公子棄疾遷許于夷實城父即此霍山縣西南八里有竆水昭二十七年楚左司馬沈尹戍與吳師遇于窮令尹子常以舟師及沙汭而還水經注淮水又東窮水入焉出安豐縣窮谷春秋吳救灊沈尹戌與吳師遇于窮谷是也沙亦水名其合淮之處謂之沙汭在今霍邱縣境詳見山川又縣東有楚瑣地昭五年楚伐吳越大夫常夀過帥師㑹楚子于瑣即此又縣西南八十里有雩婁城為楚雩婁地淮南子孫叔敖决期思之陂灌雩婁之野期思陂即芍陂在河南光州固始縣境與霍邱縣接壤襄二十六年楚子秦人侵吳及雩婁昭五年楚使薳啟疆待命于雩婁即此新設府治阜陽縣為春秋時胡國昭四年楚靈王合十三國于申伐吳胡國與焉及吳入郢胡子盡俘楚邑之近胡者定十五年楚滅胡葢潁于此時已盡屬楚地胡僅存至是亦滅又潁上縣西北有慎城為楚慎邑哀十六年吳人伐慎白公敗之杜註汝隂慎縣是也漢置慎縣至劉宋初改置慎縣于合肥縣境此城遂廢太和縣西有原鹿城為宋鹿上地僖二十一年宋襄公為鹿上之盟以求諸侯于楚杜註鹿上宋地汝南有原鹿縣是也和州昭十七年吳伐楚楚卜戰不吉司馬子魚曰我得上流何故不吉戰于長岸大敗吳師獲其乘舟餘皇杜註長岸楚地今太平府西南三十里有西梁山與和州南七十里之東梁山夾江相對如門之闕郡國志云楚獲乘舟餘皇處廣徳州今州西北二十五里有桐水匯于丹陽湖入大江哀十五年楚伐吳及桐汭杜註宣城廣徳縣西南有桐水是也詳見山川寧國府今府境有吳頯黄地哀十六年楚白公之亂王孫燕奔頯黄氏杜註吳地即此池州府今銅陵縣北十里有鵲頭山髙聳臨江太平府繁昌縣西南大江中有鵲尾洲春秋時所云鵲岸也昭五年楚伐吳聞吳師出薳啟疆帥師從之吳人敗諸鵲岸杜註廬江舒縣有鵲尾渚髙氏曰杜註所云葢謂今廬州府舒城縣西北之鵲亭然薳射自夏汭出薳啟疆别從江道不應在内地杜佑曰南陵大江中有鵲尾洲即古鵲岸也此説可通今池州府銅陵縣即南陵縣地所分與太平府繁昌縣相連自古常為戰争之地徽州府皇輿表以為吳地然于經傳無所見據史記年表吳闔閭十一年伐楚取番實當魯定公之六年番為江西饒州府治之鄱陽縣由吳取番路須經浙江之嘉興府杭州府嚴州府江南之徽州府而後至江西之饒則嚴徽二府之為吳地信矣通典歙州理歙縣春秋時屬吳杭州府通典春秋越國之西境越西北至禦兒今嘉興府石門縣與呉分界然以浙江之嚴州江南之徽州謂均屬呉地由嘉興趨嚴徽路必由杭越豈能孤處孑立于呉地中耶竊意杭在春秋時尚荒僻為兩國莫居之地所以越之侵吳則徑入笠澤吳之敗越窮追至㑹稽杭在其中曽無藩籬之限謂杭竟為越地者亦非也或當増封越地後則杭嚴俱當屬越耳近者嘉興府志云禾郡地名其見于春秋國語越絶諸書者曰檇李曰禦兒曰平原三者而已皆在嘉興一府之地葢自呉越兵争三江播蕩地荒而不治民徙而失業數百里之間靡然榛莾可見春秋當日嘉興實為吳越分界所以戰争多在夫椒笠澤唐人詩所云到江吳地盡隔岸越山多謂杭州尚屬呉地者非也葢不獨兩國兵争蕩為墟莾其實杭湖二府春秋時尚未開闢自越之㑹稽至吳之檇李三四百里曠無人居不在版圗之内杭近海自唐以前尚不宜稼穡李鄴侯為刺史開西湖為六井以溉田民始樂業况春秋當日乎余向著論謂杭州為吳越兩國之甌脫因閲嘉興府志而復附識于此大凡割據兵争之世兩國俱各逺斥堠以自保所以中間多棄地不止春秋時吳越也魏曹操與吳分境欲徙淮南民而江淮間十餘萬衆皆驚走入吳其地遂空今淮安府之淮隂射陽鹽瀆三縣及揚州府所屬諸縣凡四五百里之地三國時俱廢不立至晉平吳混一太康元二兩年復置郡縣曹孫分境時且然足知春秋時之吳越矣富陽縣本為富春春秋時屬越西境海寧縣春秋時地介吳越間彼此分屬餘杭縣春秋時屬吳越二國嘉興府今府治嘉興縣南四十五里為吳檇李地定十四年於越敗吳于檇李杜註吳郡嘉興縣南醉李城是也案吳越春秋吳王夫差増越封西至于檇李然則與闔閭戰時越境猶未能至此檇李當為呉地矣嘉禾百詠注有東顧城西新城南于城北主城四城並吳越争戰時所築後俱廢今嘉興縣西二十七里有市曰新城稅務亦曰新城土人呼曰新市當往來大道即西新城之遺蹟矣石門縣東二十里有石門鎮為越之禦兒地國語越地北至于禦兒是也吳人纍石為門以距越即其處盖吳越分界矣嘉禾志有管城何城晏城萱城吳王築四城以禦越管城屬鹽官今為海寧縣其三城在今石門縣境髙氏曰勾踐初歸越吳封以百里之地東至炭瀆西至周宗南造于山北薄于海葢不得有浙西之地也後又増其封東至于勾甬西至于檇李南至于姑末北至于平原越絶書作武原即今海鹽縣時海鹽與海寧尚未析縣也縱横八百餘里據此則嘉興全境吳皆棄之以予越而杭湖二府其為越地可知矣厥後呉越戰争常在太湖近吳國都之側豈非以杭湖已屬越無藩籬之限耶海鹽縣治為春秋時馬嘷城亦曰吳禦越城越絶書吳伐越道逢大風匹馬啼嘷因名宋武原志晉咸康七年移縣治于此唐并省開元五年復于舊海鹽縣吳禦越城西北置縣今不改湖州府通典春秋時屬吳領長城縣有木山若溪吳王闔閭使弟夫概居此築城狹而長因名吳越當梁時避梁諱改為長興縣寧波府通典勾踐平呉遷夫差于甬東即句章在鄮縣西今府治鄞縣國語越地東至于鄞即此定海縣故海中洲為越甬東地一名勾章哀二十二年越使吳王居甬東杜註勾章縣東海中洲是也勾章故城在今慈谿縣西南三十五里海中洲即舟山為􅓝八十有三五穀魚鹽之饒可供數萬人本朝康熙二十六年設定海縣其地在故定海縣之東北故定海縣乃錢氏所置本朝改為鎮海縣亦秦勾章縣地紹興府今府治山隂縣南十二里有越王城為無餘故城史記少康封庶子無餘于㑹稽以守禹祀號于越杜註越國今㑹稽郡治山隂縣也越世世都此諸暨縣皇輿表以為越王允常所都台州府通典春秋時屬越理臨海縣金華府通典婺州春秋時屬越理金華縣衢州府今龍㳺縣穀溪之南有姑蔑故城為越姑蔑地國語越地西至于姑蔑即此哀十三年越伐吳王孫彌庸見姑蔑之旗杜註姑蔑東陽大末縣錢氏改為龍㳺嚴州府通典睦州春秋時屬吳理建徳縣温州府通典春秋時屬越理永嘉縣處州府通典春秋時屬越理括蒼縣春秋大事表卷六中欽定四庫全書春秋大事表卷六下國子監司業顧棟髙撰江西南昌府皇輿表以南昌為呉之豫章地非也春秋時豫章未嘗屬吳且南昌亦並非豫章地按定四年吳入郢傳呉舍舟淮汭自豫章與楚夾漢以為吳地據此今考闔閭之十一年為定公之六年在入郢之後吳始伐楚取番番為今饒州府治鄱陽縣在鄱陽湖之東南昌在鄱陽湖之西相去三四百里入郢時呉尚未得鄱陽豈能越饒南九三府而先取南昌之地耶左傳豫章凡六見其地極廣均非今日之南昌葢秦得楚地置九江郡漢武帝分九江郡之西置豫章郡漫取春秋舊地以名之而不知其道里差池貿易如此如春秋時䕫國本在湖廣歸州䕫即歸而今四川之䕫州府乃遥取䕫國為名南昌之為豫章亦猶此通典斷為楚地較是今寧州西一百里龍平岡有古艾城哀二十年吳公子慶忌出居于艾杜註吳邑豫章有艾縣一名㵋水水經注㵋水出豫章艾縣桓山西南吳公子慶忌諫夫差不納居于艾是也案杜註及水經注所云豫章俱據漢豫章郡饒州府今府治鄱陽縣為楚之東境昭王時吳伐楚取番為呉地漢置鄱陽縣屬豫章郡餘干縣為越之西境漢置餘汗縣寰宇記餘干縣西南有于越渡漢淮南王安獻議曰越人欲為變必先田餘汗界中葢今餘干縣以東皆越地矣通志云餘水在餘干縣南㑹縣之西南諸溪餘水一名三餘水或曰吳楚越之餘水也廣信府通志秦為番縣地漢為餘汗地又弋陽貴溪二縣即餘干縣之所分哀十九年越人侵楚以誤吳夏楚公子慶公子寛追越師至冥不及而還冥地自杜註至春秋地名考俱不詳何所意當在饒州至廣信之境葢是時吳方强盛舍此無楚越相接之地南康府今府治星子縣及都昌縣俱浸大湖鄱陽湖實呉楚所共方輿勝覽南康軍春秋時呉楚之地九江府通典江州理尋陽縣春秋時屬楚即今九江府治之徳化縣也重慶府今府治巴縣為古江州巴子所都巴葢古國從周武王伐殷善歌前歌後舞而入因封其宗姬于巴爵之以子桓九年巴人使韓服告于楚杜註在巴郡江州縣江水逕其城南三折如巴字因名封境極逺東至魚復西至僰道北至漢中南至黔涪地當秦楚之交文十六年從楚人秦人滅庸始見經戰國時稱王為秦所滅䕫州府今府治奉節縣為庸國魚邑文十六年楚侵庸與庸遇裨鯈魚人逐之杜註魚庸邑漢置魚復縣屬巴郡公孫述號曰白帝城先主改為永安唐改䕫州其地在湖廣歸州之西歸州為春秋時䕫子國䕫既滅其地為歸鄉宋忠曰歸即䕫今為䕫州府葢遙取䕫國為名已上凡八省皆列春秋各國地形相錯處自魯衛鄭宋至畸零小國以及晉地之闌入直𨽻陜西河南山東楚地之闌入江南江西河南陜西及四川者棼如亂絲錯如列㝛靡不詳考縷載若乃山西全為晉地湖北全為楚地而以前併吞諸國學者亦多不詳其處又二國都屢遷而名仍相襲如晉再遷而皆名曰絳楚三遷而皆名曰郢又晉有二瑕楚丹陽在歸州尤易蒙混今仍以今之州府列之詳其道里别其異同庶若網在綱犂然易見云乾隆五年庚申三月上浣復初氏又識太原府今太原縣為古唐國本堯之後裔周成王滅唐以封叔虞分徙舊唐之子孫于許郢之間春秋唐恵侯是其後在今湖廣隨州西北八十五里叔虞受封因仍其國號曰唐至叔虞子燮侯始改唐號曰晉祁縣東南八里有古祁城志以為晉祁奚邑縣以近祁藪而得名即尒雅所謂昭餘祁也府治陽曲縣東北八十里有大盂城為祁氏之盂邑昭二十八年魏獻子為政分祁氏之田以為七縣孟丙為盂大夫榆次縣有涂水鄉為晉祁氏之塗水邑魏獻子以知徐吾為塗水大夫又縣西北為晉魏榆邑昭八年石言于晉魏榆即此清源縣為祁氏之梗陽邑魏獻子以魏戍為梗陽大夫文水縣東北二十里有大陵城為祁氏之平陵邑魏獻子以司馬烏為平陵大夫大谷縣東南十五里有漢陽邑縣為晉陽處父邑又縣東三十五里有箕城僖三十三年晉人敗狄于箕即此平定州今夀陽縣東南十五里有馬首村為祁氏之馬首邑魏獻子以韓固為馬首大夫平陽府今翼城縣治東南十五里有古翼城為晉穆侯所徙之絳莊二十六年獻公城絳以深其宫即此一名翼詩譜云穆侯遷都于絳孝侯改絳為翼獻公又北廣其城方二里命之曰絳則翼與絳為一地成六年景公遷新田仍謂之絳因更名翼為故絳曲沃縣治西南二里為晉新田成六年景公遷都于此亦謂之絳自此以後傳文所書絳皆新田之絳矣又縣西三十五里有汾水縣南五里有澮水所謂有汾澮以流其惡澮水一名少水又縣西三十里有汾水為晉汾隰地桓三年曲沃武公伐翼次于陘庭逐翼侯于汾隰獲之即此府治臨汾縣東北三十七里有髙梁城為晉髙梁地僖二十四年晉公子重耳入國使殺懐公于髙梁即此又府城西北有狐谷亭孔氏以為即晉之狐厨邑僖十六年狄侵晉取狐厨受鐸涉汾及昆都葢府城西二里即逼汾水是時狄自西來薄平陽境狐厨受鐸在汾之西而昆都則在汾東故涉汾而後及昆都也又府治東為晉平陽邑故堯都春秋時係羊舌氏邑昭二十八年魏獻子分羊舌氏之田以為三縣謂平陽楊氏及銅鞮也趙朝為平陽大夫即此洪洞縣東南十八里有古楊城舊為楊侯國應劭曰伯僑自晉歸周封于楊晉滅楊以賜羊舌肸為楊氏邑襄二十九年傳女叔齊謂虞虢焦滑霍楊韓魏皆姬姓而晉滅之是也魏獻子分其地以僚安為楊氏大夫霍州西十六里有古霍城舊為霍叔處封國閔元年晉獻公滅之後為先且居封邑一名霍人襄十年晉悼公滅偪陽使周内史選其族嗣納諸霍人霍名霍人猶直伯柄之後為直人也又州西三里有吕鄉州西南十里有吕城葢皆以吕飴甥所居得名後以賜魏錡故復有吕錡吕相之稱蒲州府今臨晉縣東北十五里有郇城舊為郇國文王子所封左傳所謂畢原酆郇詩所謂郇伯勞之者也亦曰荀桓九年荀侯賈伯伐曲沃汲郡古文晉武公滅荀以賜大夫原氏黯是為荀叔成六年晉人謀去故絳諸大夫皆曰必居郇瑕氏之地即此案郇城亦曰瑕城本一地故左氏連屬言之此所謂河北之瑕也僖三十年燭之武曰許君焦瑕朝濟而夕設版焉則在河之南杜註焦瑕晉河外五城之二邑今河南陜州南二里有焦城陜州西南三十二里有曲沃城曲沃即瑕也文十三年晉人使詹嘉處瑕以守桃林之塞崔浩以為詹嘉處此備秦以曲沃之官守之故謂瑕為曲沃桃林為今潼關然則瑕非河北之瑕曲沃亦非桓叔所封之曲沃也戰國䇿每以焦曲沃並稱如左氏之言焦瑕葢曲沃即瑕之明證文十二年秦師夜遁復侵晉入瑕髙江村以為秦已渡河而西必不能復深入東渡其為河外甚明駁辨可謂精且審矣又縣東南十八里有解城為晉解梁邑惠公賂秦以河外列城五内及解梁城即此又縣東南有臼衰城東南十八里有桑泉城僖二十四年晉公子濟河圍令狐入桑泉取臼衰即此猗氏縣西十五里有令狐城西北有廬栁城僖二十四年晉師軍于廬栁退軍于郇郇在臨晉葢與猗氏接壤也文七年晉敗秦師于令狐至于刳首通典陜西同州郃陽縣有刳首水在河之西士㑹于此奔秦猗氏縣為秦晉通衢與秦以河為界又縣南二里有王官故城為晉王官邑文三年秦伯伐晉取王官及郊郊亦平陽臨晉間小邑裴駰注史記以王官在陜西澄城縣非也本傳上云濟河焚舟下云自茅津濟所取之地在河之東無疑髙氏辨之審矣又縣南二十里有鹽池左傳謂之盬成六年晉謀去故絳皆曰必居郇瑕氏之地沃饒而近盬杜註盬鹽也猗氏縣鹽池是也宋志引池而化者周官所謂盬鹽煮海煮井煮鹻而成者周官所謂散鹽府治永濟縣東南五里有蒲坂城為晉河曲文十二年晉人秦人戰于河曲杜註在河東蒲阪縣南是也僖二十四年子犯從重耳反國及河以璧授公子請亡即其處又是年濟河圍令狐文三年秦伯伐晉濟河焚舟文十三年晉魏夀餘誘士㑹秦伯師于河西魏人在東既濟魏人譟而還皆其地也葢此為秦晉東西往來渡河通道故凡濟皆不言其地名他如自茅津濟自南河濟則兵行詭道故特舉以見之左傳文法如此其地在今華隂縣潼關以東河水自此折而東故謂之河曲為秦晉交界之地又府治南三十六里有覊馬城為晉覊馬邑文十二年秦伐晉取覊馬即此在河之東杜佑以為在陜西郃陽縣非是又府治東南有首山即首陽山靈輒餓處又府治東北二十八里有涑水城即秦所伐之涑川解州今平陸縣東北六十里有古虞城為春秋時虞國武王封周章弟虞仲于此又縣東北五十里為虞顛軨阪東北二十五里為虞鄍邑東五十里有砥柱山山有三門僖二年晉假道于虞曰冀為不道入自顛軨伐鄍三門即此又縣東五十里有大陽城大陽東北三十里為虢下陽城其地有虞阪之險晉欲伐虢慮虞人要而擊之攻虞則虢又救之葢虞虢之門户滅下陽而兩國皆失其險又縣西為晉茅津亦曰大陽津以在大河之北也河之南為陜州乃黄河津濟處芮城縣北五里為春秋時魏國閔元年晉滅之以賜畢萬為魏氏文十三年使魏夀餘偽以魏叛者以誘士㑹秦伯師于河西魏人在東既濟魏人譟而還葢魏地逼河與秦以河為界詩譜云南枕河曲北涉汾水是也又解州鹽池東有苦成故城為晉郤犨邑謂之苦成叔安邑縣東南有中條山又縣北三十里有鳴條岡為晉條邑桓二年傳晉穆侯以條之役生太子當係此地孟子曰舜卒于鳴條即此舊以為在直𨽻河間府景州漢周亞夫所封晉在春秋前其地不宜至此當誤絳州今聞喜縣東二十里為桓叔所封之曲沃歴莊伯武公國之三世凡六十七歲滅晉後仍為别都一名下國有武公之廟在焉凡外來公子入立及君薨而殯皆于曲沃武公之廟重耳及成公悼公即位皆朝于武宫文公卒殯于曲沃是也曲沃距翼城縣之故絳凡二百里正義曰國君五日而殯文公以己夘卒明日庚辰柩即出絳葢以曲沃路逺詳見都邑又縣東北三十五里有董氏陂産楊栁可為箭即所謂董澤之蒲也河津縣東有冀亭舊為冀國地杜註冀國并于虞虞亡歸晉晉惠公以與郤芮為食邑芮𬒳誅邑復入晉後其子郤缺獲白狄子有功復與之冀又縣南十二里有古耿城為春秋時耿國地閔元年晉滅之以賜趙夙為邑絳州界有賈鄉為春秋時賈國地桓九年荀侯賈伯伐曲沃後不知何年滅之以賜狐偃子狐射姑為邑垣曲縣西北六十里有臯落鎮為東山臯落氏國閔二年晉侯使太子申生伐東山臯落氏杜註赤狄别種又縣東南有陽壺城南臨大河為晉瓠邱地襄元年晉悼公以宋五大夫在彭城者置諸瓠邱杜註在河東東垣縣東南又縣東有邵亭為晉之郫邵邑一名郫文六年趙孟殺公子樂于郫襄二十三年齊侯伐晉戍郫邵杜註取晉邑而戍之葢三名為通稱矣稷山縣西北二十里為晉清原地一名清僖三十一年晉蒐于清原作五軍以禦狄宣十三年赤狄伐晉及清成十八年悼公入國大夫逆于清原皆此地吉州今州治東北二十一里有北屈廢縣為晉北屈邑莊二十八年晉獻公使夷吾居屈又晉有屈産之乗案傳二五言于公曰狄之廣莫于晉為都知蒲屈向日皆狄地矣又州西有晉采桑津僖八年晉里克敗狄于采桑即此隰州今州治北四十五里有蒲陽故城在蒲水之北即重耳所居之蒲邑又州境有晉交剛地成十二年晉人敗狄于交剛即此永和縣南十里有樓山城為晉趙嬰齊食邑左傳謂之樓嬰潞安府今潞城縣東北四十里有古潞城為赤狄潞氏國都案潞氏國為最大封境極廣國都在潞安據晉之腹心而其邊邑則在今直𨽻廣平府之曲梁延袤二省宣十五年傳荀林父敗赤狄于曲梁遂滅潞葢師反出其東而轉攻之所以絶其奔逸滅潞之歳秦師東來晉侯别遣魏顆以偏師禦之而身留治兵于稷以略狄土其用力亦勤矣明年又遣士㑹滅甲氏留吁鐸辰以盡其餘黨留吁鐸辰俱在今潞安府境甲氏在今廣平府之雞澤縣自此以後晉勢益強而六卿亦漸跋扈黎城縣東北十八里有黎侯城為春秋時黎國後屬晉杜註上黨壺關縣有黎亭今壺關縣亦接壤屯畱縣為畱吁地晉滅之為純畱邑亦曰余吾襄十八年晉執孫蒯于純留即此今縣東南十里有純畱城長子縣為晉長子邑襄十八年晉執衛行人石買于長子即此府治長治縣為晉壺口邑哀四年齊國夏伐晉取壺口杜註潞縣有壺口關舊志關在府城東南十三里延袤百餘里山形險狹形如壺口因名汾州府今平遙縣西十二里西南接介休縣界有中都古城為晉中都邑昭二年晉人執陳無宇于中都即此介休縣東南二十五里有介山以介之推得名一名綿山僖二十四年晉侯求之不獲以綿上為之田即此又縣東有隨城隠五年翼侯奔隨又士㑹食邑于隨即此又縣東北二十七里為晉祁氏之鄔邑昭二十八年魏獻子分其地以司馬彌牟為鄔大夫石樓縣南有龍泉山接隰州界多産名駒左傳所謂屈産之乗也澤州府今沁水縣西北四十里有平陽府翼城縣接界有黒壤山宣七年㑹于黒壤即此左傳謂之黄父文十七年晉侯蒐于黄父杜註即黑壤二名為一地後周宇文泰小字黒獺諱之改為烏嶺澮水所出沁州今州南十里有銅鞮故城為羊舌氏之食邑昭二十八年分其地以樂霄為銅鞮大夫又為晉離宫子産曰銅鞮之宫數里羊舌邑在宫旁二十里成九年鄭伯如晉執諸銅鞮即此州東又有斷梁城吳氏云即春秋晉之斷道地宣十七年同盟于斷道左傳謂之卷楚杜註卷楚即斷道湖廣武昌府今府治江夏縣為古夏口今名漢口與漢陽府治漢陽縣對岸春秋時謂之夏汭昭四年吳伐楚楚沈尹射奔命于夏汭為漢水入江之處漢受夏水亦通稱夏江夏之名取此武昌縣為楚之鄂都漢屬江夏郡孫權改置武昌縣漢陽府府城東南百步有大别山江水逕其南漢水自西北來㑹之亦謂之魯山乃漢水入江處與武昌府治江夏縣對岸葢江自漢陽府城東武昌府城西而㑹于漢水今日之漢口是也漢川縣南十里有小别山亦名甑山在府治漢陽縣之西北百七十里定四年楚子常濟漢而陳自小别至于大别乃呉由西漸東且戰且却求間道為歸計孔穎達謂小别當在大别之東者誤安陸府今當陽縣東南有古權城為春秋時權國莊十八年楚武王克權使鬭緡尹之水經沔水逕當陽縣章山東又東右㑹權口權水在章山東南流逕權城北古之權國也荆門州東南有那口城為楚那處地楚武王遷權于那處即此舊為文王子那季載所封那史記作冉或作那皆讀為然不知何年入楚荆門州志亦謂之權國城葢權那二國本相近也府治鍾祥縣東六十里有鹿湖池深不可測為楚之沈鹿地桓八年楚子合諸侯于沈鹿即此今湮為上腴又縣東三十里有臼水入漢定四年楚昭王奔隨將涉于成臼即此又府治為春秋時郊郢地桓十一年鄖人軍于蒲騷將與隨絞州蓼伐楚師莫敖患之鬭亷曰君次于郊郢以禦四邑我以鋭師宵加于鄖鄖國為今徳安府治在安陸府之東安陸下臨漢水地形險固四國相去甚逺不能一時遽集而安陸為居中扼要之地故使屈瑕據之也又府治東一里有樠木山莊四年楚武王侵隨卒于樠木之下即此詳見山川京山縣西南八十里有澨水流通漢江為春秋時之雍澨定四年吳從楚敗諸雍澨五戰及郢即此又縣境有薳澨漳澨汊澨即禹貢之三澨昭二十三年薳越縊于薳澨宣四年鬭椒師于漳澨即此當陽縣北一里有沮水一作雎定四年楚子涉雎孔頴達曰雎水在郢都之西楚王避吳西走處水經注曰沮水東南逕當陽縣北又南逕楚昭王冢又南與漳水合過枝江縣而入于江謂之沮口又襄陽府南漳縣東有漳水流入當陽縣東南五十里合于沮楚昭王謂江漢沮漳楚之望即此詳見山川荆門州西北有長林城接當陽縣東南境為楚之大林文十六年戎伐楚之西南師于大林即此自當陽之北接長林之境栱木修竹隠天蔽日即曹操追先主處所謂當陽長坂也胡氏曰長坂在當陽縣東南百二十里襄陽府今宜城縣西南九十里有鄀城與安陸府之荆門州接界為春秋時鄀國地杜註鄀本在商密在秦楚界上為南鄉丹水縣今河南南陽府淅川縣西有丹水故城此舊鄀也僖二十五年秦晉伐鄀文五年秦人入鄀楚人戍以争之而不克因遂徙之南郡鄀縣為附庸即今襄陽府宜城縣後仍入楚定六年楚避吳北去徙都鄀仍名郢謂之鄢郢左傳所謂遷郢于鄀是也因名江陵舊都為紀郢又縣東南有湫城為楚湫邑伍舉食采于此為湫舉莊十九年楚子伐黄還及湫有疾即此又縣西南九里有古鄢國入楚為鄢縣昭十三年楚靈王沿夏將欲入鄢杜註順漢水入鄢也是時鄢為楚别都與郢相近故通謂之鄢郢又縣西二十里有古羅川城為春秋時羅國南漳縣東五十里有中廬鎮為廬戎國一作盧孔疏曰盧與廬通皆近鄢水桓十三年楚屈瑕伐羅及鄢亂次以濟及羅羅與盧戎兩軍之大敗之是也鄢水至宜城縣南四十里入于漢府治襄陽縣東北二十里有鄧城鎮為春秋時鄧國莊十六年為楚文王所滅又縣東北十二里有鄾城為鄾國居鄧之南鄙桓九年楚子使道朔將巴客以聘于鄧鄧南鄙鄾人攻而奪之幣不知何年滅于楚哀十八年巴人伐楚圍鄾鄾葢為楚邑久矣後漢志鄧縣有鄾聚光武曰宛最强鄾次之是也穀城縣西十里有穀城山為春秋時穀國水經注曰國在穀城山上不知何年滅于楚光化縣西漢水東岸有古隂縣城為楚下隂地昭十九年楚工尹赤遷隂于下隂即此隂即隂地之戎也南漳縣西有荆山昭十三年傳楚遷許胡沈道房申于荆杜註荆荆山也能容六小國之衆是荆山之為地廣矣山海經曰荆山之首曰景山即卞和抱璞處自宜城南漳以至房縣迤邐而西與歸州相接亦曰西山自襄陽府城以南至安陸府城西凡七百里通謂之漢汭自安陸府城至沔陽州北漢川縣南凡七百里又至漢陽府城東北入江通謂之夏汭孔穎達曰漢水之尾變為夏水是也莊四年莫敖以王命入盟隨侯且請為㑹于漢汭而還此漢汭乃襄陽以南至安陸之漢水隨國為今隨州西至襄陽府一百五十里漢水之東為隨西為楚地故濟漢而後𤼵䘮也葢楚之初未能越漢而有之其後奄有江漢色絡南陽汝寧至吳伐楚從淮右入與楚夾漢而軍入楚之腹心内地而楚岌岌矣鄖陽府今府治鄖縣為春秋時麇國地文十一年楚子伐麇敗麇師于防渚潘崇復伐麇至于鍚穴鍚音陽即麇之國都防渚在今房縣唐時謂之房州武后遷中宗于此又府治西北為絞國地桓十二年楚伐絞大敗之為城下之盟而還又伐絞之役楚師分涉于彭彭水在房縣境西南流入襄陽府之穀城葢穀城與房縣連壤也又房縣南五十里有阜山文十六年戎伐楚之西南至于阜山即此竹山縣東四十里有上庸故城為春秋時庸國地文十六年楚使廬戢棃侵庸及庸方城又與之遇七遇皆北惟禆鯈魚人逐之庸人遂不設備楚及巴人秦人滅庸今縣東四十五里有方城山四面險固山南有城周十餘里所謂庸方城也葢當四川陜西之交界庸之魚邑為今四川夔州府治奉節縣徳安府今府治安陸縣城東南有古雲夢城今雲夢縣在其南四十六里又南六十步為雲夢澤宣四年䢵子之女生子文䢵夫人使棄諸夢中又定四年楚子涉雎濟江入于雲中葢雲夢跨江南北包絡五府今安陸府之荆門沔陽二州及京山縣漢陽府治漢陽縣荆州府之監利枝江二縣黄州府之蘄州及黄岡麻城二縣及徳安府治葢東抵蘄州西抵枝江在在有雲夢之名而徳安之雲夢為尤著今府治為春秋時鄖國桓十一年楚屈瑕將盟貳軫鄖人軍于蒲騷將與隨絞州蓼伐楚師鄖䢵溳三字通用若敖娶于䢵即此楚滅之以封鬭辛為鄖公蒲騷鄖邑在今應城縣北三十里應山縣境為貳國應城縣西為軫國俱出近志又府治安陸縣西北有清水春秋時謂之清𤼵定四年吳從楚師及清𤼵即此隨州南有古隨城為春秋時隨國桓六年楚武王侵隨僖二十年鬭穀於莵伐隨取成而還自後為楚私屬不與諸侯㑹盟至定四年吳入郢楚昭王奔隨隨人免之楚以此徳隨哀元年使復列于諸侯侵蔡終春秋世不滅又州東南三十里有光化城志云本楚子城左傳所謂軍于漢淮之間者葢築城于此以逼隨也今隨州之光化廢為鎮淮源出河南南陽府桐柏縣逼近隨州之北故曰漢淮之間又隨州西北八十五里有唐城鎮為春秋時唐國本堯後舊封晉陽周成王以其地封叔虞而分徙其後于許郢之間春秋時服屬于楚宣十二年唐惠侯從楚莊王敗晉于邲定四年唐成公與蔡侯及吳子伐楚入郢五年楚復國為楚所滅又州西南有楚軍祥地定五年薳射子從子西敗吳師于軍祥即此應山縣東北一百三十里河南汝寧府信陽州東南一百五十里有武陽關即左傳之大隧應山縣北九十里信陽州南亦九十里有黄峴關即左傳之直轅應山縣北六十五里信陽州西南宛溪江邨俱云東南疑悞今從元和志及皇輿圖九十里有平靖關即左傳之冥阨一曰黽塞三關勢如首尾為漢東之隘道吳師從淮北陸路來道必由此所謂義陽三關之險也其總名曰城口定四年楚左司馬戌謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥阨子濟漢而伐之我自後擊之必大敗之史皇曰若司馬毁舟于淮塞城口而還是獨克吳也即謂此三關之險互見險要黄州府今蘄水縣東三十里有軑縣故城為春秋時弦國僖五年楚人滅弦杜註弦國在弋陽軑縣東南又河南光州西南有弦城葢接界也皆魏晉時弋陽郡境麻城縣東六十里有龜峯山山勢嵯峨上有白黒二龍井為舉水之源又縣東三十里有柏子山定四年吳楚戰于柏舉柏舉之名葢合柏山舉水而得荆州府今府治江陵縣北十里為楚之故郢都一名紀南城定六年遷于鄀為襄陽府之宜城縣謂之鄢郢因名此為紀郢江陵縣治為春秋時楚之渚宫在郢都之南十里文十年子西為商公沿漢將入郢王在渚宫下見之水經注渚宫為今江陵城楚之船官地歴代為重鎮晉桓温及弟冲皆保據渚宫梁元帝都此為西魏所陷遷後梁居之為藩國隋井梁置荆州後為蕭銑所據唐平銑復為荆州五代時髙季興據此稱髙平枝江縣西有楚丹陽城葢從歸州而移于此亦曰丹陽詳見宜昌府楚又徙羅人居于此故後漢志云枝江本羅國水經注云江汜枝分縣治洲上故名枝江又縣西三里有津鄉莊十九年巴人伐楚楚子禦之大敗于津杜註江陵縣有津鄉葢本應劭之説以地相近而稍訛酈道元辨之謂枝江縣西有津鄉葢里名當矣後漢建武十一年岑彭自津鄉攻田戎于荆門克之即此監利縣東三十里有州陵城為春秋時州國桓十一年鄖人將與隨絞州蓼伐楚師即此又縣東北三十里有楚章華之臺又縣東南有涌水乃夏水支流莊十八年巴人門于楚閻敖㳺涌而逸水經注江水當華容縣東南涌水出焉涌水自夏水南通于江謂之涌口閻敖㳺涌而逸于二水之間也宜昌府歸州東南七里北枕大江有丹陽故城為楚始封之丹陽史記楚世家周封熊繹于楚蠻居丹陽徐廣宋忠以為在南郡之枝江縣而郭璞注山海經則曰丹陽在秭歸為説不同杜佑通典曰楚初都丹陽今秭歸東南故城是後徙枝江亦曰丹陽也春秋時諸侯徙都常襲前都之名如晉遷新田仍名絳之類至後世猶仍兩丹陽之名晉王濬伐吳破丹陽遂克西陵此秭歸之丹陽西魏伐江陵曰為蕭氏計席捲渡江直據丹陽此枝江之丹陽也歸州治東二十里有夔子城為楚所分之夔國僖二十六年楚人滅夔杜註夔楚同姓國今建平秭歸案左傳夔子對楚人曰我先王熊摯有疾鬼神弗赦而自竄于夔夔即歸其地即楚之丹陽盖當時熊摯自竄不過遜居國都之側楚人因而封之及其後楚國徙于枝江夔乃獨為一國也長沙府自府以南為羣蠻地後漢書南蠻傳槃瓠之種曰精夫今長沙武陵蠻是也唐虞曰要服周宣王命方叔南征所謂蠻荆來威者也平王東遷侵暴上國至春秋楚武王時蠻與羅子共敗楚師殺其將屈瑕莊王初立民饑兵弱復為所寇楚師既振然後乃服自是遂屬于楚及吳起相悼王南并蠻越遂有洞庭蒼梧據此則長沙府以南洞庭蒼梧之地春秋時俱非楚有楚地不到湖南信矣葢楚始封在歸州之丹陽其後屢遷而益北未嘗南移一步洞庭蒼梧其時尚未入版圖禹貢蔡傳謂九江即洞庭可知其謬九江為潯陽之九江唐張僧監尋陽地記列其名為九孔頴達之釋禹貢賈公彦之釋周禮職方皆宗之今為江西之九江府不宜取晁氏説之之説以為即洞庭也湘隂縣東六十里有羅城岳州府平江縣南三十里亦有羅城乃接境處後漢志枝江侯國本羅國後乃徙于長沙亦謂之羅川隋末蕭銑為羅川令即此地有汨羅江即屈原自沈處也附列國地名考異列國地名都邑表已備列今府州縣之某地而左傳更有兩地三地四地同一名者更有二名同一地者後學恐致混誤且杜註與後人之説或合或分今彚聚而剖析之并略附鄙見庶一覽瞭如指掌乾隆戊辰正月下浣九日復初氏識魯有東鄆西鄆文十二年城諸及鄆此東鄆也莒魯所争之邑今為山東沂州府沂水縣之鄆城成四年城鄆此西鄆也今為濟寧州鄆城縣之舊城魯有三防隠九年公㑹齊侯于防此東防也本魯地在今沂州府之費縣世為臧氏食邑襄二十三年臧紇自邾如防即此隠十年敗宋師于菅辛巳取防此西防也為魯取宋地在今兖州府之金鄉縣欲别于臧氏之防故謂之西防僖十四年季姬及鄫子遇于防此魯國之防山也在曲阜縣東二十里孔子父母合𦵏于防即此魯有兩平陽宣八年城平陽本魯邑今濟南府新泰縣西北四里有平陽故城哀二十七年公及越后庸盟于平陽為魯取邾地在今兖州府鄒縣西南方輿紀要及髙氏地名考俱併入宣八年之平陽誤矣又晉衛二國俱有平陽昭二十八年魏獻子以趙朝為平陽大夫即堯所都今故城在山西平陽府臨汾縣西南哀十六年衛侯飲孔悝酒于平陽今河南衛輝府滑縣東南有韋城韋城南有平陽城齊曹俱有重邱襄二十五年同盟于重邱今東昌府城東南跨茌平縣界有古重邱杜註云齊地方輿紀要謂曹北竟之邊邑案曹都定陶去此尚三四百里小國之邊疆安能及此襄十七年衛孫蒯伐曹取重邱杜註曹地在今曹州府曹縣東北杜明註兩國不可混魯齊晉俱有東陽哀八年吳伐我克東陽而進東陽為魯邑在今費縣西南七十里襄二年晏弱城東陽以逼萊子此東陽為齊竟上邑今青州府臨朐縣東有東陽城襄二十三年齊侯伐晉趙勝帥東陽之師以追之獲晏氂為晉地今臨清州恩縣西北六十里有東陽城魯齊楚萊俱有棠邑隠五年公觀魚于棠魯濟上之邑在今兖州府魚臺縣東北十二里襄二十五年傳齊棠公尚杜註齊棠邑大夫今為東昌府之堂邑縣襄十四年傳楚子囊師于棠以伐吳今為江南江寧府之六合縣襄六年齊滅萊萊共公奔棠杜註棠萊邑今膠州即墨縣南八十里有甘棠社襄十八年齊靈公將走郵棠即此齊宋俱有黄地桓十七年公㑹齊侯紀侯盟于黄路史登州府之黄縣東南有古黄城本紀邑後入齊隠元年傳惠公之季年敗宋師于黄寰宇記雎州考城縣西三十六里有黄溝西距外黄城四里即魯惠公敗宋師處又有黄國汝寧府光州有黄城鄭衛楚俱有瑣地㐮十一年諸侯伐鄭次于瑣一云瑣澤其地在新鄭縣北定七年傳齊衛盟于瑣經文作沙衛地地道記元城縣有瑣陽城昭五年越大夫常夀過帥師㑹楚子于瑣杜註楚地在今夀州霍邱縣東晉齊楚宋俱有稷地宣十五年傳晉侯治兵于稷以略狄土杜註晉地在今山西平陽府稷山南五十里昭十年齊陳鮑與欒髙戰于稷杜註祀后稷之處在今山東青州府臨淄縣西定五年秦子蒲使楚人先與吳戰而自稷㑹之杜註楚地在今河南南陽府桐柏縣境桓二年公㑹齊侯陳侯鄭伯于稷以成宋亂杜註宋地當在今歸徳府境衛齊晉俱有清地隠四年公及宋公遇于清杜註衛邑濟北東阿縣有清亭今東阿縣屬兖州府哀十一年齊師伐我及清杜註齊地濟北盧縣有清亭盧縣今為濟南府之長清縣程啓生曰衛齊各有清杜氏以東阿盧縣别之景范氏以為一地今仍從杜説成十七年齊侯使國勝告難于晉待命于清杜註齊地陽平樂平縣今東昌府堂邑縣東南有清城宣十三年赤狄伐晉及清杜註一名清原今山西平陽府稷山縣西北二十里有清原城衛蔡虢俱有莘地桓十六年使盗待諸莘杜註衛地今東昌府莘縣北有莘亭故城成二年師從齊師于莘即此杜更以為齊地者非是莊十年荆敗蔡師于莘杜註蔡地在今河南汝寧府汝陽縣境莊三十二年有神降于莘杜註虢地髙氏地名考以為今陜州硤石鎮西十五里莘原是也宋晉周衛俱有盂地僖二十一年宋公㑹諸侯于盂杜註宋地襄邑西北有盂亭襄邑為今河南之雎州哀二十六年宋大尹盟六子于唐盂即此昭二十八年魏獻子以孟丙為盂大夫杜註晉地太原盂縣今山西太原府陽曲縣東北八十里有大盂城髙氏地名考以哀四年齊國夏伐晉取盂即此案晉為大國不應深入至此亭林先生以為當在順徳廣平之間定八年劉子伐盂杜註周邑今河南懐慶府河内縣西北有邘臺鎮定十四年衛太子蒯聵獻盂于齊盂即歛盂杜註衛地今直𨽻大名府開州東南有歛盂聚僖二十八年齊晉盟于歛盂即此周魯燕俱有唐地𨼆二年公及戎盟于唐杜註魯地在今兖州府魚臺縣東十二里昭十二年齊髙偃納北燕伯欵于唐經文作陽杜註燕别邑今直𨽻保定府唐縣北八里有唐山昭二十三年尹辛敗劉師于唐杜註周地後漢志洛陽有唐聚在今河南府洛陽縣東魯有兩武城襄十九年城武城懼齊也杜註太山南武城縣故城在今沂州府費縣西南九十里程啓生以為在濟寧州嘉祥縣界昭二十三年邾人城翼還自離姑武城人塞其前哀八年吳伐我道險從武城程啓生以為此武城乃費縣之武城也費縣乃魯與邾吳相接界非所當備齊之處襄十九年之武城宜在嘉祥杜註併而為一似誤案髙氏地名考從杜註以昭二十三年哀八年之武城併子之武城曽子居武城俱即此地然余嘗往來京師至嘉祥縣有絃歌臺此地與齊界相接去費縣尚逺啓生以為費縣非所當備齊之處此説是也又晉楚俱有武城文八年秦人伐晉取武城在今陜西同州府華州東北十三里一名武平城僖六年蔡穆侯將許僖公見楚子于武城杜註楚地在南陽宛縣北今在河南南陽府城北周晉楚隨俱有瑕地昭二十四年王子朝之師攻瑕杜註敬王邑不詳何地僖三十年許君焦瑕杜註晉邑髙氏地名考以為此晉河外之瑕也即曲沃文十二年秦復侵晉及瑕十三年使詹嘉處瑕以曲沃之官守之今河南陜州西南三十二里有曲沃城即此瑕也又成六年𫝊有郇瑕為古郇伯之國在今山西蒲州府臨晉縣東北十五里此晉河東之瑕與此有别成十六年楚師還及瑕杜苐云楚地都邑表據水經注謂山桑縣有瑕城即此瑕在今江南潁州府蒙城縣北案楚敗于鄢陵狼狽遁歸决無反逺道東南之理或曰瑕即襄城縣之汾邱城襄城縣今屬許州府在鄢陵之西為楚歸道此説近是桓六年楚武王侵隨軍于瑕以待之杜註隨地魯齊楚俱有棘地成三年叔孫僑如圍棘杜註魯邑在濟北蛇邱縣在今兖州府寧陽縣西北昭十年陳桓子召子山而反棘焉杜註齊國西安縣東有㦸里亭在今青州府臨淄縣西北昭四年吳伐楚取棘杜註楚譙國酇縣東北有棘亭在今河南歸徳府永城縣西南鄭晉楚俱有櫟地桓十五年鄭伯突入于櫟杜註鄭别都今為河南開封府之禹州襄十一年秦伐晉戰于櫟杜註櫟在河北在山西境非陜西臨潼縣北之櫟陽也昭四年吳伐楚取櫟杜註汝隂新蔡縣北有櫟亭在今汝寧府新蔡縣北二十五里向為國名又莒周鄭俱有向地隠二年莒人入向杜註譙國龍亢縣東南有向城在今江南鳳陽府懐逺縣西四十里隠十一年王與鄭人蘇忿生之田向杜註軹縣西有地名向上今懐慶府濟源縣西南有向城詩皇父作都于向即此僖二十六年公㑹莒子盟于向杜註莒邑今莒州南七十里有向城襄十一年諸侯伐鄭師于向杜註鄭地今開封府尉氏縣西南四十里有向城晉鄭宋秦俱有新城僖四年太子奔新城杜註即曲沃今在山西絳州聞喜縣東二十里僖六年諸侯伐鄭圍新城杜註鄭新密滎陽密縣今河南許州府密縣東南三十里有故密城文十四年同盟于新城杜註宋地在梁國穀熟縣西今在歸徳府商邱縣西南文四年晉侯伐秦圍刓新城杜註新城秦邑今陜西同州府澄城縣東北二十里有古新城秦謂之新里為秦取梁地齊宋俱有葵邱莊八年齊侯使連稱管至父戍葵邱杜註齊地在今山東青州府臨淄縣西三十里僖九年㑹于葵邱杜註宋地陳留外黄縣東有葵邱在今河南開封府考城縣東三十里鄭莒俱有鄢陵成十六年晉楚戰于鄢陵杜註鄭地屬潁川郡今河南開封府鄢陵縣文七年公孫敖為襄仲逆已氏及鄢陵登城見之美自為娶之杜註莒邑在今山東沂州府沂水縣界唐即棠隠二年公及戎盟于唐杜註髙平方與縣有武唐亭在今魚臺縣西十二里隠五年公觀魚于棠杜註與唐同方輿紀要于魚臺縣武唐亭下亦並列二年五年傳合為一地厲即賴桓十三年楚屈瑕伐羅楚子使賴人追之不及杜註賴國有義陽隨縣僖十五年齊師曹師伐厲杜註義陽隨縣北有厲鄉則知厲與賴通矣另有論見後蓼飀音溜與蓼了有别桓十一年鄖人將與隨絞州蓼伐楚師杜註蓼國今義陽縣東南湖陽城師古曰蓼力救反楚得其地謂之湖陽光武封姊為湖陽公主今湖陽故城在河南南陽府唐縣南九十里文五年𫝊楚公子燮滅蓼杜註今安豐蓼縣今河南汝寧府固始縣蓼城岡即其地費如字與費秘有别隠元年費伯帥師城郎髙氏曰今魯大夫費庈父之食邑讀如字與季氏費邑讀曰秘者有别今兖州府魚臺縣西南有費亭僖元年公賜季友汶陽之田及費此季氏之私邑也今沂州府費縣西南七十里有費城髙氏地名考既以魚臺之費亭為費庈父食邑非季氏之費而于費縣注云初為懿公子費伯食邑及僖元年賜季友遂為季氏邑前後自相違反春秋時厲賴為一國論春秋時有賴國左氏桓十三年楚屈瑕伐羅𫝊楚子使賴人追之不及杜註賴國在義陽隨縣葢賴人仕于楚者僖十五年齊師曹師伐厲杜註厲楚與國義陽隨縣北有厲鄉𫝊書賴經書厲古通用實則一國也宣九年楚子為厲之役伐鄭十一年傳厲之役鄭伯逃歸則傳並書厲昭十四年楚子執齊慶封殺之遂滅賴傳云賴子面縛銜璧造于中軍則經傳並書賴前漢地理志南陽郡隨縣厲鄉故厲國也師古云厲讀曰賴厲與賴之通用徴之左傳漢書歴有明據矣公羊僖十五年齊師曹師伐厲何休云厲于葵邱之㑹叛天子之命厲如字舊音賴昭四年楚子滅厲註云左氏作賴穀梁于僖昭兩傳俱書厲史記豫讓范雎𫝊漆身為厲厲並音賴古人之通用如此杜佑通典乃以厲賴並列兩國杜精于考古而乃有此失歟余在汁梁修志著此論獨見杜氏通典分列兩國以為不深考之過及作春秋大事表遍閲方輿諸書杜氏以下如馬氏通考王氏地里通釋髙氏地名考略及宛溪方輿紀要俱主分列竊疑余説之不然夫余所據者杜預氏何休氏顔師古氏之説也且即三傳本文同一年事而左作賴公穀作厲其為一國顯然更無待杜何之註釋也諸儒特以通典從分列更不復深考而馬氏又以賴在光州商城縣南以杜預在義陽隨縣者為不知何據賴在光州以昭四年楚子合諸侯于申遂滅賴之文合之申在今南陽于光州洵屬相近而更于厲從杜氏之説謂厲在隨縣賴在光州商城則因杜氏而更為添設尤非矣謹書之以俟後之知者齊穆陵辨僖四年傳管仲對楚使曰南至於穆陵杜註以為齊封境今山東青州府臨朐縣東南一百五里有穆陵關在大峴山上歴千百年無異辭華子師茂獨據史記索隠之說以闢之曰此楚地也以為齊地者殊謬此不過言太公征伐所至與上五侯九伯女實征之相應楚使言汝何故至吾地管仲言先王有命征伐南可以至穆陵如此纔與楚使鍼鋒相對若只鋪張齊境仍與楚地風馬牛不相及烏能折楚使之口考元和志穆陵關在淮南道黄州麻城縣西北八十八里穆陵山上一名木陵關南北朝為戍守重鎮梁陳間夏侯䕫周炅屢出兵苦戰唐元和中鄂岳帥李道古出木陵關討吳元濟其地在召陵與陘之南與當日語意尤脗合况當日齊之疆界實不止此莊九年傳管仲及堂阜而稅之杜註齊地在東莞蒙隂縣西北閔二年齊人遷陽今沂水縣南有陽都城蒙隂沂水二縣今俱屬沂州府在臨朐之穆陵西南百數十里是時齊疆已擴而管仲反稱舊封之界何耶索隠明言今淮南有故穆陵門是楚之境無棣在遼西孤竹服䖍以為太公受封之境不然也葢言其征伐所至之域耳可見穆陵無棣在唐時猶有可考者特以小司馬晚出未為人所尊信不能勝服杜兩家之言後人習以相𫝊遂至譌謬千載不可復辨晉之受封不過夏墟楚之受封不過丹陽而齊始封在營邱後各拓地數千里决無始封之地終春秋世為疆界是杜解固失而後人所傳倂失杜解之意循而按之瞭然大白矣杜於地理最精審其春秋地名皆核以晉之郡縣其未確知者則但云某地以闕疑杜於穆陵無棣第云皆齊地未嘗指實今某郡某縣以是知杜註左之時尚未有穆陵關無棣溝之名乃後人設關浚溝之時因注左之誤而命名耳劉裕伐南燕更在杜後百餘年燕臣或謂宜守大峴或謂宜出峴逆戰裕部下亦慮燕人塞大峴之險裕過大峴喜形於色可見此時尚無穆陵之稱亦並未設關而後人乃指為齊之南界引杜註為援據不亦誤乎近世禹貢錐指引元和志謂穆陵關在麻城縣穆陵山上齊之四履南至穆陵即此定四年戰于柏舉亦在麻城縣界為楚腹心要地管仲借以懾楚使意當在此師茂初作此論示余凡千餘言余初不以為然尋繹久之實是有見此從𫝊文上下語氣推究非故立異翻新者况木陵關為楚地在今湖廣麻城縣一見於史記索隠再見於元和志三見於林堯叟註四見於禹貢錐指諸人皆精熟地理遞相祖述非師茂一人創見因為刪其繁芿幷略參鄙見存此論以俟後之君子乾隆十三年三月中浣四日復初氏識春秋大事表卷六下
