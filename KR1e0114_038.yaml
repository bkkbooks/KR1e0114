body:
  text: 春秋大事表卷三十八國子監司業顧棟高撰城築表敘國家用民之力歲不過三日豳風我稼既同上入執宫功召誥厥既命殷庶庶殷丕作言先王之世役民而民不知相與趨事赴功如此也夫説以使民民忘其勞説以犯難民忘其死所謂説者非家喻而户曉之也民知其事之不獲已而非為其私則雖捐軀赴刃而民不怨况區區力役乎周公東征三年破斧缺斨而詩人作詩致美至平王之世揚水之役特期戍耳而民相與怨思此以見存乎其事而不係乎期之久近與役之勞逸也春秋十二公其用民力多矣僖公修泮宫復閟宫不志于經程子謂復古興廢乃禮之大者至城郭溝池以為固非立國之本務春秋自莊以後或黷武啟釁而防報復或背盟大國而慮見討又况末季權臣擅侵奪小國以自封殖甚矣故凡城之志無論時不時皆譏臺囿之築耽細娛而忘國計其失更不待言莊公忘父讎不報而一年三築臺昭定當權臣竊國而築郎囿蛇淵囿此真下愚不移無足與論得失之數矣輯春秋城築表第三十八霞峰華氏曰城者完舊築者創始經書築者八皆譏也書城二十有三春城四夏城七冬城十二左氏于冬城多曰書時書時無貶乎穀梁子曰凡城之志皆譏何也凡城郭溝池以為固有國之所務而非有國之先務也不務脩德而苐勞民于城築土功之後以為保邦之要雖以時脩之庸得無譏乎又况如莊公城諸防亟興土功于大饑告糴之後季孫行父帥師城諸及鄆開魯莒數世之争而左氏皆曰書時其非聖人之㫖明矣或又以為聖人重用民力雖時亦書然則十二公宫廟之脩非用民力者乎春秋書世室屋壊新作世室不書成公三年新宫災作新宫亦不書僖公脩泮宫作閟宫亦不書故知凡城之志雖合乎時猶譏而以為重民力而書城者猶未盡聖人之㫖也城二十三附浚洙附外城六李氏亷曰齊伯之編外城三獨城邢為美晉伯之編外城三惟城成周無譏愚謂城虎牢乃晉悼扼鄭之吭以制楚之南向其功尤大豈得以偪鄭為譏乎春秋大事表卷三十八
