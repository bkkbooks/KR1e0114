body:
  text: 春秋大事表卷十三國子監司業顧棟髙撰刑賞表蓋聞有功不賞有罪不刑雖唐虞不能以化天下故虞書有天命天討之文戴記爵人于朝與士共之刑人于市與衆棄之蓋自天子之統一宇內與列侯之撫馭一國莫不由賞罰之得其道不僭不濫斯稱上理焉余觀春秋二百四十年知天子之所以失其柄而旁落于諸俟諸侯之所以失其柄而僭竊于大夫陪臣者皆由刑賞之失政為之徵諸經傳可考而知也蓋當春秋之初猶能爵命儀父為諸侯而伐鄭伐曲沃猶能誅叛討篡刑賞未盡失也乃伐鄭而射王中肩伐曲沃而荀賈尋為晉所滅其罪當滅國絶世而天子不聞赫然震怒列侯不聞敵王所愾從此姑息養癰馴至潰爛此豈一朝一夕之故哉當時以無罪殺母弟而子頺子帶侵犯王室則避位而出奔爵命至于奬篡弒而求車求金使命交馳列侯視之若辨髦蓋賞不足以勸善罰不足以懲奸徒擁空名于其上而已魯為諸侯之望國而陵夷更甚慶父弒二君再世負大罪而纍代貴位公孫歸父欲張公室而衰絰出奔蓋文公之世刑賞出于仲遂文公以後刑賞出于三家其國命倒置宜也唯齊桓任管仲而撻荆楚用以創伯晉文舉郤縠而刑三罪民情大服庶幾得命討之義逮其衰也抑又甚焉列國風靡蕩無綱紀夫君之所以威其臣者大則誅殺小則竄逐乃當其始也諸侯猶以専殺為罪其後大夫自相殺若齊之殺國佐晉之殺欒盈或出于闈闥或出于權臣諸侯并不得過而問矣其始猶以專放為罪其後大夫不待譴逐自出奔以抗國君若孫林父之奔晉宋魚石之奔楚借援大國為國生患兵連禍結易世不解上不得以威其下下反得以要其上矣究其禍亂安有底止惟明天子振興于上諸侯佐天子以大明黜陟天下正則一國莫敢不出于正大夫佐諸侯以振飭紀綱一國正則家臣陪𨽻無有敢踰越犯分者嗚呼此孔子春秋之所為作也殺張氏洽曰春秋之義非天子不得専殺是故二百四十二年無天王殺大夫文書諸侯殺大夫者四十七古者諸侯之大夫皆命于天子諸侯不得専命也大夫有罪則請于天子諸侯不得専殺也大夫猶不得專殺况世子母弟乎春秋之世國無大小其卿大夫士皆専命之有罪無罪皆專殺之無王甚矣稱君稱汪氏克寬曰春秋書殺大夫四十七或稱國或稱人惟晉侯殺申生宋公殺痤天王殺佞夫不稱國不稱人而直稱君以為獨其君之罪也僖十六年鄭伯殺其世子華文十八年宋公殺其母弟須殺得其罪不書此春秋之變文以賊討賊不辨曲直故書楚子䖍蔡侯般同斥其名比不稱君比不得為君也棄疾不稱人棄疾非討賊不得稱人也所謂輕重之權衡曲直之繩墨也慶封見執例然亦弒君之賊與泛執他國大夫有别故從春秋討亂賊之例吕氏大圭曰殺之或稱公子或稱大夫公子或稱大夫稱公子者公子而非大夫也稱大夫者大夫而非公子也稱大夫公子者公子而為大夫也又有以官舉者以官之重而著之也觀聖人所書而褒貶寓乎趙氏汸曰兩下相殺不書其書譏不在相殺也王孫蘇與召毛爭政使王札子殺召戴公及毛伯衛王室復亂陳哀公屬其嬖子干司徒招公子過而殺世子偃師國幾亡則譏不在相殺矣內諱殺曰刺霞峯華氏曰穀梁云先名後刺殺有罪也先刺後名殺無罪也按公實懼晉而殺買以不卒戍解於楚安得謂買有罪乎或又云刺不言罪言罪非其罪也不言罪者刺得其罪也公之將行穆姜指偃與鉏曰是皆君也以激公使逐季孟而偃未嘗與知姜亦非真欲立偃安得謂偃有罪乎經兩書刺皆殺無罪也方氏苞曰經書刺大夫二或言其故或不言其故皆舊史之文蓋殺大夫必録其得罪之由史之常法也然公子買見殺之故可言也而公子偃見殺之故不可言也故書辭異焉孔手不革而一因之何也偃之不言其故者不可增也於買而削其故則刑之不中與當日之邦交皆不可得而見矣案春秋書刺殺所不當殺也書肆大眚赦所不當赦也寬嚴俱失之矣此執而書用者李氏廉曰胡氏執諸侯例執雖有罪而不歸京師則稱人宋執嬰齊是也成九年晉人執鄭伯襄十六年晉人執莒子邾子十九年晉人執邾子可入此例歸于京師而執非其罪則稱人僖二十八年晉人執衛侯歸之于京師是也若邾人執鄫子晉侯執曹伯畀宋人執戎蠻子歸于楚宋人執小邾子則暴惡之甚不特以專與濫罪之矣其楚子執宋公見伐例楚人執徐子戎狄肆威天下大變又非可與此例論也內大夫見執他國執他國大夫已上執稱行人啖子曰凡稱行人而執以其事執也不稱行人而執以已執也放孔氏頴達曰放之與奔俱是去國而情小異釋例曰奔者迫窘而去逃死四鄰不以禮出也放者受罪黜免宥之以逺也趙氏汸曰以上書王卿士出奔者一莊十六年周公忌父出奔虢惠王立而復之不書宣十六年王孫蘇奔晉晉人復之亦不書以王命為重也至尊制命為紀法之宗茍以王命復之則奔者之有罪無罪與復之之有援無援皆不足深辨矣周公楚以王命復之而不反故書之也書王子奔者二桓十八年周公欲弒莊王而立王子克王殺周公黑肩王子克奔燕不書蓋主謀者黑肩既以天子討有罪不書則子克出奔不書以非其罪也儋括欲立王子佞夫佞夫弗知景王殺佞夫括瑕廖奔晉瑕廖蓋與括同謀者殺佞夫既以非其罪書則瑕書奔者以佚賊也僖十二年王以戍難故討王子帶王子帶奔齊其後又以狄師伐周襄王復辟卒討之則其奔齊不書者以能討也王子朝之亂王猛敬王相繼播越五年敬王反正而不能討其罪則其奔楚亦以佚賊書也不書是也然書奔者未必皆有罪如蔡公子燮陳公子黃皆非有罪而書者陳蔡之人安于事楚其臣有欲從中國者雖公子公弟不能保其身然不奔他國而皆奔楚者以其國終于事楚猶冀可藉以歸耳故悉書之以見二國之習于夷上無天子下無方伯莫能正也楚公子圍弒其君右尹子干奔晉亦非有罪而書者圍弒君而以瘧疾赴諸侯特書比奔以明變也衛鱄以下皆以罪書事見于傳惟衛討齊豹之亂公子朝奔晉有罪而不書者衛人以朝故殺宣姜諱不告也趙氏汸曰以上外大夫書出奔者三十有三非以罪出則彊家之相傾者也蓋自元咺而後大夫益專其出入必有關于一國之故惟鄭厲公反國討與于雍糾之亂者殺公子閼而公父定叔出奔衛不書春秋不與鄭突削其復歸之文故見殺與出奔者皆不復書鄭文公惡髙克使宿師河上久而不召師潰而克奔陳春秋特書鄭棄其師譏文公不君而髙克之奔不足書矣故自僖以前外大夫無以出奔書者政不在大夫也趙氏汸曰以上書篡弒出奔者二書叛臣出奔者一雖卒討之不書雖討以諸侯之師不書宋請南宫萬于陳醢之定五年春王人殺子朝于楚皆不書者蔽罪于所奔之國也亂臣賊子無所逃罪天地之間其誰可受凡諸侯為逋逃淵藪者皆有所利焉而罪莫甚于黨惡逆故經于篡弒者出奔雖卒殺之不書蔽罪于受之之國也昭二十一年傳公子城以晉師至曹翰胡㑹晉荀吳齊苑何忌衛公子朝救宋大敗華氏圍諸南里春秋削之不書者以四國之師救宋而懼楚不能一戰乃出叛者以說之其事不足書也趙氏汸曰以上外大夫書奔不名者二宋人將弒昭公而殺其司馬故司城與髙哀皆來奔非見出于君故一書其官一書其字而不名案以上書錫命三皆志天王之僭賞也最失禮者莫如虢公命曲沃武公為晉侯綱紀從此大壞其餘如成簡公追命衛襄公劉定公之賜齊靈公命皆僭賞之尢者然春秋例皆不書他如賜齊桓公晉文公其有功者亦不書所以詳內而略外也春秋大事表卷十三
