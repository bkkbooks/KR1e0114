body:
  text: 春秋大事表卷四十九國子監司業顧棟髙撰人物表昔班孟堅篹漢書列表十其終曰古今人表余讀之殊苦其不倫自邃古羲皇以至孔子下逮桀紂幽厲妲己褒姒夏姬之徒列為九等猥雜已甚且世代遼逺難可悉數以余觀春秋二百四十二年人物號為極盛無論孔子大聖垂法萬世即如栁下惠之和聖季札蘧伯玉之大賢亦古今罕儷而讒佞亂賊之徒後世之殊形詭狀者亦莫不畢見於春秋之世無他國異政則賢否絶殊世變亟則奸邪輩出也謹就其中區其類為十有三曰賢聖曰純臣曰忠臣曰功臣曰獨行曰文學曰辭令曰佞臣曰讒臣曰賊臣曰亂臣曰俠勇而以方伎終焉凡孔門弟子之見于左𫝊者靡不具載所謂附驥尾而名益顯其餘寧愼無濫而向戌欒書之列於讒臣衛子鮮之不得列于獨行亦春秋推見至隠原情定罪之意云輯春秋人物表第四十九右各項俱極謹慎純臣列士燮而不列士㑹以士㑹在秦時為秦畫䇿謀戰故也提彌明之于趙盾董安于之於趙鞅俱以身死難而不得與于忠臣之列以為私家盡力貪其豢養之恩而不明大義特與佞倖有别耳鬻拳兵諫不可以訓子文與管仲同時而專事猾夏華元合晉楚之成為向戌弭兵之倡趙武韓起文雅優柔使晉伯業不振其功業俱無足稱故俱沒其名不列楚子西與仲歸謀弑穆王鄭羣公子謀殺子駟俱事成則為討賊不成則身族滅而受惡名春秋于楚大夫宜申稱國以殺而不去其官存恕道此聖筆之權衡也衛子鮮托于木門終身不入衛國疑可入獨行然先儒謂其導甯喜以弑君又不忍負甯喜而甘棄其君兄亦未為知道較魯之叔肸曹之子臧逺矣卜齮圉人犖及程滑親加刃於君父而賊臣不列其名以其微者且安知非歸獄罪當坐主謀不使他人得分其罪如後世魏髙貴郷公之死當坐司馬昭賈充不當及成濟也齊襄之弑從死者三人齊莊之弑從死者十人後為莊公報仇者二人然平日從君於昏苟私于所事烏得謂明于大義得免佞倖足矣凡兹去取俱有微意不得以脫漏為嫌壬戌十月下浣復初氏識鄭莊公論春秋初年列侯僣侈多封樹子弟以僭擬王室而卒自受其弊同時衛有州吁晉有成師鄭有叔段皆擁强兵謀奪宗其後桓公立十六年而州吁弑其君成師𫝊莊伯至武公凡五弑君歴六十七年而卒滅晉獨莊公克平大憝宗祧無恙論者謂荘公養成段惡志在欲殺其弟歴千百年無有能平反是獄者此信𫝊而不信經之過也愚獨謂莊公之為人狙詐猜忍無一事不干天討獨其處段未為過當夫段之作亂路人皆知形勢已成使莊公而稍孱弱不為衛桓之駢首就夷即為晉之三世有亂其機間不容髪且以莊公之雄才其欲殺段宜無難者而莊公未嘗窮追極討如齊桓之殺子糾楚平之殺子干子晳仍使之餬口于四方則所謂緩追逸賊于親親之道正合穀梁訓克為殺既於實事不符而左傳謂稱鄭伯譏失教嗚呼莊公豈能教段使不為亂哉段恃母之寵愛常謂莊公之攘奪其位其心每憤恨不平使莊公而稍禁戢之適足予以兵端而反噬故母氏請京則聽收貳至廪延亦不發露隠忍至二十二年之久葢猶有畏名義念母與鞠弟之心非可謂養成其惡也且石碏純臣豈有養成子惡之理而石厚佐州吁弑君石碏熟視十六年不能禁直至問定君之計詭計請陳而使殺之此實出于無奈而謂石碏之處心積慮成于殺子乎嗚呼于石碏之殺其子則謂之大義滅親于莊公之以罪逐其弟則謂之處心積慮成於殺此見世俗之情私于父子而薄于兄弟遂以此立論而莊公亦實為衆所惡無有肯為之平反者遂至明建文之世燕師軼境猶謂無使朕有殺叔父名蓋猶懲鄭莊之事而卒肇金川門之禍讀書無識千古眯目可一嘆也莊公之罪罪在誓母黃泉為得罪名教耳使為莊公者誠敬以感悟母氏涕泣以訓誨其子俾之率徳改行而復任為大夫則與周公之誅管蔡而庸蔡仲合矣若其處段固未甚害義也後世于明建文之遜國則譏其不克負荷于宣宗之誅髙煦則美其克守先業獨至論莊公則反是春秋之世簒弑相尋往往寛假臣子而苛責君父于稱人以弑則曰君無道也又曰君惡甚矣于莊公之誅亂臣則曰養成弟惡而殺之使君父于凡桀驁悖逆之臣子真有進退維谷之勢如此則春秋乃助亂之書豈可訓乎春秋初年晉未與中國通故成師三世之事不見于經而鄭衛二國則書法顯然著明隠四年書衛州吁弑其君完而桓公前有讒而弗見後有賊而弗知之罪亦難辭矣隠元年書鄭伯克段于鄢稱鄭伯舉爵為無譏段不言弟為削其屬籍書曰克大鄭伯之能戡亂斷以經之書法而春秋君臣之義乃定鄭莊公後論嗚呼余讀春秋鄭伯克段傳而竊歎明建文之世其所以處置燕王者事事與鄭莊相反宜其失守天下而卒不祀也方莊公初立武姜為段請制公曰制巖邑也虢叔死焉以極制防之心而出以慈愛雖係奸謀實闗至計而燕王雄踞北平不能移駐他處其失制馭一也鄭莊之時羣臣爭欲除段而莊公持重不發葢欲蓄全力以待其敝而建文失于輕遽今日下罪書明日削䕶衛周齊湘岷同受縲縶俾之合志併力而㢋以謀我其失人心二也段之雄武可埓燕王而又多一姜氏為之内主而莊公一舉勝之絶不震驚此必有先為不可勝之計其二十二年之中未嘗一日忘備而建文君臣方粉飾太平制禮作樂倣周官行井田之制泄泄然不復以燕兵為慮其踈警備三也嗚呼儒者謀國其居平議論動謂莊公負叔段叔段何負于莊公意以藩臣弄兵如狂騃孺子不久自弊誰知有雄大桀驁如燕王者頓移天祚此時雖十族以殉何補於國此尤可歎息痛恨者也夫子刪詩于鄭風錄叔于田大叔于田二詩于唐風錄揚水椒聊二詩當日民心之歸向叔段與成師者情勢大畧相似而晉祚卒移于曲沃莊公手平大難宗社晏如夫子大其功而曰克正與錄詩之意相對照此尢大彰明較著者也春秋于凡叛臣之入國者一則曰鄭人殺良霄再則曰晉人殺欒盈稱人謂夫人之所得殺絶無憐憫伯有與欒盈之意獨至叔段則曰段無罪莊公養成其惡而殺之從来書法以稱人為貶稱爵為無譏而于亂臣賊子則反是尤不可解嗚呼春秋初年奪適搆亂之事列國多有而其始靡不由于助亂鄭共叔之亂公孫滑出奔衛衛桓為之伐鄭未㡬而即見殺于州吁州吁弑君魯隠為之伐鄭以定其位未㡬而即見弑于羽父鄭莊親受共叔之亂而卒助魯桓助宋莊逮其子厲公始而簒忽繼殺子儀且反公父定叔曰不可使共叔無後于鄭亂臣賊子同惡相濟雖其親父子且弗顧而後之儒者又可助段而揚其幟乎余熟覽春秋列國時事及有明建文之世而歎左穀釋經與經意悖足為後世召亂謹書此以質後之君子鄭莊公第三論余於莊公叔段事既再為論以明之而榖梁之論尤謬榖梁曰緩追逸賊親親之道致明建文帝於燕師軼境之日猶勅諸將無使朕有殺叔父名使叛逆之臣聞之輕騎深入冒險突圍諸將莫敢加兵卒肇金川門之禍是亡惠帝之天下者穀梁一言啓之也夫人臣無將將則必誅明其為賊敵乃可服親則非賊賊則非親二者不容並立見無禮於其君者逐之如鷹鸇之逐鳥雀况親執干戈破城殺將之賊而可縱釋不誅以遺後患乎且其言曰甚鄭伯之處心積慮成于殺獨不曰段之處心積慮成於簒乎釋其臣而責其君為亂賊立一䕶符為君父設一箝制致周襄王於叔帶之難倉皇出奔曰寧使諸侯誅之無傷母氏意而後世儒者謂同於舜之處象飾退讓之小名忽宗社之大計是徐偃之仁宋襄之義滅亡之道也且以段之興兵聚衆跋扈肆横而曰猶取諸其母之懐中而殺之夫段豈懐中之赤子乎果爾則周公先不宜致辟管叔於商矣若謂周公為國家除難而鄭莊止利一身殊不知莊公既立則社稷為重而身為輕段所圖利者鄭之社稷非止莊公一身也若以此引嫌則當於嗣位之初先宜退讓而弗居不當既立而輕以其國為兒戲公穀俱謂殺母弟直稱君甚之比於天王之殺佞夫夫儋括欲弑王而立佞夫佞夫不知此出於無罪而見殺烏可與段比例故佞夫書弟而段不言弟書法顯然具見余謂孔子作春秋以討亂臣而三𫝊不明大義解經而適以亂經孔子明書趙盾弑其君夷臯三𫝊則曰非弑也不討賊也如此則司馬昭亦可云非弑孔子明書許世子止弑其君買三傳則云非弑也進藥而藥殺也如此則霍顯亦可云非弑孔子明書趙鞅入于晉陽以叛三傳則曰非叛也欲清君側之惡人如此則朱全忠李茂貞之徒皆得以橫行無忌孔子明書子野卒與子般卒子卒同例三傳則曰毁也如此則凡斃其君於宫庭隠處者皆得以售其奸夫趙鞅晉陽之甲夫人而知其非趙盾許止之獄歐陽公有定論即子野之蒙弑前明諸儒及近世方望溪氏猶有能白發其奸者獨鄭莊叔段之事晦昧終古使後世簒逆臣子成事則為成師之世享晉國燕王之晏有天下不成而猶得為叔段蒙文人學士之哀憐與孔子作春秋之意相反昌黎云春秋三傳束髙閣獨抱遺經究終始豈無故哉衛石碏論嗚呼吾觀于春秋衛石子之事而知古来之除奸必出于慎宻持重而輕發則未有不敗者也當石碏之極諫于莊公時此特禍之始萌耳逮莊公薨而桓公立此時莊姜為主于内石碏老臣柄政于外豈不可奪其兵柄斥居外國亂何從生而顧告老以去此必度知桓公之為人柔懦不足與圖事又州吁權譎能使其衆觀石碏之子厚為之出死力則其人可知先發恐至僨事故隠忍不發至十六年亂果成列國不惟不能討而反為之援此時石碏决計圖之然猶未敢聲言討賊父子之間未嘗偶露至石厚問定君之計乃使入陳請覲告于陳而使執之此特一匹夫之力耳可見兵權在握君無如其臣何父無如其子何然此計何不發之于十六年之前使桓公不至于弑而國君新立州吁罪惡未著則為桓公内不能容其弟莊姜下不能容其子而石碏以殘害骨肉導其君要亦不知其禍之至於此也嗚呼始之能慎後之能斷指麾談笑變故立定石碏可謂千古一人矣後世具此大力以小人而除小人則有若元載之于魚朝恩史彌逺之於韓侂胄而大臣謀國誅剪巨憝則若王曽之除丁謂楊一清用張永以除劉瑾徐階之計除嚴嵩俱外不設異同之迹機㑹可乗不崇朝而制其死命譬之摶虎一擊不勝則將為所噬吾獨悲夫明季諸君子絶無長慮却顧之術虚張聲勢恣意抨擊俱入奸閹之手卒之身塡牢戶而國運亦隨以斃後之君子其亦觀于石碏之事而審所措置哉晉狐偃趙衰胥臣論從古一國之興莫不有股肱宣力之臣後利而先義推賢而讓能蓋自唐虞之世禹臯稷契交讓一堂下逮春秋伯者之佐亦莫不禀此意以周旋無後世草昧初起飲酒爭功拔劍擊柱之熊于此益知先王禮義之教去人未逺也余觀晉狐偃趙衰胥臣三人出萬死不顧一生從公子于外十九年幸得返國即使其才庸下亦當居首功况三人皆天下才而當作中軍謀元帥之時趙衰薦郤縠又讓欒枝先軫狐偃讓于狐毛而已佐之猶曰此其同列兄弟也逮狐毛死先軫子且居為上軍將而狐偃佐之先軫死子且居嗣為中軍將而趙衰佐之胥臣亦舉郤缺而終三人之世未嘗將中軍夫狐趙于先且居為丈人行而先軫未嘗有從亡之功乃父子並將中軍上軍兩世而狐趙為之佐先氏偃然列其上而不疑狐趙泰然處其下而不忌相與出竒効䇿戮力同心此豈文公之徳有以致之殆亦氣運使然天生此三人以昌晉之伯也至再世以後狐偃子射姑以易班殺陽處父矣趙盾逐賈季放胥甲父矣胥童以胥克之廢怨郤氏矣植黨樹權營私報怨即其父子祖孫已有絶不相似者殆亦有莫之為而為者耶余觀人臣功名之㑹莫不敗於爭而成於讓樊舞陽以蓋世英雄而淮陰侯謂生乃與噲等為伍李道宗以宗藩宿將而尉遲敬徳至拳毆道宗目㡬眇趙韓王以儒臣佐命亦不免有專權之譏蓋讓徳之難如此元李思齊與察罕同起兵逮察罕死子庫庫總天下軍而思齊不為之下至治兵相攻若三人者豈特天分過人蓋亦沐于先王禮義之教浸淫而不自知觀趙衰之薦郤縠曰說禮樂而敦詩書胥臣之舉郤缺曰敬徳之聚而子犯詔公子不以得國為利至蹈九死而不悔非有得于聖賢之教而能然乎夫三子偶不為聖人所論列而曽氏𫝊大學戒言利而述舅犯仁親之訓其意以為過齊管仲逺矣夫鮑叔牙薦管仲而管仲治齊專興魚鹽之利不聞為國樹人三子所舉人才晉國賴其利者再世而管仲死五公子爭立齊國大亂不聞有管仲推轂之臣為國柱石主持國是則較三子者之優劣豈不大相逺哉鄭燭之武論世多稱燭之武退秦師謂與展喜犒齊同能不戰而屈人之兵以余考之良不然燭武特戰國䇿士之先聲偷取一時之利其實兆鄭二百年晉楚之禍者燭武為之也何則鄭之大患在楚而唯秦與晉合則力足以抗楚庇鄭而無患往者齊桓嘗勤鄭矣卒之楚患未巳甚者江黃則為楚所滅獨至城濮之役晉合齊秦攘楚楚力屈逺遁而鄭乃得安意事晉今一旦秦晉以小嫌伐鄭其實主兵者晉也為鄭之計宜屈體以求成于晉晉退而秦亦退秦晉之懽不失則晉之足以庇鄭者如故也乃間秦撓晉用三帥戍之未㡬秦旋圖晉使晉襄不禦之于殽而鄭蚤為秦滅矣一自殽之師起而秦晉之仇不解楚且乗間以合于秦使晉力疲于西不得復致力于東楚得日翦東諸侯而無忌鄭且駸駸日逼矣夫秦晉楚匹也燭武苐知當日說秦可以紓二患不知啟秦窺覦之心而又多一秦患幸而殽師扼之而秦患不至而晉勢孤力不能抗楚而楚之禍方深厥後秦晉之仇二百年不解而鄭國晉楚之禍亦二百年不息犧牲玉帛待於二竟猶不得免是誰之咎哉晉悼之興結吳撓楚楚之有呉患猶晉之有秦患也楚勢稍屈而鄭亦得以稍安然呉卒肆横齊魯且惴惴焉向使秦晉合力足以制楚而有餘無用召吳中國不特無楚患并無吳患矣余反覆晉楚二百年事追原禍始未嘗不歎息于燭武之一言為之階也後之當事變者長慮却顧審擇所從母偷一時之利而釀百年之害致蹈燭武之故智哉衛蘧伯玉論余觀伯玉世稱大賢夫子亟稱之及觀左氏𫝊于襄十四年孫甯逐其君衎逮二十五年衎復入伯玉俱不對從近闗出曰嗟乎左氏所稱殆不可信如果有之是春秋之馮道也尚安得為伯玉乎哉且夫子之作春秋將以嚴君臣之分立臣子之防使為人臣者盡忠不貳以事其君今以伯玉此舉為合道是使後世之偷禄取容全生苟免者有以藉口與春秋之志違矣夫食人之禄者死人之事𫝊曰謀人之家國危則亡之當孫林父之以謀告伯玉也伯玉能正色直辭以折之使不敢動上也不然乞師大國討孫甯之罪而復其君次也不然則逃之深山終身不復出又其次也乃衎出而臣剽剽弑而復臣衎有事則束身出境無事則歸食其禄視其君如奕棋漠然不闗其慮是五代之季畔亂反覆者之所為而謂伯玉出此乎哉或謂伯玉身非正卿故委蛇以合道又非也夫位之崇卑不同而其為人臣子則一也今有人欲刼質其父謀之其子更十年而復歸之其子乃恝然不顧其父之出也聽之其父之歸也復受之是尚安得為人子乎或又謂衛侯之出其君實甚晏子所謂非其私暱誰敢任之者非歟曰晏子之論後世猶有非之者况獻公之出特以不禮于權臣而孫寗謀先非有淫昏不可道之行尤不可與齊莊之弑同日語也子朱子乃引為卷而懐之之證余疑其事而急辨之如此曰然則左氏非實錄歟曰左史一也史于武公之徳而謂其弑共伯而自立豈弑立之事亦有可信者歟列國謚法考鄭夾漈著謚法略謂謚有美而無譏臣子當大故之際而加譏貶于君父非先王之法楚頵謚之曰靈不瞑曰成乃瞑此變夷之習也嗚呼鄭氏好為異論而不自知其顯同于始皇之見且鄭氏獨未聞孟子乎名之曰幽厲雖孝子慈孫百世不能改孟子係周時人幽厲豈非惡謚其踈謬不待辨而可知矣廼余遍考春秋之世通君臣皆有謚者惟魯衛晉齊四國為然然皆卿有謚而大夫無謚公族世卿有謚而庶姓無謚其餘逺國如秦楚中夏如宋鄭則君有諡而臣無謚至呉越徐莒則君臣皆無謚秦之蹇叔百里奚楚之令尹子文孫叔敖子重子反皆位為正卿著有功業不聞以謚稱也宋華元向戌無謚鄭之子皮子産子太叔皆赫然著見于春秋之世而後世不聞以謚稱二百四十二年莊公世惟一公父定叔僖公世惟一皇武子襄公世惟一馮簡子哀七年有駟𢎞别為桓子思九年有罕達為武子賸然杜註惟于公父定叔及駟𢎞明之曰謚其餘則無註又晉語鄭簡公使公孫成子来聘韋注云成子子産之謚此苐見于國語而左傳則無之至魯衛齊晉得謚者最多簒弑之賊如魯共仲季平子衛之孫文子甯惠子齊之崔杼晉之趙盾無不有謚而衛之史魚蘧伯玉無謚孔子大聖人亦無謚則以異姓非世為卿晉以祁奚叔向之賢而無謚則以雖公族而非為正卿晉有非公族而得謚者惟樂王鮒一人則或以晉君之嬖而為范氏私人之故夫易名之典起于周公當時以直道行之而其後世惟論爵秩之崇卑且為世室大家所竊據而虚稱美號加于簒逆之賊如慶父之為共意如之為平謬盭尢甚周公之後裔且然况其外餘子乎子貢與孔子尚論諸賢如孔文子公叔文子二人斤斤有循名責實之思而仲尼之卒哀公作誄子貢不聞請謚意其時已成習尚雖孔子大聖不得援公族之例以請歟此外如陳之轅宣仲公孫貞子蔡之聲子邾之茅成子他國行謚亦間有之然𫝊文闕畧莫可深考吳越之君如闔閭勾踐皆無謚故以延陵季子之賢而亦不得謚成十四年莒子朱卒楊氏士勛曰渠邱公也葬須稱謚莒無謚故不書葬徐子章禹亦無謚是則蠻夷之俗不知有謚而鄭氏之言顧反之此尢不思之甚也夫諸國之無謚用夷禮宋之無謚因殷禮獨鄭為王室懿親冠葢交于中國而其謚見于傳者寥寥止三四人然其行事皆不概見于春秋其顯然著名者則無謚此不可解者余為列其端緒以俟後之君子博考而得其故焉春秋大事表卷四十九
