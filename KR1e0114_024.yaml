body:
  text: 春秋大事表卷二十四國子監司業顧棟髙撰宋執政表中州為天下之樞而宋鄭為大國地居要害國又差強故伯之未興也宋與鄭常相鬬爭逮伯之興宋鄭常供車賦潔玉帛犧牲以待于境上亦地勢然也顧春秋時宋最喜事春秋之局大變自宋起當齊桓之伯宋嘗先諸侯以求盟桓死而襄繼之求諸侯于楚卒至執于盂傷于泓楚遂橫行不可制而春秋之局于是乎一變繼恃其有禮于晉公子逮公子反國首先輔晉成伯業鄭衛陳蔡翕然從服而春秋之局于是乎再變最後華元欲合晉楚向戌以弭兵為名令晉楚之從交相見卒至宋虢之盟楚先晉黃池之後吳先晉舉中原之勢凌夷而折入于吳楚悉向戌為之禍首而春秋之局于是乎三變厥後南里之叛晉已失伯而吳楚帥兵以助叛人夫非宋自階之厲歟叙其次第于南北勝復之故有深感焉亦春秋升降之一大機也其執政不拘一官孔父以大司馬華督以太宰華元以右師向戌以左師樂喜以司城與晉楚又異輯春秋宋執政表第二十四右宋執政自孔父至樂茷共十五人中間桓公三十年執政闕不見𫝊或遂欲以蕭叔大心當之非也蕭叔特封為附庸未見有執政之迹其餘皆班班可考春秋大事表卷二十四
  hash: sha256:1c16eb7d278b80fd6f66bb137c3fccdfdf5f4ab9e64bb5309fec5469b313834c
