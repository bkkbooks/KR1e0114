body:
  text: 春秋大事表卷三十六國子監司業顧棟高撰魯邾莒交兵表嗚呼余觀春秋之世而知封建之為禍烈也魯與邾莒僻處一隅非有關于天下之故然魯虐邾莒莒滅向滅鄫邾滅須句滅鄅而其後皆為魯所吞併最後以邾子益來㡬亡邾矣賴呉越而得復中間仗桓文之霸扶持綿延二百餘年迭相攻伐而斯民之塗炭亦甚矣葢嘗綜其始終而論之魯邾莒之事終春秋之世凡三變何則魯立國于兖州之曲阜其南則邾其東則莒地小而偪其勢不得不争然邾列在附庸而莒介于蠻夷故春秋之初魯嘗凌邾而畏莒隠桓皆再盟邾而再伐邾邾不敢報而莒則隠與其微者盟于浮來矣莊以叔姬女其大夫矣隠桓莊三世魯莒未嘗交兵至僖公首年一敗莒師旋即再盟洮向以弭其隙而邾則僖公之世戰伐無已則以邾近而莒差遠邾弱而莒差强故也至文十二年季孫行父城鄆而争鄆之禍起襄四年魯請属鄫而莒即滅鄫而争鄫之禍又起當其時晉悼興霸羣侯方屛息聼命魯以禮義之國兢兢焉軌於法度罔敢凌虐弱小而邾莒反恃齊靈而肆横十年之間莒四伐我而邾再伐我魯凡十六年不伐邾反為脩平以講好葢邾莒倚齊以軋魯魯之所恃者晉晉遠不若齊之近又是時晉方以楚鄭為事無暇理邾莒葢倚人立國彊弱隨時理固然也至昭之元年而莒有亂季孫以大盗竊國取鄆不已旋而取鄫取鄫不已旋而取郠而邾則連歲四納其叛人昭公以後莒不復見哀之世無歲不與邾為難竟俘其君以歸獻於亳社陵蔑弱小之禍至此極矣嗚呼以邾莒之宻邇于魯而得終春秋之世不亡者以大國林立環視而莫敢先動然其民之死于戰争已不可勝數故欲復周初方伯連帥興師討伐之制不若易後世郡縣㝢内守令迭更之制雖有殘暴不軌為生民害者馳一尺符則虐燄頓息孰與夫興師討罪有抗拒之禍甲兵之慘哉春秋列國之争可前鑒矣輯春秋魯邾莒交兵表第三十六邾李氏亷曰春秋内兵之伐國僅二十而書公伐邾者六書大夫伐邾者八止書伐邾者一邾在魯之宇下而陵弱侵小之兵史不絶書如此莒莒與魯為列國差倔彊非若邾之附庸能卑屈于魯也故始而争向繼而争鄆争鄫中間附于齊更愬于晉楚致叔孫見執意如為囚兵端與春秋相終始共公以後不復見矣春秋大事表卷三十六
