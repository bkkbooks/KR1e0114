body:
  text: 春秋大事表卷三十五國子監司業顧棟高撰齊魯交兵表夫子有言管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左袵嗚呼夫子稱到于今則知此言非特豫管仲并豫晉文愚嘗觀于齊魯之故而歎春秋之天下不可一日無晉晉伯息而齊魯俱受其敝矣何則霸之局非管仲與齊桓不能創而非晉則不能維持以至于百年齊桓之世天下之所賴者唯齊齊桓既沒魯之所患亦唯齊齊桓之子孫至春秋之末凡八九世獨惠公稍安靜而景公有志爭伯觀釁而動故二公之世齊魯爭鬬差少其餘若孝公懿公頃公靈公莊公類皆如猘犬之狂噬而悼公之世國已制于陳氏好以其君惡于諸侯故其時魯一有齊難則乞師于晉晉師出而魯得安枕者數十年逮晉稍有間或新君初立未遑諸侯之事則齊患復起故齊之於魯如切膚之錮疾不時間作所藉以為扁鵲者唯晉晉伯息則魯無所控訴故晉文之未興也僖公至以楚伐齊晉伯之既去也哀公至以吳伐齊夫至以吳楚伐齊天下幾無復有中夏此夫子所以有被髮左袵之懼也世徒見夫子有譎正之言謂聖人或伸齊而抑晉略晉文之功而不録豈識春秋之旨哉夫桓公一匡天下而其子孫首壞其法狼貪鼠竊晝伏夜行賴晉承齊桓之業整飭者數世至晉伯衰而齊弱魯魯亦能乞師以弱齊齊魯交相敝而吳楚得橫行于天下夫子立定哀之世親見昭公娶于吳矣哀公㑹吳伐齊至齊弒君以說矣至吳晉爭長黃池而齊桓一匡之緒吳且分其半夫子蓋心傷之而要非齊桓則不能創其局以貽晉夫子所以獨歸功於管仲者以此孟子曰其事則齊桓晉文夫惟桓文並稱此夫子之所為到於今也輯春秋齊魯交兵表第三十五春秋大事表卷三十五
