body:
  text: 春秋大事表卷五十國子監司業顧棟髙撰列女表周家世有婦徳自周姜以迄任姒世嗣徽音文王后妃化行江漢其易汙亂以貞信豈一朝一夕之故哉逮春秋之世四百餘年禮教陵夷衛興新臺之刺齊有南山之行魯以秉禮之國再世女禍文武之家法盡矣吾夫子作春秋内大惡諱而夫人姜氏㑹齊侯于防于穀如齊師享祝邱繁稱不殺豈非著其淫佚不道為世鑒哉夫上有好者下必有甚焉是以春秋卿大夫家咸淫姣失行外于禮法通室易内怙不知耻春秋大書紀叔姬宋共姬之卒葢欲撥亂世反之正而或謂叔姬不當歸酅共姬女而不婦聖人書之以示譏一何刺謬乎余倣孟堅遺意將春秋列女區為三等最上節行其次明哲下則縱恣不度因而亡國喪家戕夫殺子者有之嗚呼鑒兹行事變亦備矣輯春秋列女表第五十案晉懐嬴魯施孝伯女俱係失節婦人而非其罪且其人亦頗明了見事機識道理然無可褒如後世蔡文姬一流息媯委身事仇更下一等然自入楚以後未聞失檢即有子元處王宫事而不著其淫通事迹魯鄫季姬左氏傳與公羊各異然諸儒謂宜從公羊姑闕疑俱沒其名不列可也鄭雍糾妻齊盧蒲癸妻雖與淫肆殊科然亦人倫天理滅盡矣特附于列女之下用志春秋世變之極云十月下浣又識衛夷姜晉齊姜辨左𫝊衛宣公烝於夷姜生伋子晉獻公烝於齊姜生太子申生説者因謂芝草無根醴泉無源愚嘗反覆核其年而知左氏之誣也据閔二年傳惠公之即位也少杜註謂葢年十五六宣公之在位止十九年而朔尚有其兄夀則奪伋妻之事計當在即位之元二兩年伋年可娶亦必當十五六而宣公之兄桓公凡十六年而為州吁所弑則烝夷姜當在桓公即位之初年矣凡先君之妾媵嗣君當嚴閉深宫無有他公子得濁亂宫掖者而宣公為公子時又出居邢逺寄他國無由得近借令有之亦當閟不令宣何乃顯然屬諸右公子猖狂無忌如此且夷姜何人當即莊姜之姪娣也而右公子即宣公之兄弟莊姜嚴正惡州吁之好兵豈反不惡宣公之淫亂而石碏老臣謀國手定州吁之難創深痛鉅豈有迎穢迹彰聞之公子而奉以為君此萬萬必無之理至獻公之于齊姜事尢不類左𫝊莊二十八年晉使太子申生居曲沃重耳居蒲夷吾居屈係晉獻公之十一年若申生是烝武公之妾所生想當在即位後年不過十歳重耳夷吾必當更幼以三稚子守宗邑與邊疆適足啟戎心而使民慢何謂威民而懼戎又僖二十八年杜註謂重耳年十七而亡亡十九年而反合共三十六年至此年四十据此則重耳守蒲時止六齡耳尤不可當重任觀楚子曰天假之年而除其害時楚子年已五十而謂人四十者為天假之年可乎案史記重耳奔狄時年四十三歸國時年六十二則城濮之戰年已六十六與左氏假年之說相符合計守蒲時年三十二矣而申生居長則其生當在獻公為曲沃世子時是時武公暴起方圖并晉志意精明豈有縱其子淫昬之事即使有子豈宜復立為太子唐之髙宗不聞于太宗之世而先通武后也竊意夷姜齊姜皆二君未即位時所娶之適夫人後因寵衰見廢横加之罪左氏因而甚之耳史記俱不及烝淫事于衛則曰宣公愛夫人夷姜生子伋以為太子于晉則曰太子申生其母齊桓公女也曰齊姜史公亦喜談女徳者而于此二君則母曰夫人子曰太子絶無曖昧不可道之事此尢信而可徵者也夫宣公奪子婦獻公惑驪姬以致大亂㡬亡國俱無足深道獨惜伋子之兄弟爭死申生不敢明驪姬之過為千古之純孝而其母蒙不韙之名不得不為之辨為考其年之先後而論著之如此此華子師茂之説余為申其意而作辨噫讀書不具隻眼多為古人所誣鄭氏康成箋匏有苦葉云刺夷姜而取証于雉鳴求其牡一語竟似襄夫人之欲通公子鮑矣罪狀輾轉増加夷姜有知得毋叫寃于地下乎乙丑六月上浣八日復初氏識春秋大事表卷五十
