為麇國地文十一年傳楚子伐麇師於防渚防渚在今房縣又東南經均州北均水合丹水淅水自北入焉丹水出商州西水經注丹水自倉野東歷菟和又東南歷少習出武關又東南淅水注之又東南經三户城又東南經丹水縣南又東歷於中之北所謂商於者也又南合均水按今鄖襄以北北通宛洛西走商華實春秋時楚與春晉往來要害之地左傳哀四年楚人謀北方司馬起豐析與狄戎以臨上洛左師軍於菟和右師軍於倉野使謂晉隂地大夫將通於少習以聼命豐在今淅川縣西南析在今內鄉縣西上洛今商州菟和倉野俱在州南自州以東至嵩縣俱晉陰地少習在商南縣東其下有武關史記沛公西入武關破咸陽是也僖二十五年秦晉伐鄀楚鬬克屈禦寇以申息之師戌商密申在今南陽縣西息在今息縣北商密在內鄉縣西南本鄀國地有三戶城哀四年晉執蠻子以畀楚師於三戶是也文十年子西為商公沿漢泝江將入郢商在今商南縣武關西北然則均州丹水之間為楚重地明矣又文十六年楚侵庸次於句澨楚子會師於臨品子越自石溪子貝自仞以伐庸俱在州境又東南經光化縣西南縣西有隂縣故城為楚下隂地昭十九年傳楚工尹赤遷隂於下隂即此又東南經榖城縣東彭水自西入焉縣西十里有榖城山為榖國又東南經襄陽府治襄陽縣北淯水自北入焉漢水北岸即古樊城與襄陽對峙為古今之形勝南北之腰膂年府東北十二里有鄾城為鄾國又文十六傳楚人謀徙於阪高在府治西折而南經宜城縣東鄢水自西入焉縣西南九里有古鄢國入楚為鄢邑昭十三年傳王沿夏將欲入鄢杜注順漢水入鄢也縣西南九十里有鄀城與荆門州接界鄀國自商密遷此後入於楚定六年楚避吳北去徙都鄀仍名郢謂之鄢郢縣東南有湫城為楚湫邑又南經安陸府治鍾祥縣西南桓十一年傳鄖人軍於蒲騷將與隨絞州蓼伐楚師鬬亷謂莫敖曰君次於郊郢以禦四邑我以鋭師宵駕於鄖郊郢即今府治高氏曰四國之境相去甚逺隨在隨州蓼在唐縣州在監利絞在鄖陽而郊郢則居中扼要之地也故鬬亷使屈瑕據之而莊四年傳莫敖以王命入盟隨侯且請為會於漢汭還此漢汭乃襄陽以南至安陸府之漢水也高氏曰漢東之國隨為大故西境特廣踰漢而後為楚地桓八年楚武王侵隨軍於漢淮之間始漸規取漢上之地今隨州東南三十里有楚子城所謂軍於漢淮之間者蓋築城於此以逼隨也三楚沈鹿在縣東六十里潛府志云漢水自鍾祥縣北十里分流為蘆伏河經江縣東南復入於漢即禹貢荆州之潛也臼水自東入焉即成臼又南經荆門州東州西北有長林城為楚大林東南有那口城為楚那處又東南經京山縣西南雍澨在縣西南薳澨亦在縣境又東南經潛江縣北又東經天門縣南天門本景陵縣雍正中改夏水自西南入焉自此以下漢水亦稱夏水又東經沔陽州北又東經漢川縣南溳水自北入焉即清發又東經漢陽府治漢陽縣東北又南合於大江今漢口也漢既納夏亦通稱夏左傳昭四年沈尹射奔命於夏汭杜注漢水曲入江今夏口也孔疏漢水之尾變為夏水是也昭十三年王沿夏欲入鄢猶為漢水上流而亦稱夏者猶沔為入漢之水而水經稱全漢曰沔蓋三水通稱也古夏口即漢口在江之北三國吳時於江南築城名夏口而夏口遂與沔口對峙矣定四年傳吳人舍舟淮汭自豫夏與楚夾漢司馬左戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥厄子濟漢而伐之子常濟漢而陳自小别至於大别大别山一名魯山在府城東北百步小别山一名甑山在漢川縣南十里大隧直轅冥厄即所謂義陽三關也總名曰城口在應山縣北信陽州南方城在裕州吳人舍舟遵陸當在今潁夀之間從此循淮以西入城口以至於漢也自胡氏曰漢水本東行觸大别之陂而南回入江今則郭師口以上決而東經大别山後入江非復古之夏汭矣在按楚人濟漢而陳則春秋時大别山在漢水東岸今漢水西岸附入江入漢諸水睢水出湖廣鄖陽府房縣西南景山一名沮水東南流維南漳縣西逺安縣西又南經當陽縣北又東南合漳水又南至松滋縣東入於江定四年傳楚子涉睢濟江蓋自郢西走涉此水也按今沮水上流出逺安縣西北其房縣之沮東流至榖城縣南入於漢漳水出湖廣荆州府南漳縣西北荆山東南流又屈西南經荆門州西又南至當陽縣東南合睢水漳水入沮在當陽縣東南五十里宣四年傳子越師於漳澨即此按今漳水上流在南漳縣西南桐水出江南廣德州西南白石山西北流經建平縣南又西北經高淳縣注於丹陽湖又西入江丹陽湖在太平府治當塗縣東南周三百里分流蕪湖哀十五年傳楚伐吳及桐汭應在當塗蕪湖二縣之間又襄三年傳楚子重伐吳克鳩兹至於衡山鳩兹在蕪湖縣東三十里衡山在當塗縣東北六十里彭水出鄖陽府房縣一名築水東南流經榖城縣南又東入於漢桓十二年傳楚伐絞楚師分涉於彭即此絞國在勛陽府治西北鄢水亦出房縣一名夷水東南流經南漳縣南又東南經宜城縣南又東入於漢水經注夷水蠻水也導源中廬縣界康狼山與荆山相鄰其水東南流經宜城西山又東南經羅川城故羅國也又謂之鄢水春秋楚人伐羅渡都者也又東南流與零水合經蠻城南城在宜城南三十里春秋莫敖自羅敗退及鄢亂次以濟是也中廬縣本盧戎國人楚為廬邑其故城在南漳縣東五十里羅川城在宜城縣西二十里皆近鄢水成臼即臼水出出湖廣安陸府京山縣西北聊屈山西入於漢定五年傳王之奔隨也將涉於成臼即此水也溠水出湖廣德安府隨州西北黃山莊四年傳除道梁溠營軍臨隨即此水也東南流注於鄖清發即溳水出隨州西大洪山東南流經德安府治安陸縣西謂之清水定四年傳吳從楚師及清發即此水也又東南經孝感縣西南漢川縣東北又南入於漢夏水首受江水於荆州府治江陵縣東南水經注夏水之首江之汜也屈原所謂過夏首而西浮顧龍門而不見龍門即郢城之東門也又東經監利縣北水經注夏水自華容縣東北東經監利縣南華容故城在今監利縣西北監利故城在今縣東北涌水出焉水經注水自夏水南通於江謂之涌口莊十八年傳閻遊涌而逸即此又東北經沔陽州西又東北入於漢水經注沔水經江夏雲杜縣夏水從西來注之雲杜故城在今沔陽州西北水應劭曰江别入沔為夏冬竭夏流故名雲夢跨江南北在今湖廣德安安陸二府以南荆州府監利石首枝江等縣以北左傳宣四年鄖夫人使棄子文於夢中杜注江夏安陸縣東南有雲夢城安陸今德安府治昭三年楚子以鄭伯田江南之夢郭景純言華容縣南巴邱湖是也華容今監利石首二縣定四年楚子涉睢濟江入於雲中當在今枝江縣界彭蠡即鄱陽湖在江西南昌府東北九江府東南南康府東饒州府西其上源曰贛水亦曰豫章水出南安府崇義縣南東北流經贛州吉安臨江諸府至南昌府西北又東入鄱陽湖又北經饒州南康二府至九江府治德化縣東而北入於江今饒州府治鄱陽縣為楚地餘干縣為越地俱濵鄱陽湖史記吳伐楚取番即鄱陽縣是湖為三國接界之地昭二十四年楚子為舟師以略吳疆越大夫胥犴勞王於豫章之汭即今鄱陽湖左右地也笠澤即松江在今江南蘇州府吳江縣南浙江嘉興府治嘉興縣北上承太湖下入於海哀十七年傳越伐吳吳子禦之笠澤國語越軍江北吳軍江南是也春秋大事表輿圖
