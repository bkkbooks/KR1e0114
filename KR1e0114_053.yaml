body:
  text: 春秋大事表輿圖國子監司業顧棟高撰古稱左圖右史惟春秋列國尤不可不圖亦惟春秋列國尤難圖以其強兼弱削大小無定形不可畫定分封時疆界為某國又犬牙相錯棼如亂絲有以今之一縣而四國錯壤者今以本朝輿圖為凖填寫春秋時列國都邑曰河南曰山東曰山西曰直隸曰陜西曰江南而附四川於湖廣附江西於江南浙江為圖八又總圖一止列國名河圖二詳未徙已徙時分岐地界淮水及江漢圖各一庶行軍之往來屯戍之要害使聘之郵遞河道之遷變開卷而瞭然具見亦讀左之一助云乾隆十年三月五日識此圖因局於尺幅故於昭代輿地止列春秋時所有諸國省分如福建兩廣雲貴但畫出接界處不列府州以上十省亦但列府州不及縣各省首府不載府名晉楚諸國其都屢遷今圖中如晉衛莒杞秦吳六國從其最後書之蔡許邾邢四國列其始封楚都郢最久繫之荆州府其初遷及屢遷始末俱詳列於左以資𠫭考至夏商諸國已詳存滅表中兹不復載又畫方計里昉於朱思本今惟總圖每方五百里餘俱一百二十五里本皇輿圖以北極出地度及東西偏度俱每度二百五十里每方得半度也晉始封唐今太原府太原縣遷於絳亦曰翼在今平陽府翼城縣東南再遷新田仍謂之絳在今平陽府曲沃縣西南衛始封朝歌在今衛輝府淇縣東北遷於楚邱在今衛輝府滑縣東再遷帝邱在今大名府開州西南蔡始封蔡在今汝寧府上蔡縣西南遷於新蔡今汝寧府新蔡縣再遷州來亦曰下蔡在今鳯陽府壽州北許始封許在今許州府治石梁縣東遷於葉今南陽府葉縣再遷夷即城父在今鳯陽府亳州東南三遷白羽一名析在今南陽府內鄉縣西四遷容城在今南陽府葉縣西莒始封介根在今萊州府膠州西南遷於莒今沂州府莒州邾始封邾在今兖州府鄒縣東南遷於繹在故都稍北杞始封雍邱今開封府杞縣遷於淳于在今青州府安邱縣東北再遷緣陵在今青州府昌樂縣西南復還淳于邢始封邢在今順德府治邢臺縣西南遷於夷儀在今東昌府治聊城縣西南秦始封西垂今秦州遷於平陽在今鳯翔府郿縣西春秋初秦尚都此再遷雍在今鳯翔府治鳯翔縣南楚始封丹陽在今宜昌府歸州東南遷於丹陽在今荆州府枝江縣西春秋初楚尚都此再遷郢今荆州府治江陵縣吳始封吳在今常州府無錫縣東南遷於姑蘇今蘇州府治吳縣開封府祥符鄭時來在縣東四十里陳留鄭牛首在縣西南十一里縣鄭斗城在縣南三十五里宋老邱在北四十五里把縣把始都雍邱今縣治後為宋邑十里鄭鳴雁在縣北四十里鄭圉在縣南五宋曲棘在縣境尉氏鄭向在縣西南四十里里鄭菟氏在縣西北四十洧川鄭匡在縣東北阪鄭曲洧在縣南鄭隂在縣西鄢陵鄭鄢亦曰鄢陵在縣西南四十里中牟鄭東汜在縣南在縣西北七里鄭原圃即圃田澤鄭北林在縣西南陽武鄭城棣在縣北十里封邱魯黃池在縣西南七里衛平邱在縣東四十里宋長邱在縣南八里蟲衛鞫居在縣境鄭牢在縣北二里蘭陽宋戶牖在縣東北二十里鄭州鄭管本管國即州治六祭國在州東北十五里非鄭邑鄭邲在州東里鄭梅山在州西南三十五里滎陽古東虢國十鄭京在縣東南三十里十鄭索氏在京城西二里鄭垂隴在縣東二里京水在縣東二十二里旃索水在縣南三十五里即然水滎澤鄭踐土在縣西北十五里鄭滎澤在縣南河隂鄭敖山在縣西二十里汜水鄭制即虎牢本東虢地在縣西二里十鄭申在縣北鄭梧在縣東汜水出縣東三二里浮戲山下浮戲山即鄭戲童亦曰戲陳州府淮寧陳都宛邱在縣南三里壺陳濮在縣北宋陳辰陵在縣西南四十里陳邱在縣南柳即犖在縣西城宋赭邱在縣東按後漢志長平縣有赭邱長平故城在今府城之東六十里商水頓國今縣治西華宋鬼閻在縣西南項城項國今縣治冥楚郔在縣境陳厥貉大俱在縣境沈邱楚養在縣東北縣楚沈邑即寢邱在南扶溝鄭桐邱在縣西二十里許州府石梁許都在縣治東三十里亦曰舊許魯許展陂在縣西北許鉏任冷敦亦在縣境許田在縣西北縣周狐人在縣境在鄭陽陵在西北鄭狼淵縣西臨潁鄭城潁在縣西北十五里在鄭大陵在縣北三十里鄭皋鼬縣西北襄城鄭南汜在縣南新楚汾在縣東北即戰國䇿汾陘之塞與鄭陘山俱為南北隘道郾城楚召陵在縣東四十五里三楚陘在縣東南楚鄧城在縣東南十五里長葛鄭長葛在縣北十二里即繻葛禹州鄭櫟邑為鄭别都即州治在鄭上棘在州南在鄭高氏在州西南鄭雍梁州東北鈞臺州城北門外密縣鄶國即鄶城在縣東北五十里弭鄭新密即新城在縣東南三十里鄭在縣境新鄭鄭都在縣治西北在縣東二十五里制田在縣東北十棐即棐林陘山在縣南三里亦曰陘田樂函陵在縣北十三里縣洧水在縣南曰洧上曰氏曰洧淵黃崖在東南二十里棘澤在縣東南鄭瑣在縣北皆地歸德府商邱宋都商邱在今縣治西南三里有亳在縣西北亦曰薄此北亳也縣東南四十里穀熟故城即南亳也偃師之亳西亳也惟西亳屬鄭縣稷在縣境蒙澤在縣東北三十五里橫在西南新城在縣南南三十里榖邱在縣南四十里虞陽梁在縣東孟諸澤在縣東北接城縣界睢水在縣南凡曰睢上睢澨次睢之社皆此睢也鴻口在縣東皆宋地寧陵葛國在縣北十五里在宋寧在縣西里宋沙隨在縣西六里宋汋陵縣南二十五宋大棘在縣西南七十里鹿邑陳鳴鹿在縣西十三里縣宋訾母在縣境潁水在南夏邑宋朝郟在縣境南曹黍邱在縣西氷城宋犬邱在縣西北三十里楚棘在縣南虞城古虞國里綸在縣西三十五里多宋空桐在縣東三十宋空澤連中大尹魚俱在縣境睢州宋承匡在州西三十里縣宋孟在州西北襄衛首止在州東南衛巢在南二十里衛牛在縣境鄭鄭