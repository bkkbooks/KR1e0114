body:
  text: 春秋大事表目録春秋類卷一時令表附旁通諸經七種尚書毛詩易經周禮禮記論語孟子卷二之一朔閏表隱桓莊卷二之二朔閏表閔僖文卷二之三朔閏表宣成襄卷二之四朔閏表昭定哀卷三長厯拾遺表卷四列國疆域表卷五列國爵姓及存滅表卷六上列國犬牙相錯表卷六中列國犬牙相錯表卷六下列國犬牙相錯表附列國地名考異卷七之一列國都邑表卷七之二列國都邑表卷七之三列國都邑表卷七之四列國都邑表卷八上列國山川表卷八下列國山川表卷九上列國險要表卷九下列國地形口號卷十列國官制表卷十一列國姓氏表卷十二上卿大夫世系表卷十二下卿大夫世系表卷十三刑賞表卷十四田賦軍旅表卷十五吉禮表卷十六凶禮表卷十七上賔禮表卷十七下賔禮表卷十八軍禮表卷十九嘉禮表五禮源流口號卷二十王迹拾遺表卷二十一魯政下逮表卷二十二晉中軍表卷二十三楚令尹表卷二十四宋執政表卷二十五鄭執政表卷二十六齊楚爭盟表卷二十七宋楚爭盟表卷二十八晉楚爭盟表卷二十九吳晉爭盟表卷三十齊晉爭盟表卷三十一秦晉交兵表卷三十二晉楚交兵表卷三十三吳楚交兵表卷三十四吳越交兵表卷三十五齊魯交兵表卷三十六魯邾莒交兵表卷三十七宋鄭交兵表卷三十八城築表卷三十九四裔表卷四十天文表卷四十一五行表卷四十二之一三傳異同表卷四十二之二三傳異同表卷四十二之三三傳異同表卷四十二之四三傳異同表卷四十三闕文表卷四十四齊紀鄭許宋曹吞滅表齊滅紀始末曹鄭滅許始末宋滅始末卷四十五亂賊表卷四十六兵謀表卷四十七左傳引據詩書易三經表卷四十八杜注正訛表卷四十九人物表卷五十列女表附録偶筆輿圖臣等謹案春秋大事表五十卷附録一卷偶筆一卷輿圖一卷國朝顧棟髙撰棟髙有尚書質疑已著録是書以春秋列國諸事比而為表曰時令曰朔閏曰長歷拾遺曰疆域曰爵姓存滅曰列國地理犬牙相錯曰都邑曰山川曰險要曰官制曰姓氏曰世系曰刑賞曰田賦曰吉禮曰凶禮曰賓禮曰軍禮曰嘉禮曰王迹拾遺曰魯政下逮曰晉中軍曰楚令尹曰宋執政曰鄭執政曰爭盟曰交兵曰城築曰四裔曰天文曰五行曰三傳異同曰闕文曰吞滅曰亂賊曰兵謀曰引據曰杜注正訛曰人物曰列女險要表後附以地形口號五禮表後附以五禮源流口號附録則皆諸表序并表中所未及者又為辨論以訂舊説之訛凡百三十一篇考宋程公説作春秋分紀以傳文類聚區分極為精密刋板久佚鈔本流傳亦罕棟髙蓋未見其書故體例之間往往互相出入又表之為體仿於周譜旁行斜上經緯成文使參錯者歸於條貫若其首尾一事可以循次而書者原可無庸立表棟髙事事表之亦未免繁碎至參以七言歌括於著書之體亦乖然條理詳明考證典核較公説書實為過之其辨論諸篇皆引據博洽議論精確多發前人所未發亦非公説所可及其朔閏一表用杜預隱公元年正月起辛巳朔之説與陳厚耀所推長歷退一閏者不合蓋厚耀之書棟髙亦未之見故稍有異同云乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
