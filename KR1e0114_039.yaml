body:
  text: 春秋大事表卷三十九國子監司業顧棟高撰四裔表敘昔先王疆理天下建置侯甸而蠻夷戎狄猶錯處内地春秋之世其見于經傳者名號錯雜然綜其大概亦約略可數焉戎之别有七其在今陜西之臨潼者曰驪戎即女晉獻公以驪姬者秦置驪邑邑有驪山俱以戎得名其在鳯翔者曰犬戎葢西戎之别在中國其先嘗攻殺幽王秦驅逐之至春秋時種類猶存閔二年虢公敗犬戎于渭汭是也其在𤓰州者曰允姓之戎遠莫知其所居秦晉遷于中國則曰陸渾之戎今為河南府嵩縣又曰隂戎又曰九州戎又曰小戎晉惠公母家𫝊謂小戎子生夷吾逮惠公歸自秦而誘以來處之陸渾世役于晉亦曰姜戎佐晉敗秦師于殽自後無役不從亦數與㑹盟以其處晉陰地謂之陰戎昭十七年陸渾貳于楚晉荀吳滅之其餘服屬于晉者謂之九州戎自晉滅陸渾城汝濵地而有之楚亦滅蠻氏係汝州之地而汝水南北遂為晉楚分界其先陸渾而居伊洛之間者又有揚拒泉臯伊洛之戎揚拒泉臯皆戎邑王子帶曾召之以伐京師焚王城東門為禍最烈自秦晉遷陸渾而此種浸微後泉戎地入于周為前城而文八年公子遂因趙盾盟伊洛之戎于暴成六年與陸渾蠻氏同受命于晉侵宋則伊洛陸渾並為晉之内臣矣蠻氏亦戎别種在汝州西南亦名茅戎以處茅津得名在今解州之平陸地頗遼遠成之元年王師嘗為所敗後屬晉乃哀公之世晉執戎蠻子以畀楚而楚之强益不可制其在直𨽻之永平者曰北戎亦曰山戎春秋初嘗侵鄭伐齊已而又病燕齊桓公因北伐山戎襄四年無終子嘉父因魏莊子納虎豹之皮以請和諸戎者其别種也又有在山東之曹縣與蘭陽接壤者經直曰戎無名號春秋初屢與隠公㑹盟隠九年天王使凡伯來聘戎伐凡伯于楚邱以歸所謂戎州已氏之戎是也胡氏以徐戎當之夫戎在魯西境徐戎在魯東郊凡伯聘魯還過楚邱而戎伐之豈所云東郊者乎凡此皆諸戎之大略也狄之别有三曰赤狄曰白狄曰長狄長狄兄弟三人無種類而赤狄之種有六曰東山臯落氏曰廧咎如曰潞氏曰甲氏曰留吁曰鐸辰潞為上黨之潞縣處晉腹心宣十五年晉滅赤狄潞氏明年並滅甲氏留吁鐸辰留吁甲氏俱在今之廣平鐸辰在潞安境白狄之種有三其先與秦同州在陜之延安所謂西河之地其别種在今之真定藁城晉州者曰鮮虞曰肥曰鼓鮮虞最强與晉數鬬争而肥鼔俱為晉所滅葢春秋時戎狄之為中國患甚矣而狄為最諸狄之中赤狄為最赤狄諸種族潞氏為最晉之滅潞也其君臣用全力以勝之荀林父敗赤狄于曲梁遂滅潞而晉侯身自治兵于稷以略狄土稷在河東之聞喜而曲梁在廣平之雞澤綿地七百餘里旋復得留吁之屬晉之疆土益遠狄所攘奪衛之故地如朝歌邯鄲百泉其後悉為晉邑班氏所謂河内殷墟更屬于晉者葢自滅狄之役始也然狄之强莫熾于閔僖之世殘滅邢衛侵犯齊魯其時止稱狄未冠以赤白之號其後乃稍稍見于經傳意其種豪自相擕貳更立名目如漢之匄奴分為南北單于而其後遂以削弱易制傳云衆狄疾赤狄之役遂求成于晉此其徵也東方之夷曰萊曰介曰根牟後萊介并于齊根牟滅于魯不復見經惟淮夷當齊桓之世嘗病鄫病杞後復與楚靈王連兵伐吳然皆竄伏海濱于中國無甚利害南方之種類不一羣蠻在辰永之境百濮為夷盧戎為戎羣蠻當楚莊王時從楚滅庸自後服屬于楚鄢陵之役從楚擊晉而盧戎與羅兩軍屈瑕後卒為楚所滅率微甚無足道者余觀夫齊桓創霸以來存三亡國而終不敢加兵于狄戎伐周而管仲為平戎于王幾若儕于敵國而范文子謂狄為三彊自宣迄昭六七十年晉滅陸渾兼肥鼓剗潞氏留吁鐸辰戎狄之在河朔間者稍稍盡矣獨無終以請和得存而鮮虞亦曰中山至戰國時為列國僭號稱王後滅于趙輯春秋四裔表第三十九戎四裔之中戎種最雜亂難稽或三名而為一族或一種而隨地立名隨時易號至五六而未已其中盛衰之故略可見綜而計之其别有七如文十六年戎伐楚西南則為楚山間之民非有名號不列于戎之數狄史記晉文公攘戎翟居于河西圁洛之間號曰赤翟白翟杜註亦云白狄在晉西此因左傳白狄與秦同州而為是説耳以愚考之狄之見于傳不一而足均在晉之東與西無預潞氏在今山西潞安府臯落氏則在今平陽府垣曲縣鮮虞在直𨽻真定府肥在藁城縣西南鼓在今晉州晉之滅潞也荀林父敗赤狄于曲梁曲梁為今廣平府永年縣葢反出其東而轉攻之則即一潞氏而疆域之廣亘千有餘里且閔僖之世狄滅邢滅衛滅温伐齊伐魯伐鄭伐晉并蹂躪王室藉非境壤相接何以能為患至此則自山西以迄直𨽻河南直接山東之境皆其所出沒特其俗不城郭就山野廬帳而居莫能指名其何處耳且又遷徙無常傳曰狄之廣莫於晉為都葢指蒲與屈言蒲屈為今山西之隰州吉州以後漸東徙晉重耳之適諸國也先奔狄而後適衛適齊境道顯然狄在晉東可知矣征南得無為史記所誤乎東夷僖十九年傳宋襄公用鄫子于次睢之社欲以屬東夷又論語子欲居九夷註云東方之夷有九種若畎夷黄夷白夷之屬今考春秋左傳杜氏所稱東夷國絶少如萊介諸國以其僻小不通于中夏故遠外之若吳楚越儼然與中國㑹盟且吞併諸夏不復列于蠻夷之數矣南蠻春秋之世楚境不能越洞庭而南楚使對桓公言曰寡人處南海特誇辭耳故其時蠻夷之在今湖南境者皆係徼外世服屬于楚無由自通于中國徃徃不能舉其號苐稱蠻曰羣蠻濮曰百濮以概之葢其種類實繁其地為今某州縣亦難可深考獨盧戎以敗屈瑕軍楚滅之為廬邑文十六年楚戢黎為廬大夫侵庸其地在今江漢間略可紀焉赤狄白狄論春秋之世有赤狄白狄又有長狄長狄兄弟三人無種類而赤狄白狄種類最繁案經傳所見赤狄之種有六曰東山臯落氏曰廧咎如曰潞氏曰甲氏曰留吁曰鐸辰白狄之種有三曰鮮虞曰肥曰鼓然以予考之閔僖之世狄尤横其時止稱狄未有赤白之號葢當時之單以狄舉者皆赤狄也赤狄最强能以威力役其種類白狄故居河西其别種在中國者赤狄能役屬之而長狄尤其酋豪中之魁異者合諸部為一力大勢盛故能以兵威伐邢入衛滅温伐周又能仗義執言救齊伐衛以齊晉之强莫之能抗也其疆域自晉蒲屈以東東與齊魯衛為界葢自平陽潞安以及山東之境雜居山谷緜地千里故當日邢衛宋魯齊晉鄭諸國胥被其患逮魯僖公之三十二年而狄始亂明年伐晉而白狄子見獲蓋其種類自相攜貳各分部曲如匈奴之分五單于勢分力弱自是而赤狄白狄紛然見經而狄於以不競矣論者謂長狄白狄之各為一國非也蓋其初皆屬于赤狄後稍稍離異始以名見于春秋文宣之世威令不行四出侵伐屢見挫衂經書晉侯敗狄于箕郤缺獲白狄子叔孫得臣敗狄于鹹獲長狄僑如皆狄之將佐後僑如之弟焚如與潞俱滅則狄之死國難者春秋賤之故不書使不得與潞子嬰兒等則其種之貴賤可知矣綜而計之莊公三十二年而狄伐邢暴横中國更三十有四年而狄有亂赤狄白狄始分又三十有五年而赤狄潞氏滅于晉又六十有五年而晉滅肥又十年而晉滅鼔白狄止存鮮虞首尾百四十有四年之間盛衰强弱之故豈不較然也哉晉里克之逐狄也曰懼之而已無速衆狄則當狄之合狄之所以盛也郤成子之求成于狄也衆狄疾赤狄之役遂求成于晉則當狄之分狄之所以衰也春秋始書狄而後書赤狄白狄者蓋因列國之赴吿與狄之自通于中國者而書之皆當時之實錄學者可由此思其故矣杜氏于吕相絶秦以白狄為晉婚姻謂赤狄之女白狄伐之以納于文公其意似以廧咎如為赤狄而重耳所奔為白狄此出于臆見無可考據廧咎如之女為叔隗季隗而狄女亦稱隗后則本為一姓當時之止稱狄者皆係赤狄無疑也太史公稱諸戎翟自有君長莫能相一葢据春秋之末至戰國而言耳非所論于魯閔僖之世也戎狄書子論昔先王建國胙土命爵分為公侯伯子男春秋時班班猶存然亦有出于時王之所賜如王命曲沃武公以一軍為晉侯郳犂來進爵為小邾子是也而于戎狄則無聞乃吾觀宣昭之間赤狄之别有潞子嬰兒白狄之别有肥子緜臯鼓子鳶鞮者聖人皆書之于經而左氏不著其封爵之所自杜預亦弗深考余嘗疑之其爵非先王之所賜亦非時王别命以土直以戎狄各居一方桀驁難制大國請于王而命之如唐世外彞有叛者就加節度使之類耳而其先之不見于經何也閔僖之世狄最强盛聖人止書狄其時實未賜爵也僖之末年而狄有亂赤狄白狄始分宣三年而赤狄始見經八年白狄始見經自後凡書赤狄者七書白狄者三其時賜爵與否未可知而聖人略之不書者春秋于外彝多從其故號如楚之武文改為楚已久而終莊公之世止書荆人是也逮晉滅諸國則其君臣自誇武功獻俘于王必詳列其國號與其君之爵與名如後世之露布自京師昭示遠近春秋安得而不書其爵乎至如甲氏留吁鐸辰則實未有國號未賜爵命聖人亦苐從其實書之也經于潞氏及甲氏留吁明書赤狄而曰肥曰鼓不著狄號而杜氏知為白狄之種者此或别有考據至其國名則各從其地潞氏以潞縣得名鼓以鼓聚肥以肥累城得名此各因廬帳所在從而立稱知出于春秋之季之濫加名器而不得比于徐楚吳越之列明矣推而計之如所稱戎子駒支無終子嘉父戎蠻子嘉及陸渾子者例皆書子無終乃山戎之别種陸渾係秦晉之所遷其非文武之舊封尤最易明者他如楚之别為夔宋之别為蕭聖人皆書之于經而未詳其封于何年正義云宋桓公之立蕭叔大心有功宋人封之為附庸孔晁註鄭語謂熊摰有疾而自棄于夔子孫有功王命為夔子此皆隠桓以後之别封者余悲夫春秋之國日就微滅而亦有别為建置如鮮虞亦曰中山至戰國時僭號稱王與燕趙為列國均非周初之舊封余因得而備論之庶春秋當日之興廢較然可睹焉范為士㑹封邑考山東濮州范縣為晉范武子封邑世多疑之以晉當春秋中葉不應拓土至此季氏私考遂以為隨之别名此甚非也余嘗考之武子之封范葢自宣十五年晉人滅潞之後始也案宣十二年邲之戰稱隨武子十五年荀林父滅潞十六年士㑹滅甲氏留吁晉侯請于王命為太傅王享之其時止稱武子而不稱隨十七年請老遂稱范武子以後世世稱范意范為赤狄潞氏地晉滅其族而因以為武子賞功之邑耳何則滅潞之役士㑹荀林父二人同功荀林父賞狄臣千室士伯諌不殺荀林父猶子以𤓰衍之縣士㑹滅甲氏留吁豈獨無賞傳但載其將中軍為太傅而偶遺其封邑耳其范之為狄地何也春秋時狄之疆域甚逺伐邢而邢遷夷儀攘邢之故地入衛而衛遷楚丘處殷之故墟其後屢侵齊魯曹濮之境狄地實相犬牙而晉獻之世以蒲屈為邊案蒲屈為今平陽府隰吉二州之境自此以東皆狄地故曰狄之廣莫狄之東為衛衛之東為齊故其時晉之與齊甚遼遠齊桓㑹盟無由至文襄之世猶隔絶文公伐曹必假道于衛是則未滅潞氏以前晉決無由得范地既滅潞氏二年而武子遂封范中間不聞别侵齊魯故知范為狄之故地無疑當是時楚方强横服鄭伐宋晉概置不問而郤缺士㑹専致力于狄其意以為争無益之虛名不如為拓土之實計故求成以擕其黨滅留吁甲氏以盡其族自是以後衛之故封如河内朝歌邯鄲百泉之地悉為晉邑幾有中原大半與齊魯衛三國為鄰境鞌之戰遂卷甲而長驅入齊矣後東昌之冠縣為晉冠氏邑丘縣為晉乾侯邑而齊烏餘以廪丘入晉廪丘亦范境此皆宣公以後之晉非宣公以前之晉也余輯疆域而有見于范武子之事故備誌之使後有考焉隨在今山西介休縣縣東有隨城隠五年翼侯奔隨即此隨也士㑹既受范隨仍歸于晉案吳季札封延陵稱延陵季子後更封州來稱延州來季子以兩邑並食故得兼稱今范氏惟稱范故知更不食隨也春秋大事表卷三十九
