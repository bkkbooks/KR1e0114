body:
  text: 春秋大事表卷九上國子監司業顧棟髙撰列國地形險要表險要之為天下重也從末世起也羣雄起而後有戰爭戰爭用而後出竒制勝設守要害則險要尚焉太平之世天下為家未嘗有也余讀左氏知春秋險要之地莫多於秦晉吳楚鄭衛鄭衛南北所爭而吳楚秦晉壤地相錯為日交兵之國桃林二殽茅津之為西北險也以秦晉七十年之戰爭著也汪氏曰秦晉七十年之兵爭起於殽之戰終於襄十四年十三國之師函谷一入秦而六國之亡兆矣鍾離州來居巢之為東南險也以吳楚七十年之戰爭著也林氏曰鍾離州來居巢三邑吳爭七十年而後得此州來一入吳而入郢之禍基矣他如齊穆陵之為大峴晉劉裕過之而喜形于色者而地鄰莒魯強晉東來道所不經故戰伐罕書焉晉南陽之即河陽唐李光弼百戰守之以固關輔者而界連周鄭方輯和以拱衛故兵爭亦不及焉轘轅伊闕同一險也伊闕以備子朝而著而轘轅則無聞虎牢敖倉同一要也虎牢以晉悼之城而著而敖鄗則無聞至晉楚懸隔千里所爭惟在鄭宋楚戍彭城以塞晉之通吳晉城虎牢以防鄭之服楚春秋尤大書特書少習武關為秦豫咽喉之地秦人滅鄀蓋欲南出以圖武關而卒不能有及楚圖北方將通少習而晉人震懼豈非襄鄖商雒之間地形厄塞與函谷俱稱絶險哉故險要有常所初無定形有千年不易之險要有一時因敵為防之險要往往在後世為要害在春秋為散地者此亦古今時勢不同之故也聖王安不忘危大易有設險之義周書有慎固之訓三代之世何嘗不以險要為兢兢故詳列春秋所書參以後世攻守之事使古今山川險固瞭若列眉而列國強弱之勢與當日行軍用師交爭纍戰之故俱可考而知焉輯春秋列國地形險要表第九春秋列國不守關塞論春秋時列國用兵相鬭爭天下騷然然其時禁防疏闊凡一切關隘扼塞之處多不遣兵設守敵國之兵平行往來如入空虛之境其見于左傳者班班可考也文十三年春晉侯使詹嘉處瑕以守桃林之塞注云以備秦桃林今潼關也昭二十六年秋晉知躒趙鞅帥師納王使女寬守闕塞注云以備子朝闕塞今伊闕也二者天下之險必待紛紜有事而後遣將設守重書于册則其平日之漫無間禦可知矣齊莊公之伐晉也入孟門登太行封少水而還而晉僅于其還也使趙勝率東陽之師追之而已而晉平日之備禦無有也吳闔閭之入楚也舍舟淮汭自豫章與楚夾漢道由大隧直轅冥厄而司馬戍第于既陳始議塞城口以邀其歸路而楚平日之控扼無有也是皆一夫守險千人莫過使當日有一旅之師百夫之長當關旅拒則齊之啓胠申殿必不能輕騎而入羊腸之隘吳之水犀精甲必不能疾驅而至漢水之濱也以至文五年秦人入鄀道由上雒出武關經歷晉之隂地是時秦晉已絶好而鄀在南陽之析城深入東南五百餘里秦出兵與楚爭鄀而晉人不之禁也僖三十三年秦人襲鄭道自華隂出函谷關經歷二崤及周之轘轅伊闕而後至河南之偃師行嶔巖深谷中二千餘里商人弦高遇諸途而始覺而周人晉人不之詰也他若晉會十三國諸侯于柤而柤為楚地吳伐魯而子析故從武城道險是蓋列國皆然主者無設險固圉之謀敵人無長慮却顧之志處兵爭之世而反若大道之行外户不閉歷敵境如行几席如適户庭主人能則有秦穆之喪師主人不能則為楚昭之失國春秋之所以日尋于多事者以此也易之有重門擊柝以待暴客又曰慢藏誨盜夫土地人民國之寶藏敵國外患國之大盜偃然弛備而欲狡焉啓疆者不胠其篋而劫其藏得乎善為國者慎其封境險其守集深維大易設險之謀重凛周書慎固之訓庶乎姦宄戢志而強鄰寢謀矣春秋大事表卷九上欽定四庫全書春秋大事表卷九下國子監司業顧棟髙撰列國地名口號余纂春秋地形卷成中有所見與前人違反處既為著論復作韻語以叶之積成一百一十三首取便于學者之記誦其封疆錯互險要肻綮與列代戰爭顯著及今日川瀆改易併漕運海道來由俱用今代府州縣地名旁注其下簡而居要可為讀史之先路杜氏之驛郵而列國廢興大要封建原委與杜注孔疏之舛訛亦一二附見焉昔元遺山先生效少陵體作評論古今人詩三十六首近世阮亭復推廣之為五十首余不能詩但以左氏丱角受讀今成白首又參以二十年來足迹所歷輒倣元氏之意名曰春秋地形口號貽諸學者用為讀左之一助云時假館九江大孤山堂乾隆四年十二月上浣復初氏識老向蟫魚寄此身那堪歷碌走風塵春秋列國紛如繡贏得披圖數問津一余經歷七省到處訪求春秋地理從古文人説馬遷撏扯經傳等談天瀾翻左氏如流水聚米山河在眼前二土地稱名歷代更征南注左最分明滄桑更轉無窮劫翻譯重須仗顧榮三杜元凱有釋例土地名綺錯縱橫舊版圖瓜分合併更懸殊若從盲左清疆索酈注桑經信不誣四酈道元注桑欽水經説春秋地理最有根據初遷洛邑帶河陽肩背桃林是虢疆表裏山河俱屬晉空存虛器守蒸嘗五鄭氏詩譜周東都北得河陽漸冀州之南河陽為今河南懷慶府孟縣即古孟津也又虢公為王卿士虢地自河南府嵩縣以西至陜州靈寶六百里髙山深林皆虢略之地桃林之塞在焉後皆屬晉聲勢相聨稱宛雒宣王封謝壯藩垣申亡腰膂從中斷南國旋成楚北門六詩稱于邑于謝南國是式謝申伯之都周之南國也故城在今河南南陽府南陽縣北三十里楚文王滅申由是出兵則以申息為先驅守禦則以申吕為門户文十六年楚大飢戎蠻交伐楚申息之北門不啓燕封僻逺隔山戎職貢王朝路未通北伐功髙稱尚父京師左輔舊無終七莊三十年山戎病燕齊桓公伐以通道山戎一曰北戎一曰無終三名一地也襄四年無終子嘉父納虎豹之皮于晉以請和諸戎杜注無終山戎國名今為直𨽻永平府玉田縣縣治西有古無終城齊桓伐楚合江黃此是驅人到滅亡晉悼用吳能制楚褒齊貶晉説何狂八江在河南汝寧府真陽縣東黃在光州西十二里皆近楚小國齊桓于僖四年合江黃八國為召陵之師僖十二年楚滅黃文五年楚滅江齊不能救諸儒謂齊桓能逺交以孤楚之勢胡氏至比之牧野之庸蜀彭濮而以晉悼之用吳比之却虎進狼者竊所未喻登萊大海浸茫茫萊子城髙百尺牆齊滅萊棠通海道空聞鏜鎝怕吳強九今山東登州府黃縣東南二十里有萊子城極為險峻棠萊邑在今萊州府即墨縣南八十里襄六年齊侯滅萊遂圍棠滅之齊于是始有登萊二府之境東際于海矣哀十年吳徐承帥舟師自海入齊蓋因齊滅萊棠後通東方海道也敵入韓原患寇深幾從河內費搜尋晉疆直抵延安府白翟遺墟舊帶襟十韓原晉地為今陜西同州府之韓城縣僖十五年韓之戰晉惠公曰寇深矣若之何近代顧亭林先生謂韓城在河外無寇深之理疑當在河東或欲以河北縣之韓亭當之非也晉跨有河西之地直抵白翟故墟魏得之為河西上郡孔氏曰河西同丹二州丹州今延安府宜城縣上郡為延安以北延安東去黃河界四百五十里質諸寇深之言吻合不必以韓城為疑也曹衛諸姬南向楚名之曰畔更何辭宋儒半是陳餘者只道文公譎用師十一曹衛以北方大國與魯僖俱南向事楚此時周室孤立有纍卵之勢晉文坐致楚師一舉勝之使天下諸侯翕然宗晉真有回瀾倒日之力僖二十八年書晉侯侵曹晉侯伐衛兩舉其爵家氏鉉翁所謂言之不足而重復言之者也夫子謂譎而不正蓋指其他事如請隧及召王巡狩之類耳必以伐衛致楚為譎是驅天下而為宋襄之仁義也厥後雖晉伯極衰叛者四起而曹衛未嘗一日事楚豈非城濮之餘烈未艾歟狄之廣莫晉為都密邇平陽患切膚滅衛入邢侵魯鄭東連齊界半寰區十二僖五年傳二五言于晉獻公曰蒲與二屈君之疆也請使重耳主蒲夷吾主屈使俱曰狄之廣莫于晉為都杜注蒲平陽蒲子縣今山西隰州屈平陽北屈縣在今山西吉州治東北二十一里俱逼近晉都是時狄侵滅諸國狄地蓋連亘齊晉由山西貫直𨽻以及山東之西界齊晉東西各樹壇征車盟會路漫漫晉人滅潞收遺地逼近齊疆遂戰鞍十三初時齊在山東晉在山西逺不相及故齊桓之霸晉獻不與盟晉滅虞虢齊桓不能討自宣十五年晉景公滅潞收狄之遺土于是晉地跨有東昌曹濮之境與齊接壤成二年鞍之戰遂平行以入齊都矣郤克欲使齊之境內盡東其畝惟戎車是利蓋以地逼近故也范家封邑在山東狄土歸來作賞功後入齊疆更竒絶助臣黨叛長凶風十四范為今山東曹州府范縣季氏私考謂此係衛地晉不應以封其大夫余考宣十二年邲之戰士會稱隨武子宣十五年晉滅潞十六年士會帥師滅甲氏留吁十七年請老稱范武子以後終春秋之世稱范不稱隨蓋范為狄所滅之衛地晉收之以為士會賞功之邑耳後又入齊為邑盂子自范之齊即此此因春秋之季范中行叛晉即齊齊衛助之范遂入齊不返情事固顯然也郇伯懷思歎下泉黍苗隂雨被桑田興師曲沃由朝命見滅王靈不復宣十五詩稱郇伯勞之毛傳郇伯郇侯也鄭箋云郇侯文王之子為州伯郇一作荀左傳畢原酆郇文之昭桓九年荀侯賈伯伐曲沃郇與荀同一國也荀承王命連五國以伐曲沃舉方伯連帥之職而汲郡古文云晉武公滅荀以賜大夫原氏黯為荀叔是顯抗王命挾仇滅國而周室不討王令不行于天下可知矣僖二十四年晉文公入國秦晉大夫盟于郇杜注解縣西北有郇城今在山西蒲州府臨晉縣東北十五里即故荀國地梁韓同在陜韓城秦晉鄰居鼠穴爭厥後戰攻歷幾世少梁刳首血縱橫十六韓姬姓文王之子詩稱韓侯受命是也晉文侯滅之為韓原地後以封桓叔之子韓萬為韓氏之祖在今陜西同州府韓城縣南十八里梁嬴姓僖十九年秦穆公取其地為少梁邑在韓城縣南二十里文十年晉人取少梁即此秦臨河界築王城秦晉為成亟會盟初起西陲基尚狹東平晉亂始經營十七王城在今陜西同州府朝邑縣西二里所謂臨晉也東近黃河渡口秦孝公初立下令曰穆公東平晉亂以河為界則知前此未能東至河也韓之戰獲晉侯十月晉隂飴甥會秦伯盟于王城王城之名始見于此疑經營即在此時靈臺舊在鄠宫旁周室遺模尚未亡奢麗阿房秦帝制可憐焦土是咸陽十八周靈臺在今陜西鄠縣東三十里阿房宫在今咸陽縣俱屬西安府秦伏西陲四百年空餘戎馬莫爭先桃林少習他家有柙虎深山洞口填十九桃林即函關屬晉少習即武關屬楚楚先北向後東圖申吕隨唐實首塗漢水諸姬吞滅盡徵諸傳記半糢糊二十今人多以九縣為漢陽諸姬髙江村曰漢陽謂在漢北夷考姬姓國之近楚者曰隨曰息曰蓼曰穀隨終春秋不滅穀在漢南息蓼在淮壖又非漢北蓋楚所吞滅之姬姓甚多皆不見于經傳也楚勢鴟張自滅庸連秦掎角道巴賨戎車更繞周疆後郟鄏初通漢水烽二十一文十六年楚人秦人巴人滅庸杜注庸上庸縣故城在今湖廣鄖陽府竹山縣東四十里先儒謂秦楚相逺其所以得伐庸者由巴蜀以通道楚至是蓋西連巴秦繞出周晉之後列國諸侯在其掌握自是楚益強宣三年遂問鼎于雒邑矣邲水從稱古汴梁袁曹官渡戰爭場渡河爭掬舟中指原武河邊祀告長二十二晉楚戰于邲邲城在開封府鄭州東六里邲水一名汴水楚漢時謂之鴻溝三國時謂之官渡又原武縣西北大河即晉師敗而濟河楚莊王祀河告成處疇昔驅車覽宋椒荒原千里集寒雕應懲洛邑遺頑畔平地封藩四望遙二十三宋都為今河南歸德府商丘縣土髙而四隳者為椒城西南有商丘周三百步世稱閼臺余十年前曽過此往來頻過魯遺墟南自魚臺北汶餘漫説海邦魯所屆詩人頌禱尚從虛二十四余往來州京師水陸皆由魯境隱五年公矢魚于棠為今兖府魚臺縣又汶上縣為齊南魯北境上魯境東西長而南北狹其後侵奪邾莒杞小國故其地多畸零不正員朱子謂襲慶東平府沂密海等州即其地嘗皇輿表以為山東登州府之寧海州非也魯地未涉登萊之境且既以為江南之海州不得復兩屬鄭界中州四戰區惟強是擇最良圖髙家賴子同斯術得免兵戈保一隅二十五五代十國中南平髙氏國小民貧地當四戰奉事中朝又稱臣吳蜀閩漢當時目為髙賴子然用是五十年無大兵革民以少安蓋用鄭犧牲玉帛待于竟上之計杞遷東國是何時宋得雍丘事可疑三恪舊封疆互易春秋失載更誰知二十六杞始封雍丘為今河南開封府之杞縣入春秋未幾即遷東國東國即淳于為淳于公故地在今山東青州府安丘縣東北而雍丘為宋有淳于去雍丘絶逺不知杞以何年并淳于之地又不知宋以何道取雍丘此等俱不見于經傳棄陳何事等珠崖召楚初由陳計乖齊楚會盟陳列首卒夷九縣聽差排二十七晉悼公時陳事晉范宣子曰陳近楚棄陳而後可僖十九年宋襄圖伯陳穆公請修好于諸侯以無忘齊桓之德于是會陳人蔡人楚人鄭人盟于齊陳蔡列楚上此為楚與中國會盟之始蔡先服楚亂中華入郢鞭尸蔡始芽厥後零丁無倚泊州來遷國入吳沙二十八定四年蔡以吳人伐楚入郢楚復國哀元年楚圍蔡蔡請遷于吳二年冬吳遷蔡于州來由是夀州更為下蔡蔡之服楚最蚤其得楚之禍亦最酷自莊十年獻舞被執蔡遂甘心從楚齊桓之興僅一從北杏之會後以八國加師國潰而不能革其從楚之志也逮晉文大創楚蔡始黽勉為三會而旋即背之悼公復伯陳鄭相率事晉而蔡安于即楚凡楚之撓亂王略吞噬諸侯蔡無役不從卒至昭十一年楚殺般用世子有遂從而滅蔡矣平王封蔡蔡猶忘讎事楚雖東國再逐而不悔至昭侯積纍世之怨用吳破楚入郢鞭尸蔡為禍胎楚復而蔡禍未巳哀元年楚復圍蔡而蔡遂入吳遷于州來蔡一微國而有關于夷夏之世變如此楚武經營首事隨藩臣役楚不嫌卑若從盟會江黃比蚤見南遷呌子規二十九隨國在今湖廣德安府隨州近河南界自僖二十年楚子伐隨取成而還自後為楚私屬不與諸侯盟會定四年吳入郢楚昭王奔隨隨人免之楚以此德隨哀元年復列于諸侯終春秋世不滅滕薛邾郳併一方截長補短亦何當况從里計周量小百里曽無七十強三十四國俱在今兖州府滕縣孟子曰今滕絶長補短將五十里也五十只當今二十七里有竒蓋里從丈尺起周尺短當今五寸五分弱也濡上南通易水寒悲歌慷慨號無端黃金不愛求死士前有燕昭後子丹三十一昭七年齊燕盟于濡上杜注濡水出高陽縣東北至河間鄭縣入易水黃金臺在易水東南十八里濡上蓋在今直𨽻安州任丘之間梅李遺墟泰伯城于今脆弱可憐生闔閭以上俱都此破楚爭齊蓋世橫三十二今江南常州府無錫縣東三十里有泰伯城地名梅李鄉自闔閭以上二十一世俱都此鐵甕城邊江水潺朱方當日舊江山楚師何道能深入邀擊應無匹馬還三十三昭四年楚靈王使屈申圍朱方克之顔師古曰漢丹徒縣吳朱方也今為江南鎮江府附郭孫權于此築城號鐵甕歷盡閩疆又浙東俗能堅忍號雄風范蠡深識能因地嘗膽君臣啓霸功三十四舊以浙江以東皆越境余甲辰逰閩丙午丁未逰浙東遍歷越地越封西境盡餘汗衢信遙連姑蔑寬于越渡頭流水在淮南獻議炳如丹三十五江西饒州府餘干縣為越之西界寰宇記縣西南有于越渡漢淮南王安獻議曰越人欲為變必先田餘汗界中蓋今餘干縣以東連廣信一府皆漢餘汗地國語止稱越地西至于姑蔑姑蔑為今浙江衢州府龍遊縣由衢至饒中尚隔廣信府饒為越楚分界廣信之弋陽貴溪二縣本餘汗縣地也餘汗即于越為越之餘國語所稱殊未盡夏口慿髙江上師吳兵仰瞰自難支其如陸騎臨江岸淮右銜枚席捲馳三十六昭四年楚沈尹戍奔命于夏汭杜注今夏口也吳兵在東北楚盛兵在東南以絶其後按夏口在今湖廣武昌府治江夏縣扼江上流吳人仰攻勢不便故出兵多就淮右北道楚亦從北道應之至是出夏汭欲順流東向以制吳十七年長岸之戰以得上流而勝至柏舉之役吳舍舟淮汭自豫章與楚夾漢則從陸路臨江岸失水戰之勢矣大别鋒交吳却東還師就近易收功不期夫概先殊死三戰長驅入郢中三十七定四年子常濟漢而陳自小别至于大别庚午陳于柏舉小别在漢川大别在漢陽柏舉在麻城自漢川至麻城吳師東退三百里蓋因懸師深入故且戰且却引楚至近以為全師返國之計耳孔穎達謂自東而漸西者誤詳見柏舉之戰論楚王掃境與吳爭紀郢空存百雉城不固國都圖保聚倉皇燧象却吳兵三十八子常濟漢擊吳蓋在漢陽府漢川縣戰于柏舉在黃州府麻城縣去郢都江陵尚逺是時昭王不宜親在行間當其戰敗急宜還守國都固其根本猶可背城借一乃遽取季芈卑我以出涉睢西走乞哀隨人使宗社為墟倘無包胥楚不國矣城口邀歸用計精不行旋致楚師崩闔閭豈是狂愚者倘肯從前冒進兵三十九城口乃漢東三隘道之總名即大隧直轅冥厄也在河南汝寧府信陽州東南與湖廣德安府應山縣接界乃吳師北來之路是時吳方與楚夾漢屯駐漢口在武昌漢陽之間深入楚內地司馬戍欲毁舟淮汭塞其歸路前後夾擊乃漢李左車塞井陘之計世謂子常不從其䇿以致敗余謂闔閭子胥精于用兵必然有備即從其䇿未必能勝蔡居淮汝水中間逼近能為楚國患淮北漢川幾千里全慿嚮導透重關四十尚書左傳蔡封淮汝之間在今河南汝寧府上蔡縣與信陽州義陽三關接界當日舍舟淮汭在今江南壽州中間經大隧直轅冥扼至漢陽府漢川縣陸路凡一千一百里若無蔡人為之嚮導吳必不敢踰險深入杜預云吳乘舟從淮來過蔡而舍之蓋蔡近淮汭吳師至蔡境蔡更道吳從陸路來徑越信陽三關之險乃吳以前用兵所未嘗歷者經于定四年書蔡侯以吳子杜云吳從蔡計謀故經書以以者言能左右之也故讀春秋必深曉地理方知聖人經文皆是據實書吳人伐楚取鄱陽路出嚴徽道里長此事已當入郢後從前何道到南昌四十一鄱陽縣為今江西饒州府治在鄱陽湖之東湖亘饒州南康九江南昌四府南昌在湖之西定六年吳始伐楚取番番即鄱陽春秋時鄱地極大不止今一縣當為今饒州南康略盡彭蠡之境九江德化縣已當彭蠡之尾而定四年入郢傳云自豫章與楚夾漢又以前屢言豫章吳豈能越饒南九三府而先有南昌之地乎知春秋之豫章非今日之南昌決矣錢塘帶水分吳越語出唐賢殆未然笠澤戰爭鋒不解鴻溝只在五湖邊四十二唐人詩云到江吳地盡隔岸越山多以錢塘江之東為越地若然則今嘉湖杭三府吳兵當有守禦安得越一出兵即入太湖與吳為夫椒笠澤之戰耶况越北境之禦兒已為嘉興府之石門縣越敗吳于檇李檇李城在今嘉興縣南四十五里則此語之不足信明矣國語曰與我爭三江五湖之利者非吳也耶五湖即太湖詳見吳越分界論夫椒敗越係包山渺渺湖光煙水間逐北直過苕霅界會稽山接伍胥灣四十三哀元年吳敗越于夫椒杜注吳縣太湖中椒山通典包山一名夫椒山即西洞庭山也在蘇州府西南八十五里越一敗即保棲于會稽吳王追而圍之蘇州去會稽五百里追奔直至此可見今日湖杭二府春秋時係甌脫為兩國莫居之地楚越交通計不疏掎吳結越在鄱餘若非左蠡親經歷三國分疆總瞀如四十四昭二十四年楚子為舟師以略吳疆越大夫胥犴勞王于豫章之汭歸王乘舟且帥師從王據此則豫章為水濱案地圖饒州府之鄱陽縣為楚餘干縣為越豫章之汭即今鄱陽湖連亘二縣之境歸王乘舟當在此吳楚越三國之分界也余親歷鄱陽湖方深曉其地理蓋杭州以西為吳地由杭州而嚴州而徽州至饒州之鄱陽縣濱湖則闔閭十一年伐楚取番之路也衢州之龍遊縣為越姑蔑由衢州而廣信而饒州至餘干縣亦濱湖則越大夫帥師從王歸王乘舟之路也哀十九年越侵吳以誤楚楚追之至冥不及乃還當亦近餘干之境從前論地理者未及此會計山頭苦聚兵風高獵獵越王城滅吳固守江淮險七國爭雄比大鯨四十五太史公曰會稽者會計也禹會諸侯于江南計功而崩因葬焉在今浙江紹興府山隂縣東南十二里有無餘故城號越王城勾踐所都又越滅吳而不能正江淮以北今日揚州淮安之地盡棄與楚所以五世至無疆為楚所并自第五首至四十五共四十一首論春秋列國疆域闕塞屯師備子朝轘轅捷出徑嶕嶢漢家八設關都尉弭亂黃巾並建標四十六昭二十六年子朝之亂晉使女寬守闕塞杜注伊闕口也在今河南府洛陽縣城南三十里襄二十一年晉欒盈過周王使候出諸轘轅孔穎達曰轘轅山在緱氏縣東南四十里連接鞏縣界漢靈帝時並為河南八關之一張衡賦曰回行道于伊闕邪徑捷于轘轅是也周齊苦戰北邙餘鄭魏羣雄角鬭初本自成周襟帶地洛陽遙挹孟津裾四十七昭二十二年王田于北山杜注北邙也在河南府治洛陽縣城北十里連偃師孟津鞏三縣連亘四百里魏文帝欲平北邙山令登臺便見孟津以辛毗諫而止周宇文泰攻河橋據北邙為陳魏公李密攻鄭鄭王王世充自引精兵出偃師據北邙以待之蓋自古為洛陽形勝地河陽自古孟津區晉造河橋天際紆南北三城列節度臨淮百戰固西都四十八河陽即古孟津在今懷慶府孟縣西南三十里晉泰始十年杜預以孟津渡險始建河橋河橋自此始魏孝文帝太和十三年作橋于河北側岸謂之北中城東魏元象元年更築東城及中灘城所謂河陽三城者是也唐設三城節度使為重鎮史思明之叛李光弼棄洛陽守河陽賊卒不敢西渡關輔得無恙北城在孟縣南城在今河南府孟津縣中隔一河相去四十里中灘城即今河中之郭家灘宋政和以後廢今皆無故迹一丸泥固壯秦墉誰料崤函是晉封蚤定霸圖由虢略河山兩戒此當衝四十九文十三年晉使詹嘉處瑕以守桃林之塞桃林即秦函谷關在今河南陜州靈寶縣故虢地晉獻公滅虢崤函為晉有故得以制秦秦得崤函而六國之亡始兆矣自秦孝公始置關以前則但謂之桃林武關一掌閉秦中襄鄖江淮路不通少習虛聲能懾晉却憐拱手送商公五十哀四年傳將通于少習以聽命杜注商縣武關也在今陜西商州東楚通上雒厄道今自河南之南陽湖廣之襄鄖入長安者必道武關後入于秦秦以封衛鞅為商於邑自河南鄧州內鄉縣至陜西商州凡六百里皆古商於地武關在其內自後秦屢出兵武關攻楚成建瓴之勢矣太行詰屈阪羊腸少水封尸事更狂不是危疑等風鶴當令單騎縛齊光五十一齊莊公伐晉取朝歌為二隊入孟門登太行張武軍于熒庭封少水乃還案太行陘在懷慶府城北所謂羊腸阪也少水即澮水在絳縣逼近晉都是時晉方懼欒盈為內應故按兵不動徐俟其退而使趙勝帥偏師追之不然豈止如殽之獲三帥已乎秦人滅鄀志南圖楚却移都好避吳白起功成置南郡百年未竟舊遺模五十二僖二十五年秦人晉人伐鄀文五年秦人入鄀蓋欲圖南出武關然終不能有其地至定公六年楚避吳之侵北去徙都鄀謂之鄢郢頃襄王二十一年秦白起拔郢置南郡楚東北保陳城明年又遷夀春蓋白起所拔之郢即僖二十五年秦穆公所圖之鄀也至拔郢之歲統計凡三百五十六年韓原戰勝賦河東不久歸還晉尚雄魏獻西河十五縣空教吳起泣成功五十三僖十五年秦晉戰韓獲晉侯秦始征晉河東河東即河外列城五晉人背約不與者僖十七年秦質晉太子圉仍歸晉河東蓋今陜西同州府及華州之境左傳所謂虢略華隂也少梁北徴彭衙刳首之戰皆在此地三家分晉地入魏秦惠王六年魏始納隂晉八年納河西地十年納上郡十五縣由是河西盡入于秦吳起去西河而泣曰使畢我能秦必可亡西河可以王自僖十五年至戰國秦惠王十年統計凡三百十六年大峴關山古穆陵齊南天險實堪慿戰爭不見春秋傳強晉東來道不登五十四僖四年傳齊地南至于穆陵穆陵關在山東青州府臨朐縣東南一百五里劉裕伐慕容超兵過大峴喜形于色即此青州與魯莒杞三國接界平隂廣里肇長城魯衛東眙孰敢爭晉水波高北風競空聞殺馬格追兵五十五襄十八年諸侯同圍齊齊侯禦諸平隂塹防門而守之廣里今山東泰安府平隂縣東北三十五里有古平隂城防門去平隂二里即齊築長城之始又格馬山在濟南府長清縣東南六十里即夙沙衛殺馬塞道處虎牢天下據中樞南北東西孰敢逾服鄭制荆成晉悼韓侯從此啓雄圖五十六虎牢城在今河南開封府汜水縣西二里初屬鄭後屬晉襄十年諸侯之師戍鄭虎牢即比後三家分晉段規謂韓襄子曰必得石溜之地即虎牢也後韓哀侯卒以此滅鄭夾寨沿河梁晉爭契丹南渡亟親征澶淵自古襟喉地林父居麋盜㺯兵五十七襄二十年盟于澶淵杜注衛地近戚田古澶淵在今直𨽻大名府開州之西北往時大河經流于此梁晉爭時晉王存朂于此築夾寨城時河流逺兩城相距三十里故有南澶北澶之目宋景德初寇凖勸帝親征駕至南城凖固請渡河御北城門樓士氣百倍即夾寨之兩城也戚為衛孫林父邑在開州北七里衛獻公使太師歌巧言之卒章喻文子居河上而為亂于是文子遂叛馬陵狹道可藏兵此地春秋曽會盟萬弩深林夾道伏終教豎子遂成名五十八成七年同盟于馬陵杜注衛地在陽平元城縣東南今直𨽻大名府治東南十五里有馬陵道即孫臏伏弩射殺龎涓處考史記世家此時魏尚都安邑乃齊入魏境必由之道也彭城南北往來衝吳晉通聨遏楚鋒猶有逼陽口中蝨不由王命晉家封五十九春秋時彭城為宋有今江南徐州府治銅山縣也逼陽在沛縣與山東兖州府嶧縣接界襄十年晉滅逼陽以與宋欲通吳晉往來之道汝寧府治古懸瓠南北兵爭最要區此地春秋沈子國平輿屬楚蔡先驅六十今河南汝寧府治有平輿故城在汝水南岸春秋時故沈子國定四年晉人使蔡滅沈後屬楚為平輿邑晉杜預時猶仍平輿之名亦謂之懸瓠城南北朝用兵懸瓠為必爭之地楚陵中夏恃方城百萬雄師莫敢攖連亘直苞申國地戍申不用怨周平六十一方城山名在今河南南陽府裕州東北楚人因山為固築連城東向以拒中國起葉縣至唐縣連接數百里苞絡故申國之地僖二十五年楚子入居于申杜注申在方城內故曰入是也楚文王滅申在莊十八年至僖四年屈完對齊桓公即云楚國方城以為城蓋楚一得申地即經營方城楚之強橫莫制實始于滅申也平王東遷申巳被楚侵伐故平王戍之詩人興刺至入春秋滅申之歲已近百年矣楚之覬覦申國非一日則申之係周利害豈淺鮮哉楚扼長江最上流吳兵更擾東北陬防淮全恃州來險一失藩籬到郢州六十二州來楚邑為今江南鳳陽府夀州阻淮為固吳畏楚上流出兵多從淮右北道夀州是其要害昭二十三年雞父之戰楚師大奔州來遂失自是入郢之禍兆矣雞父在今夀州西南六十里鍾離天險號難降梁魏兵爭劒戟撞起自春秋吳楚世巍然百雉奠南邦六十三昭四年楚城鍾離州來居巢以備吳鍾離為今江南鳳陽府鳳陽縣控扼淮水南北朝時為重鎮梁天監五年魏將元英圍鍾離邢巒謂鍾離天險必無克狀魏主不聽梁遣曹景宗韋睿督軍二十萬赴救魏人敗走上庸蜀魏互相攻孟達申耽反覆蹤白馬金城空歎息楚莊圖霸首侵庸六十四庸國在湖廣鄖陽府竹山縣東四十里秦置上庸縣建安十四年先主遣劉封孟達攻上庸上庸太守申耽降後孟達復以城降魏其城號白馬塞孟達登之而歎曰劉封申耽據金城而更失之春秋文十六年楚使廬戢梨侵庸遂滅庸蓋莊王圖伯之始事也白水真人氣鬱蔥舂陵帝里舊唐風晉陽本自伊耆後肅爽成仇郢市空六十五唐本堯後夏殷徙封晉陽周成王徙之于許郢之間而以其地封叔虞春秋唐惠侯是其後定三年唐成公如楚有兩肅爽馬子常欲之弗與止之由此遂結仇明年道吳人伐楚入郢又明年為楚所滅漢元帝時以蔡陽之白水鄉徙舂陵戴侯仁為舂陵侯屬南陽郡蘇伯阿過之曰氣佳哉鬱鬱蔥蔥然即此今為唐城鎮在湖廣德安府隨州西北八十五里楚雖三户足亡秦項氏兵來三户津夷考當年渡河處春秋晉地果誰真六十六哀四年晉人執戎蠻子以卑楚師于三户史記楚南公曰楚雖三户亡秦必楚後項羽果使蒲將軍日夜引兵渡三户破章邯説者以為亡秦之讖今考三户津服虔曰漳水津名也在彰德府治臨漳縣西三十里春秋時為晉地楚之三户在今南陽府內鄉縣西南內鄉距臨漳驛道一千三百里地名偶同不可以此混彼也楚地蔓延多險阻六十萬衆始能平深山大澤多英物劉項還從楚地生六十七秦王翦破楚用六十萬人後項羽宿遷人漢高帝沛縣人俱屬今徐州府當日係楚地自四十六至六十七共二十二首論列國險要官山府海致齊強旋入陳家為國殃興霸即成竊國計國之重寶慎收藏六十八曲沃初由支子興驪姬奪嫡更堪懲從今無畜羣公子本削終教異姓乘六十九宣二年傳初驪姬之亂晉詛無畜羣公子正義曰服虔以驪姬與獻公為此詛非也乃文公懲驪姬之禍而設此詛爾考文公諸子雍在秦樂在陳黑臀及襄公之孫談在周無在本國為卿大夫者知是文公本意非踵驪姬舊法蓋矯枉過正自是權移六卿矣公族旄車加趙氏宗藩大柄世卿操揚干及憖無通顯盟會從來不執羔七十晉成公即位宦卿之適子以為公族使教公之子弟于是趙括為公族大夫趙盾為旄車之族晉之公族無通顯者見傳惟悼公之弟揚干悼公之子憖二人終春秋之世晉公子未嘗見經定八年公會晉師于瓦范獻子執羔周禮大宗伯卿執羔七穆三桓張魯鄭晉無公子執朝權從教廢食還懲噎莽懿千秋好作緣七十一春秋時會盟征伐列國諸公子見于經者甚衆魯鄭則非公子不行惟晉絶無此春秋變局也齊則崔慶欒髙遞執國柄亦稱公族逮自相吞滅而陳氏興矣楚之立國最堪師委任宗支更不疑命將尤能嚴賞罰喪師辱國莫逃誅七十二楚之令尹執政俱用公子為之不參用異姓然每有敗績輒必誅不赦城濮之敗誅子玉鄢陵之敗誅子反陳之叛誅子辛惟柏舉之戰囊瓦以逃鄭免所以權不下移纍世強盛晉當典午曽南渡楚際春秋向北遷南畏吳侵徙郢鄀西憂秦逼就淮川七十三楚郢都為今荆州府治江陵縣定六年徙郢于鄀為襄陽府宜城縣戰國時白起拔郢遷郢陳為今河南陳州府又遷夀春仍謂之郢今江南夀州是由南而向北也季子能全讓國高終令傳位闔閭叨誅鋤骨肉摧殘甚夫概功成卒逋逃七十四季札不立而立王僚係夷昧之子所以闔閭欲圖篡弒其後疏忌骨肉使徐執公子掩餘鍾吾執公子燭庸二公子皆奔楚夫概有破楚大功卒奔楚為堂溪氏所以一蹶不復振仲尼沐浴討陳恆全魯加齊力尚勝決勝審知彼已䇿伊川持論太無慿七十五事見哀十四年獲麟之後孔子勝齊確有成算非以空言作一好題目告君者左氏載孔子之言甚明伊川謂勝齊為孔子之末務是不免以人國為僥幸也竊恐未然自六十八至七十五共八首論列國廢興大要莒國初封舊介根葛盧朝魯事難論于今高密膠州地曽有夷人解獸言七十六杜注介東夷國在城陽黔陬縣今萊州府高密縣西有黔陬城膠州南七十里有介亭蓋髙密與膠州連壤也又髙密縣東南四十里有計斤城春秋謂之介根莒始封邑長狄三人九𤱔身弟兄都歷百年春不知何地堪君長絶種離竒恐未真七十七公羊傳第云兄弟三人一之齊一之魯一之晉不詳其立國何地杜預云鄋瞞防風氏之復漆姓至國語以長狄即古汪芒氏守封隅之山韋昭注云山在吳郡永安縣尤誕妄驪戎舊在陜臨潼納女驪姬國祚空積怒山川能作祟晉疆蚤徹漢新豐七十八驪戎國名杜注在京兆新豐縣新豐漢高帝置今為陜西西安府臨潼縣案國語晉獻公伐驪戎克之滅驪子獲驪姬以歸立以為夫人史蘇曰君滅其父而畜其子禍之基也是為女戎三代皆然魏冰叔曰後世滅國其所滅之國山川乏主必積其怨怒篤生殊尤入後宫為患害用以傾覆宗祀如驪姬及隋宣華夫人是也據此則晉地早已踰河而西矣小戎陸渾本燉煌重耳姬甥後嗣昌允姓姬宗支派别史遷女弟説荒唐七十九晉獻公娶二女于戎大戎子狐姬生重耳小戎子生夷吾杜注大戎唐叔子孫别在戎狄者小戎允姓之戎孔疏狐氏出自唐叔之後狐伯行之子實生重耳狐偃其舅在今陜西延安府境小戎瓜州之允姓戎為今燉煌後遷中國為陸渾在今河南嵩縣瓜州在今陜西肅州衛西即詹桓伯所謂惠公歸自秦而誘以來者蓋為惠公母家故挾以偕來也二公子母姓各别史記晉世家謂夷吾母重耳母女弟也可發一笑肥鼓俱遭晉剗除鮮虞尺土幾紛拿中山立國開王號界在燕齊抵霸餘八十鮮虞一名中山與肥鼓俱白狄别種春秋季年晉竭力攻鮮虞終不能滅至戰國時僣號稱中山王與趙魏並今直𨽻正定府治西北四十里有鮮虞亭自七十六至八十共五首論春秋四裔山川阻奧隔舟車戎裔中華錯雜居晉楚並吞俱失記周初列國萬千餘八十一周時蠻夷戎狄錯處中華大抵近山者為戎近水者為夷廣莫之地為狄如淮夷徐戎赤狄白狄之類先王第設方伯連帥以統屬之未嘗必欲驅逐翦除而後已也蠻夷以姓名自通于天子者雖大皆曰子如今湖南兩廣蠻洞之地動輒數百里春秋時北方亦多有之晉所滅留吁甲氏陸渾楚所滅戎蠻子特以其來告而後書耳又凡諸侯滅國不赴告則不書則知周初執玉帛者蓋萬國也周當八百會同初推戴功髙難剗除封建屏藩先懿戚半仍舊地奉車書八十二周初封國同姓五十餘人而中國空地殊少如滅奄以封伯禽滅三監以封康叔滅唐以封叔虞其餘非有罪不遽除也封召公于燕封太公于營丘周初已屬荒逺之地此外如薛如吕如徐如巢如越如庸蜀盧濮焦祝薊遂以及羣舒六蓼為臯陶偃姓之後俱係夏殷舊封先王因而不改蕭叔酬功宋附庸夔因廢疾就他封東遷亦有分茅典不係初年大小共八十三宋蕭叔大心立桓公有功宋封之以為附庸又僖二十六年楚人滅夔杜注夔楚同姓國鄭語孔朝注云熊繹元孫曰熊摰楚人廢之熊摰自棄于夔子孫有功王命為夔子以及郳黎來進爵為子王命曲沃為晉侯皆係東遷後封典蕭為今江南徐州府蕭縣夔即歸今湖廣歸州治東二十里有夔子城自八十一至八十三共三首論封建源流蒼莽河從西北來黎陽白馬望中開流經鄭衛迤齊北無棣溝通海曲隈八十四禹貢導河積石至東過洛汭洛汭為河南府鞏縣以上黃河俱束于山峽之間千年不易至于大伾大伾山在今濬縣即古黎陽為河之北岸其南岸為白馬即今之滑縣大河經流其中乃古河道自東折向北處今則南徙三百里在開封府城北十里矣河道遷易自大伾始春秋時白馬為衛楚丘稍西為延津縣即鄭之廪延又東北為開州即衛之澶淵又東北為汲縣即衛之南河晉文公還自南河濟侵曹伐衛處也又自東而北則為齊之無棣無棣即九河入海處今山東武定府海豐縣有無棣溝合鬲津河東入海鬲津乃九河最東第九河也周定五年河始徙春秋年數恰中央大伾右轉流從北却繞山南迤邐長八十五周定王五年河徙自宿胥口東行漯川是年係己未為魯宣公之七年自隱公元年己未至此恰一百二十一年矣禹河則繞濬縣之西而北流河徙後則繞濬縣之南經大伾山之足折而東流禹貢所謂北過洚水至于大陸此時已無之矣自是河流濬滑之間二千年前首所謂黎陽白馬望中開也蓋此時已與禹迹微分同一大伾而一經其西一繞其南正對白馬南岸嗣後河屢決而南河流更在濬縣之南三百里為開封府城北十里而至于大伾之迹亦不可復問為今日之河道矣前首所云乃春秋宣公七年以後之河道也宣公六年河未徙以前河離滑縣開州尚逺詳見河圖説王莽旱時清濟絶餘流今作小清河發源趵突溫泉水迤邐青齊入海波八十六桓十八年公會齊侯于濼濼即今之小清河其源即趵突泉在濟南府治歷城縣西南濟水伏流重發處也流經章丘鄒平長山新城高苑博興樂安七縣以入于海蜿蜒六百餘里故道就堙而水橫決為諸邑患民多曲防盜決田本朝康熙某年張鵬撫山東斥豪強之占河身為者疏請濬復建石閘以備旱潦蓄泄遂為永利此濼水之見于今日者也詳見徐東海憺園集趵突泉冬溫故又謂之溫泉北注則謂之濼大江無恙截南區衆澤分流勢轉紆彭蠡九江和震澤宛如傳舍列通衢八十七江河俱橫截中夏乃河屢易而江如故者固緣河性湍急亦由河處北方為百川之委無諸澤為之渟蓄如貕養昭餘祁及孟諸諸藪俱乾涸夏秋霖雨歸併一河故屢決而遷江則有洞庭鄱陽俱數十百里列峙東西如人狂奔得憩息之處自然不至顛蹶蓋亦地勢然也春秋時諸澤尚未乾涸故河至西漢始決溢其理可想見淮瀆于今未失常黃流吞噬軼分疆刷黃仍藉清淮力持正還能力砥狂八十八淮水發源河南南陽府桐柏縣至江南淮安府安東縣入海至今仍由禹貢故道因河屢南徙至元之季年徑從淮安府清河縣之清口與淮合兩瀆併而為一自有明潘季馴治河専恃固隄束淮清水刷黃泥沙使通流入海故淮盛則可敵黃淮弱則黃淤塞而決潰是淮之為功大矣三折如巴江水源建瓴千里迅如奔益州已吸金陵勢吳楚平分天塹門八十九春秋時大江經流巴楚吳三國後世晉隋取金陵皆用益州樓船巨野澤承河濟委河遷濟絶涸成阿猶餘南旺湖中水南北分流濟運河九十哀十四年西狩于大野大野一名巨野在今山東曹州府巨野縣東五里濟水之所絶也屢經河患自漢以來衝決填淤凡四五度元至正四年河又決入此處及河南徒遂涸為平陸今為巨野及嘉祥二縣地王氏樵曰南旺湖在汶上縣西南縈回百五十餘里漕河貫乎其中有東湖西湖東湖北接馬踏伍莊坡以及安山諸湖南接蜀山馬場坡以及昭陽諸湖即古之大野澤也今有分水龍王廟三分北流七分南流以濟運海口微高瀦太湖鄱陽北阻大江紆自餘十藪皆乾涸雲夢圃田今已無九十一夏氏允彞曰震澤入海之地亢若仰盂水反流而趨內內溢而外噎故激蕩靡寧朱子謂彭蠡在大江之南地形北高而南下其北流入江處反為江水所遏因却而自瀦故二澤至今不改其餘巨野雲夢皆涸為縣圃田孟諸亦幾成平陸矣詳見春秋時藪澤論元建燕都行海運雲帆轉稻自唐先那知吳霸爭齊日已辦舟師入海船九十二哀十年吳徐承帥舟師自海入齊此為海道之始詳見春秋時海道論連屬江淮沂濟波積成今日轉漕河夫差爭長黃池歲却已功成半又過九十三哀九年吳城𨝍溝通江淮杜注通糧道也今廣陵𨝍江是又哀十三年會于黃池杜注在封丘縣南近濟水國語夫差起師北征闕為深溝于商魯之間北屬之沂西屬之濟以會晉公午于黃池案𨝍溝今曰漕河亦曰官河起于揚州府城東南二里歷邵伯高郵寶應諸湖北至黃浦接淮安界其合淮處曰未口在淮安府北五里自江達淮南北共長三百餘里又十三年既溝通江淮遂帥舟師自淮入泗自泗入沂復穿魯宋之境連屬水道有不通者鑿而通之以達于封丘之濟即杜氏所云近濟水也蓋吳人溝通之路由今考城過杞縣北境歷蘭陽而至于封丘今日漕河由淮而北連合沂泗汶洸及山東諸泉以濟運都倣其遺法漕河沿革考曰漕河之北段即元人之會通河其南段春秋吳子所開之𨝍溝也北段萌牙于元南段兆始于吳至明而大備總為我朝萬世之利南海春秋尚未知屈完之對屬誇辭濱東齊地連吳越三國時勤海道師九十四哀十年吳徐承帥舟師自海道入齊十三年吳為黃池之會越范蠡舌庸帥師沿海泝淮以絶吳路俱用海師以三國俱邊東海故也春秋時中國尚無閩廣故未知有南海屈完之對及鄭伯行成楚子云俘諸江南以實海濱皆虛言耳自八十四至九十四共十一首論川瀆改易及今日漕運海道來由亞父封條漢廣川晉初疆域太相懸鳴條近在今安邑通雅諸書竟失傳九十五桓二年晉穆侯以條之役生太子杜注但云晉地通雅云河間府景州有古條漢周亞父封條侯即晉條地近此皇輿表祖之案穆侯當周厲宣之時晉地安得至今山西解州安邑縣北三十里有鳴條岡括地志云岡北與夏縣接界即舜所葬孟子曰舜卒于鳴條尚書大傳湯伐桀戰于鳴條即此以此為晉條邑庶幾近之今日中牟鄭圃田佛肸畔處迹終湮征南不解知何地漫説湯隂亦未然九十六今河南開封府之中牟縣在大河之南係鄭地至漢初始置中牟縣春秋時未有中牟之名也春秋晉之中牟杜注第云當在河北不詳何地據各處傳文及國語約當在今直𨽻順德府邢臺邯鄲之間今日第當傳疑雖以近日間百詩之精于地理亦云無可考而史記張守節正義以湯隂縣有牟山謂中牟當在其側今方輿紀要與高氏地名考俱從之亦未必然也余修河南省志曽詳辨此有春秋時中牟論楚邑丹陽係秭歸女嬃遺迹是耶非朱方别有丹陽郡班志傳訛失據依九十七楚封丹陽在今湖廣歸州東南七里熊繹故封也亦曰秭歸𡊮嵩曰屈原有賢姊聞原放逐亦來歸因名秭歸離騷所謂女嬃之嬋媛也班固地理志謂楚始封在丹陽郡丹陽縣大謬丹陽郡今為江南鎮江府丹徒縣東晉時為重鎮丹陽尹常以皇子為之衛邑原來兩楚丘開皇並置本春秋班書謬列從成武滑縣漫同己氏州九十八穀梁于兩楚丘皆言衛邑而不明其處至隋開皇十六年同時置兩楚丘縣一在漢己氏縣以戎伐凡伯之楚丘為名己氏春秋時為戎州在今山東曹州府曹縣東南四十里一在漢白馬縣即齊桓公所封者在今河南衛輝府滑縣東六十里截然甚明班固地理志于山陽郡成武縣下注云有楚丘亭齊桓公所城遷衛文公于此則以滑縣混同曹縣大謬宗邦並列兩平陽新泰高平各一方稽古兩援盟越事東南不辨魯封疆九十九魯有兩平陽一為東平陽是魯本有之邑宣八年城平陽是也杜注泰山有平陽縣今山東泰安府新泰縣西有東平陽城晉羊祜為平陽人奏立新泰縣今仍之一為南平陽向本邾邑魯取之哀二十七年越使后庸來聘令魯還邾公與之盟于平陽是也杜注云西平陽西字當作南孔疏髙平南有平陽縣今兖州府鄒縣西三十里有南平陽城後屬齊孟子一戰勝齊遂有南陽即此景范氏于兩平陽下俱引左傳盟越后庸事高江村地名考刪一存一遂以宣八年之平陽下注云案哀二十七年公及越后庸盟于平陽即此兩地混而為一矣景范江村俱精于地理而不免于此此千慮之一失也豫章廬皖及饒州六見經文迹可求漢代郡名非昔地南昌尚隔楚江修一百春秋時豫章地極廣今江南廬州府之巢縣鳳陽府之夀州安慶府泗州及江西之饒州南康二府盡鄱陽湖之境吳楚越三國接界處當日吳楚交兵豫章凡六見于左傳南昌在鄱陽湖之西吳兵未嘗至南昌也柏舉之戰舍舟淮汭自豫章與楚夾漢豫章即指淮汭今日夀州地耳世多以江西之南昌為豫章乃漢分九江置豫章郡南昌是漢豫章郡治耳按之春秋當日之地形殊不合也鄭重滅許在容城葉地西偏敢撼荆漢縣華容郢都側楚雖新敗豈能爭一百一定四年楚遷許于容城六年春鄭逰速帥師滅許杜注因楚敗也此許當為葉縣之許昭九年傳遷方城外于許杜云許遷于葉因即謂之許是也鄭至是凡再滅許矣其舊許之地在許州已為鄭所奪容城當即在葉縣西蓋葉在楚方城之外故鄭得因楚之敗乘機取之應劭以為即漢之華容案華容城在今荆州府之監利縣逼近郢都此時昭王新復國鄭師豈能至此祝其城在贑榆西魯國南疆更逺齊盟會須當接界地稱為夾谷屬無稽一百二祝其漢縣屬東海郡地在今江南海州贑榆縣西五十里當魯之極南定十年公會齊侯于夾谷杜注夾谷即祝其後漢志東海郡祝其縣即古夾谷以道里計之祝其縣僻處海隅去齊魯之都數百里非會盟之轍所宜至且齊強魯弱齊豈能越國而會于其地魯亦無為挈齊而會于其國之極南也髙氏地名考以山東濟南府淄川縣西南三十里有夾谷山一名祝其彚纂又以為齊魯相會不應去齊若此之近去魯若此之逺而以泰安府萊蕪縣之夾谷峪為萊兵劫魯侯處近日山東通志以新設青州府之博山縣有地名顔神鎮為當日之夾谷為萊蕪淄川二縣適中處庶幾近之齊曹各有重丘地曹縣東昌迥不同兩國並從元凱注宛溪于此又朦朧一百三襄十七年衛孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而詬之衛伐曹取重丘杜注曹邑在今曹州府曹縣東北五十里又襄二十五年諸侯同盟于重丘杜注齊地在今東昌府東南五十里跨茌平縣界兩國分注甚明景范氏方輿紀要以襄十七年衛所取之重丘即注東昌府謂為曹北竟之邊邑襄二十五年同盟于重丘即此混而一之殊誤自九十五至一百三共九首論從前地里差訛處近關脫屣等浮雲廢置由來總不聞馮道老姦狙儈術卷懷髙蹈事宜分一百四襄十四年衛孫林父將出獻公告籧伯玉對曰君制其國誰敢姦之雖姦之庸知愈乎遂行從近關出襄二十六年寧喜將弒其君剽而納獻公復告伯玉伯玉曰瑗不得聞君之出敢聞其入復從近關出此左氏之謬也夫伯玉食君之祿而首尾十二年之間此廢而彼入彼入而此弒漠然不關其慮若無與己事者此長樂老人之歷事五代豈伯玉大賢而出此而子朱子乃引為卷而懷之之證恐未可訓詳見蘧伯玉論一百四一首論左氏差謬徒父占辭説涉河候車東敗是秦戈征南詮解殊疏謬地里推尋矛盾多一百五僖十五年韓之戰卜徒父筮之曰吉涉河三字要連讀是卜徒父口中語猶襄二十八年傳子之曰克見血左氏每有此文法若説秦軍涉河則韓原之地當在河以東于陜西韓城縣解不去矣侯車是秦之遊兵如今之探騎侯同候古人二字通用係秦車非晉車若説晉車敗是秦已得勝穆公安用詰徒父杜解殊謬詳見杜注正訛焉用喪歸屬晉侯繆公本意不成仇若從杜解支離甚伉儷情深輟閫謀一百六秦伯曰獲晉侯以厚歸也既而喪歸焉用之兩歸字俱屬晉侯説下文有必歸晉侯可證文義夲易解杜注云若將晉侯入則夫人或自殺穆姬在內如何云喪歸且穆公竟成懼內之人真所謂武夫力而拘諸原婦人暫而免諸國矣沃盥旋揮系屬連英雄降服豈徒然湔衣揮水鄰調戲情事相懸有萬千一百七僖二十三年傳秦伯納女五人懷嬴與焉奉匜沃盥既而揮之案沃盥是執巾櫛之事既而知是懷嬴係姪婦欲揮令逺去故懷嬴怒曰何以卑我降服而囚只是當日畏秦威耳杜注揮湔也正義解之曰懷嬴奉匜為公子澆手既而以溼手揮之使水湔汚其衣如此則此時已屬調戲情事正是相反鳩兹江水屬蕪湖吳地烏城天一隅南北懸殊千里外追奔曷用過吳都一百八襄三年楚子重伐吳克鳩兹至于衡山鳩兹為今江南太平府蕪湖縣杜注衡山在吳興烏程縣南今為浙江湖州府附郭是時吳都尚在無錫烏程更在無錫東南三百里何用追奔至此乎疏舛甚矣生而賜族本劉炫頴達譏彈已在先仲氏季孫從後得康侯祖述亦徒然一百九僖十六年三月壬申公子季友卒胡傳謂季友仲遂皆生而賜氏俾世其官春秋書此以著壞法亂紀之戒按賜氏之説本出于劉炫正義已駁之曰季是其字友是其名如仲遂叔肸皆名字雙舉無以為氏之理劉炫謂季友仲遂皆生而賜族以規杜過非也仲遂生時止稱東門氏成十五年仲嬰齊卒傳云宣十八年逐東門氏既而又使嬰齊紹其後曰仲氏季友至孫行父始稱季孫氏其生時之季與仲非氏也胡氏之説誤劉君規杜未為真孔氏依阿是諛臣千慮何妨存一失後人無用護前人一百十劉炫規杜氏之失凡一百五十餘條穎達謂其雖規杜氏義實淺近固然然韓之戰劉炫以侯車敗為秦伯車敗云侯者五等總名國君大號且韓戰之前未有交兵何得言晉侯車有三敗其説甚允而穎達必強申杜氏之説謂秦是伯爵晉實是侯爵既云侯車敗故知是晉侯車敗如此則秦車當云伯車楚車當云子車乎可發一笑也又云三敗是車有敗壞非兵敗強解殊甚凡杜氏之稍有違誤者必曲成其説如此等類不一而足劉炫矜伐性多爭頴達攻劉義極精獨到征南違反處更無一語為持平一百十一孔氏正義序內謂劉炫意在矜伐性好非毁其攻劉氏規杜如僖三十三年晉人敗狄于箕及襄二十一年傳邾庶其以漆閭丘來奔以公姑姊妻之二條伸杜抑劉可謂析入牛毛繭絲但其他杜有未安而劉規之為得者必曲護杜氏甚覺無謂且杜最精地理而孔于地理特疏凡涉地理處多置不解如柏舉之戰謂吳兵自東而追至西者尤誤自一百五至一百十一共七首論杜注孔疏胡傳之失虢滅西歸絶好音申亡南服啓雄心春秋晉楚平分勢兩國存亡痛巨深一百十二晉滅虢得陜州靈寶桃林之地鎬京消息中斷楚滅申有宛謝南陽營方城逼近洛邑自是春秋為晉楚之世矣此一首總論春秋全局往日談經兒戲同聽人傳説任西東而今紙上看形勢歷歷輿圖指掌中一百十三補遺越棄江淮就故封史遷耳食未宜從武城烽火曾相接隔逺如何有戰攻史記越滅吳而不能正江淮以北故楚得東侵廣地至泗上泗上蓋今揚州及徐泗等地考吳越春秋竹書紀年越絶書俱云越徙都琅琊起觀臺以望東海琅琊為今山東沂州府其所屬日照縣向係海曲疑所謂觀臺即于此左傳哀二十二年越滅吳二十七年越使后庸來言邾魯之界哀公嘗欲以越伐魯而去季氏公又嘗如越武城嘗有越冦武城在今沂州府費縣若棄江淮則后庸使命之往來公之如越越之冦武城中間俱隔一楚地則知史記之説非也楚疆不越洞庭湖此外殊方天一隅吳起相荆新闢地春秋原不𨽻輿圖長沙府以南俱為百蠻地楚莊王時羣蠻從楚子滅庸自後蠻服楚鄢陵之戰蠻從楚擊晉然皆不𨽻版圖及吳起相悼王南并蠻越遂有洞庭蒼梧漸由湖南以開兩廣矣春秋時並非楚地也沙鹿于今𨽻大名經為天下志山崩祇緣卜偃言亡國適會韓原與禍并僖十四年秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國僖十五年十一月壬戌秦晉戰于韓原獲晉侯後儒遂謂沙鹿是晉地胡傳云春秋書沙鹿崩于前書獲晉侯于後事應具存此不考地理而曲徇左氏之過也按杜注陽平元城縣東有沙鹿土山在今北直大名府元城縣東四十五里其西有沙鹿城去晉疆絶逺晉當惠公時其地未至于東方也沙鹿即五鹿杜注衛地僖二十三年傳晉公子重耳處狄十二年而行史記年表是年為僖公十六年即秦晉戰韓之明年也公子由狄過衛出于五鹿乞食于野人杜注陽平元城縣亦有五鹿近志今大名府有五鹿城二屬元城縣者即沙鹿城也由晉而狄而衛道極遼逺沙鹿非晉地明甚因左氏好言災異附著晉卜偃之言而韓原之役適與之會後儒不察遂以沙鹿屬之晉而不知此日之晉尚未有沙鹿也僖二十八年文公伐衛取五鹿沙鹿屬晉未幾又屬衛至哀四年齊衛救趙稷于邯鄲圍五鹿又屬晉蓋當春秋之季晉地直跨至山東界沙鹿始為晉有不得據其後以概夫前也公羊云為天下紀異此為得之江漢初逢大别山楚吳角鬭此中間康成錯解安豐縣顧氏仍訛未肯刪禹貢漢水過三澨至于大别南入于江春秋定四年吳楚柏舉之戰自小别至于大别大别山在今湖廣漢陽府城東北百步武昌府之西漢水觸山回南入江處即今之漢口也康成注禹貢謂在今之安豐史記索隱及班固前漢志亦云六安國安豐縣禹貢大别山在西南而方輿紀要亦從之皆誤也安豐之大别另是一山與禹貢左傳俱無涉安豐為今江南夀州大别山在今潁州府霍丘縣西南八十里去漢口絶逺孔氏頴達曰吳既與楚夾漢然後楚乃濟漢而陳自小别至于大别然則二别是近漢之名無緣反在安豐也春秋大事表卷九下
