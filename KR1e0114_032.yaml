body:
  text: 春秋大事表卷三十二國子監司業顧棟高撰晉楚交兵表春秋時晉楚之大戰三曰城濮曰邲曰鄢陵其餘偏師凡十餘遇非晉避楚則楚避晉未嘗連兵苦戰如秦晉吳楚之相報復無已也其用兵嘗以爭陳鄭與國未嘗攻城入邑如晉取少梁秦取北徵之必略其地以相當也何則晉楚勢處遼逺地非犬牙相輳其興師必連大衆乞師于諸侯動必數月而後集事故其戰嘗不數戰則動關天下之向背城濮勝而天下諸侯翕然從晉邲勝而天下諸侯翕然從楚惟鄢陵之勝鄭猶倔强至悼公而後服之故文公之伯務一戰以勝楚悼公之伯務不戰以罷楚逮向戌為弭兵之說而天下之大事去矣然此非獨向戌之罪也當晉楚盟宋時天下尚多與晉而不與楚晉强而楚弱使當時晉嚴兵以待楚楚必不敢萌先歃之志即楚人請之而晉正辭以折其鋭不可則整軍而退帥諸侯以申罪致討于楚楚必不敢動乃趙武守匹夫之信以藩為軍惴惴懼楚之哀甲謀變以請先歃則聽以請晉楚之從交相見則聽叔向空為大言以自慰俾楚得執前言為要質魯宋諸國僕僕于楚之庭甚至楚䖍驕橫執殺陳蔡之君晉猶恐瀆齊盟而卑辭請楚曽不敢發一矢相加遺趙武叔向豈非當日之罪人也哉自弭兵之後晉之君臣偃然弛備不復以諸侯為事歷楚之郟敖靈平三世晉不能復出兵東向者四十餘年如病痿不能起至囊瓦不仁從楚之國悉起從晉晉合十八國之師自桓文以來所未嘗有而徒潛掠楚境以大功歸諸僻陋之吳而晉之伯業于是乎終矣嗣及六卿相軋日尋干戈至哀之四年晉人且執戎蠻子以歸楚儼然以京師之禮事之晉之為晉亦可哀矣哉輯春秋晉楚交兵表第三十二春秋大事表卷三十二
