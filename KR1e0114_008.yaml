body:
  text: 春秋大事表卷八上國子監司業顧棟髙撰列國山川表或問春秋之山川與今日有異乎曰濟絶于王莽時而濼水之源于趵突泉為大小清河之入海者猶濟之故瀆也河不兩行即屯氏南北故瀆幾不可問至近世而蔡潁絶汴泗成涓流非復當日之故迹矣然則山川曷為異曰亦由天運亦由人事夏商之時世運淳古民氣安靜故其時有王者無羣雄無羣雄故亦不言地利殷之革夏也止有一湯不聞有先湯而舉事者周之勝殷也止有一武不聞有偕武而並興者八百諸侯胥歸有德未嘗角力而始臣之問所謂萆山而軍阻河為固者無有也至周之衰乃有七國秦攻伐二百年而始混一天下故六國者羣雄之祖而春秋實戰國之先聲也其時乃有以天地之山川為攻守之備富強之計齊塹防門廣里起于平隂楚營方城為城亘于宛葉而山之形勢漸失矣吳掘邗溝以通運而江淮始通齊桓遏八流以自廣而九河始塞水之故道漸移矣春秋以後戰功滋興至有塹山堙谷壅川塞河以求一切戰勝攻取之計者知伯決晉王賁灌大梁蒙恬築長城堙地脈馴至西漢與河患相終始易天地之性違川陸之宜譬之人身日事壅閼則血脈營衛非復故常衡決盩逆隨間輒發山川之不能不易者亦自然之勢也春秋一書當衰周之中伯功之始言地利者權輿于是乎在故讀禹貢而識山川奠定所由基讀春秋而知山川改易所自始亦猶導河者必于積石導江者必于岷山也輯春秋列國山川表第八周汜亦在此春秋大事表卷八上欽定四庫全書春秋大事表卷八下國子監司業顧棟髙撰衛吳越山險水道淮上地與楚補遺虞之三門虢北燕泰山亘齊魯二國太行山亘晉衛中山北燕四國海周回齊吳越三國大河經流秦晉周鄭衛齊六國濟水經流鄭衛曹魯齊五國汝水經流晉鄭蔡楚四國潁水經流鄭楚二國大江經流巴楚吳三國淮水經流楚蔡吳三國春秋時秦晉周鄭衛齊諸國東西南北渡河考古大河由北而南折而東復折而東北入海故有西河南河東河之稱春秋時其津要之見于左傳者凡有數處一曰蒲津即晉河曲一曰茅津一曰孟津即晉河陽一曰延津即鄭廪延一曰棘津即衛南河其往來之徑道俱可考而知焉文十二年晉秦戰于河曲河曲為今山西蒲州府通典云有蒲津關西岸為陜西同州府朝邑縣秦之王城在焉十三年秦伯師于河西魏人在東是蒲州與朝邑東西相望也秦晉平日往來多于此晉公子返國濟河子犯投璧秦伯誘殺吕郤于河上及孟明伐晉濟河焚舟俱在此處成十一年秦晉為成秦伯不肯涉河次于王城則在朝邑西岸河曲之戰臾駢曰薄諸河必敗之則在蒲州東岸昭元年秦后子造舟于河歸取酬幣終事八反則從朝邑至蒲州東西造舟以渡以其常所津濟故不言處所遂自茅津濟遂自南河濟涉自棘津則以非平日經行處故特著其名茅津在今山西解州平陸縣南岸為河南陜州州治距河七里是由北至南秦以晉人不出故不復從蒲津西返特由茅津南渡至陜州永寧澠池之間封殽尸更西北從陸路歸也南河一名棘津在衛輝府汲縣南七里曹在衛東晉從汲縣南渡出衛南而東陸渾今河南府嵩縣在晉南是時晉欲假用牲于雒以襲陸渾故不由孟津而東南涉棘津以掩其不備皆非平日往來之常徑故特稱某處某處以著兵機之倐忽棘津西二十里為延津即鄭廩延之津為今衛輝府延津縣水經云河水又東北通謂之延津故衛亦有延津之名孔悝為蒯聵所逐載伯姬于平陽行于延津是也衛之楚丘為滑縣有白馬津亦曰延津北岸為濬縣係衛舊都與淇縣接界衛文公渡河野處漕邑是從黎陽南渡白馬津也衛後遷帝丘為今北直之開州黃河在開州北十五里則鄭衛皆在河之南故俱有河上之稱衛宣公作新臺于河上此時尚都朝歌則在河之北鄭文公使髙克禦狄于河上則在河之南皆在濱河之境邲之戰晉師濟河是從孟津濟大抵春秋時晉西渡河至秦則由蒲津南渡河至周鄭則由孟津東渡河伐齊則由衛之開州長壽津三者皆不言處所蒲津孟津皆在晉本境而孟津為今河南府孟縣即晉河陽晉與周鄭往來尤數凡使聘郵遞出軍振旅路必由此城濮之勝晉召王狩于河陽是從南渡河而北返邲之戰先縠以中軍佐濟是從北渡河而南至敗而宵濟掬舟中之指及楚莊祀河告成則在原武縣西北大河是時倉卒失次不能復整部伍從故道歸也周與晉南北以河為界周都洛陽有北邙山山之北臨大河河北岸即望見孟津子朝用周之寶圭于河津人得之河上蓋在孟津之南也衛遷帝丘後與鄭皆在河南兩國適晉則鄭由延津衛由白馬津白馬津亦曰延津其地名偶一見之襄三十年遊吉奔晉駟帶追之及酸棗此為廩延之延津哀十六年孔悝載伯姬于平陽行于延津此為滑縣之白馬津也鄭太叔命西鄙北鄙二于己又收二以為己邑至于廪延是延津在鄭之北遊吉欲從此渡河北奔晉故駟帶追之及酸棗用兩圭質于河也齊地西至于河成二年鞍之戰襄十八年荀偃沈玉而濟是時河已南徙渡處當在今濬滑之間由開州長夀津昭定之間六次至河乃復大抵假道于此蓋是時晉地已有鄭之虎牢衛之朝歌并錯入山東范縣界與齊魯接壤大抵由河曲以北為秦晉分界則謂之西河從河曲之南折而東經周鄭之界則謂之南河更從南河折而東北穿入衛齊界則謂之東河左氏于諸國行軍朝聘之往來皆以一河為經緯最明晰有法今據其可見者約著其地理如此使後之讀左氏者有考焉書渡河考後大河從古遷徙不常在春秋時已當劃分兩截看周定王五年河徙自宿胥口東行漯川與禹河故道南北相去幾四百里案定王五年己未為魯宣公七年春秋隱公元年己未至此恰一百二十一歲適當春秋之半殆亦氣運使然學者不可不詳考也宿胥口在今衛輝府濬縣之西南滑縣之西北禹河則繞濬縣之西而北流經廣平肥鄉合于洚水即漳水至肥鄉入河曲周巨鹿即禹貢所謂至于大陸也至天津入海河行漯川後則繞濬縣之南大伾山之足折而東流至長夀津復與漯别大河經內黃之東北流過元城縣西漯河則經開州清豐抵觀城范縣之界復迤邐折而東北流至濱州利津入海秦晉周俱在濬滑之西境與河徙無涉齊地去徙處尚逺其改移者獨衛而見于傳文可考者莫著于開州襄十四年孫蒯入使衛獻公歌巧言之卒章其詩曰居河之麋職為亂階蓋指孫文子居戚戚在開州北七里故以刺之使在宣七年以前河不經由開州無為歌此詩矣哀二年晉納蒯聵于戚宵迷陽虎曰右河而南必至焉杜注云是時河北流過元城界戚在河外晉軍已渡河故欲出河右而南使河未徙不經由元城無右河而南之理又襄二十九年吳公子札自衛適晉將宿于戚史記孔子自衛將適晉臨河而反曰美哉水洋洋丘之不濟此命也夫大抵河徙以後諸國欲適晉者必由衛由衛適晉者必由開州長夀津蓋取道徑便孫林父擁兵居戚踞大河之濱當南北孔道又結交晉之權要故諸侯畏之若一敵國綜而計之禹導河從積石起至東過洛汭迄今河道如故即再經千百年亦應無變更蓋自鞏縣以西至秦晉交界束乎華山太行北邙重山疊巘之間河勢不得橫溢至濬縣出險就夷春秋中葉河始徙向繞大伾山之西直北流者轉經大伾山之南麓出乎濬滑之間而東行漢之末季曹𡊮相拒官渡黎陽白馬為戰爭要地至宋靖康之世猶然元代河合淮流大河經開封城北距濬縣又南徙三百里而禹貢所謂至于大伾者亦無之矣滄桑之故夫豈偶然要之禹河初變自春秋宣七年始余是以謹志之乾隆十年十二月下浣六日復初氏又識春秋不書河徙論周定王五年河徙當魯宣公之七年為千古河流變遷之始此係大事而聖人不書何也曰此可見春秋之書因魯史魯史之書因赴告列國不赴則魯史不書聖人亦無從書也曰然則列國之不赴何也曰是時河徙自宿胥口東行漯川在今濬縣之境諸國獨係于衛周及秦晉皆無與倘衛而流殺人民漂沒屋廬則自不免赴告列國而是時河漯合行漯亦自能容河即使小有決溢而三代之時民居稀少去水各二十五里凡山澤隙地皆不耕種水至得有所逰蕩故雖經行滑縣及開州滑即衛楚丘之地開州即衛帝丘之地逼近國都而無甚患害本國不赴告鄰邦不弔災故魯史莫得而書也曰子何以知其然也曰據春秋宋大水則書齊大災則書宋衛陳鄭災及成周宣榭火則書凡王朝及四鄰之國水火災祲無不書者豈有河流失常壞人都邑而不重書之于䇿乎以是知不告故不書無大患故亦不告也曰襄公二十三年為周襄王之二十二年穀洛鬭毁王宫至春秋襄二十四年而齊人城郊此時自當告于齊豈有告齊而不告魯之理而春秋不書何也曰此魯人恥之故諱之也凡春秋書列國之災無不行弔恤之禮者故宋大水而公使弔焉宋災而諸侯會于澶淵歸宋財是時天子微弱晉亦失政魯惟晉伯之令是聽晉魯皆王室懿親不徴諸侯為王城郟而齊叛晉乃行之故魯晉皆以為恥而諱而不書亦非聖人削之也通考春秋全經如僖十四年沙鹿崩成五年梁山崩壅河三日不流公羊云皆為天下記異若循此例則兹之河徙與穀洛鬭其變故更大而不一見于春秋者此可考見當日之情事與世變而非聖人之有遺漏及有所筆削于其間通乎此而可以知春秋書不書之故矣乾隆十一年七月下浣六日復初氏識于淮隂志館春秋時藪澤論余考古之藪澤其見于爾雅周官職方及禹貢惟彭蠡震澤至今長存其餘若菏澤今為曹州府菏澤縣矣孟豬今為歸德府孟諸臺矣滎波今為鄭州滎澤縣大野今為兖州府巨野縣雲夢今為安陸府雲夢縣至澤之古無而今有者尤不可勝紀洪澤湖近古州來今夀州巢湖為古居巢吳楚戰爭時未有也錢塘江為吳越分界吳越戰爭時未有也至洞庭為稽天巨浸南旺湖為南北分水之脊春秋時不聞其名蓋水勢有變遷此盈則彼涸雲夢竭而後水入洞庭湖大野枯而後水歸南旺澤滄桑之理使然至彭蠡震澤之所以亘古長存者蓋亦有故余生長東南熟知太湖利害又乾隆歲己未余自武陵浮錢塘徑建德入徽歙以達浮梁又自浮梁絶彭蠡以至九江假館大孤山塘與彭蠡相吞吐者一載有餘歸由湖口縣入大江浮舟東下細察水勢蓋彭蠡自南而入于江朱子謂地勢北髙南下故其入于江也反為江水所遏而不得遂因却而自豬以是瀰漫成數十百里之大澤而夏氏允彛亦云震澤四面之水既髙若建瓴而入海之處又亢若仰盂水亦反流而趨內其中受水之處蓄而不泄內溢而外噎則激蕩靡寧因恍然曰二澤之所以長流至今者豈非以此之故哉蓋澤以受水必使四面髙而中央下而後水得有所容注若西北諸澤則地形髙仰又雲夢在安陸諸府地亦偏于西其日久而漸湮漸微且或遷徙他處其理固然無足怪者余觀春秋時藪澤合諸禹貢已有不盡符者至今日則汪洋之地變成官府城市之區淪為魚鱉難可究詰而二水自禹貢至今莫之有改考其地勢豈不較然著明也哉春秋時海道論杜少陵詩云雲帆轉遼海粳稻來東吳説者謂此即唐時海運也至元世祖時用宋末海盜朱瑄張清為萬户府歲運東南粟四百萬至燕京行之百年至明洪武永樂朝猶海陸兼運至會通河成而止儒者謂元虐用其民猝遇颶風顛覆至以生靈膏魚鱉之腹而不知浮于江海達于淮泗禹貢已有之海道出師已作俑于春秋時併不自唐起也左傳哀十年吳之伐齊也徐乘帥舟師自海入齊此即今登萊之海道也國語哀十三年越之入吳也范蠡舌庸帥師自海泝淮以絶吳路此即今安東雲梯關之海道也春秋之季惟三國邊于海而其用兵相戰伐率用舟師蹈不測之險攻人不備入人要害前此三代未嘗有也是以聖人止守內地不矜逺略僖四年管仲對楚使曰齊地東至于海此特誇言耳其時登萊二府尚有萊介諸國與夷雜處至襄六年滅萊齊境始邊海而適召吳之寇楚使曰寡人處南海此亦誇言耳終春秋世楚地不到湖南至秦始皇始兼桂林象郡而漢武遂遣樓船橫海將軍浮海擊東越晉劉裕之滅盧循也遣將軍孫處帥師三千由海道入番禺中國遂以海為門戶而在春秋時尚為荒逺莫居之地故吳雖欲避楚長江直下之險止從淮右北道未嘗由海道使當日楚越甌廣而有之則樓船橫海之師且見于闔閭之世矣是以後世疆域益廣為備益多煙燉障戍濱海相望而猶時有烽煙之警即春秋吳齊已事較然可見世運遷流其亦有不得不然者哉春秋大事表卷八下
