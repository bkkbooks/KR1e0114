body:
  text: 春秋大事表卷十四國子監司業顧棟髙撰田賦軍旅表周制授田以井井九百畝中為公田八家耕之嵗貢其入于上餘私田得以自食所謂助而不稅其賦兵則九夫為井四井為邑四邑為邱四邱為甸甸六十四井出長轂一乗甲士三人歩卒七十二人大率以五百七十六夫而出七十五人以次更調此周制田賦軍旅之大畧也自宣十五年初稅畆而田制始壊私田始有征矣成元年作邱甲而兵制始壊每邱出一甲士一甸之中凡出四甲士矣其始不過欲加賦以足用益兵以備敵至襄十一年作三軍三分公室而各有其一昭五年舍中軍四分公室季氏擇二二子各一皆盡征之而獻于公自是公室徒擁虚器于上向之増賦為三家増之爾公室不得而有也向之益兵為三家益之耳公室不得而役也嗚呼自古奸臣竊國必使怨歸于上而恩出于己而後民歸之如流水晉僖公之世碩鼠興歌而曲沃得以支子奪宗矣齊景公之世踊貴屨賤而陳氏得以厚施竊國矣魯自稅畆邱甲之興民困征斂戰争不已三子日為君虐用其民至四分公室以後必更示寛大以苛虐之制歸于上以縱舍之實出于己民當其時如脫桎梏而就父母誰肯為公家盡力死鬭與季氏為難哉乾侯之役子家子曰政自之出久矣𨼆民多取食焉范獻子曰季氏甚得其民其明証也迨至公徒釋甲執冰而踞向之邱甲以益兵者増一兵適増一敵爾貨子猶粟五千庾向之稅畆以加賦者増一賦適為季氏蓄一資爾𫝊曰與其有聚斂之臣寧有盗臣嗚呼誰知聚斂即盗臣之藉手哉丘甲田賦論春秋成元年作邱甲哀十二年用田賦杜氏兩註馬牛之數前後自相違戾具見李氏㢘辨論中李氏特取文定之說曰作邱甲者毎丘出一甲士而甸出甲士四人也往者三人而今増其一杜氏以為邱出甸賦加四倍者非是用田賦者往時田主出粟而賦則取于商賈之里㕓今魯以商賈所當出之賦而于田上征之葢收區域之征以備車牛車乗若漢家收田賦泉以補車馬亦其遺意杜氏以為别其田及家財各為一賦者非是因謂司馬法所云甸出一乗者其實止出一乗之人一切馬牛車乗决非丘甸所出卓哉斯論可破千古之惑而後儒往往不之信者則以周禮小司徒及鄊師遂師俱有六畜車輦旗鼓兵器帥而至之文疑此言與周禮相悖余謂周禮出于王莽時好為繁重碎密之制特傅㑹司馬法以瞽當世之愚民非周制之本然也夫信周禮不若信左傳信左傳尢不若信詩書詩書非出于一人之手學者可因文思義以想見當時之制度非若周禮勒成一書有所増飾故至今猶可考而知也嘗攷左氏傳鄭荘公伐許授兵于大宫公孫閼與頴考叔争車晉惠公禦秦師乗小駟鄭入也則車馬皆出自上可知矣衛懿公將戰國人受甲者皆曰使鶴鄭子産授兵登陴楚武王授師孑焉以伐隨則甲仗兵器皆出自上可知矣夫以六十四井之地需出長轂一乗戎馬四匹牛十二頭則必廬井溝洫之外别有牧地主伯亞旅而外别有圉人築場納稼之餘别煩芻茭且或秣飼不以時或致臨事倒斃不大敗乃公事乎不特此也果其馬牛車輦皆出民間公家可以不煩畜馬而衛風有騋牝三千魯頌有䮐䮐牡馬豈反不以備戰陣而止以供逰觀乎不特此也馬牛車輦皆民自具則必怨行役者兼述其供馬賦車之苦勞歸士者并慰其車煩馬殆之勤而東山止言制彼裳衣勿士行枚何草不黃之詩止云匪兕匪虎率彼曠野但曰民勞耳未嘗一言及車馬也且其制當自周初已定武王勝商克紂當云歸馬于民間還牛于卒伍可矣何云歸馬華山之陽放牛桃林之野此尢大彰明較著者也且即周禮一書亦自相矛盾既云馬牛供于邱甸矣而大司馬校人之職復云掌王之六馬十二閑又云凡軍事物馬而頒之大司徒牛人又云軍旅供其兵車之牛與其牽徬以載公任器與左傳授甲授兵正相類可見周禮一書有真有偽所貴好學深思之士旁通經傳叅互而别擇之勿徒泥于先儒之成說庶乎考諸三王而不謬也謹因文定與李氏之說為衡定之曰初稅畆加賦也作邱甲益兵也用田賦備車馬也春秋當日之情事瞭然若睹而諸儒之說亦有所折衷矣春秋大事表卷十四
