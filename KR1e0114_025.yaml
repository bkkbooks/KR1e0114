body:
  text: 春秋大事表卷二十五國子監司業顧棟髙撰鄭執政表世嘗謂鄭莊公鍊事而黠宋襄公喜事而狂然此二者兩國遂成為風俗宋之狂非始于襄公也殤公受其兄之讓而旋仇其子至十年十一戰卒召華督之弒此非狂乎下及莊公馮以下諸君以及華元不忍鄙我之憾而旋致柝骸易子之慘向戌貪弭兵之功而使天下諸侯僕僕楚廷馴至晉伯熄而楚氛熾其狂之禍遂中於天下至鄭則不然眀時勢識利害常首鼠晉楚兩大國之間視其強弱以為向背貪利若騖棄信如土故當天下無伯則先叛天下有伯則後服其先叛也懼楚也齊桓公以僖十七年冬十二月卒而鄭文明年春正月即朝楚邲之戰鄭首先叛晉堅事楚者十二年中間以與許訟不勝改而從晉至成九年貪楚之重賂復從楚未三年復從晉至成十六年貪汝隂之田復從楚投骨于地就而食之搖尾乞憐者鄭之謂也其後服也欲以諸侯之力斃楚使楚不敢與爭也莊十六年與齊桓同盟於幽眀年即不朝歷十三年復同盟于幽至僖五年首止之盟復逃而從楚晉文之興踐土甫盟而明年翟泉復不至燭之武復間晉事秦旋召杞子之謀不得不從晉未及五六年復與陳蔡偕楚為厥貉之次矣每間伯主之有事則侵伐小國以自益晝伏夜行竊食盆盎常懼人覺者鄭之謂也然亦因此得保其國常倔強于諸侯間以中國四戰之地迭受晉楚之侵伐而能國威不挫民力不疲雖當晉楚之伯已衰猶能與宋相鬪爭者蓋亦地勢使然其君臣積習之久而遂成為風俗歟鄭之君且勿論其大臣執政如子良子駟子展之徒遞掌國政五十餘年其謀議具見於左傳子良之言曰晉楚與其來者可也晉楚無信我焉得有信子駟之言曰犧牲玉帛待于二境以待強者而庇民焉子展之言曰吾伐宋晉師必至使晉師致死于我楚弗敢敵而後可固與晉其揣量兩國之情形狡矣黠矣故其術常出于頑鈍無耻卑污忍垢民鮮罹戰鬪之苦而有征賦之擾其時國勢亦賴以少安子産繼之能折𠂻于大道適遇向戌弭兵兩事晉楚能事楚而不受楚害事晉而不為晉屈本之以禮而善其辭令故仲尼稱之有君子之道蓋委蛇以從時權宜以濟變又非黠之謂矣竊嘗以春秋列國之情形譬之秦楚如虎狼鄭如黠鼠宋如猘犬鼠之囓物也以漸鄭莊以隱十一年入許旋使許叔居許東偏卒還其國後屢侵伐之直至定六年遊速因楚敗而始滅許首尾歷二百餘年犬之噬人也以暴宋襄甫嗣齊伯而即執滕子嬰齊用鄫子于次睢之社宋景當晉楚之衰天下無伯伐邾侵鄭遂執曹伯以歸殺之狂焰四出不可嚮邇蓋終始春秋二百四十二年宋鄭立國之大較也此由封建之貽害積漸至此後世易為郡縣朝不道則夕黜之夕不道則朝黜之豈特虎狼逺迸凡鼠竊狗偷俱不容于大一統之世矣鄭自中葉以後執政之上更有當國蓋自襄二年鄭成公卒介于晉楚國家多難成公命子罕當國攝君事非常法自後子駟子孔子展世有當國之號其執政常不依卿之位次子皮父子世為上卿位居子産之上與魯宋又異輯春秋鄭執政表第二十五右鄭執政自祭仲至駟宏共十五人春秋大事表卷二十五
