body:
  text: 春秋大事表卷二十二國子監司業顧棟髙撰晉中軍表周制大國三軍次國二軍小國一軍晉本大國自曲沃武公以支子奪宗莊公十六年僖王命曲沃伯以一軍為晉侯從小國之制至閔公元年晉獻公始作二軍公將上軍太子申生將下軍以滅耿滅霍滅魏時尚未有中軍也僖公二十七年文公蒐于被廬作三軍謀元帥使郤縠將中軍郤溱佐之中軍于是始二十八年復作三行以禦狄荀林父將中行屠擊將右行先蔑將左行避天子六軍之名故名三行三行無佐三十一年秋蒐于清原更作五軍以禦狄罷去三行更為上下新軍文公六年春晉襄公蒐于夷舍二軍罷五軍復三軍之制以趙盾為中軍將成公三年十二月晉景公賞鞌之功作六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿擬于天子矣六年晉遷新田韓厥將新中軍且為僕大夫是時欒書為中軍將曰新中軍創出也十三年晉厲公伐秦韓厥將下軍趙旃代韓厥將新軍是新中軍在下軍佐之下矣十六年鄢陵之戰郤犨代趙旃將新軍新上下軍復罷是為四軍襄公三年晉悼公使魏絳佐新軍新軍皆有將佐二卿鄭子展謂晉四軍無闕八卿和睦知罃謂三分四軍與諸侯之鋭以逆來者是也至十三年蒐于緜上使荀偃將中軍士匄佐之趙武將上軍韓起佐之欒黶將下軍魏絳佐之將佐皆遷于是新軍無帥悼公難其人使其什吏率其卒乗官屬以從于下軍十四年歸自伐秦遂舎新軍復還三軍之舊自是終春秋之世晉軍制不復變更中軍本司徒之職晉以僖侯諱廢司徒為中軍自翼侯以前未入春秋故其時中軍不著文公圗伯以後世有賢佐國以日強諸侯咸服雖經靈厲無道而小國不敢叛自韓起雖賢而弱末年漸不能制其同列范鞅更為黷貨趙氏繼之與范中行相仇怨晉以失伯而三分之勢遂成嗚呼考其次第亦治亂得失之鑒也輯春秋晉中軍表卷二十二春秋大事表卷二十二
