body:
  text: 春秋大事表卷四十國子監司業顧棟高撰天文表敘余讀春秋至日食與失閠輒歎周之歷法不傳其故殆莫可考而知也考今歷法三歲一閠五歲再閠而左傳于莊二十五年六月辛未朔日有食之云非常也杜預注非常鼓之月由置閠失所故致月錯是不應置閠而置閠誤使七月為六月襄二十七年冬十一月乙亥朔日有食之云辰在申司歷過也再失閠矣哀十二年冬十有二月螽云火猶西流司歷過也是為應置閏而失不置于襄少再閠于哀少一閏雖書十二月實十一月即夏之九月也何閠法之錯繆至于如此日月行度據後世歷家推家推算大率以一百七十二日有餘而一交交則月掩日而日為之食然亦有不正相值或食于夜則日食不見但無頻月食法而襄二十一年九月十月頻食二十四年七月八月頻食諸儒皆所不解以日月無頻交之理不交無從有食惟漢髙帝三年及文帝前三年俱于十月十一月晦頻食與春秋相同術士無從考知元郭守敬之言曰三代歷無定法周秦之間閏餘乖次至漢造三統厯而是非始定經一千一百八十二年歷凡七十改創法者十三家足徵天之運行無常雖聖人創造厯法經數百年輒廢不可用竊意易稱治厯明時當湯武革命之初應天順人改定正朔其損益歷法必更大備而自堯命羲和舜齊七政而後六經之文無可考見識者惜之然則守敬所云厯無定法者特其法不傳于後非果三代聖人不為更造也自武王革殷至春秋時又已數百年周衰失政世無明天子莫能修正厯法莊襄定哀之間閠餘失次日月交會其行度往往與後世錯固其理也漢初太史令司馬遷等言厯紀廢壞宜改正朔始造太初厯自後日益精密自此以前至春秋經戰國之衰亂秦漢皆以力征日不遑給莫能以欽若昊天為事則高帝文帝時之連遭頻食秦置閠多在歲後莫能隨月置閠恆書後九月與春秋之季略相倣其亦以此歟故論著之以俟後之精通厯法者考焉輯春秋天文表第四十日食霞峰華氏曰春秋書日食三十六謹天戒也或曰日食有常度矣當食而食天道之常于人事何有若是則天人之理不相符合而春秋之書之者為贅也夫月之與日歲十二會為十二朔朔者日月交會之期故食恆在朔而道有表裏或不正相值則月不能掩日歷家推算大率以一百七十二日有餘而一交交則月掩日而日為之食然春秋二百四十二年而經止書日食三十六必有應食而不食者矣襄二十一年九月十月頻食二十四年七月八月頻食亦必有不應食而食者矣故夫日食者厯家以為常春秋以為變也春秋之法常事不書而日食必書懼人主之忽以為常也杜氏乃謂惟正陽之月君子忌之其餘則否然則非正陽之月而日食春秋不應書矣豈不謬哉或日或不日或朔或不朔史失之也襄十五年以後無不書朔日者矣書鼓用牲于社者三譏也不鼓于朝而鼓于社僭也不用幣用牲非禮也趙氏汸曰公羊曰某月某日朔日有食之者食正朔也其或日或不日或失之前或失之後蓋以為司歷失之考漢書律歷志西漢日食多在晦亦有先晦一日者公羊此義必有所受蓋聖人以日食不在正朔茍書于經非治歷明時之意故或去朔或去日以示義彚纂曰朔前朔後聖人何難據實以書而必各立義例乎且日食于朔二日則不得為朔矣而可仍以朔書之乎故當以闕文為正案束山每有此穿鑿之説蓋過求而失之也彚纂之言當矣星變汪氏克寬曰經書星變者四莊七年之星變以王人不能勝五國之兵而王命益不行于天下也文十四年星孛以桓文迹熄而宋齊晉之君皆有禍亂也昭十七年星孛以王子朝庶孽奪正而兵力交于王都之內也哀十三年星孛以強吳爭伯而中國諸侯皆為之服役也凡此皆變之大者而王伯衰亂之徵也趙氏汸曰日食星變皆為天下記異左氏傳載叔服梓慎論星孛惟以大國災咎當之當時流俗之論上不知有王室下不知有天下大勢其所知者惟二三大國而已書萬充宗黃梨洲春秋日食問答後問云春秋日食三十六而頻食者二先儒皆謂日無頻食法王伯厚云衛朴推驗春秋合者三十五獨莊十八年三月古今算不入食限豈二頻食亦入限乎抑史官怠慢當時失記從後追憶疑莫能定遂兩存之春秋因而不削乎答曰沈存中云衛朴精于厯術春秋日食三十六密者不過得二十六七一行得二十七朴乃得三十五惟莊公十八年一食今古算皆不入食法疑前史誤耳王伯厚之言本此愚按襄公二十一二十四兩年俱頻食厯家如薑芨一行皆言無比月頻食之理授時厯亦言其已過交限西厯則言日食之後越五月越六月皆能再食是一年兩食者有之比月而食則斷無是也襄二十一年己酉九月朔交周闕宫闕九度五一二八入食限至十月朔一宫一十度三一四二不入食限矣二十四年壬子七月朔交周闕宫闕三度一九三五入限至八月朔交周一宫三度五九四九不入食限矣乃知衛朴得三十五者欺人也其言莊十八年一食自來不入食法按是年乙巳歲二月有閏至三月實四十九日一十三時合朔癸丑未初初刻交周一十一宫二十八度三四三七正合食限朴蓋不知有閏故算不能合耳朴于其不入食限者自謂得之于其入食限者反謂不得不知何説也案此問答推究春秋日食最精細但梨洲云西厯以越六月即能再食者即高氏閌所稱歷家推步之法一百七十三日日月始一交交則月掩日而日為之食是也髙係宋時人是時西法未入中國則為此説者亦不自西歷始矣頻食既斷無此法而春秋之所以書者何也是時周歷算法已不準推步常遲一月頒厯云某月朔應日食到前一月之朔而日大食甚至襄二十四年七月朔食之既人所共見魯史既據實書之矣至後一月不見有食則以周保章氏所頒未敢輕削魯史非精歷算者不能考正是月之不入食限也則疑食之微或食于夜而人不見因並存之孔子因而不革看後來漢書本紀所載髙祖即位三年及文帝前三年俱于十月十一月晦頻食亦是漢初襲用秦正歷法未講致有此誤至武帝太初定歷以後則斷無此矣連月頻書者此非魯史官怠慢之過乃太拘守之過也若謂天道至遠不可得而知容或有此則自太初迄今二千年中更南北朝五代之濁亂絶無連月再食之事而獨于春秋時再見且于漢祖開創孝文恭儉之朝而再見無是理也望溪方氏曰頻月而食何也後月之食衆所共見也前月之食史所誤推也設前月陰晦據所推以書于䇿而食在後月則莫肯追正其失而並書于䇿矣案望溪之説大旨略同但以為前月虛而後月實余前亦持此論後於梨洲集中見答萬充宗語遂改從今説梨洲精于天文意必有實據姑識此以俟後之君子春狄大事表卷四十
