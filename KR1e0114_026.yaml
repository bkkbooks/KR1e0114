body:
  text: 春秋大事表卷二十六國子監司業顧棟高撰齊楚爭盟表五霸之中仲尼獨許齊桓然論者謂自桓伯而天下遂不復知有王吾謂春秋之世之趨于伯非自桓始也桓八年楚已合諸侯于沈鹿矣十一年屈瑕盟二軫矣脫無齊桓而天下之勢將遂折而入于楚故當日之望齊桓如稿旱之望甘雨也然而齊桓攘楚之功十分不及晉文之一何也城濮一戰而天下翕然宗晉齊桓盟召陵未踰年而楚人滅弦又踰年而楚人圍許滅黃伐徐楚之桀驁曽不能稍減其分毫故穀梁子謂桓之得志為僅此非桓之劣于晉文也管仲與子文並世而生管仲有節制之師而子文亦有持重之計召陵之役按兵不出遣屈完如師方城漢水數言隱然有堅壁清野以逸待勞之計故桓不得已成盟而退于楚未大創故天下從違之勢未分也使如得臣之輕脫囊瓦之不仁一戰而勝全師壓楚責其僣王與侵奪諸侯之罪還楚舊號悉返侵地終齊桓之世不動豈非赫然王者之師哉然齊桓之志志在服鄭而已當日北方多故桓公之為備者多狄病邢衛山戎病燕淮夷病杞伊雒之戎為患王室方左支右吾之不暇明知天下之大患在楚而未暇以楚為事以為王畿之鄭能不向楚則事畢矣故終其身竭力以圗之至如楚之江黃晉之虞虢桓公以為鞭長不及無如何也且管仲佐桓公圗伯以來以大義服人未嘗交兵與諸侯一戰其意以愛養民力勤恤諸侯為事故仲尼許其仁為其不勞民力以戰攻也而孟子嗤其功烈之卑為其不能服楚制晉大王者之烈也此則桓公之世為之也輯春秋齊楚爭盟表第二十六春秋大事表卷二十六
