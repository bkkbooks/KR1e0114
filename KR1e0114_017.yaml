body:
  text: 春秋大事表卷十七上國子監司業顧棟髙撰賓禮表昔者先王為賓禮以親邦國制為朝覲聘問㑹同盟誓之禮所以協邦交明上下崇體統息紛爭也六年五服一朝又比年一小聘三年一大聘諸侯則世相朝終其君之世一見而已大行人時聘以結諸侯之好司盟掌盟載之法凡邦國有疑㑹同則掌其盟約之載及其禮儀是則朝聘㑹盟由來舊矣當其時諸侯率天下而羣奉乎一尊天子錫隆施以推恩乎萬國疏數有常期貢賦有常數賚豫有常典體統相承尊卑不紊豈非天下為同大一統之世哉東遷而後王政不綱諸侯放恣于是列邦不修朝覲之禮而天王且下聘矣歸賵矣錫命矣終春秋之世魯之朝王者二如京師者一而如齊至十有一如晉至二十甚者旅見而朝于楚焉天王來聘者七而魯大夫之聘周者僅四其聘齊至十有六聘晉至二十四而其受列國之朝則從未嘗報聘焉由魯以知天下而王室之微諸侯之不臣概可見矣隱桓之世盟㑹繁興諸侯互結黨以相軋自莊十三年齊桓為北杏之㑹而天下之諸侯始統于一無敢擅相盟㑹厯一百五十六年晉伯衰鄟陵始復為參盟而諸侯之權復散七國之分擾秦雄之并吞實兆于此蓋嘗綜一經之始終而論之由王而伯由伯而為戰國世運遷流殆非一朝一夕之故矣夫子作春秋以尊王而其于魯論則深豫管仲之伯蓋悲王道之不行而以為惟伯猶足以維之也至伯統絶而春秋不得不夷而為戰國矣觀于朝聘㑹盟而天下之勢由天子而諸侯而大夫屢降益下厯厯可見故備列之輯春秋賓禮表第十七公朝霞峯華氏曰僖公朝于王非公之能朝王也天子在踐土在河陽晉文率諸侯以朝王而公亦與朝也又非晉真能尊天子也天王下勞晉侯于踐土晉侯致天子于河陽而因率諸侯以朝也春秋書曰王所非其所也不與王之于踐土于河陽也而天王不當下勞晉侯不當召王其實著矣書曰公朝不與晉之主是朝也而晉文非真能率諸侯以尊天子其實亦著矣然而猶書曰朝至成公朝于京師則并不書朝何也僖之朝雖朝于外朝也成公㑹晉厲伐秦道過京師因而朝焉則意不在于朝也春秋誅其意故不曰朝而曰如京師下文又曰公自京師遂㑹諸侯伐秦而成公簡慢之實著矣春秋二百四十二年書朝王所者二而皆不于京師書如京師者一而又不以朝此天下之盡無王而春秋所以作也列國來朝程子曰諸侯雖有相朝之禮而當時諸侯于天子未嘗朝覲獨相率以朝魯得為禮乎吕氏大圭曰魯之所如者齊也晉也甚則朝逺夷之君而齊晉未嘗朝魯也魯之所受朝者滕也邾也薛也杞也曹也否則夷狄之附庸而滕邾薛杞曹未嘗一受魯之朝也蓋齊晉盛也楚則所畏也滕邾薛杞則土地狹隘而不能與魯伉矣霞峯華氏曰凡書來朝貶也諸侯不朝天子而朝同列與不朝天子而受同列之朝其罪均也況旅見乎況以諸侯而受同列之旅見乎交譏之矣蕭叔朝公朝于外非其地也曹伯使其世子射姑來朝當朝而疾疾而世子攝行于王可也于諸侯不可也附列國來朝後霞峯華氏曰邾子來㑹不言朝不用朝禮也祭伯來祭公來不書朝不當朝也介葛盧來白狄來亦不書朝不能朝也實來朝而不復其國也並附列國來朝後公如列國霞峯華氏曰春秋書公朝王所者二如京師者一而書公如齊十如晉二十一如楚二比而觀之由魯以知天下王室之微諸侯之不臣不待貶而自見矣僖十年公始朝齊自後不朝齊則朝晉知盟主而不知有天王迄襄昭之間伯統亦衰遂旅見而朝于楚知蠻夷而不知有諸夏此又世運之一大升降也已上如齊已上如晉已上如楚天王來聘霞峯華氏曰春秋天王來聘必書穀梁子曰聘諸侯非正也諸侯朝而王聘正也諸侯不朝而王聘非正也況桓宣篡弒之賊王不討而反聘之乎春秋二百四十二年魯大夫如京師者僅四而王之下聘有七隱桓之世絶無報聘比事以觀而天王之失道魯之不臣不待貶而自見矣聘周霞峯華氏曰公子遂如京師報宰周公也而以二事出叔孫得臣如京師拜錫命也而以大夫往宣公五朝齊而仲孫蔑一如京師襄公五朝晉而叔孫豹一如京師入春秋以後天王聘魯者七而魯大夫如京師者僅四又皆簡慢不恭如此其罪可勝誅乎或曰隱桓之世天王來聘者五魯大夫之報聘者亦無聞焉或者得禮而常事不書乎曰報聘非得禮也王制諸侯于天子比年小聘三年大聘五年一朝東遷以後諸侯莫朝視天子蔑如也其卿大夫之聘亦安有合王制而無失禮者哉設隱桓之世魯大夫一如京師春秋必書夫子必存而不削設天王聘而魯一報聘春秋尤必書之以志其非禮而不見于經是僖三十年以前魯實未嘗聘周也入春秋幾百年而後公子遂一報聘猶愈于隱桓之不答聘者矣文元年得臣一拜命猶愈于莊公成公之不拜命者矣又二十七年而仲孫蔑一如京師其後又五十餘年而始有叔孫豹之聘自是之後終春秋不復聘王矣聘列國霞峯華氏曰內大夫出聘五十有二如齊十六如晉二十四如楚一皆著其以弱事强也如宋五如陳如衛如邾各一報聘也公孫兹如牟嬰齊如莒行父如陳聘且娶焉春秋止書如不正其以公事而行私事也霞峯華氏曰內大夫如齊二十五因事而往者九逆女三納幣一單伯一葬二涖盟二其正聘于齊十有六莊三十二年慶父如齊穀梁曰奔也不在正聘之數又曰魯之聘齊自僖公始以齊桓創伯也經于僖公書如齊者三于文公書如齊者再文十八年春公薨秋公子遂叔孫得臣如齊二卿並出假聘事以行篡奪之謀自是十年之中七聘于齊襄仲行父奔命不遑或一歲再往春秋悉書于册而遂及得臣行父三人之同惡與齊人納賂黨惡之罪昭然矣至宣十七年斷道之盟魯始叛齊親晉交相侵伐鞍之戰四卿同將逞其私忿迄成十一年而叔孫僑如始再聘于齊以修前好其後襄公二十年而叔老如齊昭九年而仲孫貜如齊定十年而叔孫州仇如齊或二十年而一聘或三十年而一聘云霞峯華氏曰內大夫如晉二十有八㑹葬三昭二年公如晉晉人辭公季孫宿如晉弔少姜也不在聘數其正聘于晉二十有四又曰僖三十年公子遂如京師遂如晉為聘周之始亦聘晉之始其明年遂復如晉拜曹田文公之世如晉者五宣公篡立結援于齊亦間晉有內亂故君臣􅌹意事齊而于晉使寥寥焉僅十八年歸父一聘而已成公嗣立大夫如晉三見于經然晉不以德綏諸侯公數見止辱晉于是失盟主之禮矣其後晉悼修文襄之業使命數來而魯修聘事亦謹襄公之編見經者九昭公屢朝于晉而見距三聘于晉而執行人専于事大而不知所以自立其見辱宜矣而晉伯亦衰定六年以後魯君臣之如晉者無聞焉霞峯華氏曰內大夫如宋八因事而往三致女一葬共姬一葬平公一其正聘于宋五霞峯華氏曰內大夫如陳三葬原仲一其正聘于陳二春秋大事表卷十七上欽定四庫全書春秋大事表卷十七下國子監司業顧棟髙撰列國來聘汪氏克寬曰經書諸侯來聘三十一齊聘者五晉聘者十有一宋衛聘者各四陳鄭秦吳聘者各一楚聘者三魯以秉禮之國受同列之朝聘而尊王之禮寥寥罕見故悉書以示譏焉晉衛宋來聘連後來聘及盟數之外裔來聘莊二十二年文九年冬楚襄三十年春文十二年秦襄二十九年來聘及盟霞峯華氏曰凡聘之志皆譏而聘而及盟尤為非禮聘而盟胡氏以為大夫私盟専命遂事非也何休注公羊以為聘盟兩受命者是矣然大夫有聘無盟以大夫盟公伉也以公及大夫盟卑也凡此類皆當時諸侯昧于上下之辨而政在大夫所由來也故春秋凡聘而及盟皆不書盟所以深惡之霞峯華氏曰齊之聘魯者五而齊年再來在隱桓之世其後二百四十餘年之間公朝齊者十有一魯大夫之聘齊者十有九而齊使僅三至焉蓋其視魯為己卑矣魯朝晉者二十一聘晉二十有四而晉使之來十有一荀庚郤犨之聘而及盟以大夫伉也士燮之聘言伐郯以伯令徵也惟成十八年至襄十二年悼公復伯以禮親諸侯故十餘年間而來聘者四外此昭二年韓起執政以上卿將命庶幾以禮來者乎若荀吳之聘黨叛臣而徵諸侯士鞅之聘責牢禮至十有一則非禮之加抑又甚矣魯于宋衛匹也而亦使大夫盟公公又崇宋向戌而與盟于國都之外過矣陳邇于楚故入春秋以來惟一聘魯而在莊公之世荆楚未盛之前鄭懼于楚而自輸平以後亦惟一聘魯而在晉悼之時諸侯方睦之日楚三來聘而浸益強故春秋之書法凡三變說春秋者以為漸進之汪氏曰楚大夫書名書氏自嬰齊㑹蜀而已然然則挾衆威魯以臣伉君春秋書公子嬰齊亦將謂豫而進之乎況薳罷之來報公朝也公踰年在楚幾不得反而楚使一來謂聖人豫而進之謬矣故謂以著楚之浸強者其說猶為近之而秦使術吳使札義同楚使椒當亦非其以能聘而進之矣特㑹霞峯華氏曰㑹有三例特㑹也參㑹也主㑹也其初以諸侯而特㑹其後以大夫而特㑹諸侯矣又其後以大夫而特㑹大夫矣其初以諸侯而主㑹其後以大夫而主諸侯之㑹矣又其後以大夫而主大夫之㑹而君若贅疣矣其初以諸侯主諸夏之㑹以攘夷狄其後以夷狄同主諸夏之㑹而晉楚之從交相見矣又其後以夷狄獨主夷夏之㑹大合十三國于申而伯主不復與矣懼楚而通吳㑹吳以謀楚卒之楚敗而吳強而黃池之㑹諸侯以是終焉通而論之諸侯之特㑹者多在隱桓以前自有主㑹無特㑹參㑹者矣大夫之特㑹者多在文宣以後有大夫特㑹而後有大夫主㑹者矣以諸侯而主天下之㑹自北杏始以大夫而主天下之㑹自鍾離始以夷狄而同主天下之㑹自宋始有北杏而後有葵丘之㑹宰周公至溫之㑹而天王實狩焉而諸侯之亢極矣然後大夫乘之大夫主天下之㑹而諸侯失政然後夷狄乘之春秋詳而志之得失之故可考矣已上特㑹中國諸侯已上特㑹外裔霞峯華氏曰經書公特㑹者二十與中國諸侯㑹十四㑹師一與外裔㑹三㑹楚大夫一㑹而弗遇一內大夫特㑹諸侯案禮卿不得㑹公侯大夫専㑹公侯政安得不自大夫出乎內大夫特㑹大夫參㑹霞峯華氏曰經書公參㑹者十特㑹者離㑹也兩君相見也三以上為參伯者主其㑹為主瑣澤左氏以為合晉楚之成晉伯衰矣黃池之㑹夷主㑹而春秋先晉晉既不復能主春秋又不與吳為主則亦參㑹而已矣外特㑹參㑹案外諸侯相㑹不書必關天下之故而書㑹鄧始懼楚世道之一變也㑹洮㑹安甫黨亂臣而叛伯主天下自此無伯世道之又一變也特盟霞峯華氏曰書及內為主也書㑹外為主也隱元年及邾儀父桓元年及鄭伯閔元年及齊侯皆書及志內之急于盟也盟戎書及責在內高氏謂深責中國而不罪夷狄是矣襄三年公及晉侯盟長樗公朝晉而盟也朝晉而盟者三皆諱不書公獨此書公及異乎襄靈之及盟也與內為主而書公及者異矣㑹齊盟者四艾之盟齊僖求伯之初也柯與扈齊桓圖伯之初也于黃齊景爭伯之初也皆齊志也㑹鄭盟者一鄭突始篡而求盟也㑹邾儀父盟趡趡魯地彼來而我㑹之故書㑹是皆以外為主矣劉氏敞曰盟者何殺牲載書而約也㑹者何約信命事而不殺也古者六歲而㑹十二歲而盟亟㑹盟非禮也外諸侯特盟陳氏傅良曰外特相盟不書必關于天下之故而書莒紀無足道也齊鄭合天下始多故矣天下之無王鄭為之天下之無伯齊為之也是故書齊鄭盟石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之終也吳氏澄曰齊鄭盟石門繼以宋齊衛瓦屋之盟諸侯之黨合而無王近以胚胎齊霸之糾合矣齊鄭盟鹹繼以齊衛鄭沙曲濮之盟諸侯之黨散而無霸逺己醖釀秦雄之并吞矣閲世變者知之參盟案陳氏于瓦屋曰諸侯初參盟也有參盟然後有主盟于鄟陵曰此參盟也參盟自齊桓以來未之有也於是再見晉不復主盟也盟主不作而諸侯之盟復相參錯矣大抵兩國相盟為特盟特盟専辭也三以上為參盟參盟衆辭也伯者之盟為主盟主盟尊辭也衆共尊為盟主而聽命焉有主盟而天下之參盟定于一矣齊桓沒而有曹南之盟宋襄圖伯而不終晉伯衰而有鄟陵之盟齊景假納昭公以糾合諸侯而不果納則亦不足以主盟矣公與大夫盟霞峯華氏曰公及大夫盟者六諱公不書者二齊高傒晉處父是也及高傒內為主婚仇人而盟其使以大惡諱也及晉處父外為主朝伯主而盟其臣以國耻諱也內為主者譏在內而高傒之伉亦可知矣外為主者罪在外而公之不能自強亦可知矣家氏鉉翁曰凡公與強國之大夫為盟不書公及諱強國之以無道加于公也與小國之大夫為盟則不諱公以自欲與之盟非彼要公必欲為此盟也內大夫盟諸侯霞峯華氏曰內大夫盟諸侯始于及宋人盟宿宿微國也春秋書之謹其始也至柔㑹宋公陳侯大夫始出盟公侯矣自是而後公子結及齊侯宋公盟矣公孫敖㑹三國之君及晉士縠盟矣行父請盟于齊而商人弗及盟非能謹上下之分也求賂故也納賂而公子遂及齊侯盟矣臧孫許以次卿而及晉侯盟赤棘不已伉乎仲孫貜之盟邾于祲祥何忌之盟邾于拔直卑之耳又其甚者句繹之盟伐國取地以盟其君而公不與聞則世變之極而春秋之書盟亦止此主盟詳五爭盟例不另載遇胡氏寧曰古者諸侯或因朝覲或從王命無期約而適值于途必有兩君相見之禮所以崇禮讓絶慢易也故謂之遇周衰諸侯放恣出入無度私為邂逅之約有如適值于途者亦謂之遇非矣汪氏克寬曰公穀釋名義皆謂不期為遇左氏遇垂梁丘之𫝊則皆云先為之約不期而㑹者古禮也私為之約而以簡禮相㑹者春秋諸侯之禮也非王事而出預有期約以相㑹聚乃行古者不期之禮是自欺耳書之所以譏之也垂之過以三國之君相㑹亦比于不期而遇其為簡慢詭譎益可見矣凡㑹莫適為主以爵之尊卑為序爵同則以國之大小為序已上內相遇已上外相遇胥命春秋大事表卷十七下
