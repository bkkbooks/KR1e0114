body:
  text: 春秋大事表卷二十八國子監司業顧棟高撰晉楚爭盟表孔子曰晉文公譎而不正齊桓公正而不譎子朱子専以伐楚一事言之其說蓋原于杜氏愚竊意其非然也論其譎與正之大者如齊桓不納鄭子華之請而晉文因元咺執衛侯齊桓定王世子而拜天子之胙晉文則至請隧其規模之正大事事不如齊桓至論城濮之戰則勝召陵遠甚何則召陵雖盟而楚滅弦圍許毫無顧忌蔡鄭亦未敢即從齊至如城濮一勝而天下之諸侯如决大川而東之其功之大小寧可以數計哉論者曰晉不宜伐衛以致楚尤不當矜兵力以求必勝其說皆非也論當日從楚之罪則曹衛為罪首何則楚之最近者許蔡其次則陳又其次則鄭諸國之從楚實迫于不得已若衛為北方大國而曹介在齊魯之間與楚風馬牛不相及又均為文昭之後其相率而從楚何為者原楚之意不過欲結衛以搘晉結曹以來齊魯使天下諸侯俱南面朝楚而止耳此門庭之寇匪直為報怨之私而已也且論者之意果以為晉不伐衛而遂可以勝楚晉不勝楚而晉遂可以伯乎尤非也不勝楚則楚之虐焰未息而不伐曹衛勢必加兵于陳蔡鄭許目前齊宋之急未易解也且使晉而勤兵于四國勞兵頓師而楚檄曹衛議其後令楚反得仗義之名而晉有孤軍轉戰腹背受敵之苦勝負未可知孰若蹙方張之寇于大河四戰之地一舉勝之為中原立赤幟聖人宜録其不世之功不宜以為譎而訾之也且當日之時勢何如者魯從楚矣宋亦嘗及楚平矣魯又乞師伐齊取穀楚兵威所未及者周與晉耳斯時楚頵之橫埒于安史而晉文之功侔于李郭假令以安史之桀驁唐室能仗義執言以服之乎李郭百計殄之收復京師而論功之際乃謂其兵出詭道非王者之師鰓鰓焉議其後恐朱子之綱目其書法不應如是或又謂子所論者後世之事耳春秋未遠三代不可以戰爭論曰果如是則宋襄有明驗矣不重傷不禽二毛而遂至敗于泓令晉文而守拘方之見城濮一挫周室將不可問其利害孰為大小而又可執儒者之見以議之乎劉氏敞乃謂宋襄能守信義雖師敗國削非其恥又謂周末諸侯交爭賤守信而好竒功故穀梁子亦以宋公為非嗚呼是皆杜氏譎而不正之說誤之其弊馴至陳餘儒者不用詐謀竒計卒為泜水之擒而後已豈不謬哉輯春秋晉楚爭盟表第二十八案晉自文公創伯於僖之二十八年厯襄靈成景厲悼平昭凡九世計共一百零四年自是以後晉楚俱衰齊景爭伯參盟復見如春秋初年矣此世運一大變也詳齊晉爭盟表附晉伯餘燼案晉自平丘以後已不復能宗諸侯自此至召陵凡二十有四年僅有此三四㑹盟然皆虛循故事而無勤王恤患之實黃父之㑹坐待明年扈之㑹范鞅取貨城成周而魏子南面㑹召陵而卒辭蔡侯蓋是時六卿強而公室弱置中夏于不問徒伐鮮虞滅肥鼓以自封殖又貪於貨賄以破楚入郢之大功讓之強吳致吳晉爭長黃池而晉自此如死灰之不復然矣此世運之又一大變也詳吳晉爭盟表春秋楚人秦人巴人滅庸論據左氏𫝊滅庸者楚也而經文列書秦人巴人略無異辭文定因謂庸有取滅之道而蒍賈善謀國春秋以是減楚之罪嗟乎春秋豈為楚計得失哉就使謀國果善亦祗益其狡焉啓疆憑陵中夏之計乃春秋之所深惡聖人曷為豫之其所以詳書不殺者實著楚之交深黨固橫行無忌將有問鼎之漸關于天下之故而書之也考楚武文之世巴庸嘗病楚楚方經營近境之不暇未敢以全力與中國爭而城濮之役秦助晉攘楚楚威稍挫中國得安枕者十五年今以晉靈幼弱楚莊暴興乃連結巴秦滅庸庸與麇俱為今鄖陽府境麇今鄖陽府鄖縣又竹山縣東四十里有上庸故城即庸國地界連秦隴楚得其地則勢益西北逼近周晉且滅庸而楚之內難夷矣連巴秦而楚之外援固矣滅庸以塞晉之前結秦以撓晉之後斯不待陸渾興師而早知其有窺覦周鼎之志矣且夫庸非小弱也周武時曽佐伐紂立國已數百年晉欒武子嘗稱楚自克庸以來無日不討國人而申警之蓋亦重大其事其所屬魚邑實為今夔州府奉節縣地跨兩省居秦楚巴三國之界故不結巴秦則不得滅庸庸滅而秦楚合勢中國之籓籬撤矣夫讀春秋者貴合數十年之事以徐考其時勢不當就一句內執文法以求褒貶宜合天下而統觀大勢不當就一國內拘𫝊事以斷其是非春秋為天下之無王作非為一國作也矧吳楚蠻夷其謀國之善否何關于聖人之慮又況其為封豕長蛇洊食上國者哉前此翟泉于溫之盟秦人皆與志秦晉之合晉伯之所以盛今此楚秦滅庸志秦楚之合晉伯之所以衰晉伯之盛衰周室之安危係焉不可以弗志也胡𫝊固非而張氏洽亦苐謂楚宜制服之而已不當遽夷人宗社以是為楚罪猶屬管窺之見夫春秋豈沾沾焉責楚之滅庸而已哉春秋時楚始終以蔡為門户論楚在春秋北向以爭中夏首滅吕滅申滅息其未滅而服屬於楚者曰蔡蔡為今汝寧府上蔡縣汝寧諸小國盡屬于楚獨蔡存故蔡自中葉以後於楚無役不從如虎之有倀而中國欲攘楚必先有事於蔡僖四年齊桓為召陵之師經云齊侯以諸侯之師侵蔡蔡潰遂伐楚蓋齊不伐蔡則不能長驅而至于陘也定四年吳闔閭之入郢也經云蔡侯以吳子及楚人戰于柏舉楚師敗績庚辰吳入郢蓋吳不得蔡為嚮導則不能深入要害因以直造郢都也蓋蔡居淮汝之間在楚之北為楚屏蔽熟知楚里道其俗自古稱強悍故春秋時服楚最早從楚最堅受楚之禍最深而其為楚之禍亦最烈始以楚為可恃故甘心服從逮不堪命而反噬則楚亦幾亡故讀春秋者必熟曉地理而後可知春秋之兵法而後可知聖人之書法乃後儒之以一字為褒貶者則曰侵蔡為蔡姬故書曰遂是聖人貶之也蔡用吳破楚能報數世之怨書曰以是聖人褒之也皆不考實事懸空臆斷殊不知齊桓以天下之故而伐楚積謀二十餘年豈為一姬其曰蔡姬者或反借此為兵端若不討蔡之從楚使楚不忌而預為之備因得輕行掩襲疾驅至陘而吳自舍舟淮汭今夀州過蔡境蔡來㑹之道吳自江南夀州陸行經義陽三關之險至湖廣漢川縣小别山深入敵地一千一百里此非唐侯所能與故雖與唐偕而獨書蔡侯此皆當日之實事聖人豈有褒貶于其間哉夫春秋之作因魯史魯史之書因赴告故熟玩經文而列國之地形與當日之兵勢瞭然可見矣自哀三年吳遷蔡于州來汝寧之地全為楚有中國始無事于蔡而蔡亦旋為楚滅自定公以上蔡為中國與楚之利害豈不歷歷可驗也哉晉悼公論悼公乘再伯之餘再合諸侯天下翕然宗晉論者謂較文公之創始稍易然文公一戰而伯而晉悼蕭魚服鄭則八年九合而後定之何遲速之相懸若此曰此其故未可以一概論也當文公之時天下之勢已盡屬楚曹衛魯宋延及北方之諸侯此如陰之進而至于剝剝極當復故文公一出而如日再中是循環之理則然至悼公時所未服者鄭耳鄭舊屬楚其勢未可以旦夕服而當日楚之執政如子囊者又堅忍持重非如得臣之輕脫以僨事故其勢常迭進而迭退非要之以持久而老之以不戰則徒暴骨以逞而無當于服楚之大計故當日之謀臣知長慮却顧為國本計者無如魏絳制勝廟堂不戰而屈人之兵者無如知罃此兩人均非如狐偃先軫為推鋒出竒慓鋭果敢之計者魏絳之最得者在定和戎之策以専事中夏建息民之謀使國力不竭則既得於國本矣然後知罃復用孟獻子之言城虎牢以扼地勢却荀偃速戰之策三分四軍以道敝楚人而其要尤莫如戍虎牢何則鄭為南北之中其距晉楚道里俱各半若徒道敝楚人恐楚敝而諸侯之力亦敝故留宿徑兵于虎牢則我為主而楚為客諸侯散則各歸其國聚則兵衆不勞而畢具反客為主靜以待動以逸制勞此固不待交鋒而楚已望風而却避矣或者謂遠人不服則修文德以來之未聞道敝諸侯以來之也曰戍虎牢者所以保鄭非以爭鄭也鄭未嘗不願服于晉特慮為楚所擾故欲兩事以茍免其心蓋不得已戍之則鄭在晉之宇下楚不敢北向以爭鄭以鄭屏楚而東諸侯始得晏然攘楚以安中夏其計無出于此吾怪夫世之好為議論者以服鄭為勞民而以范丐之棄陳為失策此皆一偏之見而不審時勢之論夫陳蔡與許服楚已久其國去楚又近必欲致三國之服從此如齊桓之伐楚合江黃而適以速楚之滅也當春秋襄昭之世中國至服鄭而止以鄭為南北之界使曹衛魯宋常服晉而陳蔡與許常服楚各共犧牲玉帛以事其大國豈至使晉楚之從交相見帥天下之諸侯僕僕哉愚嘗反覆究悼公之事善其君臣能識大勢持重以服鄭即趙充國屯田以制羌之計棄陳而不事即賈捐之棄珠崖之計蓋其集效視文公為遲而其規模較可經久使晉之君臣世世守之伯業常存可也春秋大事表卷二十八
