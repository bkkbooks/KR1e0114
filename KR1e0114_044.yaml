body:
  text: 春秋大事表卷四十四國子監司業顧棟髙撰齊紀鄭許宋曹吞滅表春秋時齊與宋鄭為大國而紀鄰於齊許鄰於鄭曹鄰於宋三國有狡焉啓疆之計則必首及焉顧曹許之滅俱在春秋之末季而紀之亡轉盻在十餘年之內其故何也曹許猶差逺於宋鄭而紀之與齊近在卧榻之側齊為今青州府臨淄縣紀為今青州府夀光縣齊不得紀則不能展舒一步故雖以桓莊竭力援之為之結昏於天王求介於莒鄭而僅勉強延旦夕之命也此則其勢為之也然曹許所以得延至二百年之久者蓋亦藉桓文之力焉自突出忽入而許叔始得入於許至厲公再得國而齊桓已霸諸侯束手聽命宋鄭曹許俱從容受職於壇坫之上雖有桀黠無所復施至桓之耄年宋襄與曹同受牡丘之盟而旋伐曹此時已有吞曹之志顧方以圗伯為事未敢遽肆兼併逮泓敗身傷而曹許俱折而入於楚矣晉文執曹伯畀宋人合諸侯以圍許宋鄭於此非無耽耽朵頤之意然迫於公義欲私攘尺寸之地而諸侯環視莫敢先動至成之三年晉景中衰鄭兩嵗三伐許且明言疆許田其意以為許余俘邑也公孫獲所處西偏之地是鄭當有成十五年遷於葉而許之全境盡屬鄭此亦足快其并兼之志矣乃許之四遷托楚求庇流離顛越靡有止所而鄭如鷹鸇之逐兔楚師一敗旋即俘其君以歸使楚有保小字弱之仁而鄭為封豕長蛇之暴豈不重可歎哉至曹之事大國尤恭謹尤非許之甘心從楚比也方齊桓之世存三亡國曹與宋比肩同事晉纍世執霸權興師徴召曹未嘗不在諸侯之列止以地近于宋而畏宋宋襄始伯而伐曹宋景再伯而旋滅之桓文以定人國為事而宋至殄文昭之裔斯又足悲也夫春秋之世滅國多矣而三國之亡尤為可憫聖人于此屢書不一書而於他國無之余為撮其始末可以識聖人微意之所在嗚呼曹許之亡當伯事之已息而紀之亡當伯事之未興天下之不可一日無伯此非其明效大驗也哉輯春秋齊紀鄭許宋曹吞滅表第四十四齊滅紀始末案自桓五年齊侯鄭伯如紀至莊四年紀侯大去其國凡十有七年鄭滅許始末案自𨼆十一年鄭入許至定六年滅許凡二百零八年宋滅曹始末案自僖十五年宋人伐曹至哀八年宋公入曹凡一百五十九年春秋大事表卷四十四
