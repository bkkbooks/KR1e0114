body:
  text: 春秋大事表卷三十國子監司業顧棟高撰齊晉爭盟表案昭十二年晉侯以齊侯晏投壺齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興是時景公窺晉之衰巳有互相爭長之志屬當平邱之㑹晉已不復能宗諸侯楚新斃于吳無復北方之志而吳亦未遽爭衡于中國齊得于此時收召列辟得鄭得衛得魯復得宋夫以齊之强承桓公之餘烈又當晉楚俱衰之後因利乘便使能正魯意如之罪反昭公而君之伸大義于天下此如順風而呼何遽不能代晉主盟哉乃鄟陵之盟信子猶之讒卒佚天討且于晉則助臣以叛君于衛則助子以拒父三綱既絶猶欲軋晉而求諸侯是却行而求前也卒之內不能正其家溺意嬖寵耽樂忘禍廢長立少輕棄國本權臣乘間得行篡弒數年之間遂移陳氏與晉爭彊卒與晉同斃嗚呼亦可悲矣孔子告景公曰君君臣臣父父子子所以起膏肓而拯廢痼者豈不深切著明也哉故自鄟陵之㑹訖于景公之殁爭伯凡二十八年撮略其𫝊著于篇輯春秋齊晉爭盟表第三十春秋大事表卷三十
  hash: sha256:9478af2ba463e8634c1d54f181a964f450dc41f63ed25b49501c674cf8ad1b26
