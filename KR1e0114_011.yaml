body:
  text: 春秋大事表卷十二上國子監司業顧棟髙撰卿大夫世系表三代之宗法原於封建蓋先王建樹屏藩其嫡長嗣世為君支庶則推恩列為大夫掌國事食采邑稱公子某公子之子稱公孫公孫之子以王父字為氏世世不絶若異姓積功勞用為卿世掌國政則各以其官或以邑為氏然此非先王令典也孟子曰立賢無方又曰士無世官故春秋譏世卿世卿之禍小者淫侈越法隕世喪宗或族大寵多權逼主上甚者厚施竊國陳氏篡齊三家分晉故世卿之禍幾與封建等然論者謂先王親親報功之典於是乎在儀禮喪服傳曰親親故尊祖尊祖故敬宗又曰大宗者收族者也不可以絶戴記謂别子為祖繼别為宗有自卑而别於尊者則國君之支庶别為大夫所謂大夫不得祖諸侯者是也有自尊而别於卑者則單寒之庶姓積功勞用為卿子孫世世宗之者是也嗚呼先王之立法豈能百世無弊哉在後之人因其勢而去其積甚者可矣由乎親親之義而言之則展親睦族為國毗輔所謂百足之蟲至死不僵者而不能無尾大不掉之弊由乎選賢之意而言之則唯賢是擇不拘世類所謂挹損強宗獨操主柄者而亦有枝葉衰落之患惟使恩有所止其疏者則齒於士族使各得以材能自進而其在位者則束之以禮法使有大故不得免於罪戾用此權衡輕重雖傳諸百世豈有弊哉以余觀春秋卿大夫其得失俱可概見晉懲驪姬之亂詛無畜羣公子故文公諸子皆出仕於外晉無公子秉政者而權卒移於趙魏魯之孟孫叔孫再世有大罪宜絶其屬籍而子孫仍列於貴位所以卒兆乾侯之禍出彼入此厥害惟均徵諸己事良用顯然惟楚之令尹俱以親公子為之一有罪則必誅不赦所以權不下替而國本盛強嗚呼鑒往可以知來斯言諒哉輯春秋卿大夫世系表第十二凡世系相承者俱直下兄弟平列有世次可稽而無祖父可承者上空幾格無系可考者另列於後視其本族有某公時人略以年代為次周周氏召氏厲王宣王時有召穆公虎僖二十四年傳召穆公思周德之不類故糾合宗族於成周而作詩是也祭氏穆王時有祭公謀父儋氏尹氏宣王時有尹吉甫郈氏東門氏叔氏傳稱子叔晉韓氏趙氏史記造父幸於周繆王賜以趙城由此為趙氏七世而生叔帶去周如晉事晉文侯又五世生趙夙魏氏春秋大事表卷十二上
