body:
  text: 春秋大事表卷一國子監司業顧棟髙撰時令表春秋開卷書春王正月議者紛然蔡氏尚書傳既主不改時改月之說而文定傳春秋又謂夫子虛加春字於月之上謂周本是冬十一月夫子特借以明行夏時之意是皆攷古未核惑於冬不可為春之疑遂至輾轉相誤也後漢書陳寵傳有曰天開於子天以為正周以為春地闢於丑地以為正殷以為春人生於寅人以為正夏以為春是子丑寅三陽之月皆可以言正皆可以為春明矣而謂周有天下更姓改物於履端初始稱冬十一月以號令天下一年之内首尾皆冬非所以一天下之視聴也周既不改時月矣而謂夫子為周之臣子改冬為春改十一月為正月戾王朝之正朔改本國之史書尤不可以訓也今試以經文最顯然者証之隠九年三月大雨震電若是夏正則震電不為災矣桓十四年春正月無氷若是夏正則無氷不足異矣葢自王朝之𤼵號施令列國之聘享㑹盟與史官之編年紀月較若畫一其餘田狩祭享猶用夏時如蒐苖獮狩禴祀烝嘗則以夏時起事而易其時與月之名若桓四年春公狩于郎桓八年春正月己夘烝是也此皆其歴歴可見者而𫝊文内間有一二從夏正者葢亦有故隠六年冬宋人取長葛而𫝊書秋劉氏敞謂丘明作書雜取當時諸侯史策有用夏正者有用周正者故致與經錯異可見當時諸侯亦不盡用周正孔氏穎達云王者存二王之後使統其正朔服其服色故杞宋各行其祖正朔先儒謂宋行商厯晉行顓厯顓厯即是建寅故𫝊書晉國之事多有從夏正者若卜偃與絳縣老人之言可証也要自其國通行已久習俗使然三代原所不禁而其告於王朝則一禀周之正朔左氏特採録列國之私史其史官之紀載未經改正故致偶見此一二耳無容以為不改時月之驗也其經文則與尚書符合斷然周正無疑善乎朱子之言曰夫子未筆削以前魯史原名春秋可見以春首時片言破的諸儒無所置喙矣輯春秋時令表第一經文左傳孟子案春秋周正夏正紛如聚訟宋儒既有冬不可為春之疑而主周正者又於經典一二偶不合之處必欲强以同之是自尋破綻是以後人益增惶惑靡所適從愚謂改正朔即是改時月周斷無稱冬十一月為歲首之理王者之𤼵號施令與史臣之編年紀事自宜畫一斷無不用周正而反從夏正之理惟民俗話言習于夏正已久偶有雜出者在三代原所不禁如毛詩用周正而春日遲遲與秋日凄凄冬日烈烈則不可以周正言以撫時道景于夏時為切也論語行夏之時明言周家改時而莫春曰春服既成孟子通篇用周正而公都子曰冬日則飲湯夏日則飲水俱不可以周正言以飲食日用于夏時為宜也惟不必一一强求其同而正無害其為同因得張翠屏先生定本附列于時令表之後其未備者增入之其强合者駁正之而後學者于諸經通達無礙無齟齬不合亦無勉强求合之病而春秋王正月之為周正益瞭然無疑矣其于經學未必無小補云時令表附録余纂春秋時令表集春秋經傳證明周家改時改月以駁文定夏時冠周月之誤已經七年乾隆辛酉於鄧悔廬年丈處得覩元儒史文璣先生管窺外篇其論周家正朔月數與愚見脗合不禁先得我心且其所引陳定宇張敷言二家之說詳明確當真足薈萃諸經疏通隔礙而史先生之折衷尤核讀此則凡尚書毛詩周易周禮禮記論語孟子所言時月參錯不齊悉與春秋相通不煩牽就扭合不似蔡氏解書主不改時月之說遂置春秋于不問也謹備録其說於左史氏伯璿曰月數之說朱子孟子註以為改蔡氏書傳以為不改然以詩七月篇攷之則凡七月九月之數是自寅月起數夏正也觀於流火授衣之言可見矣凡一之日二之日之類是自子月起數葢周之先公已用此以紀候故周有天下遂定為一代之正朔以觱𤼵栗烈之氣候驗之可見矣夏正周正同見一詩之中可見月數之未嘗不改則蔡氏恐不如朱子之的當近代惟陳定宇張敷言之論最為分曉陳定宇曰蔡氏主不改月之說遂謂併不改時殊不知月數于周而改春隨正而易證以春秋孟子左傳後漢書陳寵傳極為明著成公十年六月丙午晉侯使甸人獻麥六月乃夏四月也僖公五年十二月丙子朔晉侯滅虢先是卜偃言克虢之期其九月十月之交乎丙子朔必是時也偃以夏正言而春秋以周正書可見十二月丙子為夏十月也僖五年春王正月辛亥朔日南至王正月冬至豈非夏十一月乎經有只書時者僖公十年冬大雨雪葢以酉戌月為冬也使夏時之冬而大雨雪何足以為異而紀之襄公二十八年春無冰葢以子丑月為春也使夏時之春而無冰何足以為異而紀之惟夏時八九月而大雪不當嚴寒而嚴寒夏時十一月十二月而無冰當嚴寒而不嚴寒故異而書之耳桓公四年春正月公狩于郎杜氏註曰冬獵曰狩周之春夏之冬也魯猶按夏時之冬而于子月行冬田之狩夫子只書曰春狩于郎此所謂春非周之春而何哀公十四年春西狩獲麟亦然定公十三年夏大蒐于比蒲魯雖按夏時之春于夘辰之月行春田之蒐夫子只書曰夏蒐于比蒲此所謂夏非周之夏而何次年又書五月大蒐于比蒲亦然也陳寵傳說尤明白曰天以為正周以為春註云今十一月也地以為正殷以為春註云今十二月也人以為正夏以為春今正月也是三代之正子丑寅三陽月皆可以言春也胡氏春秋傳不敢謂王正月為非子月而于春王正月之春字謂以夏時冠周月皆攷之不審安得有隔兩月而以夏時冠周月之理但得四時之正適冬寒夏熱之宜則惟夏時為然夫子欲行夏時葢答顔淵使得為邦則宜如此耳豈可但知有夏時之春而不知有商正周正之春乎一陽二陽三陽之月皆可為春故三代迭用之以為歲首以一日論子時既可為次日子月豈不可為次年觀此則三代皆不改月數與冬不可為春之說陷于一偏明矣史氏伯璿曰陳氏此說援引的當已無可議但商書再言十有二月正蔡氏主意之張本陳氏既不於彼處辨之及至此處辨論又無一言及彼惟張敷言之說可以補陳說之缺今存於後張敷言曰或謂三代改正朔無異議月數之改諸儒議論不一學者病焉間者伏讀春秋至王正月而竊得其說夫正月固王之正月如後世史書書正月即時王之正月也何假稱王竊意必其别有所謂正月者故稱王以别之及讀僖公五年晉獻公伐虢以克敵之期問于卜偃答以九月十月之交考之童謠星象之驗皆是夏正十月而其傳乃書在十二月其改月明矣襄公三十年絳縣老人自實其年稱臣生之歲正月甲子朔于今四百四十五甲子矣其季三之一所稱正月亦是夏正寅月考之老人所歴七十三年二萬六千六百六十日當盡丑月癸未其傳乃書在二月其改月又明矣然卜偃老人俱是周人一則對君一則執事大夫其歲月又二事中之切用非若他事泛言日月何故舍時王之正月月數而言夏正哉聴之者何故都不致詰即知為寅月起數哉因是而知周之正朔月數皆必改其朝覲聘問頒朔授時凡筆之于史冊者即用時王月數其民俗之歲時相與之話言則皆以寅月起數如後世者自若也而春秋書王正月以别民俗為無疑周人之詩孟子之書亦各有所取也不然諸儒之論各執所見主改者遇不改之文則沒而不書主不改者遇改月之義則諱而不録終不能曉然相通以袪學者之惑曰周以子月為正為一月信矣以為春乎曰然寒暑反易可乎曰先王之制易姓受命必改正朔易服色新民之耳目以權一時之宜非謂冬必為春子之月便可祈穀上帝便可犧牲毋用牝也曰有未安乎曰固也不然夫子不曰行夏之時矣周公作禮正月之後不復曰正歲矣凌人正歲十有二月令斬冰最可考以寅月為正歲則子月為權宜得矣曰子謂必其筆之史冊者則用時王正月月數伊訓之元祀十有二月蔡氏以為殷正月者果何月乎曰建子月也殷正固在丑月然則嗣王祇見及太甲篇之嗣王奉歸不在正月乎曰後世嗣王服䘮攷之顧命固有常儀何待正月而放桐之事又人臣之大變周公之聖猶被流言阿衡之心為何如哉朝而自怨夕而復辟尤不須於正月也况正月但書十二月以虞書正月上日正月朔旦及秦漢而下例之殷不其獨無正乎曰秦以亥正猶稱十月不亦同乎曰秦正之謬何足取法葢秦以寅月書正歲首十月其制又異不若殷之全無正也曰或者謂晉用夏正故卜偃老人之言如此則又何說也曰是又不然老人之言在晉文伯後容或有之卜偃之言及獻公之世是時纂國日淺二軍始備晉文未興齊桓尚在雖嘗滅耿滅霍小小得志方朝周納貢之不暇亦何暇毁冠裂冕更姓易物而用夏正哉然則愚之所見為有據而春秋王正月之一詞今古諸儒不敢輕議者固著明矣史氏伯璿曰張氏之説與陳定宇之說互相𤼵明甚善至於商書再言十二月之辨尤可以補陳說之缺故備録之於此云或謂改正朔而不改月數夏商西周之時皆然故商以建丑之月為歲首而書言元祀十有二月乙丑又言惟十有二月朔是商雖以丑月為正而寅月起數未嘗改也以蔡𫝊推之固是如此然張敷言之說極有理所礙者即位之年不當稱元祀耳或正以此破張氏故及此蘇氏謂崩年改元亂世之事不宜在伊尹而有之此是據周禮以律商耳三代之禮至周大備踰年改元至周始定此制夏殷時未嘗有也二孔𫝊疏云殷家尚質踰月即改元以明世次周法始以踰年改元已于伊訓明言之蘇氏推周制律商亦猶顧命中推春秋之禮以議召公召公親與周公同僚為周公所敬信豈知禮反不及蘇氏邪是皆未得為至當蔡𫝊引秦正為不改月數之證張敷言已辨之或又謂因正朔之改而并改月數周東遷以後則然意者平王于遷洛稍欲示有所革以新天下耳目故因先王正朔之改而併改月數以合之愚竊以為蔡氏主不改月數之說而為春秋所礙故其援引皆不及春秋或為此說葢欲為蔡氏剔撥此礙㑹諸經而定為不刋之論但此事須得先秦古書為據方可取信來世今但以臆度傅㑹未得為定論也平王不能自振事事因循何以見其獨有意於此邪書伊訓惟元祀十有二月蔡氏傳云云秦建亥矣且秦史制書改年始朝賀皆以十月朔夫秦繼周者也若改月數則周之十月為建酉矣安在其為建亥乎此一叚係蔡氏之言史氏伯璿曰周亡於秦昭襄王五十一年乙巳秦改正朔於始皇二十六年庚辰當是時周亡已三十六年矣周在時禮樂已不自天子出號令已不行於天下民間私稱已皆是寅月起數者矣周既亡矣則建子之正已不得為時王之制天下又安有所謂周正者乎然則秦所謂冬十月者是因民間私稱夏正而書之無足疑者此於周改月數之說自不相礙不足以為據也書泰誓上惟十有三年春蔡氏傳云云又按漢孔氏以春為建子之月葢謂三代改正朔必改月數必以其正為四時之首序言一月戊午既以一月為建子之月而經又係之以春故遂以建子之月為春夫改正朔不改月數於太甲辨之詳矣而四時改易尤為無義冬不可以為春寒不可以為暖固不待辨而明矣或曰鄭氏箋詩維莫之春亦言周之季春於夏為孟春曰此漢儒承襲之誤耳且臣工詩言維莫之春亦又何求如何新畬於皇來麰將受厥明葢言莫春之時麰麥將熟可以受上帝之明賜夫麰麥將熟則是建辰之月夏正之莫春審矣鄭氏于詩且不得其意則其攷之固不審不然則商以季冬為春周以仲冬為春四時反逆皆不得其正豈三代奉天之政乎此一段俱蔡氏之言史氏伯璿曰四時改易冬不可為春之疑但以夫子行夏之時一言證之足矣既有所謂夏之時則必有所謂商之時周之時顔子問為邦夫子欲其行夏之時則是當時所行未是夏時也未是夏時非周之時而何夏之時以建寅之月為春則周之時必以建子之月為春矣若周之時春亦建寅無以異於夏時之春則夫子何必曰行夏之時哉至於鄭氏箋詩葢亦不知民間私稱只是夏時而例以時王之制律之故致此誤耳蔡氏非之誠是也若以張敷言史冊所用民俗所言二說例之則不待多辨而自解析矣葢詩為歌詠之辭所言多是以寅月起數者不特臣工一篇為然正所謂民俗歲時相與話言者也鄭氏必欲抝以從子固誤蔡氏又欲援以為不改月數之證要亦知其一而不知其二也書武成篇惟一月壬辰蔡氏傳曰一月建寅之月不曰正而曰一者商建丑以十二月為正朔故曰一月也史氏伯璿曰二孔林氏皆以一月為子月蔡氏不從其說竊意一月便是子月無可疑者其所以不曰正而曰一者以時方舉事商命未改耳時王正月在周家雖因國俗紀候而未得定正月之名史官追書前事亦不容因後改前失傳信之意也與七月詩一之日者正同推彼可以明此矣又按夏書明有三正之文而天正地正人正之名見者亦非一處若皆以寅月起數與商正建丑以十二月為正朔故建寅之月不曰正而曰一之言則是惟夏為有正殷周雖改正朔而皆無正月之名烏在其為天正地正建子為正建丑為正也陳定宇又曰愚按蔡氏於泰誓上及武成皆以孟春一月為建寅之月與二孔之說不合必證以前漢律厯志始尤明白志曰周師初𤼵以殷十一月亥月戊子後三日得周正辛夘朔子月明日壬辰至戊午渡孟津明日己未冬至正月二十九日二月朔四日癸亥至牧野閏二月庚寅朔三月二日庚申驚蟄古以驚蟄為寅月中氣今云雨水四月己丑朔死霸死霸朔也生霸望也是月甲辰望乙巳旁之故武成曰惟四月旁生霸越六日庚戌武王燎於周廟以節氣證之則武成以周正紀月數而非夏正不辨而明矣史氏伯璿曰漢志雖非先秦古書然終是近古可信較之陳寵傳則此尤為近古皆非唐宋以來諸儒臆度附㑹無所證據之比讀者宜有取焉竊嘗又按易臨卦彖辭有曰至于八月有凶此八月程朱二夫子皆以為自子月數起當是六月遯卦雖本義兼存或說是今八月觀卦之言於後終不如主前說之力况前說勝後說又朱子平日解經之通例乎兼語録答學者之問又只主周正可見愚竊以為臨彖元亨利貞與有㓙皆主陽言以二陽上進陵逼四隂故其亨在陽將來諸爻盡則變則二隂長而漸盛故其凶在陽况臨觀與遯三卦皆就陽爻取義名卦陽浸長則為臨陽避退則為遯陽在上示下則為觀然則避退可以言有凶在上示下不可以有凶言明矣觀雖亦是隂長陽消之卦然聖人扶陽抑隂固已别取義明卦矣不應於此又指為凶也然則八月指遯而觀無凶明甚卦辭又文王所繫文王在商而自子月起數者亦猶周公一之日二之日紀數也右正朔月數改與不改之說自孟子以來千五六百年諸儒無有定論近代陳定宇張敷言之說議論援據似覺平正確實愚深信之而同志辨詰紛然暇日裒集諸說一處仍疏已見於後以俟有道而就正焉已上俱節録管窺外篇愚按史先生及張陳二家之說可謂精心考究然尚有一二未盡者愚請得而折衷之張謂晉獻公時未敢遽用夏正卜偃對君只沿民俗之通稱此猶是以常見拘泥晉實是行夏正看僖十五年韓之戰及昭三十二年城成周與經所書先後俱差兩月經用周正傳因晉俗而用夏正此便瞭然杜預載汲冢書記曲沃莊伯之十一年十一月為魯隠之元年正月其紀年篇皆用夏正先儒謂晉封太原沿唐堯之故俗理或有之然看來成周盛時原所不禁不特周也亦通三代之所不禁看豳風稱一之日二之日公劉當夏之時便已自以子月起數周有天下遂定為正朔但不曰正而曰一以避時王之尊號至武王伐商之年商命未改猶曰惟一月壬辰不敢遽用正字詩書所稱同一揆也文王於殷時彖易於臨卦曰至于八月有凶亦用子月起數八月為夏之六月夏殷時不禁豳周之用子正周時獨禁晉之用寅正乎若三代果有此禁則啓之罪狀有扈氏只當云怠棄夏正不當云怠棄三正矣孔子大聖人為周之臣子不當教顔淵以行夏之時矣當日答顔淵只是現在侯國有用顔子為政者便當行此數事非必謂代周而有天下更姓改物然後行夏之時也孔子時不比孟子時以扶起衰周為念若謂百年之後代周而王者當如此則孔子教顔淵乃是懸空說話不是現在可行之事豈聖賢商略治道之旨乎可見當時原是通用在聖人亦看得平常又何疑于晉之用夏正也呂氏大圭以為孔子答顔淵行夏之時謂顔子得志行道改革天命當如是爾如使顔子未能改革天命則亦將從時王之制不得擅用夏時其說太荒唐顔子當日是布衣豈有改革天命之理彼葢未知夏殷周三正原通行故耳其謂秦以寅月書正第以十月為歲首亦未然彼第見吕不韋作月令用夏正故云然不知秦亦改時改月亥月竟稱春正月至寅月已稱夏四月矣沿至漢髙恵文景之世猶然至武帝太初定厯改用夏正史官因追改前年月獨漢元年冬十月失於追改猶仍秦舊故有五星聚東井致髙允之疑其實秦之冬十月乃夏正之七月七月初未交中氣猶未離六月躔度日在鶉火與東井秦分鶉首猶是隔宫相望金水二星附日而行故俱得㑹於此漢初司星者原不錯因後來史官失於追改後人疑為夏正之十月則日躔析木之次與鶉首秦分隔離七宫金水無㑹聚之理秦之改時改月無所見此一條其大彰明較著者也詳見唐顔師古漢書髙帝紀注及宋劉攽貢父說中顔劉俱在史前而史援引張說未及辨正可見考核精細之難也又案秦時置閏俱稱後九月葢是時厯法不講不知隨時置閏之法都堆積在歲終春秋末年已有此病此亦秦改時改月之一證也秦史只稱為閏十二月漢太初以後追改為後九月耳春秋大事表卷一
