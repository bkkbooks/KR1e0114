body:
  text: 春秋大事表卷四十六國子監司業顧棟髙撰左傳兵謀表史稱關忠義好左氏諷誦略皆上口而岳忠武尤好左氏春秋嘗曰用兵在先定謀欒枝曳柴以敗荆莫敖採樵以致絞皆謀定也二公佐漢宋中興而生平經略靡不由於左𫝊甚哉經術之足以戡亂也余觀春秋二百四十二年列國交兵其行軍用師屢矣春秋以前為湯武之仁義春秋中葉為桓文之節制逮其季年吳越用兵則以蠻夷輕生狎死之習運後世出竒無方之智而鄭宋交取師為戰國長平之坑所自始世運遷流豈一朝一夕之故哉𫝊文所載初年仍古法用車最後毁車崇卒吳楚越則用舟師其用兵之制曰偏兩曰卒伍曰乗廣曰㳺闕其陳法則為鸛爲鵝為魚麗之陳為支離之卒其兩軍交鋒則曰挑戰曰致師曰夾攻曰横擊曰衷曰萃曰覆曰要其假物立威曰蒙虎曰燧象大扺世愈降則戰愈力而謀亦益竒綜其大要為類十有二臚而列之俾知儒者胸中當具有武事匪徒侈文雅章句之業而已輯春秋左𫝊兵謀表卷第四十六春秋大事表卷四十六
