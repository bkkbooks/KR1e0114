body:
  text: 春秋大事表卷十八國子監司業顧棟髙撰軍禮表晉書禮志曰五禮之别其四曰軍所以和外寧內保大定功者也但兵者凶事故因搜狩而習之傳曰春搜夏苗秋獮冬狩皆於農隙以講事所以明貴賤辨等列順少長習威儀晉文大搜以示之禮登有莘之墟以觀師曰少長有禮其可用也則搜狩之於禮大矣哉周衰禮制廢壞軍禮尤甚以魯一國言之其始也縱弛忘備強鄰交侵臨時講武淹留異地其繼也權臣僭竊國柄倒持黷武興師征役不息夫子於此蓋不勝世變之感焉故搜狩之合禮者皆不書於桓莊之狩必書公志非時與非地也則其平日之忘備而國威之不振可知矣昭定之搜不言公則軍非其軍國非其國君若贅旒然其得失無與於公也而魯事益不可為矣爰綜搜狩之見於經者并大閲治兵與夫乞師獻捷歸俘都為一編以志魯之遞衰非一日之故云輯春秋軍禮表第十八搜狩卓氏爾康曰四時之田止書搜狩搜狩合禮不書其書者必有故也僖文而後厯五公搜狩皆不書大夫専國公不復知軍政時田得失無足議故雖違禮亦不書也昭公八年以後又復頻書是時三家分魯假春搜之禮以耀武示強又與非時非地之搜不同故頻書以示變耳李氏亷曰經書狩三于郎以逺書于禚以親仇書西狩本常事以志非常之瑞書書搜五四書大搜用天子大搜之禮也書焚一焚咸丘志淫獵也軍旅汪氏克寬曰大閲治兵皆一經之特筆桓公有所畏而大閲非其時莊公有所俟而治兵非其地故皆特書以示貶不然常事不書霞峰華氏曰周禮仲冬教大閲遂以狩仲秋教治兵遂以獮皆於農隙以講事則大閲治兵有其時有其地矣桓公懼鄭忽畏齊人而大閲於八月莊公無故興師久次於外而治兵于郎非其時非其地而平時之忘備可知矣陳氏傅良曰內乞師不書乞諸外裔然後書故成二年臧宣叔如晉乞師不書外乞師不書必盟主而後書故隱四年宋公使來乞師不書獻捷汪氏克寬曰春秋書獻捷者二獻者下奉上之辭齊桓獻捷書齊侯所以著其誇服戎之功而譏之也楚成獻捷而書楚人所以微其挾滑夏之威而抑之也然於齊書戎捷而於楚不書宋捷則所以尊中國而賤外夷也昭昭矣莊三十一年僖二十一年歸俘髙氏閌曰歸俘終春秋一書而已凡此皆聖人之特春秋大事表卷十八
