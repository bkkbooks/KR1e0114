body:
  text: 春秋大事表卷七之一國子監司業顧棟髙撰列國都邑表世嘗謂三代行封建至秦漢乃為郡縣而宋儒䆿語更謂後世不復封建井田肉刑三者而言治皆茍道嗚呼此皆讀書泥古未嘗深觀其故而明其所以然也夫三代之都邑即後世郡縣之制而三代之封建其國之大者僅劣如今之縣而春秋之中葉強兼弱削列國已半為郡縣初不始于秦也何則三代之世九夫為井四井為邑四邑為都故孔子言邑自十室以至千室其大小可知而齊晉之初封不過百里今之下州小縣尚可當古之大國蓋古之疆域不及今五分之一而執玉帛者有萬非儉于制其勢不得不爾也故其勢亦弱其力亦分無能抗衡為患方伯連帥得以臂指相使又其時風俗淳古無有兼併之志吞噬之患故夏商之世有王者無羣雄三代之諸侯皆以次相授其更姓改物另為建置者不過百餘國耳杞鄫薛越傳國幾及二千年其故可知也嗚呼封建之不可論者謂有國之子孫不能皆賢余謂不待其子孫也即其祖宗已斷斷不可何則三代之取天下也以德湯曰聿求元聖武曰既得仁人其時伊萊周召皆有聖人之德輔佐天子治定功成剖符析土創法垂制踰數百年至戰國之世而有七雄矣世益降則羣雄割據益橫非得翦信韓彭凶虓暴桀之徒則不得芟除羣醜削平叛亂其人皆出于賣漿屠狗庸奴氓𨽻間有如斛律金王君廓之流不識一字者即使之為郡縣長無異豺狼之牧斯人何况世有爵土與國長久哉此亦世變為之也故漢之七國晉之八王皆自其及身蒙禍論者又謂此非封建之害患不行教學齒胄之制耳嗚呼此又迂也即今之郡縣而設立師儒教授之官尚不能施行教化漸于禮義而謂行封建之後能馴習膏梁紈褲之徒使明于君國子民之道此又如寸莛之撞巨鐘龍肉欲以療饑耳余觀春秋中葉如楚之申息晉之荀賈秦之少梁吳之州來其初皆小國諸侯而夷為都邑嗚呼得其道則為湯之兼弱攻昧文王之伐密伐崇失其道則為秦晉吳楚之攘竊并吞貪婪薦食無他仁與不仁而已矣後之有天下者精擇守令用久任超遷之制則能熟知其民之利病而施教化慎簡督撫授以専制一方之柄則能習知其吏之賢否而加黜陟用後世郡縣之制而兼有三代封建之利而去其害雖使聖人復生計無易于此必謂郡縣出于李斯之議不如湯武之封建此儒者之迂論也輯春秋列國都邑表第七魯春秋大事表卷七之一欽定四庫全書春秋大事表卷七之三國子監司業顧棟髙撰晉春秋大事表卷七之三欽定四庫全書春秋大事表卷七之四國子監司業顧棟髙撰楚髙江村駁正地理處多體㑹傳文而知其道里之逺近說多當理獨于僖二十年鄭人入滑謂非緱氏之滑而反有取于熊過之說以為大名之滑縣此大謬所謂過求而失之也滑縣在春秋時止稱漕邑無滑之名漢魏為白馬縣至隋開皇十六年始改曰滑州聞有前代之地名而後世因之者矣未聞有後世之改革而前代可假用之者也此其不可者一也漕本為衛下邑所謂白馬與北岸黎陽止隔一河衛舊都在黎陽之廢衛縣為狄人所逐渡河野處去其國都不逺若先有滑國在焉戴公安得廬之而齊桓又安得驅滑之衆庶而更以封衛乎若謂既為滑又以封衛則衛為鵲巢鳩居而滑為鳥鼠同穴必無之事也又江村云戴公野處漕邑與齊桓城楚丘封衛皆在滑境滑蓋衛都邑所在故鄭人極力爭之而終不得自古無與人爭國都之理以戰國秦之强圍趙邯鄲已為異事在春秋時尚無此等且使滑為衛都邑則滑巳滅于衛矣安得更謂之滑屬于列國而上煩周天子之命乎原江村所以疑滑非緱氏之滑者以傳云滑人聽命師還又即衛謂滑必鄭衛交境之地而緱氏逺在河南非衛所及似又不必如此拘泥齊晉與國幾半天下即如魯之邾莒亦不必十分逼近考秦人滅滑傳秦師過周北門次及滑鄭商人弦髙遇之滑與鄭鄰近自不必言而衛之儀封亦在河南與滑非絶逺不必以此為疑也又按莊三年公次于滑杜注鄭地在陳留襄邑縣西北此本後漢志之說今睢州西北之滑亭是也與緱氏之滑自别蓋彼是滑國此是滑地謂滑有二則可髙江村謂滑有三而以滑縣之滑當其一則非也春秋兩楚丘辨春秋時有兩楚丘隱七年戎伐凡伯于楚丘在山東曹縣東南四十里本戎州己氏之邑凡伯過其地因劫略之杜注所謂濟陰成武縣西南者是也地界曹宋間襄十年宋享晉侯于楚丘即此其一為僖四年衛遷于楚丘在滑縣東六十里于漢為白馬縣杜注春秋無明文而毛詩傳鄭箋孔疏及水經注言之甚晰毛定之方中傳云虛漕虛也楚丘有堂邑鄭箋云自河以東夾于濟水文公登漕之虛以望楚丘孔疏則云楚丘西有河東有濟故曰夾于濟水水經注曰白馬濟有白馬城衛文公東徙渡河都之其不得混于成武彰彰明矣又隋開皇十六年同時置兩楚丘縣一在漢巳氏縣以戎伐凡伯之楚丘為名為南楚丘一在漢白馬縣即桓公封衛者為北楚丘後以曹縣有楚丘因改名衛南縣杜佑通典白馬春秋衛國漕邑衛南衛國楚丘也元和郡縣志及舊唐書所載並同而朱子詩集注亦云漕楚丘皆在滑州尤顯然較著乃班固地理志于成武下則云齊桓公所城遷衛文公于此既混滑縣之楚丘于成武而文定說春秋于凡伯傳又云罪衛不救王臣之難又混成武之楚丘于滑縣蓋兩失之至熊過謂楚丘為魯地言城楚丘猶夫城向城郎耳因力辨桓公無封衛之事引僞子貢詩傳謂楚丘為魯風不惟與公羊之本文相悖并舉詩所稱楚宫楚室而一概抹殺之豈非尤荒經蔑古之甚乎髙江村辨楚丘甚明晰獨以宋享晉侯于楚丘謂即衛地此又不然宋都在歸德府睢州與滑縣之楚丘中間尚隔一開封府相去五六百里雖宋之邊不宜至是且宋享晉侯亦無于衛國都之理又臆度之云衛北遷帝丘隔逺南鄙由是地緼于宋亦無明文不可强為之說不如景范所說戎州巳氏地界曹宋間宋之楚丘與戎伐凡伯之楚丘為一差為近是也春秋時衛莘地為今東昌府莘縣論宣十六年傳衛宣公使公子伋如齊使盜待諸莘杜注衛地陽平縣西北有莘亭水經注京相璠曰莘為自衛適齊之道縣東有二子廟猶謂之孝祠今山東東昌府莘縣北莘亭故城是也成二年戰于鞍傳師從齊師于莘杜又注云莘齊地髙江村曰莘原跨兩境齊衛皆有之蓋晉師自衛來至齊疆故也但莘去鞍四百餘里齊侯既親遇晉師境上即當遏勿使進何為不戰引退縱敵入境四百里而後戰乎由是推之莘亦當為近鞍之地蓋調停兩屬之說而又疑莘縣為未必然然愚嘗詢諸東昌士大夫習往來于是者云莘縣在東昌府治西南七十里從府治聊城縣東歷茌平長清齊河三縣而後至濟南府治歷城共二百四十里華不注山在城北則從莘至鞍約計三百一十里亦無四百餘里之逺而細考傳文莘與鞍原屬兩日事髙氏之疑非也杜兩注齊衛亦屬騎牆之見左傳明言莘是衛地特人習讀之而不察耳傳云晉師救魯衛季文子帥師㑹之及衛地韓獻子將斬人郤獻子馳將救之云云下遂云師從齊師于莘六月壬申師至于靡笄之下觀其特志月日則知從于莘自是前月事尚在衛地至六月壬申歷東昌至濟南深入齊境三百餘里齊侯始親自迎敵道里與時日一絲不爽蓋自四月丙戌孫良夫敗于新築不入遂如晉乞師而晉師旋以五月至是時莘地必有齊之偏師侵略衛疆而未返者晉師適遇遂與交戰緣是偏師零騎望風披靡故不言勝負直至六月壬申長驅至靡笄之下齊侯始請戰期其前言齊師後言齊侯歷歷分明可證若如髙氏之疑豈有國君巡徼境上躬自迎敵之理乎蓋髙氏所以疑者緣左傳插入韓獻子將斬人一段隔斷上下文而又忽看過六月壬申四字疑莘與靡笄之下為同日至故有莘當為近鞍之疑是齊地而非衛地之說是泥于杜注而不細察傳文之故也今以及衛地與下文師從齊師于莘一連看六月壬申略一停頓則莘止是衛地為今東昌府莘縣兩傳地理俱瞭然矣秦自穆公始東境至河宜從史記不宜從鄭詩譜論鄭康成詩譜秦襄公當平王初興兵討西戎救周平王東遷以岐豐之地賜之遂橫有周西都畿內八百里之地史記秦本紀云平王封襄公為諸侯賜之岐以西之地與誓曰戎侵奪我岐豐秦能攻逐戎即有其地襄公十二年伐戎至岐卒至襄公之子文公以兵伐戎戎敗走遂收周餘民有之地至岐岐以東獻之周岐為今陜西鳯翔府岐山縣是秦至文公未嘗越岐以西一步豐鎬故物依然尚在也是時周之號令猶行西土虢鄭懿親雖從王東遷而其故封無恙呼吸可通魯莊之二十一年惠王與虢酒泉酒泉在今同州府澄城縣計東遷至此巳歷平桓莊僖四世九十四年矣而金甌尚無缺也直至魯僖之二年而秦穆公滅芮即其地築王城以臨晉濱河而守晉亦于僖五年滅虢守桃林之塞秦晉遂以河為界豐鎬故都淪入于秦而不可反矣計至此距初遷已及百有二十年此豈一朝一夕之故哉藉令如鄭氏之說則西都久已在秦封內天朝宫殿當已修葺王使至秦當有設館迎侯之禮何至有黍離之痛滿目悲涼破瓦頺垣依然故物哉孔氏穎達曲護鄭說引終南之詩為證謂襄公時已得岐東非唯自岐以西案終南山凡八百里亘鳯翔岐山郿三縣及西安一府之境是岐西亦有終南不得援以為據况此詩原係興體言山之髙大必有美材以稱其穹窿人君尊崇必有令德以稱其顯服未嘗指終南為當日之實境也惟朱傳謂至止為至終南之下似指為本國之境而鄭箋則謂受命服于天子而來為下句作起耳于當日之封域無與也孔氏又謂如本紀說文公獻岐東于周而春秋時秦境東至河計襄公以後更有何功德之君得之噫此又不思之甚也据史記秦武公十年伐邽冀戎初縣之十一年初縣杜鄭滅小虢而汲冡周書穆公二年滅芮春秋傳所載僖十九年秦取新里遂滅梁是其纍世蠶食非一日之故而謂東遷之初一舉手而橫有西都八百里之地此理勢所必無者余反覆左傳史記及詩秦風而斷謂詩譜之不足信如此後之尚論者尚其有取于余言乾隆十年七月中浣九日復初氏識春秋大事表卷七之四
