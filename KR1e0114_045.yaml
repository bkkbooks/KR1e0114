body:
  text: 春秋大事表卷四十五國子監司業顧棟髙撰亂賊表春秋弒君二十有五稱人者三稱國者四三家雜然發𫝊左曰君無道也文十六年公羊曰稱國以弒者衆弒君之辭文十八年穀梁曰君惡甚矣成十八年其大㫖略同啖氏于莒弒其君庶其𫝊辨之曰春秋弒君例惡甚者不書賊臣之名懲暴君也可施乎君臣猶恐害教傷化但恐暴君無所忌憚不得已而立此義豈有父為不道子可致逆嗚呼三𫝊謬矣啖亦未為得也夫君父一而已矣聞有弒君之賊人人得而誅之豈有暴虐之君夫人得而弒之者乎使欲懲暴君而先寬弒逆之罪使忍為大惡者俱得有所緣以藉口是春秋教人為篡弒也烏覩所謂春秋成而亂臣賊子懼乎然則其義云何彚纂之言曰春秋因魯史魯史之文因赴告有可損而不能益也夫弒君之賊大抵當國者居多其情必不肯以實赴今使後世有殺人者不得其姓名則有當日之勘驗有司之鞠審大吏之駁詰而後真犯始出春秋無是也天王不問列國不問苟本國之臣子與為比黨而以委罪于微者赴如羽父弒隱公而討寪氏之類則魯史無從而得其是非之實只得從其赴而書之孔子生百年後而欲遍考七十二國之所聞以定其真則顯與國史異而又恐所聞者之未必果實此疑獄也故削其所諉之人而懸其獄以俟後日之自定此聖人闕疑之學也然則弒君而書其名氏者其人果皆以弒逆自居乎曰是各有故焉弒君而其賊見討者則書名氏如衛州吁齊無知宋萬陳夏徴舒鄭公子歸生蔡世子般是也有弒君而其人當國亦得書名氏者其國之史臣出死力以爭之晉董狐書趙盾齊太史書崔杼是也有弒君而代為君且又當國其名氏亦可得而指者楚商臣弒其君頵齊商人弒其君舍陳乞弒其君荼商臣蠻夷之習若禽獸然不知弒父之為罪商人蔑視舍無威不以為君而陳氏方僴然欲代有齊國無所顧忌已不知諱舉國無代為之諱其事昭彰耳目齊魯又近魯現使單伯請叔姬而見執雖不赴而魯史得據實事書也又如里克弒奚齊斯時里克當國及弒卓子而惠公殺里克故後以殺赴而前以殺其君之子赴也棄疾假手于比而已即殺之故比以弒其君䖍赴而已以討賊赴也宋華督衛寧喜雖亦當國有權而督方以立馮為已功賂四國以求立華氏既行賂則不以弒赴而可知其為弒喜以弒剽復衎為復正彼以復正赴而列國可知其為弒也許世子止為法受惡故亦不諱其姓氏之可指者俱各有的然所以然之故聖人亦從而書之其不以實赴者聖人苐削其歸獄之人如寪氏及圉人犖卜齮之類以俟後人徐求元惡大憝之所在此萬世之權衡也若必欲得其人則孔子不當天子方伯之任不能命司冦以鞠定其獄而苐就所𫝊聞以訂國史之誤安知所聞之果實乎左氏載齊懿公之弒也由邴歜閻職又安知非公子元使此二人賊殺之而特歸獄此二人乎則其赴于魯而魯史書之者必在二人矣而聖人不與也其不與者何也聖人之嚴也鄭髠頑楚麇齊陽生實弒而以卒赴聖人亦卒之卒之何也事介隱微無從昭晰聖人亦無如何也若謂聖人明知亂賊之人而特末減之以著暴君之罪又謂楚圍方大合諸侯于申聖人憫中國之不能討而先略圍之篡弒以扶中國是謂掩耳盜鈴求之愈深曲而于聖人之意愈背馳是諸儒之過也輯春秋亂賊表第四十五弒君汪氏克寬曰通一經弒君二十有五稱世子弒者三楚商臣蔡般許止公族而削其屬與氏者四衛州吁齊無知宋督宋萬稱公子者三齊商人鄭歸生楚比大夫而稱氏稱名者六晉里克趙盾陳夏徴舒齊崔杼陳乞衛寧喜稱人者三稱國者四稱閽稱盜者各一夫世之有父之親有君之尊位其所固有國其所宜君而至推刃于君父窮凶極惡不待貶絶而自見然考其所由致之故為之君父者必失其道以及于此則首惡之名寧不為天下萬世之大戒乎公族而不書其屬與氏兩致其貶程子謂身為大惡自絶于先君故不得為先君子孫文定謂不待以公子之道使致大惡故以國氏二義蓋互相發或有以公子書者程子謂又見其以天屬之親而反為寇仇而其君寵之太過任之太重以至于亂其罪亦不可掩矣其稱人以弒者謂多行無道肆于民上為國人之所欲弒蔽賊于國人則操刀為大惡者可末減爾稱國以弒不書其人則著當國執政大臣之罪稱閽以弒而不稱君則見閽寺之賊不得君其君而狎近刑人至于不克保身者君之過也稱盜則匹夫之微視如路人又非閽人之比故并不書弒案汪氏義例多未安詳各條下此公族而削其屬與氏者也孔氏穎逹曰自莊公以上弒君者皆不書氏閔公以下皆書氏劉氏敞曰凡弒君而稱公子公子而命為大夫者也未命為大夫則不稱公子案此四條不稱公子程子謂聖人削之也蓋以其身為大惡自絶于先君故削之大義既明于初其後弒立者則皆以屬稱或見其寵任之太過以致亂或見其以天屬而反為寇仇立義各不同愚謂同一弒君前後何忽異例又何為至閔公以下而忽異蓋程子不知未命不書族之義故云爾也春秋之初諸侯猶請命于天子不自命大夫故隱桓之世如無駭翬挾柔溺及鄭之語齊之年俱不稱公子初不以其弒君而削之也莊公以後諸侯之公子多自命為大夫故其弒君亦稱公子此乃時世之異非聖人有意嚴于前而寬于後也弒君初不因削公子而見其罪亦不以書公子而益甚其罪程子之說未免支離僖十年晉里宣二年秋九宣十年癸巳襄二十五年襄二十六年此大夫而書名書氏者也此稱公子者也此稱國以弒者也此稱人以弒者也彚纂曰通經稱人以弒者三稱國以弒者四胡𫝊多主君無道之說而杵臼商人則罪在一國之人州蒲則欒書有恕辭吳僚薛比則當國大臣之罪密州則止辨左氏之誤庶其則並不發𫝊然揆以全經如晉楚陳三靈皆為無道何以直書趙盾夏徵舒公子比弒君之名則其說未能盡合也然則經意安在邪曰春秋因魯史魯史從赴告有所損而不能益也臣弒其君子弒其父其以實赴者幾何其罪必有所諉大都微者當之也聖人參稽國史以及七十二邦之所聞欲正其所誅則赴告異辭欲從其所諉則真凶漏綱與其移辜以蔽獄不若懸案以徵凶故書曰某國弒其君某國人弒其君雖無所指名而亂臣賊子之罪亦有不得而逃者矣此世子而弒君者也襄二十九哀四年春王此弒稱閽稱盜者也內諱不書弒者五實弒而書卒者三襄七年鄭伯昭元年冬十哀十年三月不書弒而書殺者一僖九年冬晉出君汪氏克寬曰春秋書君出奔者十有二鄭突衛朔燕欵蔡朱莒庚輿邾益皆書名啖氏所謂君奔例書名言其失地非復諸侯也鄭忽曹羈莒展輿不稱爵忽羈未成君展輿雖踰年而以弒立不可稱爵也衛鄭不名則以叔武攝而位未絶也衛衎位已絶而不名者著衎之立以正非突朔之比而剽之篡實逆非如忽黔牟可以兩君言之也郕朱儒不名小國紀録簡略耳杜氏預曰諸侯奔亡皆迫逐而苟免非自出也經以自奔為文責其不能自固或曰臣出其君而其罪不彰無乃掩奸乎啖子曰出君之罪史氏知之春秋舉王綱正君則而治道興矣此出奔而不書爵者僖二十八年文十二年春襄十四年已此出奔書名者王氏樵曰案春秋䯓弒君書某弒其君至于君為其下所出止書出奔而已胡𫝊謂舊史書孫林父寧殖出其君而仲尼筆削稱衛侯出奔恐無此理出之為言不客而見逐之謂也臣子施于君父而史官直書于䇿則非辭也故但言出奔而已専以為歸罪其君者害教之言也天王出居三案襄王出居于鄭賊在子帶也王猛居于皇敬王居于狄泉賊在子朝也而經止以天王自出自居為文不著子帶子朝之名氏體自當如此若書王子帶出天王居于鄭王子朝出王猛居于皇便覺非體解此則知諸侯被逐以自奔為文之義矣又案趙東山謂天王蒙塵不書苟自取則書莊二十年子頽之亂惠王處于鄭定六年周儋翩率王子朝之徒因鄭人以作亂天王處于姑蕕經皆不書以惠王避子頽敬王避儋翩非王自取而襄王以狄伐鄭立狄女為后復王子帶以生亂其失位皆自取故書其出此論殊未然據左氏之言惠王亦未得為無過以敬王避儋翩為非自取而王猛之居皇敬王之居狄泉豈其自取乎禍由景王安可以其父而咎其子也至趙氏鵬飛曲護襄王謂叔帶為惠王陳媯之所愛故寧避之而出居于鄭以俟天下之勤王比之舜之于象此尤未是襄王之罪在召狄伐鄭立狄女為后又不謹于內延致奸淫生亂耳豈可以其不誅叔帶遂曲諒其心而逭其罪乎要之襄王自有罪苐不以獨書出而見其罪耳公孫一公居五公在三案昭公失國賊由季氏而經以自孫自居自在為文不斥季孫之名氏者非為季氏諱也臣子立文自應如此若書季孫意如出公居于鄆便不成體統聖人所不忍言春秋謹名分之書季孫之罪自于上下文見之爾此事聖人所親歷深惡痛恨嘗不惜大聲疾呼而其書法只自如此則凡列國君之見逐止書出奔以為専歸罪其君者豈識春秋之㫖哉叛六闕曰經書叛五叛人十二始襄公二十六年襄以前大夫猶未至叛也樂大心入蕭從叛人不言叛其叛可知書自陳自曹者胡𫝊曰結鄰人以入叛陳曹與有罪焉復入三胡氏寧曰孫林父宋辰趙鞅荀寅皆據外邑以自保故書叛魚石欒盈將以亂國故書復入蘇氏轍曰不言叛者將以亂國非直叛君而已故魚石欒盈之罪重于趙鞅宋辰也三叛人孔氏頴達曰諸侯之臣入其私邑而以之出奔者皆書為叛衛孫林父宋華亥宋公之弟辰趙鞅荀寅等皆書為叛叛者背其本國之大辭也邾庶其莒牟夷邾黑肱亦以邑叛本國但叛來歸魯書曰來奔內外之辭言俱是叛而辭異耳李氏廉曰春秋內大惡諱此直書不諱者蓋三叛之受皆公不在國而季孫受之也觀文十八年莒僕以寶玉來奔納諸宣公而春秋不書則知在君則諱在大夫則不諱孔子成春秋而亂臣賊子懼論或曰子謂春秋之文因魯史魯史之文因赴告如是則弒逆之事得以自為隱諱何以稱孔子成春秋而亂臣賊子懼乎余應之曰子謂亂臣賊子懼者苐書其弒逆之名于䇿而懼乎吾恐元凶劭及安慶緒史朝義之徒雖日揭其䇿以示于前而彼不知懼也且此亦夫人能書之何待聖人況人已成為篡弒而懼之亦復何益聖人之作春秋蓋有防微杜漸之道為為人君父者言之則書所云制治于未亂保邦于未危是也為為人臣子者言之則禮所云齒路馬有誅是也聖人嘗自發其作春秋之㫖于坤卦之文言曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也是故兵權不可竊翬帥師公子慶父帥師及鄭公子歸生帥師必書謹其漸也盟㑹不可専公子遂盟晉盟雒戎必書晉趙盾盟于衡雍楚公子圍㑹于虢必書亦謹其漸也人君知其漸而豫為之防則無太阿旁落之患臣子凛其漸而力為之避則無功髙震主之疑此則游夏不能贊一辭聖人獨斷之于心而書之于䇿以詔天下萬世者也且人而忍推刃于其君父是人而禽獸也禽獸焉知懼惟當夫威權已逼聲勢漸成覬覦初萌形迹未露是人禽之戒聖人燭其隱微而大書特書以惕之俾天下萬世之讀是編者人人恥為大惡而不敢一毫踰臣子之常分有以寢邪謀而戢異志此聖人之作春秋所謂撥亂世而反諸正也孟子謂孔子作春秋以存幾希之統直接堯舜湯文者端在于此若謂聖人苐從其實而書之且或未得其實而欲訪求𫝊聞而得之則聖人豈能從百年後竊司冦之大權而妄欲與魯史爭真僞哉春秋逐君以自奔為文論春秋亂賊最甚弒君其次逐君弒君或書國或書人或書名氏余既為論著之矣至出君則概以君自奔為文不書逐君者之名氏此蓋聖人之特筆不由赴告不因魯史欲以警惕震動乎人君使知謹其操柄而得制馭臣子之道也何以明之考襄二十年𫝊衛寧惠子疾召悼子曰吾得罪于君悔而無及也名藏在諸侯之䇿曰孫林父寧殖出其君此則當日赴告與列國史官書法之明證而經于十四年苐書衛衎出奔齊若為孫林父寧殖掩其惡何哉曰此聖人端本清原之義欲垂萬世鑒戒所謂游夏不能贊一辭者也夫君出令者也社稷于是乎凝承臣民于是乎統馭故君而見弒則討賊之義嚴諸臣子君身尚在則制馭之道責諸君身君而淫虐不道或闒冗萎薾則君不君而徒以一身寄諸巍巍之上如一葉之戰秋風幾何其不飄墮也哉曰出奔者言已不能居其位此太康之距于河五子之歌之所以痛恨厲王之流于彘板蕩詩人之所以告哀者也人君知鑒乎此而發憤自強如宣王之能中興則有方叔召虎為之臣如晉悼之能復伯則有荀罃魏絳為之佐功業爛然天祿永固何至竄亡相繼也哉許世子止弒其君論案三𫝊皆謂止非弒彚纂亦從之而斥歐陽子之說為非是愚案左氏之言與公榖别如左所云則許世子不得辭乎弒諸儒所稱不嘗藥與左氏之言絶逺若據之以為非弒是非特不信經文并錯看左𫝊矣夫所謂不嘗藥者庸醫不識病症妄投藥劑人子失于不知遂致大故若此後世多有謂之非弒可也而左𫝊則云許悼公瘧五月戊辰飲太子止之藥卒太子奔晉又云舍藥物可也杜注藥物有毒當由醫非凡人所知責止身為國嗣國非無醫而輕果進藥如此則無論誤與故皆不得辭乎弒夫醫不三世不服其藥君父有疾其慎重宜何如者以晉國之大猶求醫和醫緩于秦計止身為儲嗣年尚幼小國事所當與知非素習方書精通藥劑者而不延醫診視率意自為是以君父為嘗試也雖果嘗藥何益于事固有平人服之無恙而投劑失宜遂致立斃者亦不得以其嘗藥遂可求解于弒君之罪是則左氏所云已顯然為弒君立案而謂止非弒君其可乎彚纂又解之曰止之非弒有可屬辭比事而知之者楚商臣蔡般皆立乎其位而止則弗立乎其位左𫝊明言太子奔晉夫國人以弒赴于諸侯必其為國人不容而逃竄求免未幾病死不得以弗立乎其位而明其非弒也又謂許與陳蔡皆密邇于楚楚䖍能假討賊之名以滅陳蔡何獨釋許不問夫楚之滅陳蔡不過欲利其土地耳豈真為討賊哉而許素屬楚其地亦無足貪故遂置而不問不得以蠻夷之舉動定人之罪狀虛實至冬而葬止已出奔罪人已得國人以禮葬舊君魯遣使往㑹其弒逆之跡已昭然暴白于天下更不宜以書葬為赦止之罪歐陽子謂既以大逆加人又輒赦之則自侮其法而人不畏春秋之用法不若是也至榖梁之說尤為誣妄哭泣啜飦粥嗌不容粒未踰年而死則是止為孝子也在有司折獄固當矜疑而聖人作經遽加以大逆之罪與撡刃而殺其父者同科此殘刻之吏周興來俊臣之所不為而謂聖人為之乎若懼後世有假托者而借一止以立教則是聖人加誅于無罪之人也殺一不辜而得天下不為誅一無罪以垂教萬世聖人用心不如是之迂且曲也趙氏木訥謂歐陽子固嘗攻之吾願鳴鼓而先登然歐陽止謂宜信經棄𫝊愚謂即據左𫝊而其罪狀已顯然謹標出之以告後世之善讀左氏者乾隆十一年三月下浣一日復初氏識孔子請討陳恆論案左氏續經𫝊哀十四年齊陳恆弒其君壬于舒州孔子齊三日而請伐齊公曰魯為齊弱久矣子之伐之將若之何對曰陳恆弒其君民之不豫者半以魯之衆加齊之半可克也嗟乎此誠知己知彼乘機赴㑹足徵大聖人經濟不外尋常理勢之中而子程子顧絀之謂如是是以力不以義孔子之所以勝齊者特其餘事耳豈計魯人衆寡嗚呼先生此言殆失之矣夫興師討罪兵凶戰危必計出萬全而後可舉事若不計其力之不能則如王元謨之伐魏韓托胄之伐金何嘗不名正言順而卒喪師辱國蹙地千里若謂名其為賊無憂不服則如漢翟義之討莽唐徐敬業之討武氏海內翕然稱義舉終于家族誅夷身首異處又其甚者董承伏完之于曹氏毒流帝后漢祚旋移是皆無益于事而禍敗隨之是以君子必審計利害而不忍輕以民命為嘗試也且其言曰上告天子下告方伯此尤迂緩不識時務之論夫陳氏之愚其民久矣獨當驟弒簡公人心惶駭齊之義士尚有挾公憤而思食其肉者簡公之人尚有念故君而欲報其仇者故其道可急取不可緩圗宜獨斷不宜牽制必若告于天子方伯無論周天子守府而當日之方伯則晉也且聽命于韓趙魏與陳氏唇齒耳告之萬萬無益而周晉去魯俱二千餘里往返動羈時日徒令陳氏得以其間收合人心誅鋤異已雖復討之勢必不克且程子之謂告之者豈謂其真能命將興討罪之師乎抑明知其不可而姑告之以為名乎不知其不可是愚也明知其不可而姑告之是僞也曾謂大聖人而出此然則孔子之志宜奈何曰魯之兵權在三子而三子之兵權在家臣觀陽貨弗擾且能以其衆畔而冉求季路獨不可出其兵以仗義討賊乎孔子能使由求墮費墮郈而三子靡然聽從豈孔子當日奉魯君之命命家臣出其卒而三子敢或梗令乎誠得哀公一言聽許委夫子以兵權空魯國之甲使家臣將之此時子路雖仕衛而冉有自在也加以樊遲有若皆勇鋭之士移檄逺近聲罪致討吾知四鄰諸侯必有聞風響應而齊之甲士且倒戈來迎縱不能梟陳恆之首亦當誅當日之推刃于齊君者而更定齊嗣如此則國威可振周道可興夫豈空言而不可見諸實事者哉宋之儒者以力為諱而但執正誼不謀利之說謂事苐當揆于義不論其力之能不能如此則書所謂同力度德孔子好謀而成非矣孔明之成敗利鈍非所逆睹蓋謂其謀出萬全至事之萬有一失則聽之天耳夫豈僥幸以嘗試者哉余向惡夫世之詆訾宋儒者至先生此論心竊疑其有未然故備論之黃楚望氏曰陳恆之事魯若任孔子亦不得不用魯衆加齊半之說蓋聖人德義雖孚于人然亦須臨事而懼好謀而成豈得全然不論兵力故當斟酌事情與彊弱之勢以告君也附髙紫超先生公羊賊不討不書葬論公羊內賊不討不書葬外仇不復言葬義之精者也然考經所書則不書然經固有內賊未討而亦書葬者若蔡景許悼之書葬則于所謂內賊未討不書葬者其說未信矣然則或葬或不葬者謂何曰禮成而葬者書葬委尸而藁葬者不書葬蓋凡所謂葬者非徒掩之于土已也將必有子孫之踊從焉公卿之備位焉鄰國之賵奠焉凡賊既討者必重更棺斂告于鄰封成禮而葬蓋元凶既去而忠臣孝子得以自盡其心也如是而安得不書葬若賊未討者往往弒逆之賊猶擅國柄懟其君父藁葬路隅若欒書以車一乘葬厲公于東門之外鄰封不與知公卿不備位則是不成乎葬也如是而安得書葬更有逆子推刃其父欲自掩其弒逆之迹而反告于鄰封隆禮以葬四鄰諸侯亦皆遣使以供其事則是實行葬禮矣如是而又安得不書葬然則凡討賊者必成禮而葬則經亦書葬非以討賊之故而始書葬也凡賊未討者多委棺暴尸不成乎葬則經亦不書葬非以不討賊之故而不書葬也更有鬼蜮譸張假飾以葬則經亦書葬又不以不討賊之故而不書葬也是則或葬或不葬聖人一皆據實書之耳然而葬則書葬足以安既死之魄而慰枕戈待旦之心藁葬不書葬足以彰暴骸之慘而激同仇泣血之志僞為葬者亦書葬又以明其巧飾之惡而一時之㑹葬皆當擊其首而碎之也而聖人之立義固精矣春秋大事表卷四十五
