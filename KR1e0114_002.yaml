body:
  text: 春秋大事表卷二之一國子監司業顧棟髙撰朔閏表余讀春秋每苦日食置閏不得其解據先儒舊說春秋不應置閏而置閏者凡二見莊二十五年六月辛未朔日有食之及文元年閏三月應置閏而失不置者凡三見昭二十年二月己丑日南至襄二十七年冬十月乙亥朔日有食之哀十二年冬十二月螽至日食之乖繆尤多穀梁曰言日不言朔食晦日也言朔不言日食既朔也及襄二十一年九月十月頻食二十四年七月八月頻食諸儒皆以為日無頻食法日月無頻交之理不交無從有食歴千年罔有折衷又經傳中日月多有互異孔頴達曰凡異者多是傳實而經虛以余攷之亦有經不誤而傳誤者有經傳俱不誤而杜以駮正經傳反致誤者孔氏僅能𤼵明杜氏之義而無能救正杜氏之失至宋儒益務以義理為穿鑿不攷本末憑空臆斷至使千年經義沈霾晦蝕于附㑹之儒生鹵莽之老宿重可歎也歲癸亥華生綱從余逰年二十三歲性敏而有沈思余教以推求春秋朔閏之法以方幅之紙一年横書十二月每月繫朔晦于首尾細求經傳中之干支日數不合則為置閏始猶覺其牴牾十年以後迎刃而解其合者凡十九不合者前後率不過差一兩日因經傳之日數以求晦朔因晦朔之前後以定閏餘與杜氏長厯不差累黍其違異者則為著論駮正之乃知春秋二百四十二年之事迹指掌可數粲若列眉而後儒之憑空臆造都成䆿語試約舉三四事言之桓五年正月甲戌己丑陳侯鮑卒傳曰再赴也杜謂甲戌前年十二月廿一日己丑此年正月六日今考桓四年冬當有閏十二月甲戌實是正月廿一日而己丑則二月七日也是經書正月甲戌不誤第甲戌之下當有闕文己丑之上併脫二月兩字耳傳不知而誤以為再赴杜併不知而誤以今年之日屬之前年由失不置閏故也昭元年十二月晉既烝趙孟適南陽甲辰朔烝于温杜以甲辰為十二月朔謂晉烝當在甲辰之前𫝊言十二月誤不知是年當閏十月不可依長厯作閏十二月經傳皆有十一月己酉己酉先甲辰五十五日則甲辰非十二月朔可知服䖍云甲辰夏十一月朔也葢夏之十一月於周為正月晉烝以孟冬而趙氏以仲冬烝于家廟傳以烝本冬祭不可繫之來年而甲辰實正月朔故特變其文先言十二月晉烝而後言甲辰朔此明係兩月事趙氏之烝自在明年正月傳紀晉事自用晉之夏正耳杜不知傳文書法之變誤以來歲之日屬之今年由置閏失所故也更有經傳俱不誤而杜孔誤者莊二十五年六月辛未日食鼓用牲于社左傳曰非常也左氏之意葢謂正陽之月日食為非常之變異爾是解所以鼓用牲之故而杜釋為非常鼓之月由置閏失所誤使七月為六月夫不應伐鼓而伐鼓不過失于謹慎未足重煩聖筆而正陽之月受隂氣虧損乃災異之大者杜不舉其大而舉其細何為乎今推算辛未確是六月朔日自莊元年閏十月至二十四年閏七月凡九置閏正合五歲再閏十有九歲七閏之數而孔氏曲從杜說反謂二十四年八月以前誤置一閏所以使七月為六月此經傳俱不誤而杜孔自誤也又有杜孔俱不誤而後儒以意推求而誤者襄二十八年十二月甲寅天王崩乙未楚子昭卒相去凡四十二日杜孔俱云日誤而胡文定指為閏月經不書謂是䘮服不數閏之証吕氏本中至反駮杜孔為非殊不知置閏須通計兩年上下若此年十二月置閏則來年二月安得有癸夘五月安得有庚午乎今推算閏當在來年之八月此宋儒不考經傳前後横空臆度並不信杜孔而失之者也此卷獨多約有一百八十餘頁就一卷中釐為四卷學者執是求之以上下數千年諸儒議論如堂上人判堂下人曲直又如執規矩以量物毫髮不容少錯余于此用心良苦而位置閏月排列朔晦則華生經始華子師道改正之力為多嗚呼綦難哉余往懷此志六七年而苦無端緒聞泰興曙峰陳先生有書六卷屢郵書求其令嗣而不獲而臨川師有春秋年譜一書亦未見示亡兒炳從旁贊曰是不難從經傳日數求之足矣此事兒請任之余呵之曰爾何知炳不敢言而退今幸是編成喜二華之能成吾志而又恨亡兒之不得與成其事也為泫然者久之輯春秋朔閏表第二隠公名息姑春秋大事表卷二之一
