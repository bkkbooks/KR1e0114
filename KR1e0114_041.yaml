body:
  text: 春秋大事表卷四十一國子監司業顧棟高撰五行表班氏云昔殷道弛文王演周易周道敝孔子述春秋漢董仲舒治公羊推陰陽為儒者宗宣元之後劉向治穀梁傅以洪範與仲舒錯至向子歆治左氏言五行又與向異歐陽子曰聖人沒而異端起秦漢以來學者惑于災異天文五行之説不勝其繁也故其作五代史書天而不書人二者之説果孰從乎曰二者雖殊其義一也諸子即天以命人歐陽子以人而合天均無失乎易春秋之旨而已不言天則天道廢故謫見于天則王者避正殿不舉樂戒百工省闕失此春秋書災異之意易所謂後天而奉天時也專言天則人事惑故太戊修德而祥桑枯死宋景公有君人之言而熒惑退舍此春秋書災異而不言所以然之意易所謂先天而天弗違也後天者曰天意見矣可不懼乎先天者曰吾修吾人事而已在天者吾何知焉嗚呼其要歸于責人事以回天變故詳書災異而不列其事應以示吉凶無常人君側身修省無日敢即怠荒之意垂教可謂至矣余觀春秋所載地震山崩水旱螟螽􅈮蜚鸜鵒之類多見于莊宣昭定哀之世天意豈不顯然哉左氏于昭四年大雨雹載申豐言魯不藏冰之咎哀十二年十有二月螽仲尼歸之失閠此當日黨于季氏抹摋災異使人主漫不知省而復托于大聖人之言以欺後世嗚呼此張禹谷永諸儒所以接迹于天下也輯春秋五行表第四十一地震王氏葆曰春秋五書地震惟于文襄昭哀見之皆陽微陰盛君弱臣強之所致文公怠惰政在大夫襄公外役于強楚內脅于強臣至反國而不敢入若昭哀則遂失國矣山崩孫氏覺曰沙鹿崩梁山崩皆非魯地春秋書之有內辭焉川竭山崩所以召之者在于天下所以應之者遍于四海山雖在于晉而異及于天下不可以晉言也水災趙氏汸曰災異在一國者以經所書本國人事考之則警告之意可見董仲舒曰水者陰氣也春秋緯曰陰盛臣逆民悲情發則水出蓋桓公弒立而好亂三家之所自出莊公國母淫恣不能制宣公篡適成公幼弱而三家之勢成至襄公之末季氏益專此皆陰盛臣逆之應也汪氏克寬曰書時不書月則水之泛溢為害蓋歷時而未平也經書內大水者八桓元年莊七年二十五年宣十年成五年皆書秋莊十一年宋大水亦書秋桓十三年大水書夏惟莊二十四年紀于八月薑氏入之後襄二十四年紀于七月日食之後書月者未至歷時之久然非非常為災則不志也雷電霜雪冰雹高氏閌曰春秋書大雨雪者三隱以日書桓以月書僖以時書酉戌亥月皆非大雨雪之時也以時書為尤異汪氏克寬曰書大雨雹三僖二十九年昭公迭見于三年四年僖公頗能勤于政事以銷天變故及末年始有失政之漸遂為文公縱權之張本若昭公則昏懦不立卒不免乾侯之辱天之示人顯矣霞峰華氏曰十二月隕霜不殺草李梅實宜殺而不殺也十月隕霜殺菽不宜殺而殺也其變相反而其占一也威福者人主之柄主失其柄以有罪而賞必至以無罪而罰其事相反而其實一也一趙氏汸曰月令季秋之月霜始降草木黃落謂夏九月也周十二月夏之十月霜當重而不能殺草李梅再花而實周十月夏之八月霜不當重而殺菽皆非常之災李堯俞曰菽之為物易長而難殺者穀梁傳曰未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也范氏曰舉殺豆則殺草可知案春秋書無冰三桓十四年以正月成元年以二月襄二十八年書春周之正二月夏之十一月也法當堅冰無冰溫也是為常燠之罰書雨木冰一成十六年以春王正月正月今之仲冬時猶有雨未是盛寒雨下即著樹為冰寒甚之過其節也是為常寒之罰不雨李氏亷曰經書不雨七趙子曰凡經時不雨告廟則書莊三十一年冬及僖二年冬三年春夏兩書皆每時而一書也文二年十年十三年三書皆歷時而總書也經書大旱二僖二十一年夏及宣七年秋正義曰春秋之例旱則修雩雩而得雨書雩不書旱雩不得雨則書旱明災成也故公羊以不雨為記異大旱為記災霞峰華氏曰穀梁每時而一書閔雨也歷時而總書不憂雨也文定以僖文二公之行事合之經之所書其為得聖人之旨無疑矣每時而一書望雨也望雨不得雨故歷三時而三書不雨以志憂不得雨而憂故得雨而喜書六月雨以志喜文公不雨而不求雨故歷三時歷四時而一書不雨略也書不雨至于秋七月則八月雨矣不書八月雨不以雨不雨為欣戚也穀梁所謂無志于民也無麥苖飢趙氏汸曰經書無麥苖一杜氏曰秋大水漂之也大無麥禾一劉氏曰經無水旱蟲螟之災忽無麥禾由魯不務蓄積日損月削以至麥禾皆盡而後覺之非今歲之事也高氏曰劉向春秋説以為土氣不養稼穡不成沈約宋志謂吳孫皓時嘗有之苖稼豐美而實不成闔境皆然百姓以飢所謂大無麥禾者也劉蟲孽汪氏克寬曰春秋書蟲災者十四書螟者三而在隱公之世二莊公一書螽者十桓僖文襄各一宣公哀公各三書蝝生一亦在宣公之世蓋宣公以弒兄得國而又改法重困農民故螽蝝水旱之災比歲相仍聖人備書為後鑒也趙氏汸曰春秋書螟者三隱二莊一書螽者十有一桓一餘皆僖公之後蓋螟食苖心螽無所不食其為災也螟輕而螽重春秋之初災之輕者亦書之及其久也輕者不勝書書其重者爾不然豈隱莊之後二百年間皆無螟耶物異案春秋書多麋一麋魯地所有多則為異有􅈮有蜚有鸜鵒皆魯地所無今忽有之故曰有火災汪氏克寬曰宫廟志災者六御廪西宫新宫亳社譏不戒謹而致災也雉門兩觀桓宫僖宫譏其非禮而宜災也霞峰華氏曰御廪所以奉宗廟也御廪災公將不得奉宗廟矣西宫小寢人君燕私之地僖公之薨于小寢知公之即安于燕私也西宫之災其以示戒歟廟災而哭得禮之常法不宜書故質夫以為神未遷主然宣公薨二十有八月而主未遷書之亦以志其慢而天譴告之也雉門兩觀僭也因災而志亦以見其非禮也桓僖親盡而廟不毁故天火及之亳社亡國之社以為廟屏戒也故亳社之災劉向以為人君縱心不能警戒之象汪氏克寬曰書外災者五皆以國書蓋災及于宗廟朝市而非一處也獨成周書宣榭責王室不謹于火雖人火焚之而不能救其罪尤著矣李氏亷曰外災告則書弔則書春秋大事表卷四十一
