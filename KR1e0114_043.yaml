body:
  text: 春秋大事表卷四十三國子監司業顧棟髙撰闕文表儒者釋經為後王典制所自起國家善敗恆必由之可不慎哉春秋文多闕誤三𫝊類多附㑹而公榖尤甚迹其流弊種毒滋深其大者如紀子伯莒子盟于密本闕文也而習公榖者遂謂紀本子爵後因天子將娶于紀進爵為侯加封百里以廣孝敬漢世因之凡立后先封其父為侯進大司馬大將軍封爵之濫自此始而漢祚以移由不知闕文故也蓋嘗推而論之日食闕書曰朔者凡十本史失之而榖梁則曰言日不言朔食晦日也言朔不言日食既朔也案自襄十五年以後無不書日朔者豈自此至獲麟近百年總無食于前食于後而獨參差不定于襄以前乎則榖梁之說非也外諸侯卒闕書名者凡十亦史失之而左氏則曰不書名未同盟也案隱元年及宋人盟于宿而八年宿男卒不名成十三年滕㑹諸侯同伐秦而十六年滕子卒不名杞與魯結昏而僖二十三年杞成公卒不名則左氏之說非也夫人不書姜氏及去姜存氏去氏存姜者凡四而左𫝊則曰不稱姜氏絶不為親禮也賈逵又云哀姜殺子罪輕故但貶去姜公穀又以出姜不宜成禮于齊穆姜不宜從夫喪娶故俱貶去氏夫去姜存氏去氏存姜不成文理況文姜哀姜之罪豈待去其姓氏而明至夫人方為處女事由父母而必責其間合禮與否無乃蹈拊驂移臼之譏乎亦拘固不通甚矣王不稱天者凡六其三史脫之其三從省文而胡氏于錫桓公命歸成風之賵及㑹葬則云聖人去天以示貶夫歸仲子之賵王已稱天矣豈于前獨罪宰咺而于天王無貶于此數事又獨責天王而于榮召無譏乎桓五年三國從王伐鄭此自省文爾與公朝于王所同義而胡氏以為桓王失天討豈朝于王所不責諸侯而反責王乎必以桓十四年不書王為責桓無王則宣亦篡弒何以書王必以桓四年七年不書秋冬為責王失刑則昭十年不書冬定十四年不書冬又何以說秦伐晉鄭伐許晉伐鮮虞皆是偶闕人字而公穀以為狄之夫秦且無論晉之罪莫大于助亂臣立君襄十四年㑹孫林父于戚以定衛當日不聞狄晉鄭伯射王中肩未嘗有微詞示貶而沾沾責其伐許伐鮮虞亦可謂舍其大而圗其細矣凡此皆公穀倡之而後來諸儒如孔氏頴達啖氏助趙氏匡陸氏淳孫氏復劉氏敞亦既辨之矣而復大熾于宋之中葉者蓋亦有故焉自諸儒攻擊三𫝊王介甫遂目春秋為斷爛朝報不列學宫文定反之矯枉過正遂舉聖經之斷闕不全者皆以為精義所存復理公穀之故說而吕氏東萊葉氏少蘊張氏元德諸儒俱從之由是春秋稍明于唐以後者復晦昧于宋之南渡豈非勢之相激使然哉夫蔑棄聖人之經與過崇聖人之經其用心不同而其未得乎聖人垂世立教之㫖則一也愚故不揆檮昧瀏覽諸家之說於南渡以後兼取黃氏仲炎吕氏大圭程氏端學俞氏臯齊氏履謙五家列闕文凡百有餘條俾學者于此不復強求其可通則于諸儒支離穿鑿之論亦掃除過半矣輯春秋闕文表第四十三日食闕書日朔凡十又疑誤三外諸侯卒闕書名凡十時月日闕誤凡二十八王不稱天凡六誤稱天子一夫人姓氏闕文凡四殺大夫闕書名凡四秦鄭晉伐國闕書人字凡三盟會闕文凡五外諸侯名諡國名闕誤凡五侵戰圍滅入救闕文衍文凡九補遺春秋俱係孔子修成以後闕誤論案孔氏頴逹曰春秋闕文有二有史本闕聖人因而不改者有係修成後始闕者愚謂史闕而聖人因之無是理也孔子修春秋垂訓百世必擇其善可為法惡可為戒者書之若前史有闕宜并削而不録此何關于勸懲而重書之以惑誤來世故知皆修成以後闕也然易詩書三經與春秋並𫝊于世其闕文百不一二見而春秋之闕文獨多何也曰是亦有故焉古者用竹簡汗青為書易于剝蝕須掌于官中每嵗修輯易掌于太卜書藏于柱下詩𨽻于樂官易自天子至士庶所習用國家有大事則詔卜筮書則太史陳之以詔王善敗詩則燕饗祭祀比諸樂歌故偶有闕誤隨即較正而春秋自修成以後則為孔氏之私書又定哀以後多有所刺譏隱諱故當時游夏不能贊一辭而曽子子思亦無一語及春秋至孟子始標出知我罪我及其義則丘竊取之言而是時去孔子已百年矣書藏于私家其補綴修輯必不能如官中之勤闕誤是理之所有無可疑者左氏約生在孟子前後故已有以紀子伯為履緰之字以甲戌己丑為再赴而公榖則生于漢時据所𫝊聞謬誤尤甚幸左氏為史官得見列國之史與魯未筆削之春秋此二書皆掌于官中其義雖不存而文之闕誤則無有故左氏得据為𫝊其日月與經互異往往𫝊是而經誤此尤其顯然可見者孔子嘗自言曰辭達而已矣若春秋之去姜存氏去氏存姜及曹宋之大夫不書名不達已甚顯係闕斷宋儒不察皆目為意義所存雖經杜孔啖趙之駁正而不悟也豈不謬哉夫左氏親見國史最有功于春秋而當其時孔聖之經已多闕左氏不知而反為之說如澶淵之㑹𫝊据國史本有叔孫豹㑹四字幽之盟公羊氏經現有公字而左氏所𫝊授之本偶無之遂以為諱不書公諱不書大夫不知春秋時㑹盟之非義者多矣僖二十八年公會諸侯盟于宋成二年公㑹楚公子嬰齊于蜀絶不一諱何獨于此焉諱是則聖經之闕誤因左氏而明左氏且不知而妄生穿鑿何況後來餘子哉曰文定之為𫝊近世亦有知其非者而列于學宫厯代不廢何也曰在朝廷之公令自不得不用胡𫝊以其字字發揮便于經筵之進講敷陳大義士子之命題橫發議論耳要非經義之本然也夫明知其非是而不得不遵用之此所以說經而經愈晦也春秋僖二十四年冬晉侯夷吾卒論余常謂春秋闕誤多自經成以後左氏不知而強為之說更有左氏作𫝊時未嘗誤因漢晉以來𫝊寫之訛為杜氏之傅㑹曲成者則如僖二十四年晉侯夷吾卒是也左𫝊惠公之卒以二十三年九月而經在明年之冬杜氏謂晉文定位而後告惠公之喪經文從赴程氏端學謂惠公之卒此時非有內亂外伐安得不告喪必待文公之至而後告借使文公入而告必曰先君某以某年某月某日卒魯史因而書之必不書其赴到之日也余則謂四字當是三字之誤晉之九月為周之冬十一月𫝊因赴告從晉夏正而經自用周正耳然則謂左氏之未嘗誤何也曰文公告惠公之喪此出于杜氏之說左𫝊無之也左𫝊于二十四年正月秦伯納重耳曰經不書不告入也二月殺懷公于髙梁不書亦不告也此時魯一意事楚目中無重耳謂此亦當如夷吾之儔不久為秦俘縶耳故自入國至創伯凡五年中間無書一晉事者晉殺吕郤不書勤王及圍原皆不書豈有獨書一夷吾卒之理晉文豈有不告已之入而反告惠公之喪之理且懷公以踰年之君晉文來告豈容沒去若欲諱其弒君之實而以惠公死期遲至經年掩耳盜鈴貽笑鄰國晉文君臣必不為也竊意丘明作𫝊時晉侯夷吾卒猶在冬十有一月杞子卒之下自是懷公來赴此後晉使絶不通往來故懷公以踰年而見殺重耳以公子而反國經皆無從書非為文公諱而不書也至丘明作𫝊以後諸儒𫝊寫誤置在二十四年冬杜氏曲為遷就謂文公定位而後告惠公之喪殊不思告者何人豈有不預先書其入國之理乎左𫝊謂不書不告入也萬無可疑公羊則以為為文公諱家氏鉉翁髙氏閌則以為桓公書入以其篡兄文公于長幼次當立果爾聖人宜别有書法胡乃沒而不書謂之褒乎貶乎髙氏更謂魯未與宋通而此書惠公卒者以見文公之入文公不書入者以申生既死文公以次當立故竊意文公之入若告自當書無為書惠公之卒以見文公之入文公于次果當立則其入又胡為不書聖人用心不宜委曲如此故余謂左氏作𫝊時經文未誤若此時已作二十四年晉侯夷吾卒則文公告惠公之喪當時左𫝊發之無俟杜氏之補注也凡經𫝊互異者學者舍𫝊從經此正理也夷吾之卒不日而時必因赴告之疏秋冬之異必因周正夏正之别皆不辨而明獨二十三二十四經年之隔致千年聚訟今定為𫝊寫之誤直是卓識愚則為左氏原本已為杜氏割裂錯置其誤不在𫝊寫而在割裂時置放失簡耳聊備一說何如春秋大事表卷四十三
