body:
  text: 春秋大事表卷三十四國子監司業顧棟高撰吳越交兵表世嘗恨吳王不聽子胥滅越致越卒治吳余以為不然吳之亡以驕淫黷武耽樂忘禍輕用民力馳騁於數千里之外雖微越吳亦必亡若使守其四境和其人民任賢使能而增修其政越雖切齒思報亦且懾伏而不敢動動即滅國矣雖百越能為吳患哉且吳之㑹晉黃池聞有越師遑遽而奔歸也太子戰死國之不亡者如髮而越未嘗不與吳平此時若能效勾踐㑹稽之志則吳之封疆大于越國而吳之受創未至如㑹稽將見越能復吳而吳亦能復越瀦越之國數勾踐背德之罪而戮之天下其孰敢議乃因循至十年之久再受越師卒迷不悟慶忌驟諫而至見殺則非越之能滅吳吳自滅耳嗚呼古今存亡之理雖曰天命豈非人事吳嘗破楚入郢乃不踰年而楚卒返國越一入吳而泰伯之後遂以不祀此又非特夫差之過也楚能信任宗族其執政皆公子昭王奔隨而子西為王輿服于脾泄以靖國人子期至身為王以與吳其大臣多捐軀盡忠之士譬如百足之蟲至死不僵矣向使夫差雖亡而夫概尚在以其精于用兵得吳旁郡邑而守之安見死灰不可復然而吳自闔閭以來世疏忌骨月王僚之弒掩餘燭庸逃竄無所夫概有破楚大功而卒奔楚為堂溪氏盡斬其枝葉而欲以孤幹特立于二千里之地故以吳之强而越摧之如拉朽豈不哀哉為著其始終得失之故明鑒戒焉輯春秋吳越交兵表第三十四春秋大事表卷三十四
  hash: sha256:cc0a8c7bcb0544ff3916ca97a9876bbf9b264243b38525d8074192306dec9ae0
