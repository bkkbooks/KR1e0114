body:
  text: 春秋大事表卷十五國子監司業顧棟髙撰吉禮表昔成王以周公有大勲勞賜魯重祭其目有三曰郊曰禘曰大雩而望亦郊之屬因郊遂以有望凡郊禘及宗廟之樂用八佾之舞然亦有差别魯無日至之郊殺于天子四望闕其一雩惟建已之月大雩帝用盛樂其餘因旱而雩則禱于國内之山川而已八佾惟用于文王周公之廟自魯公且不得與况其下之羣公乎至春秋之世其僭益盛或僭用日至之郊宣三年成七年定十五年哀元年之改卜牛皆在春正月是也雩凡二十有一皆書大凡旱暵之祭皆僭用雩上帝之盛樂矣閔公竊禘之盛禮以行吉祭僖公用禘禮以合先祖叙昭穆用致夫人于廟而禘始夷于常祀之禮隠五年考仲子之宫初獻六羽明八佾前此之皆用羣公之廟之無不用也嗚呼以諸侯而用天子之禮是為上僭上僭自魯公以後世世行之孔子身為魯臣子而不忍言也以諸侯用天子之禮而旋為大夫所竊是為下陵下陵自宣成之世始之孔子心憂其漸而不能以救也不得已從其甚者書之郊以龜違書牛害書非時大不敬書大雩以旱書禘以别立廟與致小君書易曰履霜堅氷至是故書郊自僖三十一年始三桓之禍由僖基之也雩一見于桓再見于僖成五見于襄而七見于昭桓公為三桓所自出至僖公而兆其毒成襄而養其癰至昭公則潰矣孔子立定哀之世目擊禍敗追原本始書之重辭之複繁而不殺君有短垣而自踰之何有于大夫曰猶繹曰猶三望曰猶朝于廟一為幸之一為惜之低徊之辭深于痛哭焉孔子曰天下有道則禮樂征伐自天子出又曰天下有道則不在大夫嗚呼此孔子當日作春秋之發凡起例也郊呉氏澂曰經書郊者九龜違者四牛災者四非時大不敬者一葢魯郊雖僭行之已乆視為常事故不悉書惟卜之不從牛之有變及時之大異于常而後書霞峰華氏曰魯無冬至大郊之事四望闕其一降殺于天子成王所賜伯禽所受葢為祈榖之郊在啓蟄之月魯㠯諸侯而郊已為非禮其末流之失抑又甚焉或僭用日至之郊宣三年成七年定十五年哀元年之改卜牛皆在春正月是也或踰啟蟄之節僖三十一年成十年襄十一年及定哀之改卜皆以四月五月又其甚者成十七年之書九月用郊是也夫魯之郊久矣隠桓荘閔不書先儒謂聖人不敢無故斥言君父之過故因其變異而書不及時則書過時則書卜郊不從則書四卜五卜以瀆書用郊以廢卜書郊牛傷鼷鼠食郊牛以紀異書不郊猶三望以可已不已書若宣三年王䘮而卜郊哀元年先公未小祥而郊忘哀從吉違禮褻天則又比事觀之而惡自見矣禘案杜氏以審諦昭穆謂之禘合食羣廟謂之祫祫即禘禘即祫一祭而有二名也故閔二年僖八年之書禘禘也文二年大事于太廟躋僖公公榖皆以為祫祫即禘也故杜氏亦以大事為禘宣八年有事于太廟亦禘也故孔氏正義亦謂之禘昭十五年有事于武宫𫝊明稱禘于武公定八年從祀先公𫝊明稱禘于僖公又昭二十五年禘于襄公𫝊文灼灼可據故無論經書大事有事皆祫即皆禘也自朱子取趙伯循之說謂禘專祭始祖與始祖之所自出不與羣廟而以毁廟與未毁廟之主合食太廟謂之大祫單就七廟合食謂之時祫夫后稷之所自出何人謂嚳也殊不知帝嚳原非稷契之父歴考詩書及孔孟之文無一言及帝嚳者大雅之生民商頌之長發魯頌之閟宫止及姜嫄𤣥鳥無一言及稷契之父為何人者乃史公因世本之妄説謂稷契與帝堯為親兄弟果爾則堯在位七十載何不聞舉其親兄而必待舜舉之乎孔子又何說禹稷躬稼而有天下乎世本創其說于前而國語史記與戴記從而附㑹于後千年鉅典看破竟屬子虚故謂禘為祭始祖之所自出者趙伯循不知何所本歴考三𫝊及三𫝊之註疏杜孔鄭賈服諸儒未之有也世特㠯朱子大儒既從其說不敢違異遂成鐵案後儒遂以經書大事為祫祭有事為時祭于禘無與不知其實皆禘也故今斷從左傳及杜氏之說閔二年夏五僖八年秋七文二年二月八月丁夘大宣八年六月汪氏克寛曰經書雩二十一左氏于桓五年云書不時也襄五年八年二十八年昭三年六年十六年二十四年皆曰旱也昭二十五年再雩則曰旱甚餘年無傳首言不時而後皆言旱互文見義皆以旱而皆不時也然春秋實以旱書而并著其僭耳吳氏澂曰魯之雩祀僭王禮特書曰大雩以表其異于諸侯祭山川之雩也左氏謂龍見而雩過則書龍見者孟夏建已之月故經無書六月雩者盖得禮則不書常祀汪氏克寛曰四時常祀惟桓公之經書烝書嘗葢再烝之瀆與未易災之餘而嘗皆失禮之大者况冬烝而㠯夏五月行之酉月嘗而以未月行之或大過或不及皆失時之甚故書之以示貶不告朔杜氏諤曰六月閏月不告月猶朝于廟夫子録之是幸其禮之不盡廢也十六年書不視朔是未嘗朝廟聽政禮廢甚矣宫廟汪氏克寛曰隠公立宫以祭庶弟之母啟後世追尊妾母皆援春秋考宫之義聖人書之以著失禮之始凡經書宫廟若西宫新宫桓宫僖宫則㠯災而書作新宫合禮則不書也世室屋壊則書作世室合禮亦不書也丹桓公楹刻桓公桷過侈非禮則書武宫煬宫親盡不當立則書凡易世立先君之廟得禮則不書即位髙紫超氏曰十二公或書即位或不書即位一從其實而書耳聖人非有意于其間也有復舅氏霞峯書見後公至啖氏助曰凡公行一百七十有六書至者八十有二不書至者九十有四左𫝊謂告廟則書于䇿夫子隨其所至以示功過且志其去國逺邇遲速也其有一出而渉兩事者或致前事或致後事擇其重者志之十二公唯隠不告葢謙讓不以人君之禮自處也其餘不以告或耻也或怠也劉氏永之曰時有逺近則史有詳畧自文以前君行八十書至者十七自文以後君行九十書至者六十四此其易曉也彚纂曰反行必告則史書其至不告則不書杜註孔疏甚明諸家紛紛或以為逺或以為乆或以為危或以為幸失之鑿矣附髙紫超復舅氏書春秋十二公不書即位者四君說者謂皆聖人削之然其說可通于此者即不可通于彼于是各為委曲相就之說而春秋之㫖晦矣隠不書即位文定主内無所承上不請命其論固極正大然嘗竊惑之春秋之法是非善惡固云大公而不私然尊君父不敢斥言者亦春秋之定理也春秋惡天下之無王則亦惡乎一國之無君惡一國之無君則已更不當先萌無君之心而逞無君之筆夫春秋諸侯其不請命而無承者遍天下而文定乃曰春秋首絀隠公以明大法則是聖人欲正天下無王之罪而已先逞無君之筆矣夫君父一也今有羣為盗者于此而其父亦與焉藉令身為士師而曰首誅吾父之為盗者其可乎隠公即有可絀之罪而聖人非絀隠公之人若謂聖人作經直以天自處而于此乎何恤焉則亦悖理逆倫之甚矣今謂削隠公為不禀于君父之例即文定首絀隠公之意也此其說之可商者一也謂文成襄昭哀五君皆不禀于君而禀于父可從末減義亦未安夫諸侯之位受之王也非受之父也既不禀于王則雖受之于父而亦為擅立又可從而末減乎旣可受之父而從末減則天下諸侯其干王法者少矣既削隠公為不禀于君父之例又末減于文成諸君而書即位以書即位者為是則疑削即位者為非以削即位者為非則不宜以書即位者為是是非可以互易予奪可以倐更隱何獨不幸以春秋之首君而當大罸此其說之可商者二也又謂桓宣定三君皆繼弑而與聞乎故故亦如其常而書即位夫桓宣繼弑君信矣若昭非弑也昭非弑而强使之同乎弑則亦糢糊遷就之說也桓宣之惡極矣俱志存乎殺兄定非志乎殺也但不能討意如為罪耳因定不承于父難從受父末減之例而直使與桓宣之弑君者同科則用法可謂不平矣此其說之可商者三也然則十二公或書即位或不書即位其義果云何曰一從其實而書耳聖人非有意于其間也隠之攝而不即位也變例也荘閔僖之繼弑君而不即位也定例也桓宣故踰其例者則以欲自掩其簒弑之實耳若從其例則是自明其簒也慶父立閔公誠無不忍子般之意然慶父醜聲昭著廷臣亦惡之季友之徒或有與之争而抗者故亦不行即位之禮也然則桓文宣成襄昭定哀八君實嘗即位矣則經亦無容沒其實而不書即位隠荘閔僖四君實未嘗即位也則經亦不得强而誣之為即位皆從其實而書耳然春秋雖皆從實以書而于文成襄昭哀五君書即位者自有以明傳世繼統之重于荘閔僖三君不書即位者自有以昭萬世嗣君處變之法于桓宣之不應即位而書即位者自有以發其狠賊無兄之隠于定之六月戊辰而始書即位者自有以見意如强逼專制其君之實此如太陽一照而萬物無遁形聖人之意未嘗不深切而著明也或曰王法所最重莫過于繼世而立君王法所必誅莫過于不禀君父而自立今謂隠公不書即位止于從實而書之則所云丘竊取者謂何曰子不禀于父臣不禀于君為王法必誅之定律聖人于衛人立晉之文發之矣不必更牽合于此也然則隠即位不書止于從實而無他義乎曰位者人君之大寳命徳討罪皆藉位以行之天子正其位然後可以有為於天下諸侯正其位然後可以有為于一國不書即位則是失其人君之大寶而不足以有為于一國也嗚呼此其所以終蒙莵裘之變也歟案十二公或書即位或不書即位皆據實而書此本三傳及杜氏何氏范氏孔氏楊氏諸儒之註疏極明白坦易故朱子亦力主其說不知宋之儒者何故自生枝節謂不書即位是仲尼削之至其不可通處則又分為兩例以削隠公為不禀于君父之例而文成襄昭哀五公附之以從末減故不削以削莊閔僖為繼弑不當行即位之禮之例而以桓宣定附之以與聞乎弑及為弑君者所立故不削五公之不削恕之桓宣定之不削罪之如此則聖人之立制令人得上下其手矣其意欲張大聖人之書法謂非此無以警亂賊之心而不知先自蹈于僭妄之失且即據實而書而春秋之㫖未嘗不嚴于斧鉞也夫史以𫝊信若魯君實行即位之禮而仲尼沒其實而不書則春秋非傳信之書矣何以為聖人之作乎愚故節錄三𫝊及諸儒之㫖而以髙紫超之説為定春秋三傳禘祫說今世之稱祫禘者謂祫合也毁廟之主陳于太祖未毁廟之主皆升合食于太祖而禘則惟祭始祖與始祖之所自出不兼羣廟之主周以稷配嚳魯則以周公配文王此朱子取趙伯循之說而後世儒者多遵信之然愚嘗徧考三𫝊禮記孝經論語中庸之義疏與商周魯頌之樂章從無周祀帝嚳及魯祀文王為所自出之文不知伯循據何典籍而云然也夫信漢儒不若信三𫝊信三傳尢不若信聖人之經所謂漢儒之說者則戴記之大𫝊䘮服小記明堂位及祭法是也所謂聖人之經則詩所傳之三頌與孔子所書春秋之經文是也且世謂周祭及于嚳者因祭法有禘嚳而郊稷之文耳然此禘鄭氏謂祭天於圜丘非謂宗廟之祭而以稷配之也又因小記及大𫝊有王者禘其祖所自出之文耳然此禘謂祭感生之帝于南郊乃漢儒誣妄之說亦非謂稷之生于帝嚳而因以祭之也况質諸三𫝊其禘之說又甚明文二年八月大事于太廟公穀謂之祫左氏謂之禘然其義並同公羊云五年再殷祭何休云祫合也禘諦也審諦無所遺失禘所以異于祫者功臣皆得祭爾閔二年夏五月乙酉吉禘于莊公杜預云三年䘮畢大祭以審昭穆謂之禘惟諸儒稱五年一行而杜謂三年一行者其義小殊而其說禘並謂兼羣廟之主絶未嘗有周公所自出而謂祭及于文王也鄭康成又謂禘之異于祫者謂苐陳毁廟之主而羣廟之主則各就其廟祭徵之春秋之實事尢可信不誣昭十五年有事于武宫左傳謂之禘昭二十五年𫝊禘于襄公此各就其廟之明證也然猶可曰此左氏之言耳閔二年吉禘于荘公僖八年禘于太廟明明于各廟稱禘豈孔子所書之經猶不足信乎然猶可曰此春秋僭亂之禮耳至周頌之雝為文王禘太祖之樂歌商頌之長發為武丁大禘之樂歌豈商周盛世之樂章經傅說周公之手定而猶不足信乎雝之言皇考則文王烈考則武王未嘗及于嚳也長𤼵之言𤣥王則契相土則契之孫以及湯與阿衡亦未嘗一語及嚳也其列相土與阿衡尤可為陳毁廟及祭功臣之明證其謂魯用天子之禮樂者盖如舞佾歌雍之屬錫魯以矜隆盛耳豈謂其祭文王于周公之廟以諸侯祖天子以干大戾乎况魯頌閟宫之詩明言之矣其詩曰白牡騂剛公羊于文十三年傳云周公牲用白牡魯公用騂剛羣公不毛未嘗言及文王之牲何得言祭文王以配周公也載觀尚書言后稷建邦啟土孝經言郊祀后稷以配天中庸言上祀先公皆至后稷而止又禮記明堂位云季夏六月以禘禮祀周公于太廟顔師古註漢書亦云禘者諦也謂一一祭之徧觀載籍從未有言祭及始祖之父者余恠夫不知何人泥小記及大𫝊之文而又厭感生帝之誣妄遂以帝嚳當之馴至漢祖堯曹魏祖舜牽合附㑹為千古笑唐趙循伯復曲成其說至謂魯祭文王漫無依據臆斷滋甚後經朱子遵用之而後世遂無異辭此皆不深考于經之過也夫信朱子尢莫若信聖經可也書春秋禘祫說後禮家禘祫之說千古聚訟然愚謂古今世異而王者報本反始宜從其實如殷周之興肇基稷契則當以稷契為始祖始祖正東向之位始祖以上不必及也後世帝王以匹夫有天下則當以受命有功徳者為太祖太祖正東向之位太祖以上不必及也何以明之契始封商開六百年之基稷封有􅘭肇八百年之祚則商周之王自當本稷契至稷契之興不縁帝嚳無由追祀且稷契當日自是舜之臣子月其初皆起于側微謂稷契皆帝嚳之子與堯為昆弟此史家附㑹之說徵之事實萬萬無是理何則生民與閟宫之詩皆陳姜嫄商頌之長發頌有娀如果為髙辛氏之子則商周不宜頌母而不頌父譙周云其父㣲故不著且如史家之說姜嫄為元妃有娀為次妃則稷契俱為帝堯之兄而堯自即位至殂落凡百有二十四嵗計稷契當帝舜時年俱近百三十嵗當已衰老不任事而堯在位七十載有親兄為大聖人終其身不舉待帝舜而後克舉之恐親睦九族之聖人不應如是然則稷契同出于帝嚳且屬無稽而謂商周推為所自出禘祀之於太廟不尢誣妄之甚乎商周禘嚳之文出于祭法與國語國語非左氏所作其文多與𫝊牴牾而祭法出于漢儒之𫝊㑹其為不足信尢明也自是以後李唐有天下其先皇祖虎始受命為唐公追命為太祖景皇帝則東向自宜屬景皇而獻懿二祖無與焉趙宋之太祖削平僭亂垂統百世其先未有功烈顯著為王業所基者則東向自屬太祖而僖宣無與焉何也有安天下之功自宜享子孫百世之報王者祖有功宗有徳盖謂此也唐貞元中詔百僚集議典禮昌黎韓子謂當禘祫時獻祖宜居東向之位景皇帝退從昭穆之列祖以孫尊孫以祖屈同時獻議五十七封惟顔魯公真卿與公意合朝廷卒從王紹等議正景皇帝東向之位附獻懿主于興聖廟中後世不以王紹等為非而以昌黎為是者從其實也宋治平四年英宗升祔用司馬温公議遷僖祖于夾室熙寧中介甫用事復還僖祖太廟而太祖退居昭穆時伊川程子獨是其說逮南渡後孝宗升祔諸儒樓鑰陳傅良等建議遷毁相汝愚主之而太祖正東向之位時有宋建國已二百餘年朱子晦菴祖安石議爭之尤力謂僖祖上比稷契不宜遷毁然後世不以介甫及程朱之議為是而以温公等之言為非者亦從其實也夫博學多聞明于掌故至昌黎介甫止矣精研義理至伊川晦菴止矣然而不以彼易此者葢欲惬乎人心之同然初不必以其人為輕重也曰如此則子孫得以功德加其祖考孟子不有云孝子之至莫大乎尊親乎曰受命之主追崇所生者此善則歸親之義百代後守成之主以受命之祖為不祧者此祖有功宗有徳之義善則歸親者一人之私祖有功宗有徳者天下之公王者不以一人之私廢天下之公故必明于周魯之禘祫而百世禘祫之議乃定魯無文王廟論往嘗疑趙伯循說魯禘文王謂祀文王于周公之廟以周公配之不知其說何所據及閲襄十一年傳有臨于周廟之文杜預謂此為文王廟魯唯文王周公廟用八佾伯循因而傅㑹之不知此係左氏之誣妄且其說亦與伯循不甚符合請得而詳辨之禮諸侯以始封之君為太祖魯以伯禽為始封而周公留相成王肇基功業魯人尊崇其制以周公廟為太廟魯公廟為世室並世世不毁若復有文王之廟則魯不毁之廟三世比天子而更上之矣周有后稷之廟未聞更有帝嚳廟也此其說之誣一也論語稱子入太廟註云孔子始仕時助祭于周公之廟若更有周廟論語何以不之及其說之誣二也且既有周廟决無虚而不祭之理而魯享祀之典莫備于閟宫之篇其詩曰白牡騂剛但陳周公與魯公之牲不及文王也其說之誣三也春秋僖八年傳禘于太廟用致夫人别無禘于周廟之文禘為祭祀大禮而行于太廟未知虚設文王之廟將以何用其誣四也且伯循之說以文王為所出之帝以周公配若有文王之廟則當迎周公主合食于文王今不以子就父而反以父就子欲以重周公而不虞其卑文王其說之不可通五也魯禘為昭穆合食顯有明文若如伯循之說則文王虚其廟不祭而以文王下臨周公之廟周公應退居昭穆之列欲以重周公適以卑周公其說之不可通六也孔氏正義復以鄭祖厲王蒯聵稱皇祖文王謂鄭衛俱立所出王之廟其謬益甚豈鄭衛俱得賜重祭乎此又不待辨而自明者也四明萬氏充宗更為通其說謂魯禘不同周禘魯禘不追所自出葢亦據明堂位及閟宫之文其於說春秋則近之矣不知周禘原無祭其所自出之禮何論于魯且帝嚳原非稷契之父何得謂禘嚳為祭其所自出大傳及小記言祭其所自出者謂祭感生帝于南郊也非帝嚳也以感生帝為誣妄而以帝嚳當之以周禘帝嚳而魯以文王擬之復以左氏魯有周廟之說遂輾轉傅㑹其原皆始于趙伯循之一人則朱子信之之過也曰然則論語或問禘之說而夫子曰不知何也曰禘為王者大祭盖謂其禮樂特盛原不必謂祭其所自出也如周頌雝之禘太祖商頌長發之禘𤣥王何嘗及于始祖之父而亦豈諸侯所得僭乎惟非諸侯所得僭而魯僭之孔子所以不敢顯言也必謂其追逺尊先及于無窮此後人故為幽逺之論考之實事不然也辨四明萬氏兄弟論禘之失余旣博稽經傳定議以為禘兼羣廟之主不追所自出已復遍考諸儒之說以叅其同異而四明萬充宗氏著學禮質疑有禘說四篇其弟季埜復著論九首俱精詣博辨凡古今名臣學士禘祫之議靡不搜剔遯隠考正疑互以求一是厥功甚大然愚嘗取而覈之季埜取孔氏頴達之說謂禘即祫祫即禘更無差别者其說與余同其謂禘兼羣廟之主徵諸長發之詩詳列𤣥王相土成湯以為羣廟合祭之証其說亦與余同至駁杜預稱禘為三年䘮畢之吉祭謂此乃魯末流之失宣聖特書以示譏不可為典要議尢精當不可易獨其兄弟並謂禘兼羣廟之主復上追始祖所自出其說盖亦本于程子及陳用之胡明仲黄楚望諸儒之說而不知其理之不可通也夫當大祭合食之時始祖正東向之位羣昭羣穆以次列侍若復追所自出不知始祖此時位置何處若並居東向則父子無並坐之理若退居昭穆之列則褻始祖已甚進退無據無一而可故趙伯循謂祀于始祖之廟以始祖配之而不兼羣廟之主配如孔廟之配享自當旁坐以明有父之尊而復不與羣昭羣穆齒其說較為有理故朱子遵用之葢羣廟與所自出一祭必不可得兼萬氏謂禘兼羣廟之主與伯循異則是也謂復追所自出則非也且萬氏堅守禘嚳之說為報本追逺之至意者豈不以大傳小記祭法國語及儀禮䘮服傳之為經傳炳據昭昭可信乎哉然此數書之可信孰若武王周公孔子孟子之言為可信也武王既有天下大告羣后叙列祖之功徳起自后稷而未嘗及于嚳周公陳王業之艱難若豳風之七月大雅之生民與周頌思文之什遡后稷遡姜嫄無一言及嚳也孔子刪書斷自唐虞其論追王上祀止及先王先公孟子言稷契之事詳矣未嘗謂帝堯之兄弟其謂稷契同出於嚳者乃史遷據世本無稽之說戴記從其後而附㑹之耳國語非左氏所作其言多與傳牴牾且左氏已不可信何有國語儀禮䘮服世稱子夏為之傳要亦漢儒之筆耳如果係報本追逺大典何以詩書不一陳之而孔子孟子絶口不道也哉至充宗氏盡闢三年五年之說謂禘毎嵗一舉行以午月此誤以四時之禘為大禘而取徵于雜記孟獻子之言復以七月日至之禘與正月日至之郊對舉郊嵗行則禘亦嵗行可知嗚呼雜記之言已出漢儒更復憑此臆斷多見其不知量月儒者從千百年後求先王廢墜之典上之信經其次信𫝊又其次則鄭王賈孔諸儒之成説猶不失為近古然儒者猶當别白以求其至當若逞其聰明創為異説意欲求勝前人而不知適増後人之一噱耳萬氏兄弟最精于理而猶有此失則甚矣經學之難言也辨萬氏季埜論禘之失季埜氏復著論曰自三年一祫五年一禘之説創于緯書東漢初張純舉以告世祖遂據以定禮合已毁未毁之主而祭于髙廟葢自東周之亡二百餘年而禘禮復舉誠為盛事顧其為制以髙帝為始祖而不追始祖所自出自時厥後禘名雖存而實亡嗚呼泥于祭法禘黄帝禘嚳之說是將使漢祖堯曹魏祖舜至唐宋更無可假托廼至明皇祖老子唐尊其廟為太清宫前二日先行朝獻之禮次日朝饗太廟又次日有事南郊真宗更祖趙𤣥朗宋尊其廟為景靈宫前二日先行朝獻之禮次日朝饗太廟又次日有事南郊以為如是而後得稱大禮合于先王報本追逺之意不失諸傅㑹即失之矯誣是非俗儒泥古階之厲歟季埜復云後世宗廟皆無始祖又安有自出之祖雖不禘亦可舉宋神宗之言曰禘者本以審諦祖之所自出秦漢以来譜牒不明莫知其所本則禘禮固可廢遂詔罷禘祀神宗此舉真超出漢唐諸帝之上嗚呼季埜此言又何其與前說相背戾也夫過崇先王之禮而牽而合之謂後世不能盡合先王之禮而舉而廢之二者俱失善乎孔氏頴達之言曰禘祫一也以其審諦昭穆謂之禘以其合祀羣廟謂之祫商周以稷契為始祖漢唐以後以受命開國者為始祖大合食舉盛禮如是則禘之典百世可通行何為必舉而廢之哉季埜前所謂名存實亾者至此併其名而去之其故由于祭法侈大先王之禮謂虞夏商周俱有所自出之帝馴至好竒之主攀附古聖而循名責實者又旋至廢罷此俗儒說禮者之過非後世人主之過也季埜以鄭氏釋經凡言禘者俱指為祀天以為妄誕不經不知鄭氏之失特稱感生帝如靈威仰之屬雜于䜟緯為非耳祭天之說起于韋元成王者受命未有不于天者詩言惟嶽降神生甫及申况受命之主乎明祖初定祭禮以始祖無可稽考特設一主曰皇初祖帝其有取于鄭氏之㫖也夫禘祭感生帝說禮記大傳不王不禘王者禘其祖所自出以其祖配之鄭康成註所自出謂感生帝也此極為有見其見于商頌之長發大雅生民之篇彰彰可考但不當襲䜟緯之說用靈威仰汁光紀不經之名耳以稷契為帝嚳之子與帝堯為兄弟者此史遷踵帝王世本之謬而國語祭法皆雜出于漢儒以禘郊祖宗之祭謂虞夏商周皆有之逺追至黄帝帝嚳謂三代之祖皆一姓夫周公治定制禮而苐因襲虞夏商之故事何以稱禮樂之宗乎且考諸商書止云大饗于先王未嘗有禘之名也則祭法之謬不辨可知矣且以生民之詩攷之以姜嫄為帝嚳元妃者尤大謬自古帝王祈求子嗣必躬禱天地山川嬪妃不得與漢成帝祠河東泰畤而昭儀在屬車豹尾間已為淫䙝非禮豈有帝嚳端居不出而令元妃徧行郊野于情為不合于禮為非宜且即使元妃行禱亦當有千乗萬騎清塵警蹕如今士大夫家亦須有肩輿傔從乃至歩行草野至足履大人迹此乃村姥里媪所為豈謂帝王之妃而出此且以為無人道而生子亦宜秘不令宣抑或别有處置而乃置諸隘巷置諸寒氷且顯名之曰棄尢非帝王行徑且帝堯以唐侯升為天子此本與帝嚳不相渉若說稷與堯俱為帝嚳之子則稷乃元子當立决無不立稷而反立堯之理堯必無不首先舉稷直待殂落之後舜方舉之之理且不特此也頌之長發先儒以為大禘之樂歌大雅之生民為尊祖以配天之樂歌以子孫追述先世豈宜復有遺漏何故但推其母不推其父以帝嚳先代之聖帝豈其不足稱述而沾沾於有娀姜嫄以為受命發祥之始乎葢稷契皆無父而生詩人明言之曰有娀方將帝立子生商又曰履帝武敏歆所謂帝即感生帝也以其無形無影故不可立尸又不可立主但憑依於始祖之神位以為所自出之帝故當大禘之時始祖得正東向之位羣昭羣穆以次咸列長發之詩自𤣥王以及相土成湯并及阿衡雝之歌兼及文王武王此其明証也若以帝嚳為所自出稷契將與嚳並居東面而饗乎抑退居昭穆之列乎趙伯循又以為禘祭不兼昭穆尢與經文不合論語或問禘之說子曰不知也以其理幽渺所謂聖人有所不知者是也以其為天地生人之始萬物皆為同體故知其說者治天下不難也朱子惑于趙伯循之說謂后稷更追上一世以為報本之中又報本追逺之中又追逺以宇内神竒渺忽之理出以腐儒拘文牽義之見遂令後世漢祖堯曹魏祖舜影響傅㑹未必非斯言唘之也則經學不明之過也書陳止齋春秋郊禘說後事有千百年之定案載在經典𫝊于學士大夫一旦以為不然初似創論反復思之而知其理之不可易此葢好學深思之士讀書得間黙㑹遺經于千載之上卒以大白乎聖人之心非尋行數墨之士所可到也魯之有郊禘說者以為成王所賜伯禽所受葢出于明堂位之文獨止齋陳氏以為此東遷以後之僭禮也非成王所賜其說一徵之史記曰秦襄公始列于諸侯作西畤祠白帝僭端見矣位在藩臣而臚于郊祀君子懼焉則平王以前未有也魯之郊禘惠公請之也據邵氏經世書惠公請于秦襄公祠白帝之年其後齊桓公欲封禪而晉亦郊鯀皆僭禮也再徵之春秋與魯頌其言曰春秋之郊何以始見于僖公惠公雖請之而魯郊猶未率為常至僖公始作頌以郊為夸於是四卜不從猶三望故特書之以其不勝譏譏其甚焉者爾三徵諸左𫝊祝鮀之言曰周公相王室以尹天下於周為睦分魯以大路大旂夏后氏之璜封父之繁弱殷民六族以昭周公之徳分之土田陪敦祝宗卜史備物典䇿官司彛器成王命魯不過如此而已若果如明堂位之言祝鮀不應不及四徵之隠公及僖公諸傳隠公考仲子之宫問羽數于衆仲周公閱来聘饗有昌歜白黒形鹽以為備物辭不敢受衛甯武子來聘宴之賦湛露及彤弓不答果若魯得行天子之禮則自始封迄春秋之初已四百年羽數何以始問于隠公昌歜形鹽以之饗天子之元老安用固辭湛露彤弓甯武子何以不答可見魯僭未久上自天子之宰下至列國名卿之有識者無不微文示譏而魯人並無一語及于成王之賜以自解則郊禘之說當從劉恕為得也止齋此論樓氏鑰亟稱之以為千古未發余謂此亦心理同然特世儒為成見所封不之察爾明堂位出於漢儒特傅㑹魯頌白牡騂剛犧尊之文以為此天子所賜而公羊子又附益之曰周公拜乎前魯公拜乎後夫以周公大聖魯公大賢豈宜過受天子之恩以自夸大啟後世人臣加九錫之漸魯頌鋪陳郊禘盛典而其言成王之命叔父未嘗一言及天子之賜苐曰大啟爾宇錫之山川土田附庸而已此尢可與祝鮀之言相發足徵郊禘非成王所賜而出于東遷以後之僭禮無疑也止齋為浙東巨儒其論郊禘之事深有合于余心為表明而論著之如此黄楚望氏亦曰周公相成王制禮作樂為天子諸侯不易之大法身没而王與伯禽躬為非禮以享周公成王賢王魯公賢君必不至是以魯頌白牡騂剛推之則記禮者之過也禘者殷諸侯之盛祭至周公始定為不王不禘之法成王以周公有大勲勞故命魯以殷諸侯之盛禮祀周公以示不臣周公之意故牲用白牡白牡者殷牲也辭剛者魯公之牲也又可見魯公以下皆合食于太廟而禮秩未嘗敢同于周公非有祭文王為所自出之禮如或者之云也其禘于羣公之廟則後世始僭之然晉亦有禘葢文公有勲勞于王室欲效魯禘祭而請祭天子故得用之若東周諸侯為所自出之王立廟稱周廟如魯與鄭皆是然止謂之周廟不敢以祖廟稱之諸侯不敢祖天子也若如所云魯得禘于周公之廟則當于周公廟以周公配之若據趙氏則止臨期立文王之主與尸而反迎以入周公之廟以父就子以尊就卑禮必不然禮之郊大雩則平王之世惠公請之是矣然郊祀蒼帝而四望闕其一猶未敢盡同于王室葢以為成王所賜者本明堂位及祭統以為惠公所請者出吕氏春秋魯鄭皆有周廟晉有禘祀見左傳趙木訥氏曰郊之制自惠公請之周雖有其制而未敢用至僖公首舉之葉石林氏曰吕不韋之書曰此平王之末造惠公請于周而假寵于周公是平王為之也黃東發氏曰破明堂位之說自劉敞始至木訥述用之甚明石林與止齋叅考之甚備明堂位出于漢儒在秦書吕覽之後其不足據亦明矣春秋大事表卷十五
