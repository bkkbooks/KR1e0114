body:
  text: 春秋大事表卷十九上國子監司業顧棟髙撰嘉禮表先王厚男女之别重繼嗣之原爰定昏禮為納采問名納吉納徵請期親迎所以别嫌明微先徳後色垂萬世統至深逺也東遷而後禮教不修倫紀廢壊陳靈以君臣宣淫晉文以懐嬴薦寵衛宣有新臺之刺齊襄有南山之行人道同於禽獸典禮棄若弁髦大亂極矣聖人憫焉是故詳其制於禮而嚴其律於春秋自古天子尊無與敵不行親迎之禮娶后則使卿逆上公監之而祭公以専行見譏劉夏以官師致䙝春秋志之謹名分窒亂源也十二公之違禮莫甚於莊宣莊公當親喪而主王姬娶仇女而躬納幣宣公倚齊得國結好圗昏即位未幾速行喪娶有人心者謂宜於此焉變矣内女為夫人者七其三不克終不書歸餘皆有故而書鄫季姬之歸不書歸逮歸寧而反書歸譏在魯也紀叔姬以媵書宋共姬致三國之媵而亦書賢之也叔姬以孑身而全宗祀共姬待傅姆而蹈烈火秉禮守義皭然不滓庶幾周公之教猶有存焉故大書特書不一書以為勸也嗚呼昬禮有六而春秋書納幣逆女與夫人至従其重者書之也而或失之略或失之過失之略者輕妃偶而虞不終失之過者諂强鄰而羞宗廟聖人之為天下後世慮豈不深切著明也哉輯春秋嘉禮表第十九王后孫氏覺曰春秋二百四十二年周十三王書逆王后者惟二非禮則書也吴氏澂曰祭公遂行逆后而紀姜遄歸京師其逆其歸兩從茍簡故書逆書歸劉夏以士逆后而齊之歸女無違於禮故書逆不書歸得禮者不書失禮然後書王姬霞峰華氏曰春秋惟兩書王姬而皆於莊公之篇則莊公之於齊非但不可主齊襄之婚其主齊桓之婚亦未為無譏也但如王氏之説罪有大小故書之有詳略耳不然常事不書矣逆夫人霞峰華氏曰納幣逆女夫人至三者昏禮之大節得禮則不書僖公襄公是也國惡諱不書昭公之娶孟子是也其餘失禮則書是故納幣不書莊公親如齊納幣則書納幣使大夫不書文公喪未畢而公子遂納幣則書親迎不書公子翬公子遂叔孫僑如以大夫逆則書莊公雖親迎而娶仇女故亦書夫人至不悉書大夫以夫人至則書大夫逆而公中受亦書大夫宗婦覿不書莊公男女同贄則書凡書皆失禮者也書夫人至正也書入不宜入也書以不以者也婦者有姑之稱桓三年公子九月齊侯送公㑹齊侯于夫人姜氏至莊二十二年内女霞峰華氏曰内女適諸侯者七適大夫者四適諸侯書歸適大夫不書歸適諸侯書歸者紀伯姬杞伯姬宋伯姬是也鄫季姬之始歸不書歸歸寧而反書歸齊子叔姬郯伯姬杞叔姬之始歸亦不書歸而書來歸略其常而著其變也書紀伯姬以叔姬書也逆女逆伯姬也錄叔姬之歸不得不著伯姬之歸也書杞伯姬以伯姬之違禮而亟來書也書宋伯姬以三國之來媵書也歸寧不書而杞伯姬書來不當來也㑹洮則書來朝其子則書來求婦則書罪伯姬也而所以致伯姬之越禮往來者以魯之卑之非是則杞不得安也歸寧而反不書而鄫季姬書歸不易歸也書季姬及鄫子遇于防使鄫子來朝罪季姬也而所以致季姬之越禮而為㑹者以魯之止之非是則鄫不得歸也歸諸侯者七而逆女一書逆女使卿禮失之略也納幣一書致女一書納幣致女使卿禮失之過也適大夫者四書逆者三敵也譏公不當與大夫為主也以大夫自逆則稱字以姑逆則稱婦也書來者一亟也兼髙固不當同來也以反馬則不當躬至以歸寧則不當並行也媵待年不書而紀叔姬歸書賢叔姬也外女媵不書而三國來媵書賢共姬也已上内女適諸侯來歸者不君亦甚矣子逆婦是上役乎下也姬亟來亦非禮也已上内女適大夫者春秋譏不親迎論春秋𨼆二年紀履繻來迎女公羊曰外逆女不書此何以書譏始不親迎也史公於外戚世家云春秋譏不親迎索𨼆引此𫝊文以為証後儒承其説因于莊之二十四年公如齊逆女榖梁曰不正其親逆于齊也謂親迎合禮不書以親迎讎人之女故書而桓三年公子翬如齊逆女宣元年公子遂如齊逆女成十四年叔孫僑如如齊逆女皆主不親迎之説是則公榖及史遷皆以為諸侯當親迎千百年來無有異議矣程子獨辨之曰親迎者迎於其所舘豈有委宗廟社稷而逺適他國以逆婦者非唯諸侯即卿大夫亦然文王親迎于渭周國自在渭旁未嘗出􅆠也况其時乃為公子未為國君其説精當足正千古之繆文定主不親迎之說而又謂或迎于其國或迎于境上彚纂譏其未有定見既曰迎于境上矣則未入境之先安得不以大夫逆之則三公子之如齊迎女禮也既已合禮春秋何以書彚纂譏文定之無定見而究未𤼵明所以書公子逆女之故則此案終未結余懐此疑凡數年後乃因而斷之曰程子之説是也公羊謂譏不親迎非春秋之􅈲史公所云蓋習見漢世尊崇后家而援公羊以為説後儒遂以為定例過矣翬與遂之書逆女也惡其寵逆黨結强援也僑如之書逆女也惡其通國母擅國權也統觀前後經文而聖人之㫖自見與不親迎何涉乎何則翬以隠十一年弑君而桓三年即為命卿而逆女遂以文十八年殺子赤而踰年即冒國喪而逆女此為結援强大以求逭前日滔天之惡僑如以成十四年逆女而十六年即與姜氏謀逐季孟而出奔此為専擅國柄以預釀後日竊國之漸比事觀之而書法之故瞭然矣至紀履繻之逆伯姬以吾女遭人倫之變而特詳之亦初非以其不親迎也夫逆女使命卿其常耳必以為譏不親迎假令婚于秦楚而為國君者將舎國事之重越千里踰時月以求婦乎魯十二公之夫人若子氏若姒氏若歸氏均非若齊魯之近也當日必以大夫迎之而春秋不悉書者此正所謂常事不書也昭公娶于吴而魯之諸公未嘗涉吴境此當使誰迎之乎夫春秋之書來逆者若莒慶若齊髙固此則親迎矣而春秋書之者惡其以大夫伉諸侯而莊宣二公以國君而自屈故特書之其意各有在亦初不闗乎親迎與不親迎也自公羊為此説而史遷祖之後世遂成銕案之不可易雖知程子之説之為是而終莫能撼多為依稀兩可之論㧞本塞源當自公羊始而後是非之説乃定望溪方氏曰國君之禮異於公子士庶人卿逆而迎于境可也越禮而親迎非禮也使親迎為得禮則莊公如齊逆女當以為常事而不書矣春秋大事表卷十九上欽定四庫全書春秋大事表卷十九下國子監司業顧棟髙撰五禮源流口號余作春秋地形口號既竣意有未盡復取所輯五禮表中有鄙見及折衷前説處續成四十四首名曰春秋五禮源流口號凡厯代制作之典禮禮臣之引據與儒者之駁辨各列端緒附註其下貽諸學者用作鼓吹俾知經經緯史具有本末欲達古今之禮者尤不可不通於春秋云緯史經經昔典型樞機端在一麟經史從托始經垂教尼父心傳燦日星一紀事自従周正朔為邦商榷夏殷模夏時冠月支離解厯勘經文總不符二周家改時改月春秋之春正月皆夏十一月也李氏亷曰左氏以正月為建子漢唐諸儒皆以周孟春為建子之月至宋人始有改正朔不改時月之説故程子以書春為假天時以立義則是十一月本非春聖人虚立春字於正月之上以示行夏時之意胡氏因之遂謂以夏時冠周月然考諸經文總無合處汪氏克寛曰時王之厯國史據以紀事若孔子於筆削之始擅改周厯豈特無王又失事實何足以為聖人之經哉另有春秋時令表宣聖無非據事書不行即位自當初宋儒强解従誅削漫謂尼山天自居三隠公元年不書即位胡文定謂春秋首絀隠公以明大法盖為其上無所承内不禀命也髙紫超氏曰春秋諸侯不禀命而無承者徧天下而孔子以本國臣子首削隠公之即位以明王法非尊君父不敢斥言之義又謂文成襄昭哀五君皆書即位既誅首惡此後可從末減隠何獨不幸以春秋之首君而當大罰也至謂聖人作經直以天自處而於此乎何恤焉則尤悖理之甚矣孔穎達据杜氏之説曰隠莊閔僖四君皆實不行即位之禮或讓而不為或痛而不忍或亂而不得國史固無所書非行其禮而不書于文也謂孔子修經削之者本于賈服之徒宗之者始于程子而其説暢于東萊文定据以作𫝊過矣定無正月桓無王一字矜嚴凛若霜終是簡編脱誤處强求義例總荒唐四桓在位十八年凡十四年不書王榖梁曰桓無王也元年書王胡氏謂以天道王法正桓公之罪二年書王正華督之罪十年書王謂天數之終十八年書王謂正桓公之終其立説可謂鑿矣宣亦篡弑何以書王桓既無王而又以元二兩年書王為正桓公及宋督之罪則春秋弑君之賊多矣前後年無不書王者又將以何法正之耶至定公夲以六月戊辰即位是年書春王三月晉人執宋仲幾歸于京師正二月無事可見故不書公榖乃以春王二字讀㫁謂聖人削其正月以牽合定無正之義霞峰華氏曰正月非定之正月春秋無緣預責其罪經本連下三月為句公榖自析而二之何與聖人事耶此等皆曲説不可従者也桓編兩嵗闕秋冬自是當年事適逢漫謂王誅乏天討刪除造化亦何庸五桓四年七年俱不書秋冬自是兩年之秋冬無事可書故闕説者必謂賞以春夏刑以秋冬桓弑君而天討不加是有陽無隂嵗功不能成故特削之四年不書則以天王之下聘七年不書則以榖鄧之來朝天王與列國之諸侯俱無可望者果爾則桓十七年五月公羊不書夏昭十年十二月三𫝊皆不書冬又將何説乎其尤誕妄之甚矣禘祫原來非二名六經𫝊記厯然明緯書創論分三五從此諸家聚訟争六孔穎達曰禘袷一也以其審諦昭穆謂之禘以其合祀羣廟謂之祫商頌長𤼵大禘樂歌也而詳列𤣥王相土成湯禘之即祫明矣三年一祫五年一禘之説出于緯書附合五年再殷祭之文以為僖公二年喪畢而祫明年而禘至八年而再禘秋七月禘于太廟用致夫人是也唐明皇開元六年睿宗喪畢而祫明年而禘自是之後祫禘各自以年不相通數凡七祫五禘至二十七年禘祫併在一嵗有司覺其非乃議以為一禘一祫五年再殷宜通數而禘後置祫嵗數逺近二説不同鄭𤣥用髙堂隆先三而後二徐邈先二後三而邈以為二禘相去為月六十中分三十置一祫焉此最為得遂用其説由是一禘一祫在五年之間合于再殷之義漢唐王業起衡茅强慕黄虞擬禘郊劉祖帝堯曹祖舜唐宗老子更堪嘲七大𫝊曰王者禘其祖之所自出以其祖配之祭法有虞夏禘黄帝殷周禘嚳之文唐趙伯循遂謂禘専祭始祖與始祖所自出而不兼羣廟之主與祫為二朱子遵用其説不知趙何所據依其實漢晉以來馬鄭王服何范杜孔諸儒俱未嘗有此説也諸儒俱謂禘兼羣廟之主如長𤼵之頌𤣥王并及相土成湯春秋禘于太廟用致夫人惟其合祭羣公故夫人亦得致豈有祭始祖與始祖所自出而夫人得與其列者乎禘禮自東周亡而已廢至東漢初緯書盛行張純遂舉三年一祫五年一禘之説以告世祖因據以定禮初欲禘帝堯議者謂漢之王業功不緣堯乃止合已毁未毁之主而祭于髙廟以髙帝為始祖則禘仍與祫不異曹魏文帝祖舜唐元宗天寳元年神仙之説興乃建𤣥元皇帝廟先三日行朝獻禮次日朝饗太廟又次日有事南郊終唐世莫能改可􅅓益甚則皆拘泥祭法攀援傅㑹失之也萬季野云後世宗廟且無始祖又安有自出之祖宗神宗嘗曰禘者本以審諦祖之所自出秦漢以來譜牒不明莫知所本則禘禮固可廢遂詔罷禘祀嗚呼禘禮復行于東漢而罷于宋中間千有餘年皆矯誣之虚祀皆由祭法大𫝊漢儒雜以緯書之説侈談不根後世如鄭𤣥之徒好為曲説以附益之以拘牽為復古以増多為致孝而不知其無當於情實也先王之禮豈如是哉經之可信者莫如中庸論語及春秋皆言禘而不言祫禘即祫也中庸明言宗廟之禮所以序昭穆而下即云禘嘗之禮春秋大書禘于太廟禘于莊公大事于太廟躋僖公禘之為合祭羣廟灼然無疑乃必謂追所自出又謂堯與稷契同出于嚳此乃史遷據世本無稽之説耳詩書及孔孟其言稷契之事屢矣豈嘗有一言及嚳者哉魯僭王朝微不侔只行祈榖不行丘禘同大雩春秋筆失禮之中失禮尤八魯僭王禮凡三禘也郊也雩也然郊亦㣲不同王朝有二郊迎日至之郊其月以日至其日用上辛至啓蟄之月則又祈穀于上帝魯無冬至大郊之事降殺于天子所用者祈榖之郊而已諸侯祭山川皆得雩魯僭王禮特書曰大雩以表其異于諸侯祭山川之雩夫魯之僭乆矣聖人不敢無故斥言君父之過故皆因其尤甚者書之郊不及時則書過時則書僭用日至則書或以凟書紀異書可已不已書雩以過龍見書旱甚書禘以莊公之廟書致夫人書蓋凡合禮則不書也黄楚望氏曰禘者殷諸侯之盛祭周公始定為不王不禘之法成王以周公有大勲勞故賜魯以殷諸侯之盛禮郊大雩則平王之世恵公請之然郊止祈榖望止三猶未敢盡同于王室也别子従無祖至尊禮家持論炳朝暾魯如更有文王廟百代烝嘗厯祖孫九杜註孔疏以魯宋鄭衛四國俱有所出王之廟襄十二年吴子夀夢卒臨于周廟注云周廟文王廟也昭十九年鄭災子産使祝史徙主祏於周廟注云周廟厲王廟也文二年逆祀𫝊宋祖帝乙鄭祖厲王注云宋為王者後得立先王帝乙廟而周制王子有功徳者得廟祀所出之王魯以周公故得立文王廟鄭之桓武世有大勲故得立厲王廟又哀二年蒯聵禱云敢昭告皇祖文王是衛亦以康叔故得立文王廟也其傅㑹左𫝊周廟之言極謬禮諸侯不得祖天子况魯以伯禽為始封祖而周公留相王室故以周公之廟為太廟魯公之廟為世室並百世不毁若更立文王廟則不毁之廟有三周有始祖后稷廟未聞更有帝嚳廟也豈非更超天子而上之乎告朔朝正係典常文公初廢漸淪亡春秋屬筆無窮意魯論猶𫝊愛餼羊十文六年閏月不告朔猶朝于廟十六年夏五月公四不視朔周制天子常以季冬頒來嵗十二月之朔于諸侯諸侯受而藏之祖廟每月之朔則以特羊告廟請而行之謂之告月亦曰告朔因以聴此月之政謂之視朔玉藻謂之聴朔其日又以禮祭于宗廟謂之朝廟周禮謂之朝享其嵗首行之則謂之朝正告朔視朔聴朔朝廟朝享朝正二禮各有三名同曰行之文公以閏非常月故缺不告但身至廟朝謁而已故曰猶朝于廟是幸其禮之不盡廢也至十六年書不視朔是并未嘗朝廟汪氏曰春秋書此即聖人愛禮存羊之意公榖皆曰猶者可以已也杜氏亦曰可止之辭大失春秋之旨朝正闕祭匪今始在楚何煩特筆書屈辱蠻夷危已甚乾侯同志失常居十一襄二十九年春王正月公在楚左𫝊釋不朝正于廟也魯自文宣以後告朔朝廟久廢而朝正猶存以其為三始之正也然嵗首公之在齊晉多矣闕朝正之禮亦不少矣獨于楚書之者公不奔天王之喪而乆留以俟楚子之𦵏屈辱已甚又季武子専國而取卞公畏而幾不敢入已兆乾侯之漸故榖梁曰閔公閔其為楚所制公羊曰存之以係魯國臣民之望也春秋書公在乾侯三皆于正月亦此意致廟説宜從左氏榖梁立母最虚浮躬親主鬯由夫婦􅊔也如何職獻酬十二僖八年禘于太廟用致夫人左𫝊以為致哀姜榖梁則曰立妾之辭也劉向曰夫人成風致之于太廟立以為夫人楊氏士勛曰若如左氏之説則哀姜元年為齊所殺何為今日乃致之由是自胡𫝊以下彚纂所徵引十四家皆從榖梁之説而其實非也木訥趙氏曰先君已死子安有見母于廟之理不詰自屈髙紫超氏曰夫人指哀姜斷無可疑其不稱姓氏而止稱夫人正與前書夫人氏之喪相照霞峰華氏曰致夫人乃致死者非致生者也若如劉向謂致成風于太廟立以為夫人則經當言立夫人不當但言致夫人言致夫人語未竟也且于廟中行冊立之禮以子而冊母古無其禮孫氏又謂以夫人之禮致成風于太廟使之與祭將為主婦而祭乎將以聲姜為主婦而成風與助祭乎尤不可通矣愚案其遲至八年而後致者哀姜見討于方伯醜聲昭著實難入周公之廟故僖公疑而不敢即行然業以夫人之禮葬之又似不得不行故遲至八年始行之此情理之宜有者不必以楊氏之説為疑也繼統繼嗣説縱横漢宋明來最不平春秋僖閔為昆弟三𫝊先加父子名十三文二年大事于太廟躋僖公公羊曰譏逆祀也先禰而後祖也何休註僖公以臣繼閔公猶子繼父故閔公于文公為祖榖梁曰先親而後祖也楊士勛疏親謂僖公祖謂閔公左𫝊子雖齊聖不先父食杜註臣繼君猶子繼父胡安國𫝊曰兄弟不先君臣故三𫝊同以閔公為祖以僖公父視閔公為禮徐氏乾學曰僖雖閔之庶兄而既承其統則降而為子矣閔雖文之從父而既子乎僖則尊而為祖矣王侯之家臣子一例生可以諸父昆弟為臣則其死豈不可以諸父昆弟為子閔公之薨僖公行三年之喪是子為父之服既服子之服豈不可正子之名三𫝊俱指閔僖為父子有明証也又禮記有虞氏祖顓頊而宗堯陳澔註云舜受天下于堯堯受之于嚳故堯授舜而舜受終于文祖蘇氏謂即嚳廟也舜授禹禹受命于神宗即堯廟也即是可以知虞不宗瞽瞍而宗堯是舜亦以堯為父矣父子君臣等大倫生為君父死稱親王公原不同黎庶昭穆當從統緒伸十四宋真宗咸平元年禮院言太祖廟宜稱皇伯有詔集議張齊賢等曰天子絶旁期廟中安得有皇伯之稱為人後者為之子所以尊本祖而重正統也請自今有事于太廟太祖室宜稱孝孫太宗室宜稱孝子徐氏乾學曰太宗以太祖為父常情鮮不驚駭揆以三𫝊譏先禰後祖之義則張公實古之達禮者賈公彦疏周禮冡人掌公墓曰兄死弟及則以兄弟為昭穆各為一世春秋之躋僖乃是升僖為昭以閔為穆世次亂故云逆祀若兄弟同居昭位第位次之逆以為逆祀則以後羣公昭穆仍自不亂何得至定八年始云順祀先公乎最得三𫝊之意孔穎達之説非也劉氏敞曰生既為臣臣子一例若拘兄弟不相為後之説不繼所受國者而繼先君則是生以臣子事之死以兄弟治之是為忘生背死髙氏閌曰既授以國則所𫝊者雖非子猶子道也𫝊之者雖非其父猶父道也漢之恵文亦兄弟相繼而當時議者皆推文帝上繼髙祖而恵帝親受髙祖天下者反不得與昭穆之正至光武當繼平帝又自以世次當為元帝後皆背經違禮而不可𫝊者也明之嘉靖非特不當考興獻并不當考孝宗當考武宗此不易之論明儒已有言之者嬰齊為後本公羊帝室如何與頡頏昭穆自宜嚴世次弟兄相繼溷倫常十五春秋成十五年仲嬰齊卒公羊傳曰為兄後也公孫嬰齊曷為謂之仲嬰齊為人後者為之子也何休謂弟無後兄之義為亂昭穆之序失父子之親萬斯同曰此必周世原有此禮故魯人因而行之孔子據實書之公羊亦仍其舊而𫝊之爾不然魯豈敢剏為此禮而公羊亦豈鑿空妄説者乎且仲遂有弑君大惡若嬰齊後歸父仍稱弟而不稱子則固依然後仲遂矣世徒泥兄弟不同昭穆之説不知古之有國有家者以承祧𫝊統為重原與士庶不同也崑山徐氏辨之曰卿大夫之繼世即與天子諸侯不同蓋天下不可一日無天子國不可一日無君故以弟後兄可以兄後弟可甚至以叔後侄亦可生既為之臣入繼則當為之服斬衰廟食則自當正祖禰之號故三𫝊同以閔公為僖公之父為文公之祖胡氏安國謂兄弟不先君臣此定禮也大夫則不然以别子為祖亦不能臣其宗族自當循昭穆一定之序如歸父無子則當立嬰齊之子嬰齊又無子則當使為攝主以待嬰齊之子之生非如天子諸侯之位不可虚懸以有待者季孫有疾命家臣正常曰南孺子之子男也則以告而立之女也則肥也可此卿大夫之庶子攝位以待宜立者之生之証也不疑大義重朝廷叱縛姦人聴不熒决獄端須經術士公羊畢竟亂前經十六漢昭帝始元五年有一男子自稱衛太子詣闕詔公卿將軍雜識視至者莫敢𤼵言京兆尹雋不疑後到叱從吏收縛曰昔蒯聵違命出奔輒距而不納春秋是之遂送詔獄天子與大將軍光聞而嘉之曰公卿大臣當用經術士明于大誼不疑所据乃公羊之説春秋哀公三年晉趙鞅納蒯聵公羊𫝊曰不以父命廢王父命案不疑之㫁則是也而公羊之説則非也以春秋謂衛輒為當立非冉有子貢之疑而問則夫子之意幾不白于後世矣尹氏公羊譏世卿春秋大義炳然明後人更説鍾巫主强索新竒異義生十七隠三年夏四月辛夘尹氏卒左氏經文為君氏卒謂是隠公之母聲子此全無義理公羊謂是周之太師尹氏世執朝權為周階亂因其告喪以氏書者譏世卿非禮為後鑒也立義極精髙紫超謂與昭二十三年尹氏立王子朝照應其説是已明季氏本更謂是魯之大夫即隠公囚于鄭之尹氏與尹氏歸而立其主者据此則尹氏是羇旅之臣入隠公之世僅一見無甚闗係如何便書于冊恐只是好新之病鄫為莒滅事宜真異姓承祧説好新果爾尼山親斷獄不宜入莒出鄫人十八襄六年莒人滅鄫文定取公榖之説曰非滅也立異姓耳其説與左氏不同霞峰華氏曰莒人滅鄫取鄫之始末左氏備書于冊公榖之説不知何據公羊曰取後于莒榖梁曰立異姓以蒞祭祀果如此則罪在鄫不在莒謀不自莒出與黄歇吕不韋之事不同聖人不正鄫之罪以為寵愛妾立異姓以亾宗祀之戒而顧以滅鄫之罪加之未嘗與謀之莒用法可謂倒置矣趙氏匡亦謂鄫果如此經當如梁亾之類而書鄫亡不得言莒滅季氏本謂滅人國與自殄厥世其事不同其詞亦當有異聖人豈肯含糊不明使人難曉子緣母貴肇公羊千載椒房釀咎殃丁傅並稱帝太后怨生王葬禍深長十九隠元年公羊𫝊曰子以母貴母以子貴漢哀帝欲追尊祖母傅太后及母丁姬詔曰春秋之義母以子貴其尊恭皇太后為帝太太后丁姬為帝太后稱號與王太后並後哀帝崩王莽秉政修舊怨時丁𫝊已前卒迺𤼵冡開槨户周棘其處禍最慘酷趙氏匡謂公羊于經外妄生此文遂令漢朝引以為證首亂大法信矣自第二首起至第十九首止共十八首論春秋吉禮天王宴樂喪中蚤納幣親喪魯不疑天子諸侯俱廢絶只留士禮後人師二十儀禮載士喪禮三篇而無天子諸侯喪禮孟子亦曰諸侯之禮吾未之學滕文公欲行三年之喪而至父兄百官譁然則知天子諸侯喪禮已廢絶于春秋時乆矣觀宣元年公子遂如齊納幣而昭十五年𫝊景王有三年之喪而宴樂已早以天王之貴秉禮之國僴然無所顧忌其他抑又可知惡其害已而去其籍不待戰國時為然也今所𫝊士喪禮以孔子與七十子講明而切究之故能𫝊其餘王公之禮則不可得而考散見于顧命與康王之誥者皆殘闕無首尾杞宋無徵豈獨夏殷之禮哉元凱登朝倡短喪一時議出駭猖狂由來註左先差誤經術旋為倫紀殃二十一昭十二年晉侯享諸侯子産相鄭伯請免喪而後聴命杜註云時簡公未葬明既𦵏則為免喪也昭十五年穆后崩王既葬除喪叔向曰三年之喪雖貴遂服杜云天子諸侯除喪當在卒哭今王既葬而除故譏其不遂杜以卒哭與葬相去非逺同在一月也隠元年歸賵𫝊弔生不及哀註云諸侯已上既葬則衰麻除無哭位諒闇終喪孔穎達曰既葬除喪惟杜有此説晉泰始十年武元楊皇后崩既葬詔議太子宜終服否預言天子諸侯之喪不同士庶既葬除服諒闇以居心喪終制問所據依預厯引左𫝊以證且曰書不云髙宗服喪三年而云諒閽三年此釋服心喪之文也叔向譏景王不譏其除喪而譏其宴樂已早明既葬應除而違諒闇之節也議上太子遂除衰麻諒闇終制于時内外多恠駭謂其違禮以合時預令博士殷暢博採典籍為之證據夫預以一代儒宗至為短喪之議解經之誤至于如此豈非孟子所為生心害政者哉列侯曽不葬天王求賻求金轍迹忙從此冠裳成倒置歸脤錫命紊皇綱二十二平恵定靈四王志崩不志葬赴告及魯而魯不㑹致令天家喪事乏用求賻求金王固可哀而魯之無王亦甚矣而王之于魯也仲子則歸􅈖桓公則錫命僖公則㑹𦵏一再不已尚方之賜貴及寵妾爵命之頒奬及簒弑甚至靈王之崩列侯不遣一介奔喪而相率乆留踰年以俟楚子之葬君臣上下顛倒已甚喪中更築王姬舘弁冕衰麻兩不宜一綫未忘周禮在于郊不許接恩私二十三莊元年春築王姬之舘于外杜氏曰公時在諒閽慮齊侯當親迎不忍便以禮接于廟故築舘于外以迎王姬以為庶幾可以自安榖梁子以為得變之正聲姜卒後毁泉臺總為蛇妖祓禍災若説郎臺郊野外中宫何事惹嫌猜二十四文十六年有蛇自泉宫出如先君之數秋八月辛未聲姜薨毁泉臺孔疏云蛇自宫出而毁其臺則臺在宫内人見從宫而出毁宫并毁其臺也案如此則泉宫當為聲姜所居如東宫西宫之屬在魯宫闑之内因蛇出而聲姜薨遂謂蛇有妖其穴當在臺下故毁宫并毁臺劉氏敞謂迷民以怪如臧文仲之祀爰居信矣公羊謂即莊公所築之郎臺未成為郎臺既成為泉臺胡𫝊及諸儒遂謂文公暴先祖之過夫郎地在今兖州府魚臺縣去曲阜幾二百里為魯邊境安有二百里外見蛇妖而國人疑以為母夫人之祟無此情理當從左氏公羊之説非也文公出絳柩如牛篝火狐鳴原軫謀假托先君行號令左公妙筆亂人眸二十五僖三十三年將殯晉文公于曲沃出絳柩有聲如牛卜偃曰君命大事将有西師過軼我擊之必大捷左公于殽之役𤼵端書此此原軫預探秦謀假托先君以號令其衆也自秦背晉與鄭盟子犯先軫輩憤憤不平乆矣又聞秦將襲鄭視晉蔑如刻欲出師邀擊而恐國中諸大夫有未報秦施之疑故于柩出絳時假神道設教使卜偃𫝊宣以惑衆此陳勝之故智也左公却不説破故至今千載無人曉自第二十首起至二十五首止共六首論春秋凶禮盟㑹初矜特與參屢盟長亂亦何堪霸功既出諸侯一收拾殘黎得枕酣二十六盟㑹例有三兩君相見曰特三以上為參霸者主其㑹為主特與參多在隠桓之世霸統未興諸侯自擅屢盟數㑹旋相背棄兵革交争無所底止有霸者主盟而諸侯始聴命于一無復有特㑹參㑹特盟參盟而兵革亦少息矣先儒謂聖人不得已而與桓文昭定中間霸統絶㑹盟仍復似初年四時之序成功退世運従兹又變遷二十七自昭十三年晉昭公合十四國之諸侯于平丘晉之主盟止于此至昭二十五年為黄父之㑹以謀王室而諸侯不至僅合大夫以謀之天下自此無霸二十六年公㑹齊侯盟于鄟陵始復為參盟參盟自齊桓以來未之有蓋自莊十三年北杏至此凡一百六十五年參盟始再見于經自是之後諸侯復特相㑹大夫且特相㑹而季孫意如㑹晉荀躒于適厯朋比逐君之賊矣馴至陳氏簒齊六卿分晉春秋所以變而為戰國也汶陽歸自袁婁後桓世何嘗返魯田手劒登壇誇大耳史遷漫信豈誠然二十八莊十三年公㑹齊侯盟于柯公羊𫝊曰莊公登壇曹子手劒而從之管仲曰君將何求曰願請汶陽之田桓公許之案成二年鞌之戰及齊國佐盟于袁婁齊人始歸汶陽之田八年晉又使韓穿來言汶陽之田歸之于齊至定十年夾谷之㑹復來歸經文所載甚明齊桓魯荘之世不聞有歸田事曹子刼盟公羊特作誇大語耳榖梁作曹劌史遷又作曹沫列之刺客𫝊殊少着實據左𫝊曹劌論戰係節制之師必不作匹夫之勇此蓋公羊齊人口授相𫝊漫以汶陽歸田事移之此日耳趙氏匡謂桓公未嘗侵魯地及盟後又未嘗歸魯田孫氏覺亦謂事迹既妄不可以訓蔑盟不日惡渝盟柯㑹旋稱信始成一貶一褒同義例妄生穿鑿致紛争二十九柯之盟公榖皆以不日為信考隠元年公及邾儀父盟于蔑莊九年公及齊大夫盟于蔇穀梁皆曰其盟渝也至扈與葵丘桓盟亦有書日者則又遷就其説或以為危之或以為美之何前後之相矛盾若此朱子謂以日月為褒貶穿鑿得全無義理者此類是也滕杞降同伯子號時王貶黜渺難踪試看子産争承日鄭國幾從男賦供三十桓二年滕子來朝杜預從榖梁説以為時王所黜胡氏安國謂如是則春秋不作矣獨其謂孔子貶滕之朝桓更不可通豈有併其後世子孫盡削之耶趙氏匡謂當喪未君滕凡四次來朝皆書子豈其值朝魯偏有喪事程子謂後臣屬于楚滕在春秋又從無屬楚之事其説皆不可通獨程氏沙隨謂當時諸侯多自貶以省貢賦朱子極取之而引昭十三年平丘之盟子産争承以為證此最顯然者然李氏亷又謂諸侯降爵惟滕薛杞滕薛可云自貶杞于莊二十七年稱伯僖二十七年稱子文十二年稱伯至襄二十九年又稱子則前説又難通而欲更取時王黜陟之説愚謂此因貢賦一時之盈絀以為升降無可疑也杞于僖二十七年來朝僖怒其禮簡是秋使公子遂入杞襄二十九年來盟是時晉平公為杞之甥率諸侯城杞且使魯歸杞田杞蓋挾晉之勢從簡禮以要魯魯史俱不沒其實書之曰子以後終春秋並稱伯此又情事之顯然者若云時王黜陟不應倐升倐降進退無常若是則自貶之説信不可易也紀本侯封更不疑隠編闕略啓支辭漢家增飾褒封例外戚恩私國柄移三十一桓二年紀侯來朝紀本是侯爵緣隠二年書紀子伯莒子盟于密是闕文程子曰當書紀侯某伯莒子盟于密何休註公羊遂謂紀本是子爵因天子將娶于紀故封之百里以廣孝敬榖梁註亦謂時王所進爵由是後世遂啓光寵外家之漸班固外戚恩澤侯表序有云后父據春秋褒紀之義應劭云王者不取于小國天子將納后于紀先褒子爵為侯漢世立后先進其父為大司馬大將軍封邑侯恩澤之濫自此始則皆不知紀子伯之為闕文而誤創褒紀之説誤之也㑹稷澶淵特筆書宣尼深意顯然攄全經即事明褒貶不用深文蠧簡餘三十二桓二年書㑹于稷以成宋亂襄三十年書㑹于澶淵為宋災故此春秋一經之特筆未子謂春秋大義數十炳如日星此類是也餘皆據事直書而義自見更有闕文如紀子伯莒子盟于密之類當直㫁為紀侯不用曲説朝聘往來禮所宜春秋以力定崇卑襄昭旅見朝荆楚滕薛從無報聘時三十三大戴記朝事篇載諸侯相朝之禮齊等之國往來報施其常也春秋之世以小弱朝强大故魯之所如者齊晉至襄昭之末且旅見而朝于楚而三國未嘗朝魯也魯之所受朝者滕四杞邾各七曹小邾各五郯子二薛紀榖鄧鄫郜蕭叔各一魯皆未嘗報聘宋虢尋盟華裔併桓文事業一朝更從今禮義冠裳國僕僕南征向楚廷三十四襄二十七年宋之盟晉楚之從交相見虢之盟以舊書加于牲上而已自是魯鄭諸國皆旅見于楚送楚子之葬賀章華之臺以天子之禮事之而楚靈遂獨主盟合十三國諸侯于申滅賴滅陳滅蔡兵終未嘗弭向戌為成説弭兵意従休養息紛争終成和議秦丞相隳却金湯萬里城三十五自向戌弭兵之後晉偃然弛備霸業遂隳楚遷陳蔡許道房申于荆吞滅列國春秋之局從此大變以講好息民為辭後來秦檜祖此同盟本出周典禮壇祀方明自昔年同志尊王同外楚紛紛均未是真詮三十六春秋書同盟十有六齊二晉十四説者棼如亂絲杜預言服異胡文定言惡反覆止齊陳氏臨川吳氏皆謂同者衆詞或者又謂覇業未盛伯業既衰則書同盟惟劉原父引殷見曰同諸侯覲于天子天子為壇祀方明是為方岳同盟之禮齊桓懼天下諸侯有弗同故假此禮以號召諸侯同盟自是當日載書之辭故葵丘之盟曰凡我同盟之人其有不書同者亦當日自不行同盟之禮而非聖人許之而書同更非惡之而書同也若如諸儒之説則以為惡其反覆而書同又以為許其同欲而書同是後世舞文亂法之所為聖人書法不如是自第二十六首起至三十六首止共十一首論春秋賔禮蒐狩第云譏不時宣尼載筆有深思特書大蒐同王制昭定中間柄倒持三十七蒐狩合禮不書非時非地及越禮則書昭定二公書大蒐四以用天子大蒐之禮也大蒐大閲凡王所舉皆曰大不書公是時政在三家公不得専國雖公自行而不書以志變也出境専行係閫司其餘遂事有深譏匡衡妬媢因經義不許陳湯斬郅支三十八春秋凡書遂者皆惡之桓八年祭公來遂逆王后于紀莊十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟皆惡其専擅無人臣之禮漢陳湯甘延夀出使外國矯制𤼵兵斬郅支單于匡衡謂其為國生事幸不加誅不宜復加爵土先儒謂得春秋譏遂事之法齊襄滅紀志兼并九世之讐最不情一自公羊生異義空教漢武黷邉兵三十九莊四年紀侯大去其國蓋齊襄公滅之也齊之欲吞紀乆矣自桓之五年齊鄭如紀以至莊元年三年凡闗紀之存亡者一一備書至是不書出奔而書大去蓋聖人憫之也公羊則謂為襄公諱襄公之九世祖哀公烹乎周紀侯譛之以其能復逺祖之讐故為之諱至漢武帝太初年欲遂困胡下詔曰昔齊襄公復九世之讐春秋大之遂至兵連不解殫財喪師流血千里公羊一言之流毒至于如此自三十七首起至三十九首止共三首論春秋軍禮常事婚姻例不書親迎納幣義何居强鄰壓逼甘卑屈仇女親喪總蔑如四十納幣親迎昏禮之大節春秋合禮則不書僖公襄公是也大惡諱則亦不書昭公之娶孟子是也其餘失禮則書納幣使大夫不書文公喪未畢而公子遂納幣則書親迎不書莊公娶仇女則亦書莊公書納幣娶仇女而又親納幣失禮之中又失禮也其餘桓文宣成四君之書逆皆譏其不親迎左氏以卿逆為合禮失之矣仇女為婚亂紀常丹楹刻桷媚閨房小君覿幣殊恩寵終使身罹艷婦殃四十一莊公忘其父而娶仇女冒親喪而躬納幣二年之間三至齊廷盟于防遇于榖盟于扈其未至也如齊觀社以炫其車服丹楹刻桷以誇其富盛親逆而不與俱入既至而覿見有加于此見夫人之伉莊公之卑異日通慶父弑二君之禍兆矣春秋自莊二十二年髙傒盟防至二十四年大夫宗婦覿用幣詳書凡十四事以志履霜堅冰之戒髙固來迎子叔姬以臣相伉躐尊卑為因簒弑求援立屈體成婚更不辭四十二宣五年秋齊髙固來迎子叔姬左𫝊是年公如齊髙固使齊侯止公請叔姬焉至秋而來逆魯宣以不義得國倚齊自固連昏于齊之大夫而不以為耻卑屈甚矣逆女須親禮典明僑如翬遂著譏評委捐社稷躬迎婦説本伊川義更精四十三隠三年紀裂繻來迎女公羊云外逆女不書此何以書譏始不親迎也太史公外戚𫝊云春秋譏不親迎索隠引此𫝊文為証而桓三年公子翬宣元年公子遂成十四年公孫僑如之如齊逆女皆譏其以大夫逆自公榖至史遷皆主其説幾成鐡案矣程子獨非之曰親迎者迎于其所舘豈有委宗廟社稷而逺適他國以迎婦者文王親迎于渭自在周境内未嘗出疆况文王當日乃為公子未為國君其言極是有理彚纂從其説故于此三年之傳凡主榖梁譏不親迎者皆刪但不别解春秋所以書逆女之故終是未有定見愚㫁之曰公羊之説非也逆女無不以大夫迎者紀履緰來逆女乃因吾女伯姬之遭變而特詳其事如宋伯姬之書公孫夀來納幣非譏其以大夫逆也翬遂譏其寵任簒弑僑如譏其通國母而擅權義在翬遂與僑如而不在逆女必謂譏其以大夫逆則如晉之取女于齊楚之取女于晉俱隔二三千里之逺而必責國君之親往乎其理亦不可通矣故必先破公羊之説而後是非乃定自四十首起至四十三首止共四首論春秋嘉禮膝下授經讀左氏老來仍復手殘編廢興典禮千秋訟端緒須從箇裏研四十四余年十一嵗時膝下受讀左氏全本迄今五十二年矣附厯法口號一首厯法精明肇太初從前悠繆總紛如春秋連月書頻食漢代初年尚有諸春秋襄二十一年九月十月朔連食二十四年七月八月朔連食厯家推算無連月頻食法西厯則謂日食之後越五月越六月皆能再食是一年兩食者或有之連月而食則㫁無是也是時周厯法已不准致有此誤武王定厯至此已及六百年後王無能更正至漢武帝用司馬遷等言造太初厯厯法始精密以前厯紀廢壊自周末厯秦及漢初日食及置閏俱錯繆秦置閏多在嵗終恒書後九月漢髙帝三年及文帝前三年俱于十月晦十一月晦頻食皆是厯法未更正之故也詳見天文表叙後春秋大事表卷十九下
