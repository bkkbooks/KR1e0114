body:
  text: 春秋大事表卷二十七國子監司業顧棟高撰宋楚争盟表孟子曰以力􅖍仁者伯伯必有大國説者謂宋襄之執于盂傷于泓由其國小力絀使然其説得之矣而不盡然也以宋襄之國而茍以齊桓之道用之則亦可以不至于敗以齊桓之大而茍以宋襄之術馭之則傷威損重其去楚靈也不遠蘇子有言人有十夫之力茍終日狂呼跳浪則三尺童子亦可制其後我觀齊桓之伯葢終其身未嘗用戰争之力也存三亡國而未嘗加兵于狄合八國之師整兵召陵成盟而退其于淮夷山戎止以先聲駈之務在保安弱小使各安宇下而已而又能克己以下小國遇魯則身至魯地遇宋則序先宋人其興師嘗更迭用之令各就近為侵伐而不役之于遠故東征西討而民力不疲數動與國而諸侯不怨而宋則反是方齊桓之卒也汲汲乎欲代其任而首先與齊戰幸而一勝則翹然自喜以為天下莫與敵于是一㑹虐二國之君五年之中無嵗不興師伐曹伐鄭馴至排不測之強楚軍敗國蹙旋以身斃嗚呼其輕用民力若是雖使齊晉之大其能有濟哉夫以晉文之兵力猶兢兢示禮示信示義逮合齊秦兩大國而後敢與楚戰宋襄以孤軍單進又不乗險擇利雖以晉文處此亦必敗而況小國乎後來惟楚靈以咆哮之質適當晉之不振威脅小國北方之諸侯俯首帖耳恐後然未㡬而外怨内叛棄疾一呼反者四起適趣其申亥氏之變此所謂有十夫之力而終日狂呼跳浪以至于斃者也如宋襄者則以尫弱之夫而舉鼎絶臏而死豈不可哀也哉輯春秋宋楚争盟表第二十七春秋於齊晉外尤加意於宋論公羊屢發𫝊為王者之後記異先儒深闢之以為杞亦王者之後何以不記不知公羊之説未可厚非也杞棄其故都而自即於東夷無闗於天下之故而宋居天下要樞晉楚之所視以為強弱故春秋恒重之亦初不因其為王者之後也考春秋一書書雨螽于宋隕石于宋五六鷁退飛過宋都以及宋大水宋災他國之災異未有如此其詳悉者也又如㑹未有書其所為者而㑹于稷則云成宋亂㑹澶淵則曰宋災故是聖人特筆志貶盟亦未有書其所為者盟于薄則曰釋宋公是聖人特筆志襃晉楚争宋鄭而鄭及楚平春秋不志至宣十五年宋人及楚人平大書特書葢宋為中國門户常掘強不肯即楚以為東諸侯之衞至宋即楚而天下之事去矣故晉文晉悼之興首有事于救宋先軫曰取威定伯於此乎在韓獻子曰成伯安疆自此始宋之闗於天下利害非細故也楚頵之猾夏也於僖二十六年圍宋楚莊之争伯也於宣十四年又圍宋至向戌為弭兵之策合天下諸侯盟于宋而伯統絶而蠻夷横矣謂春秋全無意於宋者豈識春秋之㫖哉春秋大事表卷二十七
