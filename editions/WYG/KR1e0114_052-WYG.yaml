front:
  text: 讀春秋偶筆春秋一書一以存綱紀一以紀世變如吴楚本僭稱王
  hash: sha256:7f48dfa3070aebb1a02ca61b1122743cbe9dc47294fa83b88ecbb68ffc77835b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0114_WYG_052-1a, image: WYG0180/WYG0180-0260c.png}
body:
  text: 春秋止書曰子又如吴楚之君不書葬此聖人之不因魯史特削以示義所謂存綱紀也又有世變所趨不得不存之以紀其實如楚始書荆人繼書楚人後書楚子此因其勢漸盛交通于中國魯史書之聖人亦因而不變所以紀世變也若概書曰荆則蠻夷猾夏之實轉不可得而見乃或以為嘉其慕義而進之或因一事之合禮而褒之皆非也罪莫大于觀兵問鼎而聖人書曰楚子伐陸渾之戎諸儒又將何說哉春秋中葉或前書楚子後書楚人又書楚師後又復書楚子諸儒以為褒貶所係皆非也如城濮柏舉俱戰稱楚人敗稱楚師葢立文不得不如此爾其餘或書爵或書人以君不在而大夫將則稱人或以討賊之義予之則稱人宣十一年楚人殺陳夏徴舒如蔡人殺陳佗衛人殺州吁之類是也間有君將而亦書人者如齊人伐我北鄙楚人陳侯蔡侯鄭伯許男圍宋亦義存乎其事初不以稱人為貶如以為貶則楚子蔡侯次于厥貉滅蕭伐宋圍宋其憑陵上國甚矣聖人反書爵以予之乎春秋有只一書以見義者如子同生肆大眚鄭棄其師成宋亂宋災故王室亂終春秋不再見此聖人之特筆不必屬辭比事而可知者也有屢書再書不一書以見義者如桓五年齊侯鄭伯如紀至莊四年齊侯葬紀伯姬首尾凡十七年書紀凡十四事著齊首滅國而紀委曲圖存終不得免憫紀之亡而傷齊之暴也桓三年正月公㑹齊侯于嬴至冬齊侯使其弟年來聘一年之中連書六事皆為昏文姜莊二十二年及齊髙徯盟于防至二十四年大夫宗婦覿用幣三年之中連書十四事皆為昏哀姜志閨門之禍謹履霜之漸詔天下後世以閑有家之道也自桓十八年公㑹齊侯于濼至莊元年王姬歸于齊兩年之中連書九事志魯桓之見殺于齊而魯吞聲飲恨為可憐而可痛也自莊二年夫人姜氏㑹齊侯于禚至莊八年齊無知弑其君諸兒七年之中連書凡十七事志齊襄之淫恣夫人之無恥而魯莊之忘父事仇縱母淫奔更㑹狩㑹伐以取媚至元凶就殛而後已為悖天而逆理也自莊九年齊人殺無知至十三年公㑹齊侯盟于柯五年之中連書凡十一事志莊公之忘父仇而欲定仇國納子糾又見殺與齊為難至桓公定伯而後已也自僖十七年齊侯小白卒至二十七年楚人圍宋公㑹諸侯盟于宋首尾十一年連書凡三十四事志宋襄嗣伯無功荆楚暴横莫制諸夏瀾倒汲汲有左袵之憂而晉文之出為刻不可緩也自僖二十八年春晉侯侵曹晉侯伐衛至二十九年盟于翟泉兩年之中連書凡二十三事志晉文之一戰而伯諸侯翕然背楚歸晉如日中天患楚之深故予晉之亟也自僖三十三年晉敗秦師于殽至文五年楚人滅六六年之中書晉秦楚三國凡九事志秦晉搆難晉人失援而楚得滅江滅六鴟張無忌也自文十六年楚人秦人巴人滅庸至宣十五年宋人及楚人平首尾凡十八年書晉楚凡二十事志楚莊桀驁晉伯中衰楚得挾義聲以鞭笞列國馴至入陳服鄭并得宋幾有天下之半也自宣十年公孫歸父如齊葬齊惠公至宣十八年歸父還自晉及笙遂奔齊九年之中書歸父凡八事志宣公德襄仲而寵任其子主㑹盟専征伐頓出季孫之上卒至力小任重謀去三桓君薨而身見逐也自成二年楚公子嬰齊㑹十二國之大夫于蜀至襄二年公㑹諸侯于戚遂城虎牢首尾凡十九年書晉楚凡十一事志楚勢鴟張鄭尤屢服屢叛雖以鄢陵之勝而不能得鄭必扼其要害而後乃服從也自襄元年圍宋彭城至十一年㑹于蕭魚書晉楚魯宋陳鄭凡三十四事志晉悼再伯勤宋以為伯之始服鄭以為伯之終晉盛而楚不能抗也自昭二十二年天王崩王室亂至昭三十二年城成周首尾十一年書朝猛敬王凡十四事志王室不綱晉亦失伯不能急救天家之難陵遲至十年之久也自昭二十五年鸜鵒來巢至定元年夏六月公之喪至自乾侯戊辰公即位首尾凡八年書昭定之廢立二十四事志季之强横昭之屈辱而天下無伯之非細故也自哀元年仲孫何忌帥師伐邾至八年歸邾子益于邾八年之中書邾魯凡十一事志三家死君忘父定公骨未寒而殘虐邾國卒至吴齊交伐而後乃悔禍而存亡國也此須合數十年之通觀其積漸之時勢真如枯旱之望雨聖人之意自曉然明白于字句之外而豈以一字兩字稱人稱爵為褒貶哉春秋二百四十二年時勢凡三大變隠桓莊閔之世伯事未興諸侯無統㑹盟不信征伐屢興戎狄荆楚交熾賴齊桓出而後定此世道之一變也僖文宣成之世齊伯息而宋不競荆楚復熾賴晉文出而復定襄靈成景嗣其成業與楚迭勝迭負此世道之又一變也襄昭定哀之世晉悼再伯幾軼桓文然實開大夫執政之漸嗣後晉六卿齊陳氏魯三家宋華向衛孫寗交政中國政出大夫而春秋遂夷為戰國矣孔子謂自諸侯出自大夫出陪臣執國命實一部春秋之發凡起例逐年有發端逐代有結案有起伏有對照非可執定一事以求其褒貶也春秋大患在楚堪敵之者惟晉然必晉與秦合而後可制楚僖二十八年書晉侯宋公齊師秦師戰于城濮晉秦合志晉伯之所以盛文十六年書楚人秦人巴人滅庸秦楚合志晉伯之所以衰此對照也中原之要害在宋鄭晉得鄭則可屏蔽東諸侯楚得宋而患且及魯宣十五年夏宋人及楚人平而其年春公孫歸父先㑹楚子于宋此楚伯之極熾也襄十一年諸侯㑹于蕭魚而楚旋執鄭良霄不復以鄭為事此晉伯之極盛亦一對照也齊伯息而宋興宋襄死而晉興晉成景不競而楚莊熾楚莊死後幾及二十年而晉伯復盛此起伏也齊合江黄為召陵之師而江黄卒見滅于楚晉合齊秦以戰于城濮遂一戰而伯此對照也秦自殽之戰仇晉而與楚合晉伯不競者數十年晉不得不通吴以犄楚成十五年㑹吴鍾離此發端也至哀十三年晉楚俱衰而吴復熾與晉争伯黄池之㑹此結案也齊桓之發端在北杏首欲得宋屢為興師伐鄭伐郳至僖十五年牡邱之盟宋即伐曹以與齊貳此結案也宋襄之發端在甗之戰以立孝公攘齊之伯至敗泓之後齊即伐宋圍緡此結案也晉文之發端在踐土以尊王迨其末也昭三十二年㑹諸侯城成周亦以勤王室此結案也夫子直書其事而天下之大勢起伏自見褒貶即存乎其間矣看春秋眼光須極逺近者十年數十年逺者通二百四十二年自桓二年蔡侯鄭伯㑹于鄧始懼楚此發端也至定四年蔡侯以吴子及楚人戰于柏舉楚師敗績庚辰吴入郢是結案志蔡之積怨而能報楚而褒即寓其中矣自僖十九年陳人蔡人楚人鄭人盟于齊此發端也至昭八年楚師滅陳是結案志陳之招楚適自貽患而貶即寓其中矣隠十一年鄭伯入許此發端也至定六年鄭游速帥師滅許是結案志鄭之志在吞許厯二百八年之久而卒滅之以著鄭之暴而中間之許叔入許及許之四遷鄭之屢次伐許圍許皆其聯絡照應也僖十五年宋人伐曹此發端也至哀八年宋公入曹以曹伯陽歸是結案志宋之志在并曹厯一百五十九年之久而卒滅之以著宋之暴而中間之盟于曹南及屢次之圍曹伐曹皆其聯絡照應也成七年吴伐郯此發端也至哀十三年於越入吴是結案志吴之暴興而亦速斃而中間之入楚破齊與晉争伯皆其倐忽變幻也隠四年書翬帥師而十一年有鍾巫之禍宣二年書公子歸生帥師而四年有解黿之禍宣元年書趙盾帥師趙穿帥師而二年有桃園之禍成六年八年九年連書晉欒書帥師而十八年有匠麗之禍此起伏之在十年以内者葢弑君有漸其大要在執兵權不至弑君不止滅國亦有漸其大患在數侵伐不至滅國不止聖人灼見諸國之時勢亂賊諸人之心事而次第據實摹寫之故曰春秋成而亂臣賊子懼盟㑹不書公左氏俱以為諱不知此經文偶闕公字耳公穀現有公字又當如何立説國惡莫大于成宋亂及文姜之如齊如莒此而不諱何獨諱此乎余於先儒及近代春秋説瀏覽幾遍然十分愜意者頗少惟孫明復孫莘老及陳君舉三家為差勝餘如程積齋或問家則堂詳説儘有佳處然俱以春王正月為夏正鄭漁仲亦祖其説最後讀黄東發日抄亦無確見姑從戴氓隠在東宫所講謂三代雖有改正朔之事而天時恐無可改何其不細玩經文而但惑于冬不可為春之説也此不須别説只經文春無氷及春王正月日南至二句便確然是周正無疑只張翠屏先生春王正月考是不磨之論葉少藴夢得説執曹伯畀宋人謂宋人下當闕一田字此千古隻眼然以十二公配十二月周官三百六十職配三百六十日迂騃可笑趙木訥多于三𫝊之外摹擬揣度另造事端亦未可信惟本朝方望溪及張􅂜歎二先生所著得聖人之心什八九矣鄭夾漈謂説春秋有三家有以春秋為一字褒貶者有以春秋為有貶無褒者有以為褒貶俱無者泥一字褒貶之説則春秋一書字字氷霜劍㦸聖人之心不如是之勞頓也泥有貶無褒之說則春秋乃司空城旦之書聖人之心不如是之慘刻也泥褒貶俱無之說則春秋又似叢語瑣說聖人又非無故而作經也鄭氏之言極是聖人之心正大平易何嘗無褒貶但不可于一字上求褒貶耳孟子明言其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣如以為無褒貶則是有文事而無義也如此則但有魯之春秋足矣孔子更何用作春秋乎近日有厭支離之說而竟將春秋之褒貶抹去者矯枉過正亦非聖人之意有以春秋為有筆無削者是即無褒貶之説也夫未修之春秋即不可得見而左氏之書具在如襄公親送葬楚子昭公昏于吴豈有不遣卿大夫往㑹吴楚葬之理而終春秋吴楚之葬不書此削之以示義也襄公葬楚子不書而于二十九年春王正月公在楚見之昭公昏于吴不書而于哀十二年書孟子卒見之此削之以示諱也又如十二公之納幣逆夫人魯史皆書而春秋于僖公襄公不書此所謂合禮不書也世子生皆書而春秋止書子同生此所謂常事不書也此皆其顯然可見者如以為有筆無削則春秋竟是一部鈔胥何足以為經世大典乎春秋有以一事而繁稱不殺曲折盡意不煩傳說而顯然明白者如隠七年春天王使凡伯來聘戎伐凡伯于楚邱以歸凡十六言則志王室凌夷外裔肆横衛不修方伯之職魯不行報聘之禮為可誅也桓二年春公㑹齊侯陳侯鄭伯于稷以成宋亂夏四月取郜大鼎于宋戊申納于太廟凡三十言則志公納寵賂成簒弑而又薦于周公之廟為蔑王章而紊祖制也莊八年春師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還凡三十言則譏其老師費財連結與國親仇讐而滅同姓也宣四年齊侯平莒及郯莒人不肯公伐莒取向凡十五言則譏其恃强凌弱强人從我借公義以濟其貪欲也成二年六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊師戰于鞌齊師敗績凡四十三言則譏其以忿興兵魯四卿並出三國之大夫皆以名見兵權下擅為大夫執政所自始也成七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛不郊猶三望凡二十七言則譏其違天僭禮可已而不已也此非貶乎而謂藉一字以貶乎僖四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘夏楚屈完來盟于師盟于召陵凡四十二言受盟而退不用力征僖二十八年夏四月乙巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹凡五十二言一戰勝楚天旋地轉襄十九年秋七月晉士匄帥師侵齊至穀聞齊侯卒乃還凡十八言行師得禮卒格逺人此非褒乎而謂藉一字以褒乎又如盟㑹邾莒滕薛皆稱人雖晉宋亦間有稱人者略之也文七年十五年十七年扈三次㑹盟俱不列序諸侯而定四年召陵之㑹十八國之諸侯無不列序其爵者則以楚瓦不仁從楚諸侯悉起從晉而荀寅以求貨而失此機㑹為可惜也昭十三年平邱之㑹十四國之諸侯無不列序其爵者則以棄疾新立楚方内亂晉復得宗諸侯而叔向徒盛兵威而失此機㑹為可惜也此皆有關于天下之大者春秋二百四十二年事勢數變如髙山大川學者須髙處立大處看形勢曲折髙低起伏自見若區區執定一句又求之一字兩字如鑽入鼠穴聖人之心不得出矣春秋又有各為一事不宜連屬看者如莊二十二年肆大眚與下葬文姜自是兩事而穀梁彊連之謂文姜罪本不應葬若不赦除衆罪而書葬為嫌天子許之二十四年戎侵曹曹羈出奔陳與二十六年曹殺其大夫自是兩事而公羊彊連之謂殺大夫不死曹君之難者僖十四年沙鹿崩與十五年韓原之戰自是兩事而左氏彊連之謂期年將有大咎幾亡國文十二年杞伯來朝與下子叔姬卒自是兩事而左氏彊連之謂來朝時請絶叔姬而無絶昏十四年齊人執單伯齊人執子叔姬自是兩事而公穀彊連之謂單伯淫乎子叔姬支離扭揑增造事端此以屬辭比事而誤用之者也先儒說春秋為孔子之刑書凡誅殺爵命之見于經者皆罪也如天王殺其弟佞夫此不當殺而殺也殺王子朝則不書矣宋公殺其世子痤晉侯殺其世子申生此不當殺而殺也鄭殺其世子華則不書矣刺公子買刺公子偃皆無罪也殺公子慶父則不書殺公子牙則變文書卒矣春秋書爵命三皆譏天王之濫賞也他如錫齊桓公命錫晉文公命錫晉惠公命錫衛襄公及齊侯環命無論當否皆不書此詳内而略外也謂聖人貶桓文之功而削之亦非也僖王以一命命曲沃武公為晉侯此最害理而春秋不書此時晉未通于中國不告故魯史亦無從而書也大抵觀其不書者而聖人特書之㫖自見此最是看春秋之一法莊十二年宋萬弑其君捷及其大夫仇牧据左傳華督亦見殺督為正卿宋之赴告自必先于牧此是魯史書之而聖人削之也近日毛大可氏乃云此是宋人不赴故不書若云孔子削之是絶人自新之路唐堯衛武俱稱晚葢此論殊謬夫弑君大惡豈有可改過自新之理堯簒帝摯衛武弑其兄和而自立此野史誣㒺之言豈可信乎此過執春秋因魯史之言而失之者也未修之春秋明見于左傳者有二其一見宋華耦之言曰臣之先臣督得罪宋殤公名在諸侯之策其一見衛寗殖之言將死召惠子曰吾得罪於君悔而無及也名在諸侯之策曰孫林父寗殖出其君此各國皆書魯之春秋亦然而仲尼一因之一改之曰衛侯出奔齊以自奔為文葢弑君則責在臣子之討賊君出奔而將來復入為君如此書自覺非體書君自出奔以全君臣之分也此聖經改魯史之鑿然可據者孟子曰孔子懼作春秋春秋天子之事葢孔子作春秋天王亦在誅貶之列然不過直書其事而自見如隠公不朝聘天王而王遣使賵惠公之妾桓公弑其兄而王追錫桓公命文姜弑其夫齊襄淫其妹而王使魯主王姬之昏三綱淪九法斁昭然具見初不必名宰咺王去天以示貶也故曰春秋天子之事桓文亦假托其事者故聖人亦有取焉然齊桓之一匡九合可取而其滅譚滅遂降鄣之罪不得為桓公諱也晉文之勤王定伯可取而其召王巡狩擅執衛侯之罪不得為文公諱也葢春秋只列各人之供招罪狀未嘗判斷謂某人應得何罪某人應麗何條朱子云當時只說張三打李四李四打張三未嘗判定云張三應杖六十李四應杖四十春秋云諸侯盟于扈見文七年從此無天子曰大夫盟見襄十六年從此無諸侯齊桓死而僖公至以楚師伐齊取穀晉伯息而哀公兩㑹吴伐齊夫子所以有被髪左袵之懼胡傳云王朝命大夫例書字附庸之君例書字案尊卑有定位若諸侯書名而大夫書字侯伯書名而附庸之君反書字聖人之立法疑倒置矣此不過因邾儀父及王人子突稱父稱子有類于字耳不知齊侯禄父蔡侯考父季孫行父皆名也無以見儀父之為字也齊子糾鄭子儀子亹子臧子華皆名也無以見子突之為字也春秋無書字之法邾子克是儀父之子不得謂儀父之名方氏苞曰克與儀父非一人儀父之卒不書至克而後書卒耳儀父之卒當于桓之末年史稱定哀多微辭而聖意未嘗不顯然昭三十年三十一年三十二年春王正月三書公在乾侯公薨于乾侯六月癸亥公之喪至自乾侯戊辰公即位則昭公死于客殯而定公受國意如之情事顯然矣六次如晉至河乃復則季氏連結晉之權臣仲縮由已而公束手受制之情事顯然矣城啟陽及屢次用師于邾或書三卿或書二卿則兵權一手掌握而欲吞滅列國以自肥之情事顯然矣兩次㑹吴伐齊皆書公齊為仇讎之國三子坐享厚實以危難之事委其君欲陷公死地之情事顯然矣此皆聖人所親見故備書之當日史官為季氏之黨阿奉意指未必能詳盡如此諸侯失地名滅同姓名然有滅同姓而不名者如齊侯滅萊楚子滅夔晉滅虞滅虢是也有失地而不名者如齊人滅譚譚子奔莒楚人滅弦弦子奔黄狄人滅温温子奔衛是也戴記乃出公穀之後拾三傳之緒餘以成文耳學者顧欲據理以論春秋過矣滅同姓書名獨衛侯燬然朱子疑為羡文失國書名獨徐子章禹先母舅云且須闕之闕之無傷于春秋之大義不得以一事著為定例惟滅國而以其君歸者則書其君之名如鄭游速帥師滅許以許男斯歸宋公入曹以曹伯陽歸晉人滅肥以肥子緜臯歸滅鼔以鼓子䳒鞮歸此不過因赴告之辭耳葢滅國則但以得地告至其君則但云奔某國不必及其名也以其君歸則須有獻俘之禮不名則不可以告宗廟因而赴告列國魯史書之聖人因而弗削初非名之以甚其罪亦非不名以減其罪也夫遯逃苟免與身為囚俘其失守宗祧之罪等耳直書而義已見何用名與不名以别其輕重乎黄東發謂學春秋者只當就春秋之世以求聖人之心此語最合後儒乃動以五帝三王之事律之如彭衙之戰文定謂宜加以文諭不從乃更告之天子方伯不宜遽興師與戰晉悼三駕或謂逺人不服當修文德以來之未聞道敝諸侯以服之如此則當安史之亂唐室只須仗義執言不煩李郭之苦戰而聖人當日遇着桓魋亦可以禮感化何為微服而過宋乎無怪乎明季闖冦憑陵畿甸垂破而儒臣召對猶以舞干羽為言者此種議論則讀聖經乃是喫騃藥何益于救世哉春秋何以托始乎隠或謂以隠之讓國而賢之或謂春秋托始于桓王皆非也東遷後弑君之獄自衛州吁及魯桓公始而桓之弑隠實有以召之寵任羽父及菟裘不早斷馴致大禍故曰為人君父者不可以不知春秋春秋凡書城築皆譏無論時不時也城郚城中邱則以怯敵書城向城諸及鄆則以啟釁書城費城成郛則以三家營私邑書城漆城啟陽城邾瑕則以恃强凌弱小書城杞則以受役于强大書其非時與帥師者則罪又甚焉葢春秋一書聖人特書以垂戒為百王法未有無故而書者也魯方百里五所統凡數十百城二百四十二年之中城壊而修亦極常事何足重煩聖人之筆乎外此如城邢城楚邱城縁陵為聖人許之乎曰此春秋以紀世變也天王失政外裔交侵小國不能自立賴桓公修方伯之職帥諸侯起而城之聖人所以不得已而思伯予之亦傷之也降此而城成周抑又甚焉王室内亂流離顛越十年之後又乞城于諸侯書此而天王之孱弱晉伯之怠緩俱可概見此皆有闗于天下之大者凡褒貶無闗于天下之大故不書二百四十二年君卿大夫之賢奸善惡千態萬狀而欲執書名書字書族書爵書人書滅書入及日月時等十數字以概其功罪為聖人者亦太苦矣不知下筆時費幾許摇頭苦吟竄易數四而後斟酌定此一字作春秋不亦勞頓乎如此幾同俗吏之引例比律與鯫生之咬文嚼字聖人心事光明正大決不如此春秋只須平平看下去自如岡巒之起伏世運十年而一變或數十年而一變聖人苐因其世變而據實書之如春秋初年猶以滅邑為重至其後則滅邑不書而滅國書矣猶有未賜族之大夫須命于王朝至其後列國之大夫無不氏與族者矣春秋中葉猶書諸國伐我北鄙南鄙東鄙至定哀則直書伐我直造國都而四鄙不足言矣荆初年猶舉號繼而書楚人繼而書楚子最後但書楚之大夫兼及吴越南風滋競中夏反受其䕃庇矣列國㑹盟征伐初皆書君其卿大夫則稱人無有以名氏見至末年而但書大夫之名氏政自大夫出而君位幾如贅旒矣通春秋之蒐狩皆書公至定哀之蒐狩不書公君無一民一旅其得失皆與君無預矣此皆春秋大變故而聖人書法苐據當日之時勢初非設定一義例謂有褒貶于其間也看春秋須先破除一例字胡文定謂凡書救未有不善此亦不可以一例拘也僖二十八年楚人救衛襄十年楚公子貞帥師救鄭聖人非是許楚乃是罪鄭衛唐討吴元濟而王承宗李師道救之豈得謂許其當救乎僖十八年狄救齊聖人則深罪宋襄齊桓攘狄一旦身死内亂宋襄繼伯反為搆禍致煩狄人之救聖人葢傷之杜少陵詩云豈謂盡煩回紇馬翻然逺救朔方兵其意正同例之不可拘如此凡伐而書次則善其節制僖四年齊桓伐楚次于陘襄元年晉悼伐鄭次于鄫是也次而書俟則惡其妄動莊八年師次于郎以俟陳人蔡人師及齊師圍郕是也救而書次則惡其怯懦觀望僖十五年救徐次于匡襄二十三年叔孫豹救晉次于雍榆是也外裔而書次則惡其窺覘中夏文十年楚子蔡侯次于厥貉是也又如莊二年公次于滑則譏其救紀無功定九年齊衛次于五氏十三年垂葭十五年渠蒢則志其攘伯生事俱要合上下文之事與辭而觀之則褒貶各見單執一次字以為書法之例何從得見聖人之意㑹禮之簡者曰遇非善辭也然亦有褒者莊三十年公及齊侯遇于魯濟三十二年宋公齊侯遇于梁邱齊桓執謙以就宋魯以是能得諸侯此褒也他如莊二十三年公及齊侯遇于穀則惡其急于成昏隠四年公及宋公遇于清八年宋衛遇于垂則惡其比周結黨又如僖十四年季姬及鄫子遇于防則越禮之甚褒貶不同如此而可執一字以為定例乎春秋書初書猶書遂俱聖筆頰上添毫處書初獻六羽以明前此之僭書初稅畝以志横征之始猶繹猶三望是譏其可已而不已猶朝于廟是幸其禮之未盡廢遂伐楚次于陘遂救許遂圍許是志其赴機之捷遂滅賴遂滅偪陽遂伐曹入其郛是志其兵威之暴遂及齊侯宋公盟是志其國事之擅他如曰誘殺曰以歸曰取師曰大去曰棄師曰逃歸曰殱曰戕曰用皆聖人用意下字此其顯然可見者春秋書地震山崩是為天下記異公羊得之左氏專指晉者非也僖十五年沙鹿崩隕石六鷁則專為宋宋襄創伯六年屢挫折于楚是六鷁退飛之象外災不書以宋有闗于天下之故書之春秋誅貶非特不于一字上見併當於不書處見之如隠七年天王使凡伯來聘戎伐凡伯于楚邱以歸則下當書云師及衛師伐戎執戎子某歸于京師此理之必然者而其下寂然則魯衛不臣之罪著而戎之桀驁凡伯之失節皆其小焉者矣文八年天王崩公孫敖如京師不至而復丙戌奔莒則下當書云殺公孫敖公子某如京師而其下寂然則魯慢天王為不臣失刑誅為不君而公孫敖之罪不足言矣又如昭二十二年王室亂則下當書云公及晉侯及某某國入京師誅子朝王室復定而其下寂然但書朝猛之迭勝迭負劉單之拮据萬狀直至二十五年㑹于黄父期納王則晉失方伯之職諸侯無勤王之義均無所逃而王子朝之罪更不足言矣隠四年衛州吁弑其君完則下當書云天王使某侯伐衛殺州吁立公子某而其下寂然直至九月衛人殺州吁于濮十月二月衛人立晉殺係衛人自殺立係衛人自立天王不能正列國不能討其罪自著而衛人擅立君之罪反其小焉者矣入春秋失政刑于是始嗚呼此經之所以托始乎隠也聖人所以不得已而予桓文者只為桓文是假行天子之事如上書狄伐邢下即書齊人救邢上書狄入衛下即書城楚丘楚三伐鄭而桓公為檉貫陽穀之㑹有召陵之師楚合四國以圍宋而文公侵曹伐衛有城濮之戰楚以彭城封魚石而悼公合諸侯圍宋彭城魯為齊困非晉不解此如病急求醫縣報殺人而有司遣人拘究不踰晷刻細撿伯統未興與伯迹既熄以後則有坐待其斃聴人之白晝刼殺而已矣光景截然大異從此處着眼而聖人褒貶微意與孟子所謂彼善于此處和盤托出紙上孟子曰春秋天子之事也朱子註謂惇典庸禮命德討罪大要皆天子之事然謂聖人筆削代天子行事者則又非也􅂜歎張氏謂春秋非是維王迹乃著王迹之所以熄最得春秋之㫖細看全經如三錫命是奬簒弑䙝王言所謂命德者安在列侯上傲王命内相簒奪而王討不加所謂討罪者安在諸侯不奔喪㑹葬而王遣使求車求金典禮一切廢壊聖人只是于此等標明王迹不行于天下處而誅貶自見如齊桓殺哀姜于夷大義滅親此正是合天討處而下書夫人氏之喪至自齊細看一路上文而僖公此舉已是大錯聖人之意明白具見何必去一姜字乃為示貶乎列國來朝四十未有書名者獨桓七年穀伯綏鄧侯吾離書名左氏云賤之或又以為嘗失國林氏曰貶穀鄧逺在方城之外無為朝魯朝桓諸侯必若穀鄧而後貶皆曲說也失國書名只當其竄逐苟免之時書之耳穀鄧來朝則現為君非失國也若謂其以前嘗失國則衛成公出奔顛沛甚矣不聞終成公之世皆書名也葢桓公簒弑已厯七年至此逺國來朝且兩國更迭來志得意滿接見于廟令史臣書之以為美談誇詡宋鄭諸列國聖人因而弗削正以見桓公之自侈大意在責桓非責穀鄧也若責其黨逆則桓公當日歸獄寪氏事極隠秘天王不加討近隣不問罪穀鄧逺在二千里之外何從知為簒逆而求之備乎亦可謂欲加之罪矣桓二年蔡侯鄭伯㑹于鄧始懼楚當日以魯為周公之後故朝魯以求庇而公亦以此自喜鄭魯所畏鄭㑹鄧而鄧朝魯故書名以震矜之此當日之情事也哀四年盗殺蔡侯申凡無主名及賤者皆稱盗故聶政之殺俠累綱目只書曰盗雖以子房博浪沙之擊史記只書曰遇盗以其大索不獲也左氏曰公孫翩則是明有其人且係貴族何為不明正其弑君之罪而諱之曰盗乎公孫辰三人以賊黨而猶列其名公孫翩以首禍而顧免于罰且文之鍇已殺翩則罪人斯得則當書曰蔡公孫翩弑其君蔡人殺翩以伸討賊之義又何為作此疑獄乎大抵是奸人卒起不意衆疑是三人所為逮後或殺或逃而姑以性霍二人當獄耳其實不可得而指名也學者寧信經而舍傳為是桓五年蔡人衛人陳人從王伐鄭自是立文宜如此增一天字便覺不順如王師敗績于邥氏之戎不可云天王師也諸儒泥于去天為貶之說遂舍鄭伯滔天之罪而謂桓王不宜以小故興師自取敗辱宥臣責君悖舛滋甚又如僖二十八年兩次朝于王所義當責晉責諸侯不宜責王而反去天以貶王可乎春秋書衛人殺州吁蔡人殺陳佗齊人殺無知先儒云人者衆辭言夫人之所得討固然然愚謂責天王意較重討賊係天子之事列國有簒弑天王當遣方伯連帥討而誅之何待衛人蔡人齊人之殺乎書人以明一國之私討非天王之公討也由是征伐不自天子出自諸侯出矣書衛人蔡人齊人之殺弑君者討罪不自天子出矣書齊侯衛侯之胥命命德不自天子出矣皆譏天王之失政也三傳謂善胥命固非張氏洽謂罪齊衛猶落第二義莊二十九年樊皮叛王明年王命虢公討樊執樊仲皮歸于京師此天討之最合者而聖人不書常事不書也莊十六年王使虢公命曲沃伯以一軍為晉侯此天命之最乖者而聖人不書不告不書也華督亦死閔公之難不書此聖人削之也明季有麗逆案而死闖難者朝廷之贈䘏不及後世史官不列忠臣傳亦是此義春秋書游觀二隠公矢魚莊公觀社皆非禮也若僖公之泮水則合禮不書矣書立廟二立武宫立煬宫皆非禮也若僖公之修閟宫則合禮不書矣後世歐陽公修唐書于𤣥宗本紀書幸温湯至自温湯或一嵗一行或一嵗再行詳書不殺全倣春秋之㫖書弑君自然知為大惡不必以削去公子與稱名以見惡書死君難自然是褒不必以稱名多加責備三傳泥于稱名之說遂于死難諸人毛舉細故謂以此故名之是將忠義抹摋泥于稱人稱國以弑之說謂君為國人所欲弑是為亂賊出脱正與孔子作春狄之意反背昌黎詩云春秋三傳束髙閣獨抱遺經究終始究終始三字最妙此即比事屬辭之法治春秋自宜以經作主但不可于三傳外另造出一傳來如趙氏木訥之經筌則杜撰鑿空更甚矣終春秋之世天討之見于經者桓五年蔡人衛人陳人從王伐鄭及莊六年王人子突救衛二者而已伐鄭而敗績救衛而無功不書是聖人諱之也他如王師秦師圍芮不書伐翌伐曲沃不書不告也必以王去天為貶則子突書字又何以稱為褒乎春秋之中葉討伐無書王者政自諸侯出也至末季討伐無書公者政自大夫出也定公之初伐齊反書公者陪臣執國命而欲假公以與大夫抗也哀公之世征伐盟㑹無不書公者大夫復張已專其利而以危難之事陷其君也聖人一字之去留世變存焉皆據實書以為褒貶者殊錯文定動云上告天子下告方伯不知石碏之除州吁當隠公之四年桓王初即位只告陳使討不聞告王而請討則此時王令已不行于天下矣當春秋末世而輒以五帝三王之事律之敵師壓境而云反躬責已云加以文諭用兵云仗義執言不由詭道此如人饑將死而曰何不食肉糜路逢刼盗而與拱手談仁義其不供人軒渠者幾希杜氏以伯仲叔季皆字書字皆褒此以加于紀季以酅入于齊蔡季自陳歸于蔡許叔入于許可也他如蕭叔朝公何以書叔宋人執鄭祭仲何以書仲杜氏又云叔與仲皆名然則紀季蔡季許叔何以見其獨為字乎方望溪曰凡書伯仲皆行次也叔肸宋子哀皆名也可云斬盡葛藤矣諸侯不生名死則名之諸侯死猶名則大夫無不稱名之理大夫遇難見殺更無不稱名之理左氏以稱名為貶遂于孔父仇牧洩冶謂不足貴于崔杼之出奔不稱名以氏告謂非其罪顛倒已甚且以叔肸為賢而書字則孔子大聖續經當書仲尼卒不當書孔丘卒矣聖人當曰何嘗執定以獲麟一句結住只為是年春適有此事記了四月遂有陳恒執君寘于舒州六月行弑孔子沐浴請討不行于是輟簡廢業未幾遂卒是春秋乃聖人未竟之書一切謂文成致麟與孔子覩獲麟而作春秋俱是憒憒讀春秋偶筆
