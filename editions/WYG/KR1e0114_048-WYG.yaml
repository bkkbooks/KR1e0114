body:
  text: 春秋大事表卷四十八國子監司業顧棟髙撰左𫝊杜註正譌表昔杜元凱作春秋釋例世人未之重獨摯虞賞之曰左丘明本為春秋作傳而左𫝊遂自孤行釋例本為𫝊設而所發明何但左氏當亦孤行至今百世遂為定論然愚嘗受其書而反覆之杜氏之㝡精且博者莫如作長歴以正春秋之失閏作土地名以攷列國之地理其學誠絶出古今至其解釋經𫝊不無齟齬而其㝡大者尤在昭十五年周景王𦵏穆后𫝊註曰天子諸侯除䘮當在卒哭復于隠元年宰咺歸􅈖昭十二年子産辭享禮二𫝊疏通而証明之杜氏釋經旣誤遂以此斷據朝廷大典為一代定制後世謂杜氏短䘮其詳具見晉志考晉泰始十年武元楊皇后崩既𦵏博士張清議皇太子宜從權制除䘮即吉陳逵議以為宜終服三年有詔更詳議時預為尚書建議以為古者天子諸侯三年之䘮始同齊斬既葬除䘮服諒闇以居心䘮終制不與士庶同禮皇太子宜卒哭除衰麻以諒闇終制盧欽魏舒問預証據所依預云周公不言髙宗服䘮三年而曰諒闇三年此釋服心䘮之文也叔向不譏景王除䘮而議其晏樂已早明既𦵏應除而違諒闇之制也春秋晉侯享諸侯子産相鄭伯時簡公未𦵏請免䘮以聽命君子謂之得禮宰咺来歸惠公仲子之賵𫝊曰弔生不及哀此皆旣𦵏除䘮服諒闇之証學者未之思耳䘮服諸侯為天子亦斬衰豈可謂終服三年耶非必不能乃事勢不得故知聖人不虚設不行之制因遂具議為奏奏上詔從其議皇太子卒哭除衰麻時預議初出内外多恠之或謂其違禮以合時預乃使博士殷暢博採典籍為之証據可垂示将来嗚呼元凱歴事至乆讀書至深親見當世行三年䘮者多飲酒食肉宴樂嫁娶不循軌則况以天子之喪勒令天下士庶皆從重服勢必小人皆違法犯禁君子皆狥名失實以為制不稱情讀春秋而見當日諸侯之例皆既葬成君列于㑹盟不知此自當時之失禮非先王本制也欲執此為定制令上下可通行為短喪者立赤幟論者謂其得罪名教豈過論哉嗚呼元凱釋春秋而至倡為短喪歐陽永叔援儀禮而至倡為兩本二父經術之誤害于政事千古同病不可不戒也謹條列其註左數條與其當日所建白列諸簡端令後世考古者知别擇焉輯春秋左𫝊杜註正譌表已上係杜氏論禮之誤其說具見叙中孔氏云既𦵏除䘮唯杜有此說則孔氏已心非之矣已上係杜氏地里之誤已上係杜氏時日之誤殺大夫書名大夫出奔書名以上係杜氏稱名之誤殺大夫無不稱名之理而杜乃以稱名為貶至以洩冶之直諫而死與里克甯喜之弑逆同科大夫奔無不稱名之理而杜以稱名為貶至以公子憖之為國除惡與欒盈良霄之叛臣同罪一字之誤玉石俱焚其以稱字為褒則如司馬華孫來盟謂其憂國舉職而不知其為公子鮑之私人也足知名字褒貶之例斷斷不可通于春秋已上係杜氏解經傳之誤春秋無書字之法論蘇老泉春秋論曰諸侯而或書其名大夫而或書其字胡文定因為之説曰王朝大夫例稱字列國之命大夫例稱字諸侯之兄弟例稱字中國之附庸例稱字春秋書法有例當稱字或黜而書名例當稱人或進而書字則褒貶係焉嗚呼大夫為諸侯之臣附庸之君下公侯伯子男一等今君稱名而臣稱字公侯伯子男稱名而附庸之君稱字於崇卑之分不㡬倒置為此說者不過欲以名字見褒貶爾於是有以殺大夫之書名為貶至以洩冶之直諫而死與里克甯喜之弑逆同科以大夫出奔之書名為貶至以公子憗之為國除惡與良宵欒盈之叛臣同罪而春秋之㫖愈晦善乎方氏望溪之言曰春秋從無書字之法舊以王人子突為字非也古有以子某名者如陳子亢介子推之類是也以邾儀父為字非也古有以某父名者如齊侯禄父儀行父箕鄭父是也而支離穿鑿之弊掃除過半矣且左𫝊以儀父為克之字計其年分尢遼逺盟于隠之元年而卒于莊之十六年相距四十六載而儀父又未必以即位之初年而盟也意克為儀父之子儀父之卒不書至克而後書方氏之言得之矣且邾儀父與介葛盧郳黎来均為附庸則不宜有差别今以儀父為字而以葛盧與黎来為名可乎夫大夫之殺與出奔列國無不以名赴而以字赴之理列國不以字赴魯史何從而得其字魯史既不書其字孔子於百年後更何從追書其字耶杜於凡書名者皆曰惡之必當日俱有字書於簡冊聖人特以惡之而斥其名殊不知大夫既已正典刑與逃竄其本國方深惡痛絶之不暇豈更有褒嘉之辭而以其字赴於諸侯耶且春秋之法果以稱字為褒稱名為貶子貢之徒當必習聞之哀十六年續經何不書曰仲尼卒而書孔丘卒耶春秋大事表卷四十八
