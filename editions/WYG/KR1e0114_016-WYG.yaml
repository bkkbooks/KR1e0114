body:
  text: 春秋大事表卷十六國子監司業顧棟高撰凶禮表世儒多以例釋春秋吾不知所為例者將聖人自言之乎抑出于後儒之揣測也是不以凡例釋春秋而直以春秋釋凡例而經旨益晦余觀凶禮一編而春秋二百四十二年之書法其微意所在徃徃前後不相䝉始終不相襲而知例之斷斷不可以釋經也儀禮䘮服𫝊曰斬衰裳苴絰杖絞帶冠繩纓菅屨者子為父妻為夫諸侯為天子及臣為君此三者人道之大綱也春秋之世有諸侯不奔天子之䘮不㑹天王之𦵏而擅自盟㑹及郊祀又大國受小國之奔䘮㑹𦵏而未嘗以禮報者而君臣之道闕有居䘮而納幣衰絰而從戎祔廟而逆祀而父子之倫䘮有以妾匹嫡天王歸賵列國㑹𦵏下及僖宣襄昭四妾母薨稱夫人𦵏稱小君而夫婦之道苦聖人于百五十年間一書之再書之垂戒深切著明矣然以魯不報答小國為非禮至昭定之世􅅬薛及曹魯俱遣使㑹𦵏似足正邦交之失而聖人未嘗與也以躋僖逆祀為非禮至定之八年從祀先公似足釐廟祀之謬而聖人未嘗與也以以妾配適為非禮至定哀之世定姒不書薨不書夫人不書小君似足正嫡妾之分而聖人未嘗與也其不與者何也前之失由魯之恃强凌弱倨傲無禮後之失由季氏之樹援結黨弁髦其君前之失由禮臣之逢迎主上紊亂典禮後之失由陽虎之謀為不軌假正濟私前之失由諸公之私厚所生混淆名分後之失由季氏之目無君上菲薄禮儀聖人前後各據實書之以著其顛倒益甚罪狀益深世道益不可問而世儒顧以例求之夫一年之内有寒暑一日之内有朝夕寒暑異而裘葛不異朝夕異而饔飱不異可乎哉昔人序少陵詩有云太平黷武則志在銷兵神京陸沈則義嚴討賊嗚呼少陵之詩且然何況春秋出自孔子哉故欲執少陵開元天寳之詩而例諸肅代諸作則泥矣執孔子隠桓莊閔之春秋而例昭定哀之春秋則鑿矣學者無以傳求經並勿執經以求經惟熟覽二百四十二年之情事而綜考聖人前後之書法與聖人黙㑹于千載之上庶乎可以得之若執一字以求之如宰咺書名王不稱天之類不為酷吏之舞法深文則為兎園之咬文嚼字而春秋之義隱矣輯春秋凶禮表第十六天王崩𦵏胡傳春秋十二王桓襄匡簡景志崩志𦵏赴告及魯徃㑹之也莊僖頃崩𦵏皆不志王室不告魯亦不徃也平惠定靈志崩不志𦵏赴告雖及魯不㑹也王子猛未踰年不書崩敬王崩在春秋後公薨張氏洽曰春秋書魯君見弑之例有二在内則不書地以存其實在外則不容不書其地而以上下文之特異者見之程子曰人君薨于路寢見卿大夫而終乃正終也薨于燕寢非正也薨不書地弑也未成君卒公𦵏霞峰華氏曰春秋之法君弑賊不討不書𦵏此夫子之創例所以責臣子之必討賊不容一日緩也故隱不書𦵏而終桓之世内大夫之卒削不書魯無大夫也亦可謂深切著明矣閔之弑也慶父出奔後雖受誅卒立孟氏實啓三桓之盛安得謂之討賊故亦不書𦵏或乃以隱閔之不書𦵏為桓僖不𦵏以君禮且以隱閔夫人不備薨𦵏証之夫魯君之不以禮𦵏者莫若季氏之於昭公然春秋不聞以此削其𦵏況僖公魯之賢君決無不以禮𦵏閔公之事而閔公遇弑纔十餘歳安得夫人其誣妄甚矣𦵏大事故十二公非君弑而𦵏必書失禮而䘮不以制如定公之雨不克𦵏必書夫人薨𦵏汪氏克寛曰魯夫人見經者八文姜哀姜聲姜穆姜齊姜書薨書𦵏子氏以隱公在不書𦵏出姜歸齊并不書薨孟子以同姓諱而畧之妾母見經者六仲子之卒在春秋之前成風敬嬴定姒齊歸皆書薨書𦵏稱夫人稱小君與正嫡無異仲子不稱夫人小君猶未至如中葉以後失禮之甚也唯定十五年姒氏卒以哀公未即位故不成小君之禮爾霞峰華氏曰夫人見經者八妾母見經者六若以王法繩之惟隱夫人子氏僖夫人聲姜成夫人齊姜無貶其餘除出姜歸齊不書薨𦵏外宜俱在貶斥之列而春秋書夫人薨其𦵏也書𦵏我小君雖以文姜哀姜之弑逆而無貶雖以成風定姒之妾母僭位而無貶雖以敬嬴之殺嫡奪嗣而亦無貶惟定姒哀公之母不稱夫人孟子昭公之配亦不稱夫人孟子不書𦵏定姒𦵏不稱小君葢當時不以夫人之禮䘮之凡此類直書其事而義自見者也歸賵含及奔䘮㑹𦵏案春秋䘮禮之交際唯以力之强弱為隆殺魯不奔天子之䘮而天子遣使來㑹僖公之𦵏顛倒已甚況歸賵仲子賵𦵏成風越禮亂倫尤不可言秦人以大國而歸襚則以欲窺晉也自晉使詹嘉處瑕以守桃林之塞而秦魯遂絶邾之來奔䘮滕之來㑹𦵏則小國以天子之禮事大國也禮諸侯之䘮士弔大夫送𦵏㑹𦵏非禮也奔䘮甚矣外諸侯卒𦵏程子曰吉凶慶弔鄰國之常禮諸侯之卒與國之大故來告則書諸侯告䘮魯徃㑹𦵏則書汪氏克寛曰赴告以日史書其日則經弗削以見列國臣子之謹終赴告畧史不日則經無自而書其日以著列國臣子之慢已上書卒書𦵏凡七十二國皆來赴而魯徃㑹𦵏者也内書卿㑹𦵏者七譏其過禮至宣公親奔齊恵之䘮則又甚矣已上書卒不書𦵏凡三十一國皆來告而魯不㑹𦵏者也霞峯華氏曰或以衛朔不書𦵏宋三世不書𦵏為治其罪春秋據事而定其褒貶耳不以沒魯之㑹𦵏而治其既徃之罪也不然鄭莊射王中肩何以書𦵏巳上吳楚之君不書𦵏已上君弑賊討則書𦵏已上君弑賊未討而書𦵏霞峯華氏曰君弑賊不討不書𦵏責世子也世子弑君而何責之與有故如其常而書𦵏猶繼弑君不書即位痛嗣君也繼弑君而與聞乎故而何痛之與有故如其常而書即位或曰許世子以不嘗藥書弑避位而出奔未踰年而卒與蔡般不同是原其情而書𦵏又一例也霞峰華氏曰蔡侯申之弑書殺書盗書𦵏春秋之又一例也霞峰華氏曰國復乃𦵏春秋一見而已已上諸侯卒於外者孫氏復曰外諸侯卒不地在其國而不於路寢與卒于他國者皆載其地盖人君為一國之主宗廟社稷人民之所係重不於其寢而於他處非常可知矣故謹而志之霞峯華氏曰此所謂諱其辱而不𦵏者也内大夫卒隱元年公子隱五年冬十隱八年冬十隱九年挾卒僖十六年三已上内大夫卒凡二十五人餘六人公孫敖公孫嬰齊卒于外仲遂及叔弓當祭而卒志禮之變叔肸書字書弟係春秋之變例公子牙為季子所誅此當列于刺殺之條不同他大夫之有恩數故特列出附于刑賞表之内汪氏克寛曰或日或不日自文公而上一百十四年書日百有七十宣公而下一百二十八年書日二百二十年數畧同而日數近倍程子謂因舊史理或然也内大夫見經者四十有七卒者三十一不書卒十有六慶父歸父僑如臧紇公子憗出奔公子買公子偃刺何忌州仇叔還卒于獲麟後餘六人文定以翬弑隱公叔彭生不𤼵襄仲之謀貶不書卒柔溺結之不卒非正大夫啖氏以單伯淫叔姬黜其卿位今考無駭挾與柔溺書法無異結書族未必非大夫單伯書字無貶辭似未嘗黜竊疑大夫或卒或不卒亦因史舊文耳霞峯華氏曰朱子謂成襄以前舊史多所舛逸自昭定之後皆聖人親見其事故不至有遺卒不書日者益師無駭挾得臣四人程子曰史失之是已文定謂恩數之有厚薄則得臣之在宣公不應薄又以得臣為貶而不書日則公孫敖襄仲意如之卒何以不貶而書日已上一人書弟書字係聖人之特筆志襃外大夫卒𦵏已上四人書外大夫之卒𦵏係聖人之特筆志貶内女卒𦵏汪氏克寛曰内女為諸侯夫人者七惟紀伯姬宋伯姬志卒志𦵏葢閔紀之亡褒共姬之賢而特詳其本末也鄫季姬把叔姬止書卒志其常也郯伯姬齊子叔姬不書卒被出不復其國非尊同之比也未適人者二僖九年伯姬卒文十二年子叔姬卒許嫁稱字比于尊同者也為大夫内子者四莒慶叔姬宋蕩伯姬及婦齊高固子叔姬則以嫁大夫而不卒也惟紀叔姬非夫人而書卒書𦵏則以其賢而特録之乃春秋之變例也已上五人紀伯姬叔姬宋共姬志卒志𦵏皆非常也鄫季姬志卒不志𦵏其常也杞叔姬被出而亦書卒因逆䘮以歸也其餘如郯伯姬齊子叔姬并不書卒與嫁為大夫妻一例已上二人内女未嫁而卒者霞峰華氏曰雖云許嫁則䘮之以成人之禮亦時君溺愛之過許嫁未可稱夫人則於國君無服喪之如成人非禮也已上一人王姬比内女者春秋文十二年子叔姬卒論案左氏以叔姬為已嫁于杞被出而見絶以經文不繫杞而言絶也又因上有杞伯來朝與子叔姬卒相連憑空生出請絶叔姬而無絶昏言立其娣以為夫人遂以此叔姬為杞所絶之女而以成五年杞叔姬來歸八年杞叔姬卒為杞之所請繼續為昏者揆之情事可謂大謬據今士庶之家無絶一女而更請一女之理杞何敢然魯亦安肯許既如其意以次女續昬矣二十餘年又復見絶杞何不道乃爾五年來歸八年卒于母家九年請于杞而後來逆䘮姊娣二人前後俱為所棄杞何强暴魯何孱弱至此此皆情理之必無者且既請絶叔姬則叔姬非復夫人可不為之服矣經又何以書其卒乎當以公穀許嫁之說為是其許嫁不知何國與僖九年伯姬一例李氏亷更為之說曰已許嫁于杞杞伯來朝請絶而復求其次夫叔姬方在母家杞又何從摘其短而預先請絶乎此皆以上下兩事牽合之病也杞伯自來朝魯叔姬自卒兩事本自風馬牛看作兩事自無此病若啖氏助劉氏敞吕氏大圭謂此𫝊當在成公八年而誤置于此亦覺費手春秋一經杞伯來朝多矣豈必有所為左𫝊謬說極多豈能必求其可通與其信傳而欲易置經文何如刪傳而使經文仍舊之為得乎春秋文十六年毁泉臺論案公羊𫝊云泉臺者郎臺也未成曰郎臺已成曰泉臺即莊三十一年所稱築臺于郎者諸儒俱從之以是為彰先祖之過故譏愚統經文前後觀之而知其說非也據左氏有蛇自泉宫出入于國如先君之數秋八月辛未聲姜薨毁泉臺杜註以為蛇妖所出而聲姜薨故毁之正義云臺在宫内人見蛇從宫而出毁臺幷毁其宫也劉氏敞謂迷民以怪盖取是說意泉宫當為聲姜所居如東宫西宫之屬近在宫闈之内蛇出而夫人薨以是為不祥故欲毁若云郎臺則郎地在今魚臺縣去魯都二百里係邊鄙之地世無邊鄙有妖𤯝而以為應在夫人之理即云毁泉臺與上夫人薨各為一事不相連屬而經于夫人薨下間無異事不另志日月則當于是日毁矣若非為宫内不祥急欲毁去世豈有當衰麻哭泣之時而欲改革先朝故事毁二百里以外之臺之理孫氏覺曰毁者全除之與墮異先君為之是而毁之是毁先君之美也先君為之非而毁之是暴先君之惡也夫事之是非且勿論而毁于聲姜薨日于情事總覺迂緩不切故知迷民以怪之說為是也十八年二月公薨于臺下黄氏正憲謂即其地則蛇之妖不係于聲姜而係于文公天意若曰公當從此宫出從先君于地下理未可知夫春秋之教屬辭比事然亦有不當聨兩事為一事者如文十二年杞伯來朝二月庚子子叔姬卒此自是兩事而左氏必欲强合之遂以為杞伯之朝請絶叔姬而無絶昏二月叔姬卒不言杞絶也此與情理不合子叔姬自是魯女未嫁何與杞伯來朝事耶如此年秋八月辛未夫人姜氏薨毁泉臺此因夫人薨而毁本自一事而公羊必欲强分之遂以泉臺為莊所築之郎臺何休注云譏臨民之漱浣與泉字義合更極牽强夫人于是日薨泉臺于是日毁經文所書不顯然耶𫝊之當從與不當從一斷以經而已矣春秋昭八年𦵏陳哀公論春秋之法内賊不討不書𦵏然亦有書𦵏者如蔡景公許悼公是也國滅不書𦵏然亦有書𦵏者若昭八年楚人滅陳春秋書𦵏陳哀公是也蔡景許悼之𦵏諸儒求其説而不得往往曲為遷就迄無一定髙紫超先生論之曰禮成而葬者書葬委屍而藁葬者不書葬更有逆子推刅其父欲掩其弑逆之迹告于諸侯隆禮以𦵏則亦書𦵏春秋一皆據實書之耳善哉言乎可謂得春秋之㫖矣昭八年陳哀公之𦵏諸儒多異詞左氏謂嬖人袁克𦵏賈服以為𦵏哀公之文在殺孔奐之下指為楚𦵏孔氏又申杜預之說謂若果楚𦵏宜云楚人𦵏陳哀公如齊侯𦵏紀伯姬之例不得直言𦵏由是註疏據左氏以為定案矣而後人又從而訾之趙氏謂袁克非大臣何能辦𦵏死君又何能告諸侯使㑹𦵏黎氏謂陳為楚據魯豈敢于其𦵏而使臣徃㑹之彚纂因折𠂻其說謂𦵏宜從傳文而魯徃㑹𦵏則不可解楚方滅陳諸侯震恐故下文九年春魯使叔方㑹楚子于陳以致其敬豈有先使人如陳㑹𦵏陳君之理葢必魯㑹𦵏而後書常例也獨此役魯未徃㑹𦵏而變例得書是聖人存陳之意果若是則魯實未有其事魯史未有其文而夫子書之是誣也矯也欲存筆削之義而先著矯誣之筆不足以垂法後世竊謂此亦聖人據實書之耳葢楚棄疾奉孫吳圍陳托名討罪于哀公固無仇也滅陳之後大𦵏哀公使其故臣告于諸侯逺近畢㑹以示恩禮一以恱陳國之遺民一以掩四方之耳目而已因得取國而無慙魯之徃㑹亦承楚意而為之與九年叔弓㑹楚子正自並行不悖是則魯實㑹𦵏矣春秋安得不書𦵏楚實以禮𦵏哀公而使魯徃㑹矣魯之㑹𦵏固無嫌若如左氏之說則為袁克之私𦵏必不能告于諸侯也魯必不敢逢楚之怒而徃㑹𦵏也春秋何由得書故此事當撥棄左氏而信經文比事觀之較然矣其他滅國而不書𦵏者或仇怨相伐俘其國君或死于其位臣民私竊藁𦵏如是則魯實無由㑹𦵏也春秋安得書𦵏故知夫據事直書之說而春秋之㫖四達不悖諸儒紛紛之論不辨自眀矣春秋定十五年姒氏卒論附哀十二年孟子卒姒氏者哀公之母定公之妾也前此僖宣襄昭四妾母皆薨稱夫人𦵏稱小君君子譏之曰僭則姒氏之書卒而不書夫人書𦵏而不稱小君為春秋許其復正乎曰不許也四妾母之稱夫人稱小君也是君之欲私厚于其母也此姒氏之不書夫人不書小君也是强臣専制陵蔑其君使君不得加厚于其母也君欲加厚其母而臣下曲意以成之其事雖非而猶出于尊君愛上之意使君不得加厚其母而舉國知有權臣不知有君上其事雖正而實為無父無君之尤嗚呼亂臣賊子欲肆無禮于君父其事未有不出于正者也必擇舉世所共憤賢人君子所歎息痛恨者一旦行之使舉國翕然而後可惟吾所為而不吾忌陽虎欲作亂而先順祀先公王莽之追奪丁傅董卓之駢誅宧官皆為移鼎之漸而春秋安得許之哉夫姒氏猶妾母至孟子為昭之嫡夫人而亦書卒併不書𦵏則季之専制可見矣或謂舊史固稱夫人孟子薨夫子特削而書卒以示天下後世娶同姓之戒曰此尤悖理之甚也且娶吳為同姓罪在昭公耳于孟子乎何尤昭公畏吳而與為昏生以夫人之禮崇之則死自宜以夫人之禮𦵏之仲遂弑君之賊而宣公既以為大臣則當隆始終恩遇之禮故春秋書仲遂卒于垂猶繹去籥此尤筆法之顯然可見者豈孟子之同姓反不得比于仲遂之逆賊乎哉季氏于昭公逐其身廢其嗣又弱其配使不得成禮以𦵏此凡有血氣之所同憤者聖人據實書之以示凡為臣子者皆當食其肉而寢處其皮而顧謂季氏實以禮𦵏夫人夫子因其同姓而削其𦵏並削其號於痛心泣血之日而為索瑕摘垢之舉且以前日昭公之罪而移罪于孟子于事為失實于情為非宜聖人固萬萬不出此用是知聖人之于經皆是據實書而非有意筆削其間也前此四妾母實以夫人之禮薨之實以小君之禮𦵏之則春秋安得不書夫人不書小君此姒氏與孟子實未嘗以夫人之禮薨小君之禮𦵏則春秋安得而書夫人書小君然于其書者可以見以妾配嫡名分僭擬之嫌于其不書者有以著强臣専制陵逼其君之實則固並行而不相悖也而十二公之或書即位或不書即位概可見矣春秋桓莊二公不書大夫卒論春秋隱為公子翬所弑賊在内故不書𦵏桓薨于齊仇在外故書𦵏而于桓莊之大夫俱不書卒以著其反面事仇偷生隱􅃘以是為舉朝無臣子也考桓莊二公厯五十年大夫之卒多矣惟于莊三十一年書公子牙卒然此當在有罪刺殺之例春秋諱之而書卒非恩禮所加故知皆仲尼削之也然宣亦繼弑而叔孫得臣之書卒何也曰春秋自僖公以前以治世之禮治之自僖公以後以亂世之禮治之以治世之禮治之者著賞罰之大公周道未衰而僖公猶可與有為也以亂世之禮治之者著賞罰之失柄周道大壊而春秋将夷於戰國也夫子列僖公之詩於魯頌因哀公之獲麟而作春秋其治亂之分乎僖公之作泮宫復閟宫不書於春秋而特列於頌以為是三王之事周道其猶可為也故於僖公以前春秋一皆以王道治之至僖公以後三桓盛矣魯之衰由三桓聖人於此詳書三桓之事以著世卿擅政之漸壊法亂紀之由至昭公則魯非復周公之魯而為三桓之魯矣故聖人不復以王道治之以為誅之将不可勝誅而反掩其背上無君之實觀於桓之世公子翬不書卒而定五年書季孫意如卒彼躬負大逆者且然又何論於舉朝之士大夫乎此則聖人之微意讀者當分别觀之可也春秋左𫝊喪畢吉禘説士虞禮記卒哭明日以其班祔檀弓亦言殷練而祔周卒哭而祔孔子善殷盖亦以周祔太早急於神其親也陸象山先生居母喪欲卒哭而祔除几筵其兄子夀疑之皆以書來問朱子朱子告以鄭氏儀禮註祔已主反于寢象山謂非經之本文不足據信朱子痛闢之以為無論古禮但今卒哭之後便除靈席孝子之心豈能自安後儒多疑朱子謂䘮禮每加以逺見于坊記䘮事有進而無退見于檀弓皆主不反寢之證也鄭氏剏為此說朱子乃棄經而信𫝊可乎且廟者鬼神所依寢者生人所居既祔廟而仍反于生人雜遝之所于理亦覺未安余嘗考之朱子三年而祔之說葢本程子張子之說程張之說實本左氏䘮畢吉禘之說也程張俱云禮卒哭猶存朝夕哭若無主在寢哭于何處必俟三年䘮畢祫祭祧主藏于夾室新主乃自殯宫入于廟此特據左氏特祀于主烝嘗禘于廟以主與廟對稱謂主應不在廟而在寢爾未嘗據儀禮以立說也即如春秋所稱鄭氏用穀梁練而壞廟之說則以練為斷杜氏用賈逵服䖍說則以三年為斷其說亦不同朱子謂穀梁但言壞舊廟而不言遷新主安知其非于練而遷舊主于三年而納新主耶朱子之意葢謂三年遷新主于廟然後全以神事之其卒哭而祔則仍反主于寢而以事生之禮事之爾其于孝子之心則安矣而于䘮事即逺之㫖相悖且既不于廟以神其親矣不知卒哭之明日又胡為先多此一祔也至賈疏又云惟祔祭與練祭祭在廟祭訖反主于寢其大祥與禫祭其主自然在寢祭之是使死者于廟乍入乍出漫無一定既求合儀禮卒哭而祔之文又合穀梁練而壊廟之文又欲合左氏䘮畢吉禘之文拘牽遷就吾恐先王制禮不如是之委曲也朱子謂祔與遷是兩事祔者祔于所當入之祖廟并祭其祖是祖孫同廟而享至䘮畢祖遷于高祖廟高祖藏于夾室然後奉新死者之主入廟穀梁謂壞廟易檐改塗正是祔以後遷以前之事此在周制則可行爾後世自漢明帝以來天子之廟且同堂異室在士大夫則同室異龕爾四代並在一處安得祔時祭于其祖之龕躐其父而配享乎竊謂今日孫祔于祖斷不容泥而卒哭明日之祔既有孔子善殷之言則亦不必以儀禮之本文為拘也書儀家禮及前明㑹典俱祔後復主于寢從鄭氏之說而家禮則告祔于卒哭而祔廟于大祥葢兩從焉近儒謂卒哭至大祥相去幾二年而絡繹成兩祔非人情且已告祖考以將祔死者之主矣而仍不入廟祝文亦虛不若信程張之說以大祥之明日祔廟改主遷祔同日行之為近情而不可易也開元政和二禮卒哭之後不祔廟至三年禫後祔其亦有見于此歟天子諸侯䘮已廢絶于春秋時論世𫝊儀禮為周公所定然其中聘覲燕食多係王朝邦國之禮而䘮禮惟載䘮服及士䘮禮三篇天子諸侯之䘮禮闕焉不載孟子時滕文公欲行三年之䘮父兄百官羣然怪駭孟子亦苐陳其大概而曰諸侯之禮吾未之學嗚呼孟子去孔子之世未百年而當日之習尚如此則其泯焉廢墜豈一朝夕之故哉余嘗詳考左氏傳而知天子諸侯䘮紀已廢絶于春秋時無疑也葢自周道陵遲皇綱解紐有以諸侯不奔天子之䘮不㑹天王之𦵏而甘僕僕于晉楚者矣有以天子貧乏不備䘮具至七年乃𦵏于魯求賻求金甚至景王三月而𦵏以天子而用大夫之禮者矣逮子朝作亂王室如沸奉周之典籍以奔楚而天子之禮遂亡列國不守侯度其侈者如宋文公之椁有四阿棺有翰檜偃然用王禮而苟簡不備者如晉欒書以車一乗𦵏厲公于東門之外齊崔杼𦵏莊公四翣不蹕鄰封不與知公卿不備位魯號秉禮而𦵏昭公于墓道之南檀弓載孟敬子之言明知食粥為天下之達禮而居然食食其餘列國尤放肆不軌由是惡其害己而皆去其籍而諸侯之禮亦亡孔子以大聖人而不得位退與門弟子講習于杏壇之上故孺悲曾學士䘮禮于孔子而天子諸侯之禮無由釐正三𫝊之所記僅存什一于千百至孟子時有土之君靦焉人面以三年之䘮之達禮而怪駭為不經杞宋之無徵豈獨為夏􅇻之禮歎哉曰然則聘覲燕食之禮之獨存何也曰此正可覘春秋之世變也春秋時覲享之禮雖廢然晉文曾朝王于河陽厲公以諸侯伐秦如京師其禮猶相沿王朝與列國交聘晉楚諸大國受諸侯之聘使儼然同天子之儀至燕享及勞賜臣下列國尤多而春秋之世尚文相與致講于俯仰揖讓衣裳襘袺之間故厯久而著明䘮禮則根乎至性而人心澆漓有土之君尤甚景王有三年之䘮二而燕樂已早衛太子衎之哭而不哀魯昭三易衰衽如故衰其弁髦棄之久矣故聘覲燕食之禮不廢春秋時習行之也士䘮禮之不廢則孔子與游夏諸弟子講明而力守之也至天子諸侯之䘮禮則廢墜已久典籍缺如雖聖人亦無如之何矣余年二十一執先府君䘮讀䘮禮嘗恨儀禮獨詳于士不獲覩天子諸侯之全竊意儀禮詳載其節次而周官散見于各職嘗欲彚萃三禮大小戴春秋三𫝊及鄭賈諸儒儀禮註疏推類及天子諸侯者裒輯成書以補儀禮之闕因循未逮迄今老矣究觀左氏乃知其廢失實始于春秋時不由秦火今諸儒之所𫝊者亦未必皆周公之舊也春秋大事表卷十六
