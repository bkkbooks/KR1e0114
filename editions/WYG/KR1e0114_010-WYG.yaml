body:
  text: 春秋大事表卷十一國子監司業顧棟髙撰列國姓氏表粤自禹貢曰錫士姓而左氏傳有因生賜姓胙土命氏之分又别之以字以諡以官以邑其言姓氏之源流備矣至宋夾漈鄭氏作姓氏略乃復以左氏之言為隘而推廣之得姓氏者凡三十有二類嗟乎夾漈之學貪多務博蘄勝前人其所據者乃從典午以後經十六國南北朝之紛亂包羅囊括合併雜糅而于􅃉古得姓之始與春秋列國由姓析為氏族之源流未嘗深析而明曉也余嘗謂氏族之學至唐而極精亦至唐而極亂一亂于朝廷之賜姓再亂于支孽之冒姓三亂于外裔之入中國因蕃落以起姓何則自漢初已有賜項伯為劉纒賜婁敬為劉敬至唐而如李勣之徒不知其幾矣衛青以鄭季之子而冒姓衛氏曹操以夏侯氏之子而冒姓曹氏至唐而如楊國忠之徒不知其幾矣金日磾以休屠王太子而姓金氏劉元海以呼韓邪之後而姓劉氏至唐而侯莫陳之為侯烏石闌之為石又不知其幾矣唐太宗既有天下以地望明貴賤特詔髙士廉岑文本之屬著姓氏譜先列天家次列后族及宰相凡長孫宇文皆登貴姓而于生民之初得姓受氏之由脈絡不可得而尋也源委不可得而辨也又况夾漈更在五季數百年之後乎善乎元儒史伯璿之論曰三代以後皆無所謂姓只有氏而已故後世但曰姓某氏而不敢曰某姓某氏葢姓不可考故但虛其姓于氏之上而實其氏于下亮哉言乎愚謂欲考姓氏之分斷須以左氏為樞紐葢盤古燧人之初未始有姓也至庖犧得風姓炎帝得姜姓黄帝得姬姓帝堯以伊祁而為祁舜以媯汭而為媯至三代迭王延及春秋之初分封之國存百有二十四稽其姓合中國與鄋瞞僅及二十有一是時諸侯之國公子公孫支分派别列官分職世有掌司因以命氏而小國之卿大夫名字不列于經傳無可考者居十之九焉最著者姬姓則有周魯鄭衛姜姓則有齊子姓則有宋姒姓則有越與杞鄫芈姓則有楚其公族之析為氏者班班可考又陳本媯姓自陳敬仲奔齊而為陳氏晉之范本祁姓士㑹封于范而為范氏其在秦者為劉氏吳夫概奔楚為堂谿氏伍員屬其子于齊為王孫氏尤大彰明較著者也又春秋重世卿為之立後則置氏不必公族盡皆有氏也故春秋之初魯之翬挾柔溺鄭之宛齊之年皆無氏逮其後有沒而立氏者莊公季年立叔孫氏是也有邀鄰國以立之如四國為賂故立華氏是也余因通考左氏以姓繫國以國繫氏俾後世知受氏所由來其有不見于左傳而為後世韓曽歐陽志及史記世家新唐書世系表所推本如徐之本章禹曽氏之本鄫邵氏之本召亦間録焉輯春秋姓氏表第十一姓麇鼔祁姓弦隗姓日知録權芈姓麇嬴姓又無姓之國十三於餘丘郭道栢庸郭邿鑄不羮及昭元年傳之沈姒蓐黄春秋大夫無生而賜氏論案春秋公之子稱公子公子之子稱公孫公孫之子以王父字為氏此定制也而胡文定於僖十六年季友卒𤼵𫝊云魯之大夫有生而賜氏者若季友仲遂是也蓋季友於僖有擁戴之功仲遂於宣有援立之恩二君報之故生而賜氏俾世為卿春秋於此特書以志壞法亂紀之始謹􅂂霜之戒其論甚正而其實不然三家稱仲孫叔孫季孫氏未嘗單舉仲叔季也莊三十二年傳立叔孫氏未嘗云立叔氏其有稱叔氏者則另為一族宣公弟叔肸之後經所稱叔弓叔鞅叔輒是也論語孟孫問孝于我檀􅃓云此季孫之賜也俱有孫字若生而賜為季氏則其子孫如季孫行父季孫㝛季孫意如當云季行父季㝛季意如矣何以復多贅一孫字乎且叔氏與叔孫氏又何分别也以是知季友賜氏之說非也仲遂之仲本是行次若已賜為仲氏則其子歸父當稱仲歸父不當更稱公孫歸父公孫者未賜族之稱也况仲遂父子止稱東門氏不稱仲氏宣十八年傳有遂逐東門氏可証至仲嬰齊乃更受賜仲氏耳以是知仲遂賜氏之說非也大抵宋儒好横𤼵議論而讀書不精考究欠實往往多傅㑹影響後儒以其近正逓相祖述遂成鐵案殊不知季友卒時尚不氏曰季至其孫行父始以王父字氏曰季孫不可以孫而彊誣其祖襄二十三年外史盟曰毋或如東門遂云云若仲氏果宣公所賜此係國之重典昭彰耳目外史必不易其稱謂而曰東門氏杜於仲嬰齊卒註云嬰齊襄仲子宣十八年逐東門氏既而使嬰齊紹其後曰仲氏是則仲之有氏至嬰齊始受君賜以前止曰東門與仲無與而文定以為宣公生而賜為仲氏豈不誤哉夫因其子孫而罪其祖父并罪祖父當日之君以莫須有之事遂為一成不可變之獄此則宋儒刻論之過也彚纂曰經書公子而名字雙舉者公穀以為賢之是也胡氏之說亦正但與仲遂並譏為非其論而猶未察其於實事無據余是以綜考經傳而并正之乾隆十一年又三月一日復初氏書於髙郵舟次此亦華子師茂之說師茂名育濂先母舅之從孫韋軒先生子與其兄師道並英年好學讀書穎銳能深入考訂尤精余延以教孫甫及二載于春秋啓益為多感起予之􅂇特附識于此案文定之說本于劉炫杜註云稱字者貴之正義曰季是其字友是其名猶如仲遂叔肸皆名字雙舉劉炫以季為氏謂與仲遂皆生而賜族非也公穀二傳亦皆以稱字為賢與杜孔略同則劉與文定之說為無據又襄二十三年盟東門遂註云襄仲居東門故曰東門氏若果生而賜為仲氏豈復舉其所居之地乎春秋大事表卷十一
