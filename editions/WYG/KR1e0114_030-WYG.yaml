body:
  text: 春秋大事表卷三十國子監司業顧棟高撰齊晉争盟表案昭十二年晉侯以齊侯晏投壺齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興是時景公窺晉之衰巳有互相争長之志屬當平邱之㑹晉已不復能宗諸侯楚新斃于吳無復北方之志而吳亦未遽争衡于中國齊得于此時收召列辟得鄭得衛得魯復得宋夫以齊之强承桓公之餘烈又當晉楚俱衰之後因利乘便使能正魯意如之罪反昭公而君之伸大義于天下此如順風而呼何遽不能代晉主盟哉乃鄟陵之盟信子猶之讒卒佚天討且于晉則助臣以叛君于衛則助子以拒父三綱既絶猶欲軋晉而求諸侯是却行而求前也卒之内不能正其家溺意嬖寵耽樂忘禍廢長立少輕棄國本權臣乘間得行簒弑數年之間遂移陳氏與晉争彊卒與晉同斃嗚呼亦可悲矣孔子告景公曰君君臣臣父父子子所以起膏肓而拯廢痼者豈不深切著明也哉故自鄟陵之㑹訖于景公之殁争伯凡二十八年撮略其𫝊著于篇輯春秋齊晉争盟表第三十春秋大事表卷三十
  hash: sha256:76c83466ce096914c41a049d5e18bbc867c0ec3f7268ef9167ce1ed6a00f3467
