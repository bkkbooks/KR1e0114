body:
  text: 春秋大事表國子監司業顧棟髙撰附錄輯春秋大事表竟漫為長歌繫其末十年熟覽春秋史萬里山河在眼底逺近迂直俱能詳征伐屯戍堪指擬魚臺親到觀魚處茌平舊說㑹盟址東昌府茌平縣即齊重邱襄二十五年諸侯同盟處也商邱重問宋遺宫臨淮吳楚戰爭壘諏咨訪問無遺失案之圖書良一軌乃知前日漫說經指點東西竟誰是嗚呼春秋幅員不及今之半列國繡壤紛相亂虢滅西偏肩背捐申亡中間腰膂斷遂成晉楚平分勢猶賴晉家隄潰岸向戌弭兵失真計坐令蠻夷沸淮漢列侯僕僕晉楚廷往來叅錯如流星千乗不能理國事一年强半疲踐更犧牲玉帛比前倍不死戰鬬死橫征鄭當孔道患猶劇郊勞贈賄無時停國僑邱賦豈得已糗糧扉屨供行李盟㑹爭承日至昏當日支持亦難矣我讀春秋三歎息戰爭和好俱無術今當四海為家世蠻觸紛爭往何處寄秦子樹灃京邸三十韻兼柬蔡子宸錫吳子大年癸亥經學肇淵源實惟我舅氏閉門四十載著述浩難紀餘膏溉後人愚也叨染指蔡子亦勃興不謀而同軌鑽研事三禮註疏繁且哆余著宫室圗三代遺基址蔡子有禮傳精入毫芒裏質齋兩昆仲大年號質齋與賢弟遵義並以經學名世臭味畧相似易傳與春秋著論各宏偉秦子年最少味經得經髄味經秦子别號窮經著實用穎銳尤莫比治河洞古今鹽筴析源委乗時並髙翔稽古光有煒而我守窮廬麟經究終始諸儒論積薪不肯隨諾唯編年從周正紀事因魯史朔閏補長歴輿圗看聚米紛紛日月時瑣瑣爵名氏一掃支離障庶得筆削㫖謬誤斥公羊災異嗤董子州次而部居分肌兼析理為卷四十九為目四十四後復増六項所恨帙浩繁未能致雙鯉良友兩三人無由攻疣疻舅氏有從孫謂華子師道貫穿窮根柢郵筒數往来辨論析朱紫佽助良不淺剸割豁頑鄙此事有由來先河而後海十年粗告成吾友當心喜天逺帝城闕白雲空徙倚樹灃答和六籍聖所貽紹述賴百氏紀綱天地人厥功焉可紀精言與大義歴歴瞭如指性功達治術出處均一軌胡為後世士觸目驚且哆如構九層臺版築傾基址又如舟失舵簸蕩風波裏禮器及車服誰復求形似吾邑有顧翁復古氣雄偉窮年抱遺經含咀吸真髓脫身塵􅅽外清曠莫與比擁書萬卷樓尋源必迄委初年學古文下筆輒光煒尚論愛司馬年譜究終始先生曽著温公年譜神交若投契覿面相應唯詎止𫝊賢踪裨補先正史三禮圖宫室古意追釋米穿穴暨春秋三𫝊列硯几創成大事表務合筆削㫖書成忽十稔作歌告諸子謂蒙守朴學謬與談名理反覆㡬百言窔奥得三四欵欵尺素書殷勤附尺鯉軒朗豁雙眸不啻脫痏疻所恨久離索末由竟株柢先生名山業塵垢視青紫髙風式郷閭立志起頑鄙嗟余日荒落勺蠡難測海持示蔡與吳入手先色喜何當返柴荆百尺容攀倚留别程風衣四十韻兼論春秋大事表癸亥嚴冬迴棹氷凌兢故人送我河之濵畫作山水平逺幅幅中不覺生陽春長歌贈别慨且慷臨岐握手何徬徨江水蒼茫界南北感君此意同深長我滯淮濵經兩歲相見聚談無别事春秋往復累百千夢寐宣尼得微意君每一見輙歎絶此論從今應不易疾讀數行曉深處髙吟拍案為擊節一從公穀恣狂瞽杜孔啖趙㡬清楚康侯旋復起支離至今迷濛如宿莽東海刋行數十家徒滋衆說紛相挐節齋程氏端學則堂家氏鉉翁相祖述夾漈鄭氏樵益復重蒙遮三家皆以春王正月為夏正學者見之重結膈茫茫大海誰與適引經據論各成書彌縫更復無瑕隙從此求經經愈逺沿枝尋葉忘根本譬如白日障浮雲終古黒夜増煩懣獨有元儒張翠屏張氏㠯寧力持周正豁沉𡨕諸儒贅論如落葉酔夢叢中我獨醒其餘亦各有長處未免拘執多回䕶鯫生短視彳亍行十歩回頭五歩顧讀書要當登天衢極目千里窮所如宣尼微㫖今何在只是當年據實書我從遺經尋義諦盡掃紛紜諸則例褒貶微情倐忽分應看當日居何勢少陵一代千首詩天寳肅代不同時太平離亂俱有作討賊銷兵各異辭世儒强解從一律刻舟膠柱拘形迹寒暑一令同衣裝夏著綿裘冬衣葛是皆于事未熟覽致令經義從幽闇以管窺天天一隅誰知頃刻雲霞捲從古知人須論世世態變遷褒貶異白衣蒼狗自昔傳何况春秋是末季義理人心所同然屬辭比事得真詮求之太宻逾遼逺至義要當在眼前鑽穴十年如攻城一畨攻破一畨平于今觸處無停滯鼔枻中流自在行君今惠我春風圖山平水逺足歡娛髣髴窮經得意處目不給賞堪怡愉多君知言兼好我臨别緒論陳瑣瑣更繪新圖送逺行乗風擊楫無掀簸程啟生贈詩五十五韻甲子憲廟昔臨御恩波覃八極渙汗其大號邱園交東帛維時承平久化成邁往昔里巷聞絃歌窮陬務脩飭聞命各戎裝爭先赴上國儒冠旣峩峨征車復奕奕或懐隋侯珠或握荆山璧或披蘭苕新或掣滄海碧鳴珮集丹陛心情接虹霓就中星斗寒鉅儒出無錫讀書破萬卷性同杜氏癖著述窮歲年鑽研入無隙宣尼生周季仰窺王迹熄然後作春秋萬古垂法式筆削見是非義存三代直當時㳺夏輩欲贊空太息如何後世人無端奮私臆丘明見國史事實頗能核傅㑹雖時有網羅著勞績齊魯多陋儒厥惟髙與赤鄒夾未有書莫由問失得三家遂鼎峙左氏仍後植自兹口説滕聖經嗟晦蝕功令尊胡氏學子守之墨首先革周正先聖寧蹙額一褒復一貶譸張令人惑褒貶本所無安用常唧唧忍使日月光蔽虧重雲黑先生蹷然興掃除不遺力百家咸披靡似用大師克煌煌大事表卷軸日盈積發憤闡闕文塵埃教蕩滌曲說從此廢禾稼駈螟螣上則考天時殷勤補長歴下則綜形勢聚米圖疆域僣禮與敗度亂賊暨戎翟事事闗大義臚列各就職載觀交兵篇往來正如織旌旗猶在眼開卷若憑軾晉楚爭夏盟宋鄭困行役向戌忽弭兵難免司城責五材民並用戎懼存法則霸統經再變王猷竟永塞人欲日橫流瞻烏更誰適竊取有深意肯令鯫生識君書出雖晚重到杏壇側鐘磬鏗然鳴清音動四壁憶昔鴻詞徴余亦預末席客居郊壇西頗愛厥境僻凉風下庭梧朝昏玩羲畫㝠㑹得懸解忽然塵慮釋與君偕罷歸十載卧泉石著書曩未成今也喜大獲假令留青瑣兹業諒俱寂深荷皇天慈慨然増感激與楊農先書丙寅憶在京師于貴宗清寧兄處接見閣下此時失于請教放廢以後發憤尋繹舊業時有從問字者桐城方望溪先生傳語敝門人老先生古文為當今作手而恨其文不得見私心想望久之去冬于鎮江黃副使處獲覩大作黃太夫人韻語墓誌質實古勁可繼半山之後乃始頫首歎服知望溪之賞鑒為不虚而三十年前之失于交臂為可惜也敝邑去郡城不百里而閣下宦逰日久間一乞假南歸不能訪知的實無從請謁懸懸之誠匪朝伊夕矣兹有請于左右者某自癸卯旋里迄今㡬三十年然不敢一日自墮棄思春秋一經為聖人經世之書顧以𫝊而明亦以𫝊而晦一晦于公穀之以日月生義經杜孔啖趙及有宋孫明復劉原父之駁辨而差明再晦于康侯之以復仇立説宋明以来屢經駁正而聖人書法終未大明于世又有私意小智盡棄三𫝊臆度傅㑹横空造作如趙氏經筌黃氏通說之流雖間有長處而得不償失功不補過至春秋行夏時及不書即位為夫子貶削則自三𫝊以来未之有至宋儒始入障霧謂聖人以天道寓王法改本朝正朔擅貶斥君父此尢傷教害義之大者而歴代名儒如鄭夾漈家則堂程積齋三家俱祖其說連篇累牘引證經𫝊見則堂先生詳説程積齋全引入或問中其說愈牢其蔽愈甚東海列置經解中學者震于其名不敢違異有終身讀春秋至老死與聖人之意大悖者為此不自揣量夙承先師先母舅遺教創為大事表一書州次部居旁行鈎貫積久成多為目五十先列前儒精義次及近代名家末申己意為叙論考辨說共百三十餘篇家貧客逰不能效書生伏几據案執管吚唔篷窗輿底風雪交作又或廣廷大讌絲管喧闐嘿成腹藁已乃考訂書𫝊刪其牴牾時復自笑後之視今猶今之視昔安知後日不為覆瓿具乎然區區之用心則已苦矣本無意授梓去冬望溪先生有書來云戒為時賢作序已三十年今務必破例為之諸生輩用此捐資付刋已成三分之一除未經成卷外謹將刻過諸卷併序文及凡例總序草釘成本呈上左右雖未成書而大意已畧具伏惟老先生負當代大名與望溪先生唱和大江南北乞憐其志意收其一得作為雄文弁諸首簡榮踰華衮矣貴邑蔣東委先生亦屬向所傾慕容當致書續求聞來春欲乞假南旋能乗興到舍間萬卷樓共相討論幸甚望溪手東乙丑承示春秋表諸序乃知老先生始仕而顛乃天心玉成使有得于古有𫝊于後也僕戒為時賢作序三十餘年今必破例為之老病不能為揖讓之禮故不見一人先生若枉存自當披豁泉石間穆堂手柬己未春秋一書棼如亂絲得好學深思如年兄者閒中排比并為著論可謂抱遺經究終始矣文叔手柬丁夘前讀尊著春秋大事表正少總叙一篇今得見示極妙鄭莊公後論更勝前篇晉狐偃三人論及夷姜齊姜辨皆是核實定論非弄巧翻案也已刻表七本昨收到俟讀竟轉送望溪先生抄本一冊目錄八葉綱領九葉偶筆五葉都繳上乞驗收嵗暮歸便當奉候如或不及則拙序必寄到但恐不足用爾率佈不盡東委手東戊辰昔在淮海處相遇已不復記憶辛丑之春曾於郷前輩錢絅菴座上一望見顔色亦且三十年矣每于華芋兄處詢老先生起居及所著述渇欲一聆清誨而相去百里兼以衰年杜門竟弗克如願悵怏何既頃忽接讀來翰恍若有隕自天兼示總叙等篇雖未獲窺見全豹而議論鑿鑿直開千古混沌其規模宏大條理精宻朱子所謂許大精神者于此見之自有春秋以来得所未見其于𫝊世行逺也何有屈指五月間急欲得全部一觀以開茅塞也鄙序無足為重輕轉幸可附尾承不棄閱全書後自當勉力為之但恐衰病之餘力不從心耳韋軒手柬姓華氏名孳亨前捧讀春秋序論十數篇見地超卓詞意曉暢𫝊世何疑惟人物一表頗未惬意孟懿子殺郈孫伐公徒罪在不赦今特著論以雪其枉而斥左氏為誣人未必信也歐陽公春秋論引據確切辨析明快而篤信三𫝊者猶不以公言為然甚矣翻案之難也欲斥左氏為誣必尋頂針破綻方可折服其心今但據孟僖子病不能相禮一段謂何忌嘗師事孔子然家語及史記弟子列𫝊無懿子之名學宫配享無懿子之位是不得與于七十子之列明矣孔子已墮郈與費孟氏獨不肯墮成定公自圍成而不克知懿子非能服膺孔子而伐公徒之事非其所必無矣未確見左氏之誣而遽赦懿子之罪其為平反歟為失出歟俱未可知未可知寧闕之可也而人物表躋之首層賢聖之列使居叔孫昭子之上人必駭然矣石之紛如無他事其見左傳者獨死于階下四字耳謂死難不得為忠臣遂貶入佞幸雖說本胡文定終覺太苛何懿子之幸而紛如之不幸耶宫掖小臣非晏子比無知簒位非崔杼比變生倉卒不死則從賊耳以死為非必以從賊為是此豈公道耶漢書古今人表非孟堅筆乃女弟班昭所續議者紛然品題古人良亦未易願更加詳慎至孔子請討陳恒程子謂宜告天子方伯已極迂踈胡氏謂宜先發後聞尢為悖謬吾弟謂孔子為司冦時則可此甚不然司㓂非掌軍旅君相不聞兵何從發且欲討無君之賊而先自蹈專擅不臣之罪豈復成孔子論理則大不順論勢則必不行况胡氏以責告老之大夫真乃不成說話亟宜一筆抺去豈可復凂齒頰而汚簡牘乎略陳固陋顒俟裁奪期亨頓首答復初柬一辛酉華玉淳字師道韋軒子承命輯春秋官制表具槀呈上古今官制因革論世者所宜究心而左氏一書尢可與周禮互相證王朝之官惟宰四見於經劉原父以為冡宰獨書見任之最重與穀梁義合而公羊以宰咺為士宰渠伯糾為下大夫杜註亦以宰咺為宰夫不知冡宰紀法之守而下賵諸侯之妾聘簒弑之君故書以示譏若下大夫與士何為特著其官乎侯國三卿禮記正義謂司徒兼冡宰司馬兼宗伯司空兼司㓂其下有五大夫為小宰小司㓂之屬魯有三卿而臧紇為司㓂孔子亦為司㓂是小司㓂也羽父請為太宰葢求特設以寵已而夏父弗忌為宗伯則如他國之宗人其職近乎卜祝之間非卿官也不然是魯備六官矣宋以左右二師司馬司徒司城司㓂為六卿而别有太宰少宰晉廢司徒為中軍而士蒍為大司空尚為卿官其後立六卿以三軍將佐為號而司馬司空皆大夫為之依類以觀則當時列國設官之踰制亦可見矣愚意數國共有之官當以官為經諸國為緯庶合表體而列國互異處亦瞭然但大小有二十國一行中列横格二十未免作字太細今分周魯宋晉齊楚鄭為七國餘國設官頗少合為一格而一國獨有之官别著于後至官之崇卑及其職掌與周禮或同或異則備引孔疏及二鄭賈服之說以相考庶讀者于此處留意并可貫穿周禮一書亦讀經之一助也答復初柬二壬戌十月来示氏族世系表可合為一著其始祖則為世族詳其子孫昭穆則為世系極當然此二表俱草創垂就體例既殊亦不必合惟世系表必先表明某氏著其得姓賜族之始而列國卿大夫凡四十餘族不容于姓氏中更加詳註其支分派别如魯仲孫之後為子服氏叔孫之後為叔仲氏東門氏别為仲氏及子家氏晉之趙氏别為邯鄲魏氏别為令狐旣于姓氏表備著本末則世系中宜從略彼此可互考也又氏族之分當以國姓為權輿歴代紀事年表及通志路史俱有舛譌今一以傳文及註疏為據疑者闕之如此則爵姓表似嫌複出且必有異同處須一檢勘所諭韓歐曾碑誌言及氏族者宜附入然唐以前諸史所載姓氏源流處甚多如楊子雲沈休文自述先世俱與春秋氏族有闗係其餘與經傳無渉者自當略而不論容草成統俟裁削答復初柬三甲子三月有條見示朔閏表致為細宻然其中可商處尚多得暇當一檢校此項本難着手今法以合朔時刻定月之大小中氣有無定閏之先後而古歴甚踈不得以今法為凖杜氏只就經𫝊所有日月排成長歴未必盡合春秋時法今更出杜氏後二千載而謂所定月大小日甲乙置閏後先一一脗合此必無之事也晉語十月惠公卒韋昭注云内傳在九月而此云十月賈侍中以為閏在十二月後魯失閏以閏月為正月晉以九月為十月而置閏也然則列國之歴又各有不同因此疑經𫝊日月參差未必盡闕誤或赴告有異也最可異者先儒見經文兩書閏月皆在嵗終遂謂古歴閏皆十二月以此解左𫝊歸餘于終不知閏所以定時成嵗若每閏必在嵗終何以定四時竊意閏者附月之餘日也積聚餘分至中氣在晦則當置閏是謂一終所謂歸餘于終者如此元楊恭懿上授時歴奏云暴秦焚書廢古偽作置閏嵗終西漢因之然則史記漢書于太初未改歴前屡書後九月乃仍秦歴非古法本然也左𫝊再書日南至僖五年正月辛亥朔以宋紀元金大明歴推之得壬子後左傳一日昭二十年正月己丑朔以宋統天元授時歴推之得戊子先左𫝊一日紀元大明得庚寅亦後一日明大統歴則得壬辰更後兩日穆堂先生春秋年譜自云節氣中氣俱備此必以今法推之恐未可據以定春秋時歴也答復初東四甲子九月春秋田賦軍旅一項極有闗係増入甚善然見於經者惟五條晉州兵鄭邱賦俱𫝊中事似宜加一附字至晉之毁車崇卒越之句卒乃一時臨陣權宜之法非經久之制與前數條有别𫝊中如先偏後伍伍承彌縫及廣有一卒卒偏之兩此類甚多似不必載晉始易一軍為二軍後立三軍又増置三行後又立六軍上擬天子中間或罷為五軍四軍終春秋世凡數變此軍政之大者玉淳初輯官制表于晉軍將止載遷擢更代之大凡至軍制變更諸卿始末宜于中軍表見之亦可于軍旅官制二表互相發未審合尊意否寄復初柬五乙丑十月數日来與舍弟師茂披讀春秋地形口號深歎援据精核當日星分繡錯之勢瞭若指掌即以詩論亦自獨絶千古玉淳嘗愛杜工部河北諸節度入朝口號以為龍標太白固是絶句勝塲不若老杜此詩髙文典冊足繼雅頌今表叔乃復以比興之體與鄭康成杜元凱爭席于此道中别開生面矣近代釋地理者惟江村宛溪猶不免有誤使兩先生當日即有如表叔者與之上下其議論指其謬誤而更正之當必快然無遺憾以古揆今表叔欲成一書為不朽之業亦當不厭人之進其異說也師茂干輿地沿革頗留意因與反覆究晰得可疑者數端敢條舉如左以備採擇第十首晉疆直抵延安府白翟遺墟舊帶襟按白翟地入晉未知在何公時僖三十三年晉人敗狄于箕郤缺獲白狄子杜註故西河郡有白部胡宣十年晉師白狄伐秦成十三年吕相絶秦曰白狄及君同州屢見經𫝊江村謂文公初伯讓白狄開西河不知何據然亦非韓戰前事也延安在韓城之西北秦都鳯翔在韓城之西南自鳯翔至韓城不經延安以是釋冦深於地形亦未盡合後章有晉疆早徹漢新豐之句此正在韓城之西雍之東足解宼深之疑矣葢韓原在黃河西岸晉人所恃以守河者也韓原守則黃河之險晉所獨據韓原失則黃河之險與秦共之秦師及韓晉始得聞方且興師卜右視師往返而秦兵不曾踰韓以東一歩則韓之足以捍秦而為晉之重地可知如此則雖謂韓原直與秦接界而秦兵一渉韓境即謂之冦深可矣文二年秦伐晉晉人禦之戰于彭衙彭衙秦地也哀十一年齊師及清清齊地也而冉有已勸季氏禦諸竟盖知敵兵之来必迎而距之境外勿使其戰于我地况韓原為必爭之要地乎第十三首晉人滅潞收遺地逼近齊疆遂戰鞌註謂晉地跨有東昌曹濮之境按赤狄潞氏國都在山西潞安府其邊邑直至今直𨽻廣平府之永年縣留吁鐸辰俱在今潞安府境甲氏在今廣平府之雞澤縣如是則晉收狄遺土亦至永年雞澤而止其廣平東境屬邑已非晉有左傳明有及衛地之文都邑表亦以師從齊師于莘為衛地則東昌曹濮間當為衛曹兩國境第二十四首漫說海邦魯所届詩人頌禱尚從虚按今江南海州春秋時屬魯東際海南近淮魯頌所稱指此不得謂虚又登萊之地斗入海中三面皆海故海州雖在登萊西南而已濱海齊未滅萊棠之前其東北境亦濵于海所以得魚鹽之利然則菅仲對楚使之云亦非虚誇也第五十二首秦人滅鄀志南圖楚却移都好避吳按鄀有二舊鄀在今南陽府内鄉縣即僖二十五年秦晉伐鄀文五年秦人入鄀是也新鄀在今襄陽府宜城縣即定六年楚所徙都也詳詩意似合二鄀為一矣第五十三首註秦之河東即晉之河西二語未的秦始征晉河東當在今山西之境若仍在河外則韓原正在河西戰勝之後秦竟不曾乗勝東略晉地恐非事實且徒父渉河之占亦為不驗矣秦歸晉河東是只與晉以河為界陜西同州府秦仍有之及文二年晉取彭衙以後始漸開復河西舊疆耳秦伯師于河西自在黃河西岸魏人在東自在黄河東岸觀下文既濟魏人譟而還明隔一河豈可謂即一地乎第五十四首大峴闗山古穆陵按僖四年傳楚使詰齊桓不宜輕渉楚地故管仲對以太公本有征諸侯之責先王賜其足跡所及南可以至穆陵今日来此乃脩舊職文氣一貫若穆陵近在大峴不足以塞楚使之口是時齊境尚未及河以西至于河句推之則無棣穆陵俱别有在杜氏漫註皆齊境後人傅㑹于是溝曰無棣闗曰穆陵俱在今山東之境矣第五十五首平陰廣里肇長城按平陰舊有城𫝊言塹防門而守之廣里是于防門外作塹横行廣一里非築城也築長城係戰國田齊時事第八十四首註開州又東北為汲縣即衛之南河按汲縣在開州之西南時晉欲假道而衛不許故還自南河濟則南河不屬衛可知杜註從汲郡南渡出衛南而東是也從汲郡南渡者南河在汲郡非汲縣在南河也若衛許假道則從汲郡東渡矣是時黄河東北流今衛輝府東南兩面皆河也第一百首豫章廬皖及饒州六見經文迹可求漢代郡名非昔地南昌尚隔楚江修按漢志豫章郡贛縣豫章水出西南北入大江豫章水即今章江也從南安府之西南東流折而北經贛州府與貢水合又北經吉安臨江二府南昌府城西北又東入鄱陽湖水曲曰汭豫章之汭即今章江入湖左右地也漢豫章郡正以豫章水得名為今江西全省之境初非専指南昌特春秋時則更廣并跨至江北耳謂當日吳楚交兵未嘗至南昌則可謂南昌在春秋時獨不得稱豫章則不可謂豫章之汭與漢豫章郡無涉尤不可也至柏舉之戰吴人舍舟淮汭自豫章與楚夾漢此則與漢豫章郡懸隔然謂豫章即淮汭今日夀州地亦非也夀州即州來時已屬吳吳乗舟從淮來過蔡而舍之故沈尹戍欲毁之以絶其奔逸若吳人未出境即陸行千里至漢北亦不可謂之舍舟直是不用舟耳陸行而出即可陸行而歸沈尹戍何苦不逺千里輕渉吳地毁其不必用之舟乎左傳六豫章杜註于前則曰江北淮水南于後則曰漢東江北地是淮之南漢之東江之北皆有豫章地而未嘗明指某地為豫章昭六年楚薳洩伐徐吳人救之令尹子蕩帥師伐吳師于豫章伐徐是一人伐吳救兵者又一人則徐與豫章自是兩地昭十三年楚師歸自徐吳人敗諸豫章明是扼其歸師今求豫章于徐而謂泗州為楚豫章地未見其必然也昭三十一年呉人圍弦左司馬戍右司馬稽帥師救弦及豫章吳師還楚方及豫章而呉師即還正謂其不能相及則豫章非即弦地可知定二年桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐吳師于豫章呉人見舟于豫章而潛師于巢冬十月呉軍楚師于豫章敗之遂圍巢克之此盖吳欲伐巢而防楚救之故先誘楚師臨吳境使楚人疑呉方禦楚無暇伐巢一邊見舟豫章一邊潛師于巢則巢與豫章亦是兩地今以盧州府之巢縣為楚豫章地亦未見其必然也補遺第一首與前第四十五首事同而論異然兩有未安葢越既滅呉文種死范蠡去其不能與楚爭亦勢所必至楚東侵廣地僅至泗上則泗上以東仍為魯越接壤無礙于朝聘征伐之徃来而朝聘征伐亦不必壤地之相接國都之相近也漢志琅邪郡琅邪縣註越王句踐嘗治此起館臺宛溪亦云句踐嘗徙琅邪曰嘗治曰嘗徙則是不常都也越絶等書言其暫史記要其終耳左𫝊哀二十四年閏月公如越二十五年六月公至自越若越都近在琅邪豈必踰年始歸乎又按史記越世家句踐渡淮南以淮上地與楚當在今徐潁之境又歸魯宋故吳所侵地盖亦自知力不能有而棄之無疆以與齊楚爭强而滅非亡於蹙地也第四十五首註云今日揚州淮安之地盡棄與楚所以五世至無疆為楚所并亦未盡然以上數條以道理形勢推之殊未合不敢不獻其疑此卷為山川都邑疆域險要諸表之總萃一有未當則數處俱有改易半江方就萬卷樓畫輿地圗于地形曲折必有定見請以此商之并望于諸表中一加討究幸甚春秋大事表附録
