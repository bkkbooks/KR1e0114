body:
  text: 春秋大事表卷二十國子監司業顧棟髙撰王迹拾遺表孟子曰王者之迹熄而詩亡詩亡然後春秋作東遷以後政教號令不行於天下然當春秋初年聲靈猶未盡冺也鄭伯虢公為王左右卿士鄭據虎牢之險虢有桃林之塞左提右挈儼然三輔雄封其時賦車萬乗諸侯猶得假王號令以征伐與國故鄭以王師伐邾秦偕王師伐魏二邾本附庸也進爵而為子滕薛杞本列侯也降爵而為子伯列國之卿猶請命于天子諸侯之妾猶不敢僣同于夫人虎牢已兼并于鄭仍奪之還王朝曲沃以支子簒宗赫然興師而致討衛朔逆命子突救衛書王人樊皮叛王虢公奉命誅不服庶幾得命徳討罪興滅繼絶之義然鄭以懿親而且交質矣曲沃之伐不惟無功日後荀賈且為晉所滅甚至射王中肩列國無為王敵愾者而僖王之世命曲沃為晉侯貪寵賂奨簒弑三綱盡矣嗣後王室益微迨至晉滅虢而襄王復以温原賜晉舉崤函之險固河内之殷實悉舉而畀諸他人自是王朝不復能出一旅與初年聲勢大異矣嗚呼以文武成康維持鞏固之天下而凌夷衰㣲至此此豈一朝一夕之故哉恵襄以後世有兄弟之難子頽子帶子朝迭亂王室數數勤諸侯之師蓋齊家之道有闕政本不修皇綱陵遲君子閔焉獨能憑藉先靈稱述祖制折伏强暴若襄王拒請隧定王詰鞏伯而王孫滿以片言却强楚於近郊之外譬之以太阿授人而欲以朽索控跅􅕟之馬嗚呼其難哉爰自春秋始年訖於獲麟列王朝之事之散見經𫝊者都為一編于魯春秋之内得二百四十二年之周史亦吾夫子之志也輯春秋王迹拾遺表第二十案周自平桓之世鄭虢分政至敬王時有單平公中問或兩人或三人見於左傳者争政凡四共二十八人或出師征伐或與諸國㑹盟事迹班班可考只虢公自忌父林父兩人以名見以後止稱虢公或稱虢仲或稱虢叔至僖五年晉滅虢而止或父子相繼其名字不可得見其奔京師者為虢公醜云春秋大事表卷二十
