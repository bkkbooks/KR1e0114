body:
  text: 春秋大事表卷五國子監司業顧棟髙撰列國爵姓及存滅表余既輯春秋疆域自成周以迄齊楚秦晉凡十一國而當日之形勢如鱗次櫛比犬牙相錯凡行軍用師出入往來之迂直逺近及築城戍守之輕重疎宻莫不瞭然具見繼為原其封爵之所由及其姓氏與小國之入于某國為某邑而春秋之列侯始而星羅棊布繼而疆兼弱削究其源流指掌可數作而歎曰封建之裂為郡縣葢不自秦始也自莊公之世而楚文王巳縣申息封畛于汝逮後而晉有四十縣哀二年趙鞅為銕之師誓曰克敵者上大夫受縣下大夫受郡終春秋之世而國之滅為縣邑者强半天下而諸國卒以强盛則當日之勢較之周初已稍稍異矣雖聖王復起不得不變其制也且入春秋以來周室得以綿延數百年者賴齊與晉耳而齊晉之兼國為不少也假令齊晉謹守侯度猶然臨淄太原百里之封而周天子能統虞虢譚遂諸國以鞭笞荆楚披攘戎狄乎不能也其不能者何也其勢散且有土之諸侯未必皆賢即使因其不賢而易置之而其政令不能盡出于王朝其民之視聽不能盡屬于天子故常散而不能聚弱而不能强其易而縣邑也則不然度才而使之程能而任之朝不道則夕斥之矣夕不道則朝罷之矣晉文難守原之大夫而得趙衰鄭子皮欲使尹何為邑而子産曰少未知可否其操縱由一巳其呼吸若一氣其簡練教訓如親父兄之于子弟也故能抗方張之敵而成翼戴之勢嗚呼世變之所趨如天地之化隂陽積而成寒暑豈一朝一夕之故哉雖聖人復起無如之何也西漢之興侯國與郡縣參半未幾而反者四起其存者皆淫侈不軌逮國除為郡而黎民乂安垂數百年漢之國除為郡而地入于天子春秋之國滅為邑而地歸于强侯漢以淫侈不軌而除春秋以弱小不能自立而滅其事不同而世變之所趍則一也天下之勢合則治而分則亂自三代以來莫之有易矣輯春秋列國爵姓及存滅表第五春秋大事表卷五
