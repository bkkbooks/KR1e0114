body:
  text: 春秋大事表卷二十一國子監司業顧棟髙撰魯政下逮表從來國家之欲去權臣也必俟其有可指之罪一朝卒然而去之無使一擊不勝至於再擊則彼之聲勢益張蟠附益固而吾之國威亦頓挫又必所與謀者皆正直無私國人素所傾服之臣是故必如舜而後可殛四凶必如周公而後可誅管蔡愚觀昭公乾侯之事而知三家之所以蔓延不可制者非獨三家之罪亦魯之羣公有以自取之也何則國家之患莫大乎世卿然相沿已乆不可驟革季子有大功而執政為卿宜也叔牙以就鍼巫之酖而業許為立後至如慶父胡為者通國母弑二君負滔天之惡此斷㫁宜絶其屬籍矣而亦為立後逮其子敖棄君命從己氏罪尤必誅不赦而其二子儼然為貴卿従此三家遂如鼎足不可去一父子再負重罪而寵榮不衰此時魯之威柄已倒地此根本之失首宜歎息痛恨者也至當日魯之欲去三桓非一世矣患在𤼵之太早謀之太疎一𤼵于歸父宣十八年再𤼵于僑如成十六年三𤼵于南蒯昭十二年至平子登臺之請而凡四矣每一𤼵不勝則三家之聲望益隆國人之屬望益切此非欲去之直為三家立赤幟助之翼而飛也請得而言之季友有定國之功而其子無佚早死孫行父于文之六年纔受室為卿此時年少位卑惟仲遂之言是聴未有可指之罪也若追論弑子赤之事則宜先誅仲遂而後及行父今歸父以逆賊之子而欲圖行父忠賢之後且當時行父與蔑俱有賢聲國人豈能服乎國人不服必不能去不去而君臣之間必不相安此魯之失計一也嗣後行父稍稍肆志矣鞌之戰一怒而興舉國之師役滿朝之將功成志得立廟銘鐘然終成公之世與仲孫蔑共政小心畏慎俱為賢卿聲望猶出僑如逺甚一旦僑如通於穆姜欲藉晉力以去季孟并欲廢公此時公視季孟如唐之五王而視僑如與其母乃韋后與三思爾非特國人與之并公亦且委心聴任如同舟之遇風此魯之失計二也嗣後行父悟威權之不可去手幽君母刺公子偃然皆藉君意以行之至其子宿乃遂攘奪國政適值襄公幼弱父喪未期即首城賜邑視叔孟二卿蔑如也行父卒後次當及仲孫蔑蔑之後當及叔孫豹此二子皆賢大夫也魯之舊例執政以次更代俟其人已卒然後逓掌國政而宿之凶燄二子皆畏之慮其軋已故宿請作中軍而豹即有政將及子之言不欲與争既得國政兵柄在手入鄆以自益城成邑而偃然居叔孫之上凡意如逐君之事皆宿倡導之至宿死而其子紇早卒執政次及叔孫舎舍為政凡十八年無能革意如之惡且事事欲傾陷叔孫致之死此時之罪狀人人欲倳刄其腹中矣然南蒯特不得志于季氏之徒非能為國除患一旦造謀智短慮淺謀未及成先懼弗克叛而奔齊身冒不韙而欲除百年之積蠧有是理哉此魯之失計三也當此國威三挫之後魯人視公室真如死灰之不復然而濡首富貴之徒咸奔走季氏昭公踵此而欲與季為難此如命遼郃以攻曹瞞其不為刄出于背者幸爾追維終始此豈一朝一夕之故哉逮季桓子遭陽虎之難急用孔子孔子為政三年三都隳其二公私俱安魯國大治此所謂惟禮可以已之者也陽虎謂孔子好從事而亟失時蓋欲招孔子以共圖季氏貨蓋如董卓曹操之流欲以蔡邕荀彧擬孔子易曰開國承家小人勿用聖人繫易豈不深切著明矣哉輯春秋魯政下逮表第二十一案自僖公元年至哀公二十七年左氏春秋經𫝊之末閲年一百九十三魯之執政共十一人季氏凡六人叔孫氏二人孟孫氏一人東門氏一人中間陽虎執政在定之六七八僅三年爾旋出奔政柄復歸季氏當定之九年季孫斯乗意如兇惡之後遭陽虎幾死慬而得免創鉅痛深乃始用孔子以銷弭禍患孔子建墮三都之議叔季二家墮費墮郈譬之虎穴虎出而羣狼據之虎亦不得歸墮其穴非特公室安并私門亦安此聖人撥亂反正之大機括也至十二年冬十二月孟氏不肯墮成季叔亦漸漸生悔志慮一變旋不用孔子患難則思之安樂則棄之亦時𫝑使然至哀之十五年孟氏之成宰公孫宿亦叛入於齊踵南蒯及侯犯之後聖人之言始驗明年孔子亦卒使孔子久於其位當能感悟孟氏使漸就約束而卒以女樂去此天也至哀公之世孔子已告老陪臣之禍已銷而三家復熾哀公復孫于越蹈乾侯之轍尾大不掉之禍至於如此雖聖人其奈之何哉春秋子野卒論春秋子野卒左𫝊曰毁也榖梁曰日卒正也厯漢以迄宋明無有以子野為弑者獨近日望溪方氏斥之為弑與子般子赤一例初見似創迺余反覆觀之而知其説之不可易也胡茅堂氏謂子般子赤被弑而書卒子野過毁而亦書卒不覩𫝊文何以知其非弑余謂正惟覩𫝊文而益知其弑無疑特世儒為成見所封不之察耳蓋嘗學㫁斯獄隠之遇弑也𫝊稱舘于寪氏壬辰羽父使賊弑公於寪氏子般之遇弑也𫝊稱次于黨氏冬十月己未共仲使圉人犖賊子般于黨氏凡亂臣賊子謀行不軌類不於宫庭慮君之徒御多而耳目廣也必伺其間於寛閒隠僻之所而後得以肆虐且為後日諉罪飾奸之地况此𫝊更明云次於季氏秋九月癸巳卒入大臣之家而不得反則弑逆之罪季氏將誰逃乎左氏乃云毁此正季之欲蓋而彌彰也且所云毁者以為哭泣哀傷而毁乎則當在大斂小斂搶天呼地之際以為歠粥疏食不勝羸瘠而毁乎則當遲之朞月經年之乆今襄公之薨以六月辛巳子野之卒以九月癸巳相去七十五日距襲斂之時則已逺矣胡乃不先不後適當其時豈平日倚廬堊室之毁獨無恙次於季氏遂至一毁而卒乎且季氏為正卿攝國政職當調䕶嗣君嗣君入其室凡防衛之不周進藥之不謹當惟季是問縦使季無逆謀亦當為法受惡許世子不嘗藥而春秋書之曰弑今季豈止不嘗藥而已故孔子書之與子般子赤一例季孫謀逆之罪當與羽父襄仲同科或者謂賊無主名烏得斥之為弑曰季孫之惡毒於梁冀而季孫之謀同於霍顯漢質帝于朝㑹中目梁冀曰此跋扈將軍也冀聞遂進酖弑帝霍顯之藥殺許后也乗其産子意子野平日憤襄公之見欺與季有違言而季亦憚其英武計不若昭之童騃易制遂萌邪謀而適當倚廬居喪之日霍顯之謀曰婦人大故十死一生可用投藥去季之謀曰子之喪親禮當哀毁可以毁卒飾加至美之名於君父以惑群聴立其親娣之子以釋群疑舉朝莫得知通國莫敢議而學士大夫亦遂相蒙以至於今是其謀更巧而心更毒而烏得逭於弑逆之誅乎哉或又謂子赤之弑上書公子遂叔孫得臣如齊而下書夫人姜氏歸於齊可以知其弑而此經上下文無所見曰此世儒之拘於近而忽於逺也經於襄二十九年正月書公在楚夏五月公至自楚聞季孫取卞而不敢入於昭元年書取鄆二年公如晉至河乃復而季孫宿如晉榖梁曰公如晉而不得入季孫宿如晉而得入惡之也是季之結援大國動見掣肘擅興甲兵陵逼君父所謂司馬昭之心路人皆知者子野特未興甲以攻季氏不至顯然䝉弑耳謹因方氏之論為二語判其狀曰據經文無殊於子般子赤之卒據𫝊文顯同于寪氏黨氏之事後之折是獄者以是蒞焉可也余見望溪方氏之説以為千古未𤼵急為説以申明之後閲趙木訥經筌有云公薨而子野卒此與莊公薨而子般卒文公薨而子惡卒何異均未成君均不書地均不書葬蓋子野賢季氏忌之弑野而立昭公以毁言於朝而世不察爾黄若晦通説云曰毁者左氏失之季氏専政以子野非己所立故于其次於季氏而害之以毁聞爾春秋書子野卒於公薨之下情狀顯然又存耕趙氏云卒不於他所而于季氏此疑以𫝊疑之辭閲三説略同不禁狂喜乃知人心之同然前儒已多有疑及此者不獨望溪一人之創見也謹附識于此春秋大事表卷二十一
