body:
  text: 春秋大事表卷二十三國子監司業顧棟髙撰楚令尹表楚自桓公六年武王侵隨始見左傳其時鬭伯比當國主謀議不著官稱十一年莫敖屈瑕盟貳軫敗鄖師於蒲騷時則莫敖為尊官亦未有令尹之號至莊四年武王伐隨卒於樠木之下令尹鬭祁莫敖屈重除道梁溠營軍臨隨令尹與莫敖並稱亦不知其尊卑何别也嗣後莫敖之官或設或不設間與司馬並列令尹之下而令尹以次相授至戰國猶仍其名其官大都以公子或嗣君為之他人莫得與也其軍制則分為二廣中軍不必皆令尹將邲之戰沈尹將中軍時為沈尹者莊王之子公子貞也而孫叔敖不與鄢陵之役司馬子反將中軍令尹子重將左蓋楚以令尹當國而司馬則專主兵事將相㣲分與晉制畧異矣子辛多欲而陳棄楚即晉囊瓦貪而信讒而唐蔡道吳入郢迹其利害班班可考焉自令尹鬭祁而下歴二十三年而子元欲蠱文夫人中更文王堵敖兩世不著其令尹姓氏獨哀十七年子穀對葉公之言可以參考而互見聊復補之以俟篤于左者之考定云輯春秋楚右楚令尹自鬭祁至子國共二十五人彭仲爽不在内春秋楚令尹論國家之勢不外重則内重外重之弊權奪于異姓内重之弊勢落于宗藩故漢懲七國之反而削奪諸侯王卒成王莽之禍晉懲魏孤立之弊而大封諸子旋釀八王之亂二者嘗循環而相因我觀春秋之世晉分於韓趙魏齊篡於陳氏此外重之弊也魯之政逮於三桓衛之政由於孫寗宋之亂鍾於華向此内重之弊也蓋世卿為春秋列國之通弊而晉以驪姬之亂詛無蓄羣公子故文公諸子孫雍仕秦樂仕陳黒臀仕周無在本國者惟悼公之弟揚干與其子公子憗二人見傳終不聞其當國秉政為卿故通經無書晉公子來聘之事而權奪於韓趙魏矣齊之公族髙國崔慶恣睢暴戾自取滅亡卒為陳氏所覆此亦天運使然楚以蠻夷之國而自春秋迄戰國四五百年其勢常強於諸侯卒無上陵下替之漸者其得立國之制之最善者乎楚以令尹當國執政而自子文以後若鬬氏陳氏蒍氏薳氏陽氏皆公族子孫世相授受絶不聞㠯異姓為之可以矯齊晉之弊然一有罪戾隨即誅死子玉子反以䘮師誅子上以避敵誅子辛以貪欲誅子南以多寵人誅絶不赦宥可以矯魯衛宋之弊以肺腑而膺國重寄則根本盛強以重臣而驟行顯戮則百僚震懼且政權畫一則無牽制争競之病責任重大則無諉罪偷安之咎楚之國法行而綱紀立於是乎在或者以秦之用孟眀晉之不殺荀林父以是為楚咎曰此自朝廷宥過之典可偶一用之然晉亦未為得也若魯之慶父弑二君而卒立其後為孟孫氏公孫敖從己氏而卒歸公孫敖之䘮此則魯之法紀倒地其終至乾侯之孫宜矣楚子囊城郢論左傳楚子囊將死遺言謂子庚必城郢君子謂子囊忠將死不忘衛社稷後四十年而子囊之孫囊瓦秉政首成其志沈尹戍曰子常必亡郢苟不能衛城無益也古者諸侯守在四境後世以沈尹戍為名言而以子囊為詬厲宋仁宗朝􅆻丹有警時范文正公為諫官請大脩京城吕公夷簡笑曰此子囊城郢計也命宿重兵於北京大名府卒以無事當時以吕公為持重而以范公為少不更事鳴呼世儒徒以成敗論人徒見囊瓦城郢而昭王卒至於出奔吕公絀范公之計而宋室卒保於無事遂以此為定論其實子囊之城郢未必非即孟子鑿斯池築斯城之計也吕公之絀范公未必是後世成靖康之禍者未必不自吕公啟之也蓋嘗綜其大勢而論之當吳兵之長驅而向楚也孤軍深入轉戰千里昭王正宜固守國都厲兵登陴堅壁清野不出十日救援必至為吳者頓兵堅城之下師老財匱楚之屬邑截其歸路四面夾攻此時如虎入陷阱闔閭之君臣可坐縛則子囊之城郢正是社稷之至計失在囊瓦信讒不仁人心離叛而昭王輕棄國本狼狽出走自取滅亡此孟子所謂髙城深池委而去之者奈何併其城郢而重訾之哉世傳宋祖之營京城也命趙韓王以圗上怒擲諸地徐取幅紙以筆塗之曰依此營造城衢街巷如蚯蚓屈曲乘輿出多阻礙子孫莫敢違其制後蔡京務侈大改其式從方廣正直尼瑪哈來攻命植砲四隅一砲所擊隨手摧壊始識太祖之逺慮夫當仁宗之朝未經蔡京之改制使常用范文正公之䇿髙城浚隍嚴設守備則當靖康之世亦可堅守以待四方之援不至有青城之辱矣徒以子囊城郢為嗤笑而不知城郢未始非社稷之至計此又可與楚昭之事連類而並觀之也後宋百年而金復都汴珠格髙琪築京城縻費累巨萬元蘇布特以百萬之師盡鋭來攻不克卒講和而退唐德宗幸奉天朱泚圍困京城踰年卒能殱厥巨魁光復舊物此尤深根固本之關於長算可為明效大驗者也然則沈尹之言非歟曰此又不可偏廢也當疆埸告警而遽為嬰城自守之計勢必人心驚惶訛言四起外為敵人所窺而内解将士之志此為不戰而自敗為國家者平日凛勇夫重閉之戒而臨事持從容鎮定之度故子囊言之于四十年之前則為老成之忠謀而囊瓦為之於四十年之後則為怯懦以誤國論者當總前後之時勢而觀之未可泛然為執一之論也春秋大事表卷二十三
