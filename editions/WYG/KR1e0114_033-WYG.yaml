body:
  text: 春秋大事表卷三十三國子監司業顧棟高撰吳楚交兵表聞之敵在千里者患生于有象敵在肘腋者患發於不虞楚以方城為城漢水為池天下莫之與抗而吳卒入郢吳破楚勝齊敵晉威行於中夏而越以入吳此如猛獸之畏鼷鼠巨木之畏蝎䖝獨是吳自分封以來數百年入春秋常服屬于楚至夀夢而遂不可制説者謂此是申公巫臣教之似矣而猶未詳其利害之實也余嘗究觀左氏而知吳地水行其性不能以陸故其㑹晉也于蒲則不能至于鍾離而後至于雞澤則不能至于戚而後至晉侯徵平邱之㑹吳以水道不可辭哀九年儆師伐齊則先溝通江淮矣十三年㑹晉黄池則闕為深溝于商魯之間矣是知吳不能一日而廢舟楫之用也然以此與楚角則萬萬不能勝何則舟楫之用在江湖而長江之險吳楚所共楚實居上流故其用兵常棄舟楫之用而争車乘之利最其前後數百戰鳩兹之役則楚勝而吳之報之也伐楚取駕朱方之役則楚勝而吳之報之也則取楚棘櫟麻葢舍其習用之技而常従陸路瞰其東北以避楚長江直下之險當其舍舟淮汭自豫章與楚夾漢也贏糧越險深入内地葢用蔡人為嚮道而又得子胥伯嚭報仇死戰之士孤軍單進轉戰千里自非熟練車乘不能為用然後知巫臣之教吳其患在楚數十年之後非止一時之疲于奔命而已也向非巫臣教吳以乘車射御則楚軸轤之師從漢口順流而下譬如屋上建瓴水而注之地而吳以舟師仰攻勢必不勝向之甘于役屬者職是故耳夫吳之争州來也凡七十年三用大衆而後奄有其地盖亦欲去江路而阻淮為固扼楚咽喉為進戰退守之資故日後以季子賢人撫柔之復遷蔡以實之其舍舟淮汭直走漢濵葢逆料楚瓦不仁勢必離散亦必先于此用重兵屯守據險設伏為歸路計故楚司馬戌議悉方城之外以毁其舟還塞城口當日其計不行就令得行而吳必有與敵以不可勝者不然吳之全軍且如覆釡無噍類矣闔閭君臣豈肯出此萬死不顧一生之計哉嗚呼古之善戰者常因地以制宜隨時以適變吳舍舟用車而卒破楚晉毁車用卒而能勝翟至戰國而趙武靈王胡服騎射後世遂用為長技而車戰且成古法不可用唐房琯一用之而敗明孫傳庭再用之而亦敗矣古今之世變豈可一律論哉輯春秋吳楚交兵表第三十三春秋吳楚柏舉之戰論春秋吳楚柏舉之戰子常濟漢而陳自小别至于大别孔穎達曰小别當在大别之東蓋子常自小别與吳戰退而至大别明其自東而漸西也高江村駁之曰以地形考之大别在漢陽小别在漢川柏舉在麻城漢川在漢陽之西北百七十里麻城在漢陽之東北與孔説正相反蓋孔誤也余案高氏之言信矣獨是吳在東楚在西楚子常三戰不能勝吳吳無緣有退歸而東之理故孔氏有此臆斷然余嘗反覆考之而知其所由然也蓋吳當淮汭即舍舟自豫章與楚夾漢漢即今之漢口淮汭即今之夀州自夀州至漢口九百餘里懸師深入餉道不繼此亦如齊莊公之伐晉入孟門登太行苐欲蹂踐其内地以矜威武耳此時非果有破都滅國之謀也故其戰常且鬬且却欲退歸淮汭以收師而返𫝊云自小别至于大别庚午陳於柏舉従小别至柏舉東移凡三百里則其志可知矣且司馬戌議毁舟而還塞城口世以為善計然余謂闔閭君臣不應獨愚至此古之善為兵者過險必令搜山沿途常為設伏一以防敵之邀截一以為己之應援故亞夫之入滎陽也先使搜人於淆澠之間得之陽明之攻宸濠也先搜城外伏兵當吴兵平行至城口覩其地形阨隘料楚人必有塞斷以阻其歸路者必多置鋭卒據險設伏以為歸師接應之計故夫概請戰不許而日夜引楚兵近東意欲誘入伏中還師合擊以取勝此闔閭本謀也至柏舉之戰夫概不請命而以其私卒先死大破楚軍逐北千里㡬至滅國此則楚之失算亦屬有天幸而闔閭君臣萬萬計不及此也然則小别大别之戰其自西而趨于東也復何疑乎當日為楚之計者苐當嚴兵固壘勿輕與戰淹至旬日呉必倦怠欲歸正不必為毁舟與塞城口之計但以重兵徐行駈之縦令過險待其争舟而濟然後縦兵追擊可以大勝故當日楚之失計在速戰尤在楚昭輕棄國本逃竄狼狽人心驚惶遂至宗社失守使子常雖敗而昭王固守郢都屹然不動徐令楚之城邑堅壁清野四面合援吴進困於堅城退無所得食楚之制勝亦可以百全惜當日子西葉公輩不知出此遂令吳得僥倖成功而當其決戰時固不料其能及此也但令整軍而退不至敗衂斯已矣嗚呼世之論者多據成敗已然之局故常為古人所愚故世常恨司馬之計不行為楚之失算而不知即行其計楚亦未必能勝吴又謂子常三戰不勝吳無縁退而東去而不知吳當日之戰事勢常患不能勝楚其卒能勝者天也其不行司馬之計亦司馬幸而得成其名耳就令其計得行而吳于淮汭必宿重兵城口必伏死士徒令偏師先敗以搖軍心耳不然予胥善謀豈肯以君臣陷入死地隻輪不返重為天下戮笑哉愚故因高氏之辨而竊料當日之成算如此若孔氏所云特膚末之見未可與語戰鬬之事也春秋蔡侯以吳師入郢論聖人經文皆是據實書定四年蔡侯以吳子及楚人戰于柏舉楚師敗績庚辰吳入郢據左𫝊唐蔡俱従吳伐楚而經獨書蔡先儒謂蔡受楚毒最深善其能報仇雪耻故特書曰以乃余深考當日地里知吳之入郢全慿蔡為之鄉導唐不得與聖人亦苐㨿實書而非有意于褒之也案吳楚俱澤國皆善水戰而楚地居上流吳常不勝故入春秋百年以來吳屈服于楚為屬國者職是故也逮申公巫臣自晉使吳教以乘車射御吳始用陸道與楚角逐而楚始駸駸患吳矣楚既失長江上流之險廼更于淮右北道築州來鍾離巢三城以禦吳吳于楚之水師克鳩兹克朱方悉置不問而苐日擾于廬夀淮潁之間逮克鍾離巢而楚患始棘然猶未敢懸軍深入也至滅州來今江南夀州與蔡宻邇蔡更道吳舍舟従陸従淮汭即州來􅊗光黄逕義陽三關之險至漢江北岸與楚夾漢而陣當是時吳歴楚境一千一百餘里深入死地亦未敢必能入郢故其戰嘗且勝且却收軍至柏舉今湖廣麻城縣去小别漢川縣三百餘里適㑹楚瓦不仁人無固志而夫槩身先死戰遂長驅入郢固屬有天幸而蔡之計謀亦毒矣是時蔡以小國而聲震天下諸侯俱歸粟于蔡五年楚復國即滅唐報怨而不敢動蔡者夫亦以蔡近吳有吳以為之援故也則當日吳楚之赴告自必以蔡為兵首魯史従而書之聖人亦従而書之而豈有意于褒之也哉夫讀春秋者不知春秋之地里則不得當日之事勢不得當日之事勢則無以見聖人之書法余因蔡侯以吳師一事而𤼵明經文之據實書者如此夫蔡以弱小用吳覆楚而晉為盟主辭蔡不救而有事于鮮虞則又比事觀之而罪自見矣春秋大事表卷三十三
