body:
  text: 春秋大事表卷三十一國子監司業顧棟高撰秦晉交兵表賈生有言秦孝公據崤函之固擁雍州之地君臣固守以窺周室嗚呼此周秦興廢之一大機也考春秋之世秦晉七十年之戰伐以爭崤函而秦之所以終不得逞者以不得崤函惠公之入也賂秦以河外列城五東盡虢略南及華山蓋自華陰以及河南府之嵩縣南至鄧州凡六百里皆古虢略地桃林之險在焉賂秦則晉之地險盡失蓋以空言市秦而實不與也逮戰韓獲晉侯秦始征晉河東不二年復歸之晉春秋當日雖天子所賜苟其民不服則亦不得而有隱十一年王以盟向易蒍䢴之田於鄭未㡬盟向叛鄭歸王王遷盟向之民于郟襄王錫晉以南陽而温原之民不服晉况此時晉兵力尚强秦蓋知其力不能有故索質子于晉因而歸之以為名耳逮穆公暮年年老智昏越千里而襲鄭蓋乘文公之没蘄滅鄭而有之其地反出周晉之東使衰絰之師不出秦將包陜洛亘崤函其為患且十倍于楚幸而崤師一敗遯逃竄伏其後迭相攻擊歴三四世終不能越大河以東一歩成十一年秦晉為成秦史顆盟晉于河東晉郤犨盟秦于河西截然兩界如天塹之不可越使三晉不分以其全力制秦秦終不敢東出周室何自有窺􅎿之漸哉余嘗持論謂晉獻公滅虢而周室無復有西歸之計然使晉不滅虢虢必入秦而秦于周為切膚之災于鄭成宻邇之勢夫楚争鄭而晉得以救之者以楚去鄭稍逺而晉得陜虢庇鄭于宇下能聨絡東諸侯以為之援也秦若滅虢則晉與鄭隔絶而鄭在秦掌握中秦伐鄭而晉不能救也秦得鄭則周室如累卵三川之亡且不待赧王之世故周之得以支持四百年者以晉得虢略之地能為周西向以拒秦也周秦廢興之故豈不重係乎此哉輯春秋秦晉交兵表第三十一春秋大事表卷三十一
