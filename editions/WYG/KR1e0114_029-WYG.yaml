body:
  text: 春秋大事表卷二十九國子監司業顧棟高撰吳晉争盟表晉用申公之計用吳以犄楚其後吳卒破楚入郢馴至為患于方夏病齊及魯與晉争長于黄池論者因以咎晉之失計自啓門庭之寇其實非也晉欲制楚則不得不用吳吳之所以横不可制者咎在晉君失政六卿各擅強權不復以諸侯為事失不在用吳也何以言之楚之強天下莫能抗日者齊桓嘗欲攘楚矣不得已而用江黄一㑹于貫再㑹于陽穀徐而興召陵之師春秋詳書其事以美之然江黄國小而近楚楚滅江黄而桓公不能救也是無益于制楚之事而徒以速江黄之滅若吳則不然在楚之肘腋而力足與楚相抗自成七年入州來楚内有吳釁奔命不暇遂不復加兵于宋鄭中國藉以息肩者數十年日後晉復用向戌弭兵之説委天下諸侯南向而朝楚晉亦偃然弛備無復有經營諸侯之心楚得肆其驕横争長壇坫至靈王遂大會諸侯于申楚熄而吳熾因遂踵其故轍是則吳之所以争長黄池者由於當日之玩楚而使楚得志非用吳之過也向使晉常修悼公之業雖明知弭兵之説之不可郤而嚴兵以待之楚人争先則正辭以折之楚必俯首帖耳而不敢動楚不敢動而吳亦無緣萌其覬覦烏有召吳而反為吳病者哉且晉自昭十三年平丘之盟而後晉已失伯齊景欲嗣興而不能宋魯鄭衞皇皇焉無所依故吳得乗虚而争伯中國就使天下不折而入于吳亦必折而入于楚吳楚于中國固無分也況是時晉政已移于三家天下久已無晉君子之責晉者謂急宜發憤自立速收三家之權必使先有晉而後可以制吳不必以前日之用吳為晉詬病嗚呼自古資鄰國之兵以集事鮮有不被其患者而能自強則無之唐興嘗資突厥矣其後太宗卒擒頡利中興嘗資回紇矣而卒恭順為國外藩彼所用者苐一時之力而能自固于根本之地故能有利而無害城濮之役文公嘗用齊秦日後秦雖搆怨而不能為晉病也且以桓公之盛未有能獨力制楚者以悼公之用吳較之齊桓之用江黄其利害豈不較然著明也哉余因撮其先後諸事都為一編使後之論吳晉者有考焉輯春秋吳晉争盟表第二十九春秋大事表卷二十九
