body:
  text: 春秋大事表卷三十七國子監司業顧棟高撰宋鄭交兵表春秋之初宋鄭號中原大國宋紹微子之封而鄭取虢檜之地地既逼近力又相埓故其勢常至于鬬爭乃吾統觀春秋宋鄭之故而知天下不可以一日而無伯也春秋二百四十二年之中宋鄭凡四十九交戰然其局凡三變蓋當初年晉楚未興齊亦僻處東服其時犬牙相錯者惟宋魯鄭衛而鄭莊以善用兵常結援于齊而藉其力繼又結魯宋合衛陳蔡以搘之而不能當也至宋馮之世始立突繼又責賂而讎突後復助突以求入交戰尤數當是時魯桓衛惠鄭厲宋莊俱負篡弒大惡號稱四凶相與逐利棄信結黨崇姦競用干戈朝盟夕改生民之塗炭極矣此春秋之一大變也至齊桓興而兵爭息桓殁而宋襄以爭伯一戰而軍敗身傷晉文襄起而兵爭又息當是時宋鄭之君俱共玉帛以從容于壇坫之上間一用兵不過帥敝賦以從大國之後無兩君對壘朝勝夕負報復無已者亦足見霸功之有益于人國矣逮晉悼嗣伯其事乃與桓文少異晉合天下之力以爭鄭鄭患楚之數來屢盟屢叛故惡于宋以激諸侯之兵使楚疲于奔命而不敢與晉爭而後乃固與晉時交戰尤數十年凡十三戰此宋鄭之事之又一變也蕭魚以後悼公及平公之初海內嬉恬至向戌弭兵宋鄭更僕僕于晉楚之廷民不苦于戰鬬而苦于供億兩國息于兵戎者六十八年而陳蔡卒坐受楚滅其事得失又相半至春秋之末晉楚俱衰齊景欲圗伯而不終宋景乃率其祖之故智伐邾滅曹妄意爭伯與鄭以隙地啓釁驟興兵革卒至彼此交取師全軍覆殁得不償失此又宋鄭之事之一大變春秋將夷而為戰國矣統計伯功之始終始于齊桓之北杏訖于晉昭之平邱尾凡百四十有八年每當伯功之息則宋鄭首發難春秋于列國戰爭不悉書獨于兩國自隱桓至定哀凡取邑取師無不備載蓋以其地踞中原關于天下之故伯功視兩國之向背為盛衰而兩國又視伯功之興廢為休戚聖人思王不得已而更思伯其亦有見于此乎余故撮略其事輯宋鄭交兵表第三十七春秋大事表卷三十七
