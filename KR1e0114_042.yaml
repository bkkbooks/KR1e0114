body:
  text: 春秋大事表卷四十二之一國子監司業顧棟髙撰三𫝊異同表孔子作春秋為傳說者五家今惟存公榖左氏考前漢書儒林𫝊公羊學最先立自大儒董仲舒丞相公孫𢎞皆為公羊學故武帝尊用之至宣帝以衛太子好榖梁乃詔太子太傅蕭望之等大議殿中平公羊榖梁同異諸儒多從榖梁由是榖梁之學大盛而公羊浸微左氏最晚出特以劉歆好之至平帝時王莽顓政乃得立是時為左氏之學者微甚於二家靡得而同也然今世之學春秋者微左氏則無以見其事之本末蓋丘明為魯太史親見魯之載籍如鄭書晉志夫子未嘗筆削之春秋莫不畢覽故其事首尾通貫學者得因是以考其是非若公榖則生稍後又未仕列於朝無從見國史其事出於閭巷所𫝊說故多脫漏甚或鄙倍失真如榖梁以莒人滅鄫為立異姓公羊謂禘於太廟用致夫人為脅於齊媵女之先至不知其何所考據考其事之前後又别無因由學者無以見其事之必然也然特好為異論其說多新竒可喜故漢世遵用之漢時凡國家有大事詔諸儒各以經誼對武帝伐胸奴而謂齊襄復九世之仇春秋大之雋不疑叱縛僞太子而以蒯聵得罪靈公輒宜拒而不納皆悖義傷教之大者至子以母貴之說遂為古今妾母為夫人者之藉口經術之誤流於政事所繫豈渺小哉左氏言多近理惟以隱三年夏四月辛卯尹氏卒為君氏似不若公羊譏世卿之為得其正學者取以折衷焉可也左氏注舊有服杜公羊注有何嚴注榖梁者且十家今行於世者惟杜氏何氏范氏杜最精密何休往往因公羊之說而增加其辭惟范寧注榖梁多所規正今擇三傳之各異及注之發明者並表而出之其有三𫝊俱不可通而後儒以意臆斷者亦附列其間啖趙陸氏之辨疑劉氏敞之權衡李氏亷之㑹通及聖朝彚纂用以平三𫝊同異四家之說猶有未愜則間附鄙見極知僭踰然學者得藉是以求聖人之意不至汗漫而無所適從于是經亦不為無補輯春秋三傳異同表第四十二𨼆公元年春王正月李氏亷曰春王正月三𫝊皆無明文左氏以正月為建子得之矣而略於春字之義何休以斗指東方為春得之矣而略於正月之文至榖梁則皆無論焉漢唐諸儒直以周孟春為建子之月至宋人始有三代改正朔不改時月之說故程子以書春為假天時以立義則是十一月本非春聖人虛立春字於正月之上以示行夏時之意胡氏因之趙氏汸曰周人改時改月如使周不改時則聖人何必曰行夏之時使夫子果用夏變周則亦何以責諸侯之無王哉朱子曰胡文定春秋說夫子以夏時冠月如公即位依舊是十一月只是夫子改作春正月某便不敢信案公榖皆以不書即位為讓但公羊以讓為正穀梁以讓為不正公羊以桓母為夫人穀梁以桓母為非夫人則榖梁為得之國君不再娶於禮無二適仲子安得稱夫人桓公安得子以母貴乎髙紫超氏曰春秋諸侯不禀命而無承者遍天下而仲尼以本國臣子首削𨼆公之即位以明大法非尊君父不敢斥言之義又謂文成襄昭哀五君皆書即位既誅首惡此後可從末減𨼆何獨不幸以春秋之首君而當大罰也至謂聖人修經直以天自處而於此乎何恤焉則尤悖理逆天之甚矣彚纂曰左氏以為攝公榖以為讓而杜氏預釋之以為不行即位之禮故不書即位此定解也胡𫝊謂仲尼首絀𨼆公以明大法義恐未安夫君行即位之禮則書即位不行則不書孔子安得而筆削之乎夏五月鄭伯克段于鄢案左氏云段出奔共而公榖皆曰殺据隱十一年𫝊莊公曰寡人有弟不能和協使糊其口於四方則未殺明矣公榖之說非是秋七月天王使宰咺來歸惠公仲子之賵劉氏敞曰春秋於大夫莫書其官至冡宰則書之以見任之最重宰者尊稱非中士所當冒以為士以為氏皆非也李氏亷曰春秋有惠公仲子僖公成風左氏及公羊皆以為兼賵獨程氏發明惠公寵愛仲子僖公尊崇成風之說而以為惠公之仲子舊公之成風其義最精至穀梁又以仲子為惠公之母孝公之妾則大失矣彚纂曰左氏謂子氏未薨其謬不待辨榖梁謂仲子為惠公之母母以子氏例以成風亦合但史記年表惠公即位於平王三年至隱公元年厯四十七年而其母始薨似太久逺當以公羊說為是宰為冡宰則劉氏敞之說得之冬十有二月祭伯來彚纂曰祭伯書來諸𫝊皆以為朝公羊獨以為奔祭伯書伯諸𫝊皆以為爵公羊獨以為字當以左注為是不書來朝穀梁謂不正其外交諸儒多因之程子謂諸侯不行覲禮王不能治而祭伯反與之交其持議尤正公子益師卒劉氏權衡曰左氏曰公不與小斂故不書日非也公孫敖叔孫婼公孫嬰齊皆為公與小斂乎何以得書日榖梁曰惡也非也公孫敖仲遂季孫意如豈非惡乎而皆曰叔孫得臣不聞有罪而反不日皆妄也程子曰或日或不日因舊史也古之史記事簡略日月或不備春秋有可損而不能益也家氏鉉翁曰或日或不日舊史記載之有詳略而非褒貶惟公羊之說近之二年無駭帥師入極劉氏敞曰公羊以為疾始滅非也春秋文不害實今更滅為入則是文害實矣春秋之初接近西周先王餘法猶存諸侯僭佚猶鮮故魯卿執政多再命翬挾無駭皆是也穀梁謂貶滅同姓非也案入則不得謂之滅矣許氏翰曰凡大夫未爵命於天子不氏春秋之𥘉尚謹此若無駭翬挾柔溺是也齊桓以後列國皆命大夫無不稱族者蓋不復請命於周也李氏亷曰無駭不書氏杜氏胡氏陳氏皆以為未賜族公羊則以為疾始滅榖梁則以為貶滅同姓以左氏𨼆八年賜氏之說考之則公榖為無據矣九月紀履緰來逆女程子曰先儒皆謂諸侯當親迎親迎者迎於其所館豈有委宗廟社稷而逺適他國以逆婦者文王親迎於渭未嘗出疆也周國自在渭旁况文王當時乃為公子未為國君案太史公外戚世家云春秋譏不親迎索𨼆引公羊此𫝊文以解之而於桓三年公子翬宣元年公子遂成十四年公孫僑如如齊逆女皆譏其以大夫逆此為定解矣程子獨非之云云其言又極有理彚纂從其說故於此年節刪公榖𫝊文而於桓宣成三年逆女之𫝊凡主公榖譏不親迎者皆刪去可謂另闢乾坤然程子及彚纂俱不别解春秋所以書逆女之故春秋合禮不書逆女既未嫌於大夫此又何以書乎愚另有論見嘉禮表後惟葉氏夢得則以逆輿迎為二逆女乃娶於他國之道上大夫逆之即館及期而後迎未有迎女而親迎之者先儒一之謂春秋書逆女為譏不親迎是知迎而不知逆也此又另為一說紀子伯莒子盟于密案穀梁云伯之穿鑿可笑左𫝊以子帛為裂繻字杜注因增出平莒魯之怨事不見經𫝊尤支離無謂况大夫無列在諸侯之上者何休之說尤誕妄此當直作闕文程子曰當云紀侯某伯莒子盟於密吳氏澄亦云子伯二字或是侯字之誤直截了當惟不知闕文之說故公羊於桓二年紀侯來朝據何休注云紀本是子爵因天子將娶於紀故加封百里進爵為侯班固外戚恩澤侯表序有云后父據春秋褒紀之義應劭引此為證漢書凡立后先進其父為大司馬大將軍封邑侯恩澤之濫自此始因春秋一字之誤曲成其說遂至如此趙氏經筌獨主左氏之說謂自莒人入向有窺魯之心故無駭帥師入極以怖之而莒之伺間蓋未已紀裂繻道與莒子盟於密以為魯謀故書字以褒之此因杜注而益生支節尤鑿家氏鉉翁謂木訥之於春秋好揣摩傅㑹而為之說此類是也積齊或問云若紀子伯舊史本誤孔子所必正正之不得則不書安有如此之誤而可書之以𫝊後世者此必孔子筆削以後之闕文所謂先儒𫝊授承誤而不敢增者也十有二月乙卯夫人子氏薨呂氏大圭曰左氏曰桓母公羊曰𨼆母穀梁曰𨼆妻宜孰從曰𨼆桓之母俱不得為夫人則其為𨼆之妻者近是彚纂曰子氏薨三𫝊互異左氏以為桓母固非公羊以為𨼆母先儒謂妾母不當稱夫人春秋之初禮法尚存不得以成風敬嬴為比惟榖梁以為𨼆妻義為長故程子及胡𫝊皆從之積齊或問云魯以𨼆為君豈容不以子氏為夫人稱夫人國人辭也不書葬𨼆不以夫人之禮葬之也張氏洽曰君存則葬禮未備待君薨而合祔制本朝后雖先崩必俟合葬於山陵蓋古之遺三年夏四月辛卯尹氏卒尹左作君趙氏匡曰春秋為經邦大訓豈有緣其為諸侯及魯大夫作主人之恩遂録之于經乎公羊惟譏世卿之說是歐陽公曰公穀以尹氏為正卿左氏以君氏為𨼆母一以為男子一以為婦人得於所𫝊者蓋如此彚纂亦疑而不敢定愚案左氏之說全無義理而趙東山堅主其說謂妾母本不登於䇿此以吾君服其母喪不可不書曰君氏者為夫子之特筆最支離不可解公羊譏世卿為得之近世季氏本更謂是魯之大夫即𨼆公囚於鄭之尹氏與尹氏歸而立其主者恐只是後人弄巧之說趙氏經筌亦云君氏不成稱謂古無是言也秋武氏子來求賻家氏鉉翁曰公榖於仍叔之子曰父老子代從政於武氏子曰父卒子未命蓋以仍叔為尚存之人武氏為己卒之大夫王朝公卿大夫莫非世官世祿之家何獨於此二子而書法異曰某氏子云者有父在焉故爾案春秋大義重在諸侯不供王職與天家威令之不行爾其曰武氏子者蓋輕忽之辭以王喪大事而以乳臭出使取輕列國亦見其失政之甚若以王當喪未命與武氏子未命而便出使薄父子之恩失之小矣春秋所責者大何暇責及武氏之子乎八月庚辰宋公和卒趙氏匡曰左云同盟則赴以名豈有臣子當創巨痛深之日乃忍稱君之名乎蓋同盟名於載書朝㑹名於要約聘告名於簡牘故於卒赴可知而紀也孫氏覺曰左氏記楚公子圍使赴於鄭伍舉問應為後之辭焉更之曰共王之子圍為長是當君卒赴諸侯已言嗣君之名矣故凡往來之國皆得記其名也必若以盟㑹求之則未嘗與者五十二而不名者九耳未可通也彚纂曰趙氏匡駁左氏同盟之說極是孫氏覺又謂即位之初即以名赴似更有理家氏鉉翁曰諸侯曰薨降而書卒胡氏謂春秋貶之不與其為諸侯當時諸侯未必人人皆放恣無王而一切俱貶恐非春秋用法之意杜氏謂內稱公而書薨所以自尊其君故不得不略外以自異恐當如杜氏之說癸未葬宋穆公案左公羊之說各異家氏則堂則主左氏曰讓美德也宋之亂由殤公不仁以怨報德不關宣穆之相讓趙氏木訥則主公羊曰後世有啓之賢不以𫝊務過於禹無朱均之子而茍遜以僭擬堯舜家氏深斥之愚謂家氏之說非也有國家者必𫝊嫡子嫡子殁則𫝊嫡孫一本相承覬覦自息旁及支庶且猶啓亂况矜讓弟之名乎宣公讓弟穆公穆公卒返其子至與夷馮而亂生宋太祖讓位太宗太宗及身旋背之矣太宗號英明之主素友愛且所為若是况其不賢者乎家氏生於宋世而說經若此可謂不曉事者矣又案公榖皆以不日為危愚謂此時非有變故無危不得葬之理此蓋因日後之兵連不解造此義例爾春秋葬不日不月者皆係闕文即此可知其誤四年衛州吁弒其君完劉氏敞曰公羊謂不稱公子為當國非也諸弒君稱公子是公子而為大夫其不稱公子是未為大夫當國與不當國何足辨乎榖梁謂弒而代之亦非也宋督宋萬亦可云弒而代之乎家氏鉉翁曰胡氏謂州吁以國氏罪莊公不待以公子之道使預聞政事主兵權而當國愚謂此方誅討亂賊未當追議莊公既往之咎案州吁不稱公子是未命為大夫當以孔疏及劉氏敞之說為正程子及胡𫝊之說俱未安詳見亂賊表秋翬帥師㑹宋公陳侯蔡人衛人伐鄭趙氏匡曰春秋之初公室猶强若公實不許臣何敢固請而行蓋左氏不知未命不書族之義造此事端耳啖氏助曰凡事各於本事褒貶豈有未弒君而先貶乎翬之不稱公子自為未命爾案啖趙辨疑駁正三𫝊之說極精劉氏敞權衡意略同愚謂春秋此書重在帥師不重在翬之氏與不氏也言帥師則翬主兵専國可知隱公不能早罷其兵權是以及鍾巫之禍與莊二年公子慶父帥師伐于餘丘宣二年鄭公子歸生帥師戰於大棘同為千古炯戒胡文定之說精矣獨其謂去公子以謹履霜之戒則非也春秋之初諸侯猶請命於天子不自命大夫故隱桓之大夫多不氏如無駭翬挾柔溺及鄭之宛皆是也至莊公之世稍踰制矣故慶父稱公子以族氏要之重在帥師不重在公子與非公子也衛人立晉胡𫝊晉雖諸侯之子內不承國於先君上不稟命於天子衆謂宜立而遂自立焉故春秋於衛人特書曰立所以著擅置其君之罪於晉絶其公子所以明専有其國之非葉氏夢得曰晉不稱公子未三命也張氏溥曰州吁宜殺天下知之晉不宜立天下不知也春秋辨焉天下之父子君臣定矣案三𫝊同謂人為衆辭晉非衛人所得立文定申其說當矣獨謂絶其公子則非也晉不氏自為非三命與翬挾無駭同例胡氏不知未命不書族之義故立此義爾髙紫超氏曰文定謂𨼆不書即位為首絀𨼆公以明大法非也聖人欲正君臣之分不宜先自貶黜其君內無所承上不禀命之義於衛人立晉之文發之此與三𫝊前後俱吻合案積齊或問曰或謂晉後日淫亂故春秋不與其立非也春秋與正而不與賢茍晉當立則立之安得預知其淫亂而不與其立乎愚於是而知宣公蒸夷姜之事誣也果有其事當於桓公之初年如此穢德彰聞之公子石碏豈宜立以為君况晉此時出居邢國石碏又越境而迎立之創巨痛深之後豈有此情理乎五年九月考仲子之宫啖子曰案此時桓公之母喪始終正是考宫之時故知公羊說是初獻六羽胡𫝊書初獻者明前此用八之僭趙子曰魯僭用八佾非一朝事須因此減數時書之汪氏克寬曰樂舞之數降殺以兩諸侯既降于諸公則諸伯當降于諸侯而用二矣子男復何所用乎况禮經所記廟制堂制衮旒席數五等諸侯皆同豈以舞佾而獨異其制彚纂以用六為善蓋本孔穎達善其復正之說不知書初獻所以明八佾之僭書六羽所以明妾母之僭無所為善也六年春鄭人來輸平輸左作渝彚纂曰渝平輸平三𫝊互異左以渝平為更成公榖以輸平為隳成考前年公子翬伐鄭有憾而未平則更成之說於義為近但左氏謂變前惡而為和好則渝與平為二意葉氏胡氏諸儒多主公榖作輸而訓輸為納言其納平於我而變更前惡之意亦在其中文從公榖義從左氏似為得之葉氏夢得謂鄭厚財幣以求平於魯如晉饑秦輸之粟相似冬宋人取長葛彚纂曰經書冬左𫝊作秋杜氏預為秋取冬告引八年齊侯告成為證其義甚明劉氏敞謂左𫝊日月與經不同者多或丘明作書雜取當時諸侯史策有用夏正者有用周正者故經云冬𫝊謂之秋似亦有理案春秋時諸侯惟晉用夏正先儒謂晉封太原因唐虞故俗理或然也此係宋來告宋為殷之後當用商正亦當差一月七年滕侯卒啖子曰附庸之君及真夷狄皆有名况滕國文王之子孫雖至微弱豈無名乎程子曰不名史闕文胡𫝊滕侯書卒何以不葬怠於禮弱其君而不葬者滕侯宿男之類是已家氏鉉翁曰不名不葬諸說不同愚謂不名史失其名不葬魯不往㑹是以失書不容鑿為之說冬天王使凡伯來聘戎伐凡伯于楚丘以歸啖子曰不言執者尊天子之使故云伐也若言不與夷狄執中國其書夷狄侵伐滅入者豈皆是之乎又曰若衛實伐天子之使改之曰戎是為衛掩惡也如何懲勸乎八年三月鄭伯使宛來歸祊祊公榖作邴啖子曰鄭人請祀周公己不近人情泰山非鄭封內本不當祀又何釋乎宛不氏案不命之卿來魯例名之不必以貶立說案程氏端學曰經於隱八年書鄭伯使宛來歸祊而鄭伯以璧假許田乃在桓公之世與此别無關涉安得信𫝊而疑經趙氏鵬飛謂歸祊至假許已厯五年豈至是而後責償胡氏寧謂果易許則許當即時以歸安得須鄭伯假之而後與蓋前日鄭有宋兵而歸祊以結魯後日鄭乘魯有篡弒之隙而假許田以要魯合之啖子之說則左氏信誣也左氏好以兩事合作一事生出牽扭不獨此一事為然也無駭卒家氏鉉翁曰春秋有未死而賜族者若季友仲遂是也亦有雖為卿而竟不賜族者如挾柔溺之後無聞者是也無駭以名行及其死則賜之族以王父字為族是也春秋初年周制猶存故有未賜族之大夫其後大夫世其官無不賜族而周制幾於掃地矣李氏亷曰公榖以為罪無駭入極而貶之又以為隱不成為君故不爵大夫皆無據十年秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之程子曰戴鄭所與也故三國伐之鄭戴合攻取三國之衆趙氏鵬飛曰戴鬭其前鄭扼其後一舉而取三師趙伯循疑鄭之孤兵不能取三國之衆更以為鄭伯乘危取戴戴為鄭之附庸既屬于鄭何必取哉賀氏仲軾曰鄭人之忿在三國而不在戴故因其在戴而伐取之左氏曰鄭伯圍戴克之取三師焉是也彚纂曰公榖謂鄭因三國之力以取戴胡𫝊謂四國已鬭鄭乘其敝一舉而兼取之俱于情事未盡合獨程子用左氏取三師之說以為鄭戴合攻盡取三國之衆諸儒多從之于經㫖為近桓公二年宋督弒其君與夷及其大夫孔父啖子曰古者大夫猶皆乘車其妻安得在路使人見其貌蓋以舊言孔父義形於色而作𫝊者以為女色之色遂妄為此說耳趙子曰按孔父之事自是史冊載之非殤公自書何關君之不忍乎又曰不稱名為祖諱春秋乃魯國之史非夫子家𫝊安得祖諱乎孔氏穎達曰春秋之世有齊侯祿父蔡侯考父季孫行父衛孫林父皆是名故杜以孔父為名彚纂曰榖梁以孔父為字趙氏匡駁之是矣左氏以父為名杜氏預因為罪孔父之說亦非也惟劉氏敞君前臣名之說最為精當故程子及蘇氏轍胡氏安國皆用之案孔氏厯引春秋之世以父為名者確有證據而劉氏君前臣名之義尤精蓋古人有祖孫同諡者如春秋之世有滕文公而孟子時亦有滕文公是也亦有祖孫同名者如桓八年書天王使家父來聘而幽王時先有作詩之家父是也家父亦是名而非字節南山詩自謂家父作誦以究王訩豈有不自稱其名者乎則父之為名益信秋七月紀侯來朝劉氏敞曰春秋雖亂世至於兵革之事亦慎用之杞來朝魯有少不敬未宜便入其國左氏誤紀為杞遂生不敬之說爾榖梁謂謹而月之亦非也六年冬紀侯來朝是宜責之尤深深則宜日反書時何哉李氏亷曰公羊注謂加封百里榖梁注亦以為蓋時王所進是皆不知紀子伯為闕文之故爾互見隱二年盟密蔡伯鄭伯㑹于鄧彚纂曰公羊以為鄧與㑹正合隱元年盟宿之例杜氏以鄧為蔡地孔疏遂謂鄧國去蔡甚逺蔡鄭不宜逺㑹其國都且因懼楚始為此㑹何當反求近楚小國與之結援其說似更有理冬公至自唐胡𫝊常事何以書或志其去國踰時之久或録其㑹盟侵伐之危或著其黨惡附姦之罪桓公逺與戎盟而書至危之也孔氏頴達曰春秋公行一百七十六書至者惟八十二其不書者九十四皆不告廟也彚纂曰告則書不告則不書杜注孔疏甚明諸家紛紛或以為逺或以為久或以為危或以為幸失之鑿矣黃氏仲炎曰隱盟戎不致此何以致榖梁曰危之是不然危桓而不危隱其說不通矣蓋春秋以與戎盟為恥隱不致隱猶有不得已之意焉桓策勳於廟是不恥其所恥故即其實而致之以志桓之罪三年齊侯衛侯胥命於蒲劉氏敞曰命于天子正也諸侯自相命非正也張氏洽曰當時王不能命伯而欲自為伯故於此彼此相命以成其私逮至戰國魏齊㑹於濁澤以相王其後齊秦約共稱帝自相命而至於相王自相王而至於相帝僭竊之漸勢必至此案公榖皆以胥命為善荀卿亦言春秋善胥命諸儒多從之而趙氏匡言凡㑹遇並是不盟約言而退何得獨異此文且二君又並非賢君據經文直譏其無人君之禮爾至張氏洽申劉氏敞之說而極言其僭竊所至朱子謂其有理故彚纂亦並存之案齊僖衛宣自此年後無一事當於人心齊則謀紀衛背魯于桃丘而更助齊與魯戰則此胥命乃結黨行私爾何善之有五年春正月甲戌己丑陳侯鮑卒趙子曰豈有正當禍亂之時而暇競使人赴告即使再赴夫子亦當審定其實日何乃總載之公榖又謂狂而出人君雖狂而去亦當有臣子從之豈有人君走出臣下不追逐至昧其死日乎總之三𫝊不知有闕文之義故多造事端此蓋經文甲戌之下當記陳他作亂之事而今簡脫之爾天王使仍叔之子來聘仍榖梁作任彚纂曰左氏以為弱公榖以為父老子代從政胡𫝊以為譏世官其義蓋相因程子謂仍叔承命而使子代行則是仍叔自使其子何以稱天王使耶汪氏克寬駁之是矣黃氏仲炎曰經稱武氏子仍叔之子以乳臭之童而任邦國之政子産所謂未能操刀而使割也冬州公如曹六年春正月實來張氏洽曰記禮者曰天子曰非他伯父實來成二年𫝊王曰所使來撫豫一人而鞏伯實來今案書州公曰實來以其不復國而略之也彚纂曰三𫝊皆以實來為州公來程子及胡𫝊亦同惟三𫝊以實來為承上文而程胡以實為州公之名張氏洽獨主三𫝊之說引證實來甚為詳核案以實字為虛字張氏之說極為弄巧彚纂取之未審何故泰山孫氏曰闕文也師氏曰不應踰時隔年而書實來岩晦黃氏亦謂當如郭公夏五之類簡編脫誤據諸儒之說斷宜從闕文為是方氏苞亦曰如左氏之說則當書遂來奔或州公自曹來奔如鄭詹自齊逃來之例可也宋華元出奔晉宋華元自晉歸于宋事以連及尚再舉其名况事不相屬時年已隔而徑省其文使辭㫖不可别白乎此經文有闕𫝊者傅㑹而為之說也蔡人殺陳他趙子曰按左𫝊他殺太子之賊故經不以人君稱之公榖不達此意妄云淫于蔡淫獵子蔡不近人情胡𫝊他立踰年不成之為君者討賊之詞也書蔡人以善蔡書陳他以善陳善蔡者以蔡人知他之為賊善陳者以陳國不以他為君方氏苞曰春秋之初先王之澤未泯人心正理猶存故蔡人不以他為陳君而殺之凡篡賊而稱君者見臣子不能復讐鄰國不能討亂而成之為君也有一人能知其為賊而加刃焉則不問其情之公私而皆以討賊之義與之所以使亂臣賊子無所逃于天地之間也九月丁卯子同生趙子曰穀梁云疑故志之此乃委巷之談不近人理劉氏敞曰何以書貴也何貴爾世子也榖梁之云聖人豈至此乎且詩云展我甥兮詩人信魯莊為齊侯之甥何有仲尼反疑其先君為齊侯之子乎朱子曰桓三年夫人姜氏至自齊六年子同生十八年桓公乃與夫人如齊則莊公誠非齊侯子矣案春秋此書乃為先君表其疑非疑先君為齊侯之子也觀夫人之至自齊及與夫人如齊併此處俱詳書年月聖人未必不有意朱子之言亦自于榖梁有取倘若不書又重以文姜之訴後世不成一重疑案乎以積齊或問獨取榖梁之說曰左氏所云乃春秋為常事不書爾春秋直書變常之事子同生雖非變常然假此以明非齊侯之子則是變常而已案趙氏鼎曰生子不書此何以書則榖梁之說為得蓋是時皆以同為齊侯之子故聖人因其生正其名而書之髙氏閌謂齊襄文姜之淫蓋在同生之後此時未嘗亂也使不書其生則事不别白郝氏敬曰當時人疑莊公非桓公子故特書所生年月以折羣議方望溪曰聖人特書以正其為周公之裔又猗嗟詩小序莊公不能防閉其母人以為齊侯之子也据四家及詩小序皆與榖梁說吻合則信合乎人心之同然矣趙氏劉氏駁之非也家氏鉉翁亦從穀梁之說七年夏榖伯綏來朝鄧侯吾離來朝趙子曰據諸失國之君惟隨敵以歸者則書名若奔他國並不書名公榖之說非也此蓋以其用夷禮爾諸侯失國自辱其身猶至書名况行夷禮辱及宗廟見輕儕列而得不名乎劉氏敞曰杜云僻陋小國賤之侯伯之爵豈小哉且上杞侯來朝雖不敬猶不書名計杞之國又非大於鄧榖也又經書夏而𫝊云春者𫝊以夏正記事方氏苞曰榖鄧逺國近于荆楚故魯人視之如介葛盧郳黎來而以名書𫝊謂失地之君故名非也失地之君不可以言朝先儒謂以朝桓故貶亦非也朝桓而不名者多矣不宜同罪異罰八年祭公來遂逆王后于紀趙子曰若合禮則常事不書左氏之說非也公羊謂婚禮不稱主人假令婚禮實不稱主人即當于至紀之日但稱魯命可爾來魯未是婚禮何須不稱天王使榖梁謂不正其以宗廟之大事即謀于我必若實譏天王言使不更昭著乎案趙氏匡所駁三𫝊之說極是但謂天子嫁女則同姓諸侯為主逆王后無使諸侯為主之禮据莊十八年虢晉鄭使原莊公逆后則同姓諸侯為主確有可據魯以周公之後為王主禮舊矣榖梁謂不正其即謀于我非也公羊曰言遂譏王不親迎而使魯亦非也孫氏復謂天子不親迎娶后則使三公迎之孔氏穎達謂文王親迎太姒乃身為公子迎在殷世未可據為天子之禮然則春秋何以譏曰譏専在祭公而不在王据經書祭公來與祭伯來同例蓋譏其私交也程子曰祭公受命逆后而至魯先私行朝㑹之禮故書來而以逆后為遂事責其不䖍王命而輕天下之母此說最為得之九年春紀季姜歸于京師李氏亷曰逆后例三𫝊皆同獨陳氏曰后歸不書此何以書詳紀事也后妃為天地宗廟神民之主俄而宗國亡焉是不可不詳也此極有見六年冬紀方托魯請王命以求成于齊而公告不能今幸王有命魯求昏之事故魯亟為紀謀不待請王命而遂使祭公逆之所以托紀而紀卒不免春秋詳書紀事所以志天王之弱而齊之不道也案此時不特魯不得保其姻家并天王亦不能保其后族春秋之世可知矣十年齊侯衛侯鄭伯來戰于郎趙子曰魯以周班後鄭既是正禮鄭雖小恨豈至興師即合當年搆禍豈有經五年之後方合諸侯報此小怨榖梁云前定之戰非也言來者責三國不當來爾不言及為內諱若果諱則但當不書敗何須不言及季氏本曰齊欲吞紀與鄭衛合魯則専意援紀者也三國來戰蓋為此爾且魯以援紀之故與齊不親自齊鄭如紀之後與魯不相通已六年矣何由至齊為班耶卓氏爾康曰齊惡魯為紀謀難則主兵者齊也鄭與齊同如紀衛又與齊胥命于蒲故三國來戰案胡𫝊謂鄭主兵而首齊猶衛州吁主兵而先宋此主左氏而為之說爾其實非也鄭係小忿國又小于齊衛乃于五年之後報此宿怨牽動齊衛大國必不然矣且當日怒者鄭忽與莊公無預也此時鄭莊耄年忽又失寵明年即為突所篡方孤危不能自立請師于齊者將莊公請之乎鄭忽請之乎莊公豈能以子之故赫然興師報此纎芥小怨乎齊之欲圗紀非一日矣蓋齊都青州府之臨淄而紀在青州府之夀光縣逼近肘腋不并紀則齊不得拓地一步故纍年合鄭以圗之而魯為紀納后于天王齊僖猶畏名義終其身不敢加兵而心怒魯故九年春紀季姜歸于京師十年齊即為此戰蓋因不敢犯紀而遷怒情事顯然甚明也觀經文以齊為首而趙氏匡與季氏本之說亦可互相發明劉氏敞亦謂果鄭人主兵經當先序鄭以見其罪何故反首齊以蔽匿鄭惡且鄭忽救齊之時經無魯人往齊者足明其妄矣十三年二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績案左氏以為鄭與宋戰公羊以為宋與魯戰榖梁以為紀與齊戰趙氏匡獨取榖梁之說曰據經文內兵以紀為主外兵以齊為主若實為鄭宋而戰即當以鄭宋為兵主何得主齊紀乎且責賂小事止當二國自不和無容諸侯為之戰蓋齊紀結讐已久是年齊合三國以攻紀欲遂滅之公與鄭救之而勝得免禍其踪蹟甚明不然紀懼滅亡不暇何敢將兵越國助魯鄭以增怨乎戰而不地于紀也若助鄭止當戰于宋鄭之郊無為戰于紀鄭厲新為宋所立而去年遽與魯及宋戰今年又助紀戰則必為責賂多之故爾案趙說極是孫氏覺及胡𫝊俱因之劉氏敞謂前年魯及鄭伐宋戰于宋地故宋今嵗來報怨戰于宋時在其城下可得言戰于宋今亦戰於城下不可得言戰于魯故不舉地此主公羊之說春秋考異郵所云戰在魯之龍門民死傷者滿溝是也据此則亦當以來戰為文不得言及及者我及之也趙子曰不地者在紀都也無他義穀梁說是十四年秋八月壬申御廪災乙亥嘗張氏洽曰常事不書今書者以壬申有御廪災之變遇災而懼未可以遽有事于祖考况祭祀用夏時此八月乃夏之六月未當時祭何為汲汲然以四日之間遽舉嘗祭乎李氏亷曰三𫝊惟榖梁得之公羊以為不如勿嘗而注者以為宜廢祭自責謬矣左注尤失實茍不害何必書乎故胡氏不時不改卜之說從趙子十五年公㑹宋公衛侯陳侯于袲伐鄭吕氏大圭曰或疑宋既責賂于突而伐鄭不當又納突遂以為伐突救忽春秋諸侯離合之不常多矣但據經伐鄭二字則突在櫟忽在鄭為伐忽明甚彚纂左氏以為納厲公是也注公羊者謂善諸侯征突不知忽方在鄭突尚居櫟安得以伐鄭為征突乎榖梁曰疑辭夫㑹而後伐則謀已定矣有何疑乎十六年衛侯朔出奔齊左二公子以伋夀故公羊衛侯朔何以名得榖梁朔之名惡也天子怨惠公十一月左罪于天子也召而不往也家氏鉉翁曰朔殺兄篡國罪固當逐是以名以奔之而莊六年王人子突救黔牟春秋善之則知朔以有罪見黜于王而黔牟之立實王所命矣彚纂曰左氏以為二公子所逐公榖以為得罪天子張氏洽兼而用之謂朔立已五年二公子不能獨逐之必因王室欲討而後二子得行其志其說與情事甚合十七年蔡季自陳歸于蔡家氏鉉翁曰公羊以獻舞與季為兩人左氏謂季即獻舞諸儒多從公羊之說謂季以讓國而出獻舞既立季乃自陳來歸所以貴而書字與閔元年季子來歸義同夫獻舞失國之君季乃讓國之賢兩人賢否具見書法木訥乃是左氏而非公羊舛矣彚纂曰蔡季非獻舞杜誤合為一人耳左氏止曰召蔡季于陳蔡季自陳歸于蔡而已未嘗謂立以為君也先儒並主何氏之說而家氏鉉翁斷以書法尤為可信案榖梁及范注意亦與杜氏同學者從何說可也十八年葬我君桓公霞峰華氏曰賊在內必討而後葬仇在外可葬而後討討而後葬非慢于葬也以葬為之限也急于討賊不容一日緩緩之則逸矣葬而後討非緩于計也仇在外臣子之力不能即復責以必復仇而後葬茍其仇非嵗月可復是將久棄其親而不葬也故寬其期于葬後然非曰仇在外可以不討也枕戈待旦誓弗與共戴天此志可一日忘乎下此如夫差之報越三年而後復之其亦可也如曰仇在外非臣子之力所能復春秋從而恕之非聖人之心矣案髙紫超氏之論極精詳見凶禮春秋大事表卷四十二之一欽定四庫全書春秋大事表卷四十二之二國子監司業顧棟髙撰三𫝊異同表莊公元年春王正月陸氏淳曰左氏云文姜出母以得罪去國猶曰不忍父為他國所弒其情若何不舉其大而舉其細非通論也劉氏敞曰原左𫝊此意當為文姜與桓俱行未有至文故云出爾不知夫人行不以正者至皆不書也且文姜弒君自絶于魯莊公何故不忍即位乎莊公不忍即位文姜感之而還則莊公己忘文姜弒其父矣何以文姜又孫于齊乎彚纂曰左氏之謬陸氏淳劉氏敞駁之是矣胡𫝊謂內無所承上不請命故春秋絀之亦非也隱莊閔僖外俱書即位豈皆稟命于王若桓若宣若定豈皆內有所受自當從公榖三月夫人孫于齊啖子曰豈有先在齊而今書孫乎蓋公羊見無夫人至文故云爾不知夫人隨喪而歸以不告廟故不書榖梁亦言夫人先在齊至練時始録之亦非也案公羊云念母尤謬霞峰華氏曰案文姜於此不稱姜氏而哀姜之孫于邾則不去其姓氏于其以喪歸則第書夫人氏而不稱姜一絶之于孫齊之日一絶之于喪至之日蓋各因事垂訓為萬世法也文姜躬負大逆而孫而即歸聖人曰此時義不當歸也魯之臣子義不當使之歸也是故于其孫齊絶之使知負弒逆之罪者雖其子繼世而為君而生不得狥母子之情而違大義哀姜孫而不歸而以喪歸聖人曰此時喪不當歸也魯之臣子義不得以其喪歸也是故于其喪至絶之使知與篡弒之惡者雖其身已見討于方伯而死猶不得入先公之廟以辱宗祧不絶之于其孫齊之日使文姜去而速反儼然為國母而後㑹禚會防㑹榖如齊師享祝丘出入無忌専制壼內雖欲復齊襄之仇其可得乎不絶之于喪至之日使哀姜以國母之喪歸嗣後葬以小君之禮禘太廟致夫人雖欲不越禮而為之其可得乎案華氏之論極精但此條去姜氏字是省文哀姜書夫人氏是闕文非義所存也直因先儒之論而為之說爾范寧注榖梁乃謂哀姜殺子之罪輕故曰夫人氏第去姜以貶之文姜殺夫之罪重故全去姜氏此輕重之差夫殺夫與殺子同一弒君范氏之說直兒童之見更不可通矣書法只在一孫字此外不必多生枝節夏單伯逆王姬逆左作送汪氏克寬曰左氏惑于成襄昭之經書單子故云爾然周有祭伯祭叔豈可以鄭祭仲亦周大夫乎彚纂曰三𫝊互異者折衷于經左氏以單伯為周大夫故以逆為送然以莊十四年單伯㑹諸侯文十五年經書單伯至自齊之例考之則單伯實為魯臣當主公榖之說二年公子慶父帥師伐於餘丘彚纂曰公榖皆以為邾邑杜氏獨以為國詳考經文伐人之邑未有不繫國者亦未有邑而書伐者則杜注為勝慶父公羊以為母弟杜氏以為庶兄劉氏炫謂慶父欲同正嫡故以莊公為伯而自稱仲理或然也要之經意所重惡慶父之得兵權爾或國或邑或弟或兄皆非義所急三年溺㑹齊師伐衛陸氏淳曰左氏榖梁皆以不稱氏為貶按例不命之卿則不書氏不可别為義公羊說是案此納衛朔也溺不書公子蓋與無駭柔挾同例為未命爾若㑹仇讐伐同姓抗天子則直書其事而罪惡自見不必以去公子示貶五月葬桓王劉氏敞曰公榖以為改葬非也若誠改葬春秋應書改葬如改卜之類矣今不言改非改葬也固當據經文張氏溥曰桓王崩七年乃克葬𫝊者疑其太緩遂云改葬至春秋說云恆星不見夜明周人榮奢改葬桓王冡則近誕矣考桓公十八年王室有子儀黑肩之亂因亂而緩葬其或然歟四年紀侯大去其國案春秋復九世之讐聖人何嘗有此意漢武帝執此一語遂開西北邉禍及平民殫財喪師流血千里公羊一言之流毒至于如此又案公羊復讎之說全無義理無足深辨獨程子以大為紀侯之名蓋從失地書名之例諸儒多從之霞峰華氏亦云聖人于紀多恕詞然大法畢竟以國君死社稷為正若書大去其國或疑聖人之許之而張其詞故程子以大為紀侯之名良有以也然愚竊以大去者是傷憫之辭亦非張大紀侯也紀之圗全宗社至矣不得已而去無所失道此與太王之去邠何異大去如荀偃云大還婦人見絶于夫為大歸蓋一往不返之辭其傷之也至矣積齊程氏謂于文則支于義則室殊屬謬解齊侯葬紀伯姬劉氏敞曰如杜之說則謂春秋褒齊得禮者非也逐人之君葬其夫人此正春秋所惡何謂以崇厚義乎榖梁曰吾女故隱而葬之非也若但云葬紀伯姬如榖梁說可矣今曰齊侯葬紀伯姬則重在齊侯不在吾女明甚案聖人書此罪齊亦以責魯也魯為伯姬父母之國既不能救其國恤其喪反使齊侯假以為名居然告魯魯又靦然使大夫㑹葬此雖庶民之家猶為可恥况堂堂有國之君乎五年冬公㑹齊人宋人陳人蔡人伐衛六年春王人子突救衛劉氏敞曰左氏以立黔牟為不度非也王人子突救衛春秋貴之則是黔牟王所欲立也篡王所立朔則有罪今朔不見貶而黔牟顧先蒙惡豈春秋意哉趙氏匡曰公羊以不言納朔為避王據諸侯之心實不避王而經文反為之隱避是黨罪人也若以為為王諱其逆命則王室亂及尹氏立子朝猶不諱不應諱此若云為魯諱則成宋亂及納子糾皆不諱亦無宜諱此蓋因納事已著再書則煩冗故不書爾彚纂曰衛朔得罪于王而齊襄㑹者侯以納之無王甚矣故春秋皆書人以貶之子突左氏以為字榖梁以為名其以為褒救衛則一也孔氏頴達謂二字而子在土者皆是字于理為近故當從左氏張氏洽曰春秋一經王旅之出而合司馬九伐之法者惟此一事故特書字以褒之案劉氏敞謂不言納衛侯朔不與其納也陳氏傅良曰以朔入為重也伐鄭納突伐衛納朔俱不言納書入而已矣義極精七年夏四月辛卯夜恆星不見夜中星隕如雨劉氏敞曰如雨者言衆多不可為數也左氏云與雨偕非也杜氏注以如猶而言星隕且雨亦非也春秋記星隕為異耳夜中而雨何足記乎榖梁云著于上見于下謂之雨以言雨螽可也以言雨雪則何著于上之有又曰著于下不見于上謂之隕以言隕石可也以言星隕則何不見于上之有公羊之說尤妄語若實尺而復無為不書彚纂曰此言隕之多也三𫝊之說俱有未協劉氏敞皆駁之其義甚精八年夏師及齊師圍郕郕降于齊師秋師還郕公羊作成劉氏敞曰公羊之說非也實共圍盛改謂之成實滅其國改謂之降實降于魯獨言降齊則是春秋非實録豈可𫝊世乎榖梁謂不使齊師加威于郕其意欲以貶齊其實乃為齊文過吳氏澄曰說者謂魯欲取郕而結陳蔡同伐陳蔡不至乃藉力于齊案魯弱于齊齊豈肯為魯役魯亦何敢役之哉蓋齊欲圍郕而徵兵于魯與陳蔡爾郕畏齊而不畏魯故獨降齊師也案莊公親仇讐而伐同姓郕又不服而降齊師師久於外甘為讎役直書而罪自見經文本自直捷簡易不知𫝊者何苦自生支離左氏以為善公榖以為諱俱謬九年公伐齊納糾齊小白入于齊左氏作子糾趙子曰莒近齊小國而襄公强而無道大夫如何輒敢將公子奔之而獲安乎杜注云並僖公之子尤非也若然則糾非讐人之子公納之不應有深譏故榖梁云襄被弒二公子乃出奔此說為正言皆襄公之子李氏亷曰子糾三𫝊皆以為當納趙子程子胡氏以為不當納所以然者杜氏以子糾小白並齊僖之子而糾長故當立榖梁似以子糾為襄公子矣而終以糾為兄故亦以為當立獨程子用史記證之而定以糾為襄公子于是魯納讐之罪明定以糾為小白弟于是糾不當立之義著然後糾不書子小白繫齊管仲之不死魯之忘親釋怨皆得其說矣案左𫝊叔向謂齊桓為衛姬之子有寵于僖如此則桓公與子糾皆僖公之子矣既非讐人之子春秋何故深罪莊公三𫝊及注疏並謂糾為兄為當立如此則桓公為篡國之賊矣夫子何以許管仲之不死程子以糾為小白弟蓋以孔子答子路子貢之言以大義斷之不第據薄昭與淮南王書也况公榖之經文糾不書子而齊小白以國氏如鄭忽曹羈之例乎十年二月公侵宋黃氏仲炎曰趙子纂例又盡破三𫝊之說而曰聲罪致討曰伐無名行師曰侵合是數說考之蓋左氏嘗聞聲罪之說而誤以為鐘鼓之聲也不知春秋書侵如齊侯侵蔡晉侯侵楚皆用大師而總數國若無鐘鼓何以行師則左氏之說非也師之所處荆棘生焉其為􅊶人民驅牛馬斬木壞室者皆用兵必至之禍固無分于侵與伐則榖梁之說非也侵伐雖異辭均之為挾私逞忿爾若謂侵為無名則伐豈有名乎當時諸侯如齊侯侵蔡晉侯侵曹必謂其有附楚之罪而侵之亦不應無名也則趙子之說又非也惟公羊以為粗曰侵精曰伐其說近之而未盡夫奉辭稱罪而討敵敵必請服不服則必出師以禦之是以經書伐者多至于戰如齊伐衛衛及齊戰宋伐齊齊及宋戰之類是也不奉辭稱罪而但侵擾其疆埸故敵國不暇請服而亦不及禦之是以經書侵者未嘗至于戰如齊人侵我西鄙公追齊師至酅弗及蓋疆場之事知之後時追之已去矣故曰稱罪而討其國曰伐不稱罪而掠其境曰侵十一年秋宋大水陸氏淳曰外災來告則書二𫝊不達此意故各穿鑿劉氏敞曰公羊云及我也春秋內魯國而外諸夏若水災及魯自可記魯災無為詳宋而略我榖梁云王者之後案杞亦王者之後何以不書其災冬王姬歸于齊陸氏淳曰案書其歸為魯主婚爾公榖皆云過我榖梁他處即云為之中者歸之與此自相反矣劉氏敞曰不書齊侯逆不見公非也魯為王主婚若齊侯來逆女而公輒不見何謂主婚矣其不書來逆者乃常事自不書者也案魯與齊不共戴天之讐非特不當主襄公之婚并不當主桓公之婚特以罪有小大故書有詳略爾其餘為王主婚固多矣惟莊公之世兩書王姬歸于齊所以見莊之無父十二年紀叔姬歸于酅志陳氏深曰公羊云徒歸于叔師氏以為未詳而謂紀侯既卒叔姬歸于父母之國可也嫂叔不通問况可歸于叔乎蓋譏之東海亦謂失以禮自防之義然叔姬當隱七年歸紀至此已三十四年紀國已亡歸酅奉祀以終其身非其婦節可重聖筆何故書卒又書葬以為婦道之勸乎霞峯華氏曰積齊謂叔姬不當歸酅蓋泥于春秋所書必皆失禮之事故觸處多礙至泰山孫氏謂歸為嫁辭以伯姬之媵而歸于叔非其所歸亂也則悖謬之甚叔姬此時年近六旬老而歸酅不忘其故奈何以亂責之十三年春齊侯宋人陳人蔡人邾人㑹于北杏齊侯榖梁作齊汪氏克寬曰桓率諸侯以平宋亂宋公决不以微者㑹邾小國尤不敢以微者㑹公侯李氏亷曰春秋始伯之書有三北杏獨書齊侯曹南獨書宋公城濮獨書晉侯是也彚纂曰榖梁作齊人據李氏亷始伯之辭例以曹南城濮則當作齊侯為是四國稱人何氏休謂為微者案春秋時諸侯列于㑹而位乃定左氏謂平宋亂則宋人為宋公無疑餘可知矣或以稱人為貶辭或以為衆辭以為貶者天子錫命之法以為衆者諸侯推戴之情二說相兼始得冬公㑹齊侯盟于柯趙子曰桓公未嘗侵魯地及盟後未嘗歸魯田且莊公與齊大讐襄公之時猶歡好不絶不應至桓公却生讎怨孫氏覺曰齊魯不和久矣于是齊桓求伯欲與魯平故為柯之盟左氏曰始及齊平是也公羊載曹劌劫盟經無其事趙子曰其事迹既妄不可以訓彚纂曰公榖皆以不日為信案𨼆元年盟密莊九年盟蔇經不書日榖梁曰其盟渝也至扈與葵丘桓盟亦有書日者則又遷就其說或以為危之或以為美之何前後之屢相互異如此朱子謂以日月為褒貶穿鑿得全無義理者此類是也日不日皆因史舊文假令舊史所無聖人安得而强加之乎十四年夏單伯㑹伐宋俞氏臯曰單伯魯卿元年逆王姬者左氏以為周卿故誤逆為送至是又附成其說不知周有單子非單伯也若是周之單伯則當書曰天王使單伯㑹伐宋不當如此書法矣十六年冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽公羊作公㑹霞峯華氏曰春秋書同盟十有六其二齊桓其十四晉說榖梁者曰齊盟二皆同尊周晉盟十四皆同病楚說左氏者曰言同盟服異也說公羊者曰書同盟志同欲也胡𫝊有二例或以同欲而書同或以惡其反覆而書同四說者通于此或不通于彼至文定則自相矛盾幾棼如亂絲惟劉原父曰同所以名盟焉耳一言决千古之疑矣知同盟為當時命盟之名則春秋之書同盟不過直書其事而其不書者亦當時自不以同盟為名而非聖人創立一例以褒貶之也文定于二幽之盟則曰志諸侯同欲而書同視他盟為愈是聖人與之也于蟲牢則曰特書同以見其皆不臣是聖人惡之也豫之而書同惡之而又書同朱子謂此後世舞文弄法者之所為曽聖人之春秋而有是哉又曰春秋之書同盟惡其無王命而行天子同盟之禮也覲禮天子以㑹同之禮見諸侯諸侯不協則有盟為壇祀方明方伯臨之謂之同盟齊桓非受命之伯而行其禮僭也逮其後且至以大夫而行同盟之禮矣春秋于幽之盟諱不書公謹其始以示貶所謂直書其事而自見也夫同盟之名昉于周禮儀禮其來舊矣論者以為聖人特加之名或以為豫之或以為惡之後人將何所取凖乎黃氏仲炎曰盟而加同者録當時載書之辭爾葵丘盟曰凡我同盟之人蓋同盟之辭在當時有之非孔子新筆也即是以知凡載書曰同盟于某孔子修之亦曰同盟無此字則不書也說者多曰同欲同盟于清丘而衛將叛盟同盟於斷道而魯不肯盟同盟于平丘而齊不受盟豈得謂同欲也哉十七年春齊人執鄭詹李氏亷曰左氏說是公榖以詹為佞人此無據之言杜氏以稱人為賤之榖梁又以稱人為與齊皆非公羊又以為魯信用詹計取齊淫女卒為後敗故甚其受佞其說出緯文不可取彚纂曰公榖以為佞固非左氏以為不朝夫同盟未逾月乃遽責其不朝可乎孫氏復為盟未歸而見執以陳轅濤塗例之情事頗合案詹不氏與柔挾同蓋大夫之未命者書執罪齊也書逃罪詹不能守節也僖七年𫝊曰鄭有叔詹堵叔師叔三良為政稱曰三良則知佞人之說非矣十八年公追戎于濟西劉氏敞曰公羊謂大其未至而豫禦之非也若未至而禦何謂之追乎榖梁謂不使戎邇于我戎若不來公則無追又云于濟西大之亦非也既不言戎之來又不言濟西則當但云公追戎矣安知追之于何所乎汪氏克寬曰春秋書追二追戎濟西譏其在境而不能預備也追齊師至酅譏其出境而弗敢及之也彚纂曰左氏云諱之蓋諱其無備意與胡𫝊同若公穀大之之說則非也劉氏駁之甚明程氏端學曰春秋書此義在于逺追耳非譏其無備也十九年公子結媵陳人之婦于鄄遂及齊侯宋公盟劉氏敞曰公羊以陳人為陳侯果如是春秋無故貶損陳侯使從人稱蓋陳人特陳大夫耳穀梁云辟要盟魯誠欲自托于大國者豈敢以媵婦之名而遣使者以取戾于霸主哉李氏亷曰魯大夫書遂始于此僖三十年公子遂遂如晉襄十二年季孫宿遂入鄆大夫専國之漸也公羊以為善榖梁以為魯實使之皆非經㫖黃氏士炎曰公羊謂大夫出疆有可以安社稷利國家則專之可也漢廷議論多祖其說而不知其非也春秋之亂正由臣下擅主威大夫竊國命故特書大夫遂事以垂戒于萬世就使結真能安國家而矯命已為可罪况秋與齊宋盟而冬受齊宋之伐則所謂安者奚在乎案公榖皆以為魯女媵陳侯之婦程子則謂鄄之巨室嫁女于陳人結以其庶女媵之積齊或問云如此則經當書公子結之女媵鄄人之女于陳遂及齊侯宋公盟不當如今所云也結既為媵自然知為魯女矣積齊所駁極是鄄是衛之東地正義謂陳取衛女為婦魯使結送媵向衛至鄄聞齊宋為㑹將謀伐魯因舍其本職遂與二君㑹盟齊宋以其非君命而怒陳以其送女之不終而怒故冬各來伐据此說極有理但陳人終當作陳侯若是陳之大夫娶婦魯無用以國君之女往媵若說鄄之巨室嫁女陳人陳更無為以微者之失好而怒也况巨室嫁女而結女為媵何須親送即送亦極細事何足重煩聖筆人字或係侯字之誤耳或以其為下事起故稱人以略之未可知程子嘗言大夫無內主則家道不立故不得已而再娶如此則大夫無媵矣陳人安得有媵而說自相違反二十年齊大災啖氏助曰災天火也若以大災為大瘠新宫災亦可云新宫瘠乎二十二年肆大眚公羊眚作省劉氏敞曰經云肆大眚而公羊謂之忌省其文與其理不可訓解蓋不足辨榖梁曰為嫌天子之葬文姜存時猶莫之討今死矣反待天子而葬乎案公穀之說不同皆以連下葬我小君文姜立義故各生如此穿鑿趙氏匡曰赦自赦葬自葬肆大眚者譏其縱釋有罪爾程子謂凡赦何嘗及得善人此說是也二十四年大夫宗婦覿用幣胡氏寧曰譏同見也故不稱及若大夫不覿只書宗婦覿足矣彚纂曰古者仕於其國有見小君之禮則夫人始至而大夫見之固亦禮之所有榖梁謂大夫不見夫人與諸𫝊不合劉氏敞駁之為是公羊及胡𫝊皆以宗婦為大夫之妻蓋兼異姓言之杜氏以為同姓大夫之婦案襄二年葬齊姜齊侯使諸姜宗婦來送葬諸姜是同姓之女則杜氏之說為正案左氏只言公使宗婦覿不言大夫而杜氏預謂同贄俱見諸儒因攻杜氏謂杜氏解經一宗左氏不少違此乃不察而背之世豈有男女俱見之理愚以莊公欲奢夸夫人丹楹刻桷無所不至唐髙宗以百官命婦同宴於麟德殿淫昏之君往往如此不足異也冬戎侵曹曹羈出奔陳赤歸于曹郭公公榖皆以赤歸于曹郭公趙氏匡曰公榖皆云赤蓋郭公案郭公自是闕文赤者曹公子文義都不相關誤甚矣蘇氏轍曰公榖皆云郭公赤失國而歸于曹果爾當書曰郭公赤出奔曹不當先書赤歸于曹而後繼之以郭公也案羈出赤歸與鄭之忽出突歸同例赤蓋挾戎以篡嫡爾公羊謂曹羈為曹大夫三諫不聽事屬無據又公榖以羈赤一事分作兩事連下郭公又以兩事并作一事迂拙不可解先儒或以為郭亡亡字與公字相似故誤郭亡之跡見管子書郭亡者言郭自亡與春秋書梁亡同例義亦通二十六年曹殺其大夫趙氏匡曰公羊云不死于曹君假如不死節豈有舉國盡殺之乎榖梁曰無命大夫案例不命大夫被殺皆稱名孫氏覺曰春秋殺大夫三十有八而不名者三非賢之史失之也舊史失其名孔子安得而妄加之公羊云不名衆也案春秋晉殺三郤猶悉名之安得衆而不名乎榖梁曰無命大夫宋殺大夫亦有不名者豈宋大國亦無命大夫乎皆不通也案此春秋譏専殺大夫爾不名者係孔子修成以後失之詳見闕文表二十七年公子友如陳葬原仲陸氏淳曰榖梁云不葬而曰葬案春秋前後無有虛設其事以為義者且書葬之意直譏季友之行爾彼是陳國大夫安得書其卒也劉氏敞曰公羊云辟內難此時去莊公殁尚數年內難未作何辟之有彚纂曰人臣無境外之交季友越國㑹葬故春秋直書以示貶公榖之說皆非也二十八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績案左氏十九年秋王室有子頽之難五大夫奉子頽以伐王不克蘇子奉子頽奔衛衛師燕師伐周立子頽明年春鄭厲公和王室不克執燕仲父以王歸處于櫟又明年夏鄭虢同伐王城殺子頽及五大夫首尾凡五年而齊桓于是時方伐魯伐戎於王室之難若罔聞知天王亦不聞乞師伐衛到此已越十年衛君已易世矣乃始請師于齊齊桓為之伐衛天王不應含忍于其父而蓄怒于其子齊桓不應坐視于衛朔稱兵犯順之時而興師于衛懿易代新喪之後且王室子帶子朝之亂經文紀之詳矣天王出居于鄭則書劉子單子以王猛居于皇則書天王居于翟泉則書獨子頽之事絶不一見說者謂襄王實啓叔帶之亂而惠王未有過故為之諱據左氏所書惠王亦未得為無過且即使無過亦安得諱王猛敬王未嘗有過不聞為之諱也又云數之以王命取賂而還此乃齊晉末世之事桓公創霸方新安得有此故知左𫝊之事不足信學者以經斷之可也公羊云衛未有罪何休注幽之㑹不至衛懿蓋以喪服未終故齊遽伐之故貶稱人此義較平允三十年齊人伐山戎程氏端學曰伐山戎安知其不命將獻戎捷安知其不自行乎吕氏大圭曰以僖十年齊侯許男伐北戎觀之則伐北戎為齊侯親往伐山戎為將卑師少不然一齊侯也前伐山戎則稱人後伐山戎則稱侯前後自異誰能曉之又曰齊人伐山戎先儒多以為齊侯又以為救燕使實齊侯經當書曰齊侯使實救燕經當書曰救燕今經書曰齊人又不曰救燕則𫝊之說不然矣萬世取信者經也據經考𫝊之真僞可也據𫝊疑經先儒之大弊也彚綦曰榖梁以為善救燕以通職貢胡𫝊本公羊貶之之說以為譏勤逺略蓋皆謂齊桓親行而其實非也僖十年伐北戎則稱齊侯以國語考之齊桓親伐山戎在伐楚之後蓋即指僖十年之役耳是時桓親行故書齊侯此年不過遣將薄伐故循將卑師少之例而稱人至於㑹魯濟獻戎捷鄰封嵗一相見恆事爾不足為齊桓親伐之證也經不書戎伐燕亦不書齊救燕則以書人為善救燕者亦非也救邢救許皆書于冊何獨于救燕則沒而不書三十一年齊侯來獻戎捷遺俘趙氏匡曰據齊未霸之時尚不曾朝魯今既為伯主豈有自獻戎捷乎必無此理但文誤蓋去年伐山戎當書齊侯此獻捷當書齊人交互致誤爾又曰榖梁云戎菽也齊桓分菽豆與諸侯不近人情又捷者軍得爾安知是菽乎案公羊云過我齊在魯北燕與戎又在齊北伐戎無過魯之理三十二年城小榖邑髙氏閌曰杜預以小榖為齊邑若然聖人亦當異其文而繫諸齊且公雖感齊桓之私豈肯為管仲城私邑昭十一年𫝊所稱齊桓城穀而置管仲蓋齊自有榖非魯之小榖也趙氏鵬飛曰左氏因楚申無宇有齊桓公城榖而置管仲之言遂以此年城小榖牽合其事曰為管仲也杜氏因之遂以小榖為榖城夫榖城固齊地而安可强改小榖為榖城耶李氏亷亦言經𫝊所稱齊之榖凡六見皆止書榖無言小榖者且桓公之有功于魯在髙子來盟之後莊公時未見有功之迹故當從榖梁孫氏復謂曲阜縣西北有小榖城孫魯人終身學春秋小穀之為魯邑明甚閔公元年公及齊侯盟于落姑彚纂曰落姑之盟穀梁止曰盟納季子而左氏以為請復季友孰請之耶是時慶父當國閔公方幼慶父既不欲請閔公又不能請故陳氏傅良謂國人為之吳氏澄謂國之世臣如石碏者為之卓氏爾康以為陳方為齊所厚季友援陳人以請齊桓俱于情事頗合齊仲孫來劉氏敞曰孫以王父字為氏此乃慶父之身也未可以稱仲孫且徑實繫之齊若之何謂魯仲孫哉此不近人情之尤者二年夏五月乙酉吉禘于莊公趙氏匡曰經但譏此時未當吉祭爾非謂魯便以此為常也僖公二年冬十月不雨三年春王正月不雨夏四月不雨六月雨案左穀梁皆以為一時不雨杜注范注文同公羊則以為一月不雨餘月即有雨其不書雨者小雨不甚故也愚意左穀為是小雨亦止可言不雨耳若單是一月不雨未是變常不足書也至積齊程氏截斷冬十月春王正月夏四月為句從一時無事書首月之例謂三不雨與上文不相蒙此又求新而反鑿不雨二字不蒙月定當蒙時則已非一時無事無用書首月若懸空書不雨二字更似一年不雨無此書法也六月雨則榖梁謂喜雨者得之蓋周之六月是夏之四月正當播種之時甘霖大沛君民同喜故書若文公時三書不雨其一自十有二月至於秋七月其二自正月不雨至於秋七月不書八月雨者八月為夏之六月此時苗已枯死雖雨亦無用故不書八月雨也何休謂不雩而得澍雨亦非此時而雩正是合禮不書春秋書雩二十一皆書大雩志其僭也春秋雨書大旱皆在夏秋三不雨皆連秋言之周之秋今之夏故為災此書六月雨則正當孟夏自宜不為災也秋齊侯宋公江人黃人㑹于陽榖彚纂曰以為謀伐楚者左氏也公榖皆無此意然下與伐楚事相近疑左氏說是四年楚屈完來盟于師盟于召陵彚纂曰胡𫝊本公羊以為序績諸儒多從之者但屈完來盟其辭甚亢既盟之後楚人圍許滅弦滅黃敗徐桀驁如故而桓不能禁則榖梁所謂得志為僅者豈不信哉八年禘于太廟用致夫人案此三𫝊之說各不同公羊謬妄不足辨學者所爭論者左氏與榖梁之說耳楊氏士勛曰若如左氏之說則哀姜元年為齊所殺何為今日乃致之其言似有理由是彚纂所徵引諸家悉主榖梁之說而其實非也木訥趙氏曰先君已死子安有見母于廟之理不詰自屈霞峯華氏曰致夫人乃致死者非致生者也若如劉向云立成風則經當言立夫人不當但言致夫人言致夫人語未明白且古無以子冊母之禮泰山孫氏又謂以夫人之禮致成風于太廟使之與祭將為主婦而祭乎將以聲姜為主婦而成風與助祭乎尤不可通矣其遲至八年而後致者以哀姜醜聲昭著僖公疑于其禮不敢即行故遲至八年大祭始行之耳詳見吉禮口號注又趙氏匡盡闢三𫝊之說而以夫人為聲姜其言曰僖公若致其母即當言夫人風氏不當但云夫人但云夫人者時君之妻耳且聲姜更無書至處故知因其至特設禘禮以為榮觀無謬妄可笑設太廟盛禮以為媚悅夫人之計此與莊公之丹楹刻桷何異僖公賢君豈宜有此髙紫超氏曰夫人指哀姜斷無可疑其不稱姓諡而止稱夫人正與前書夫人氏之喪書法相照貶之至也得之矣髙氏閌又謂五世之夫人莘老又謂聲姜哀姜成風程積齊盡絀諸家之說而獨取趙氏殊不可解又趙氏木訥亦主聲姜其言曰魯禘文王僖娶于伯主內以為榮也魯祀文王外以為榮也此亦莊公覿用幣之意噫莊公之媚哀姜此是何等醜事而乃輒以為比乎其說亦自露破綻矣九年晉里克殺其君之子奚齊啖氏助曰齊舍亦未踰年君也何不云其君之子故知榖梁國人不子之義是也張氏洽曰齊舍未踰年而稱君以舍之正而與之也霞峯華氏曰非也舍立五月而商人弒之君臣之位定雖未踰年稱君獻公甫卒而奚齊殺于喪次未立乎位而為君則稱其君之子而已設奚齊既立如舍之五閲月而被弒則春秋必書晉里克弒其君奚齊如卓子之例矣程氏端學曰奚齊非弒逆之賊立雖不正則固晉人之君也使里克弒之于既立之後則豈非弒其君哉且卓與奚齊皆庶孽何獨于卓而書弒愚謂榖梁國人不子之說非也先君既以為子國人安得不戴以為君若先君子之國人可以不子之則權自下操五季末世大亂之道也十三年公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹案左氏僖十一年揚拒泉臯伊雒之戎同伐京師入王城焚東門王子帶召之也十二年王討王子帶子帶奔齊冬齊侯使管夷吾平戎于王明年春使仲孫湫聘于周且言復王子帶此言諸侯戍周亦為戎難故果如此齊桓之罪大矣夫子帶以臣伐君召戎入冦至焚掠畿甸在子帶則屬籍當絶在戎則必誅不赦乃桓公不聞出一旅助王以犯甸之戎而為之求平以伐君之賊而為之求復是黨逆抗順末世朱全忠李茂貞所為曽謂尊周攘夷者而出此乎且不伐戎于稱兵犯闕之時而戍周於戎師既退之後齊之畏戎何其甚而管仲之舉動何其愚也况果有召戎伐王之事春秋何以沒而不書彭山季氏謂左傳妄誕不足信有以也十四年春諸侯城緣陵陸氏淳曰左曰有闕榖梁曰散辭皆不知前目後凡之例故多生穿鑿爾案左氏云淮夷病杞公羊云徐莒脅之賈逵据書序謂徐即淮夷也木訥趙氏曰淮與徐大逺于杞不啻千里之遙無病杞之理杞初國于陳留桓六年遷于淳于在今密州淮夷則在今之泗州蓋越魯而後至于此豈有越魯數百里而滅杞乎髙郵孫氏亦言徐莒小國何能脅杞使遷且經無其事未可據也髙紫超氏曰左氏淮夷病杞之說考之經文無明據今案僖十二年之夏書楚人滅黃十三年之春書狄侵衛而于十四年春城緣陵疑緣陵為巗險之地係楚狄出入往來必由之道故特城以控扼之與城楚丘之意略同爾若以為遷杞則莫能探索其義矣大抵胡氏三城之說皆據𫝊文為斷而不考于經之前後本末故有𫝊義愈明而經義愈晦者緣陵臣瓚謂即北海郡營陵縣案營陵一名營丘即今青州府之臨淄縣乃師尚父初封之地豈有以封杞之理其謬不待辨或云在今諸城縣界總因左氏緣陵遷杞之文而為之說耳桓六年淳于公如曹不復杞即并其地至襄二十九年晉人城杞之淳于是杞都淳于始終未嘗改無由中間遷緣陵又自緣陵復遷淳于也足知遷杞之說為妄矣夏六月季姬及鄫子遇于防使鄫子來朝彚纂曰胡𫝊謂僖公愛女使自擇配說本公榖然僖公魯之賢君聲姜又有令妻之稱豈肯聽女自擇配如果來朝為請昏則既朝之後必有納幣逆女之事何俱不見于經耶故當専從左氏案啖氏助力主公榖之說謂魯之淫風久行積漸成俗季姬少見文姜之行遂至于此不足為怪諸儒自蘇子由氏而下俱力闢之而從左氏是矣然髙紫超氏終以文定擇配之說為未可盡非其言曰若如左氏之說則下文季姬歸于鄫之書為贅矣季姬歸鄫與伯姬歸紀書法一也其為出嫁之辭非歸國之辭可知也春秋于內女之歸寧而反國者例不復書而此獨書季姬歸鄫何為乎且果曰歸寧也則去來當亦不過旬時今乃歸寧于十四年之六月而歸國于十五年之九月縱怒其不朝而止之亦當于既朝而即歸之何至羈留久逺若斯也然則于防之遇其為蔓草清揚之㑹可知矣然而僖公一聽為之者必以此為牽絲之良姻雀屏之佳話而不以為嫌也若以季姬為已嫁之女則夫婦相㑹於途固屬常事而使之來朝亦閨房相勸時有之言也何與于經世之大典而書之案髙氏之言亦甚辨當並存之以俟知者方氏苞曰內女適人者繫國季姬書字而未繫諸國則女而非婦明矣及者內為志蓋使自擇配故得與鄫子遇也如左氏所𫝊則當書某月鄫季姬來某日及鄫子㑹于防使鄫子來朝若卒然相遇不由期約則當書季姬遇鄫子于防以是知公羊所𫝊於經為合也明年季姬歸于鄫以始嫁之辭書則此非歸寧益曉然明矣凡內女之歸非失禮不書案孫氏覺髙氏閌趙氏與權程氏端學黃氏仲炎說皆從公羊家氏鉉翁曰以書法觀則明年九月歸于鄫此始嫁也僖公號賢君略無正家之法魯之不競實由乎此葉氏夢得曰子産為鄭不能奪公孫黑之强委禽乃從徐吾犯妹之所欲以與子南其習俗有自來矣公羊以為奔則已甚擇配之說吾于子南之事徵之沙鹿崩姜氏廷善曰沙鹿山名陽平元城縣東有沙鹿土山陽平今大名府大名去晉地逺僖公時晉猶未至於東方左氏卜偃之言蓋屬附㑹後儒遂以為晉地非也公羊為天下記異者得之案沙鹿山名見漢書元后𫝊在今大名府元城縣東四十五里公羊以為邑榖梁以鹿為山足皆妄也又案沙鹿即五鹿元城郭東有五鹿之墟即沙鹿地僖二十八年文公伐衛取五鹿則此時尚屬衛地十五年己卯晦震夷伯之廟趙氏匡曰春秋遇晦朔必書穀梁成十六年𫝊云事遇晦書晦何得于此獨名晦冥乎公羊云天戒之故大之豈有為天所罰翻乃書字尤為非理大夫既死不更稱名爾原仲亦是也案劉原父曰左氏云展氏有隱慝則夷為展氏之諡非也大夫當繫字于氏寧有稱其諡遂舍其族之理據此則夷伯當為夷氏非展氏也若是展氏當為栁下惠惠係聖人又當其身尚在二十六年展喜猶受命于展禽何至有隱慝為天所罰至公羊以夷伯為季氏之信臣尤謬是時季氏尚未得政又安有陪臣専權僭立大夫廟乎十七年夏滅項啖子曰齊桓雖賢滅項非合義安得為之諱且春秋豈可為齊諱而使魯受惡名乎彚纂曰左氏之說相沿已久然以城楚丘之例推之公榖以為齊滅者於理亦通蓋不書齊者蒙上伐英氏之文也與襄十年春㑹柤夏滅逼陽同一書法蓋㑹淮之後齊以淮夷之事委魯統率而自與徐人伐英滅項故僖公經略之久至於九月乃歸爾若胡氏安國謂滅項為季孫所為案是時季友已卒子無佚早亡行父年尚幼稚然則滅項之季孫何人耶案彚纂主齊滅之說以此時季氏尚未執政爾然項係陳州府項城縣北距曹五百里齊更在曹北與魯尚近于齊似涉風馬牛無越國鄙逺之理須更參之方氏苞曰胡氏謂經末有書外滅而不言國者如齊師滅談是也亦未有書內取而直言魯者如取鄟取邿取鄫是也由此知項為魯滅無疑其辨公榖之誤極是但以為季孫所為故不為諱滅則未安僖公時政未下移季友子無佚早亡行父幼稚安能擅兵而滅國蓋魯宋恃齊交之固知桓志之衰故牡丘㑹罷而宋伐曹淮之㑹罷而魯滅項耳案齊之去項固逺而魯去今項城縣尚全隔歸德一府宋實介其間勢不能越宋取項意宋襄此時窺桓公不久將死急欲代齊霸而管仲又先殁故牡丘㑹罷而宋即伐曹旋即誘魯滅項欲分罪于魯以撓亂霸略為自已出頭地耳蓋項地居宋西南宋此時明以項餌魯不然魯不假道于宋無由滅項也其時季友卒而公子遂執政觀後日伐齊入杞邀功生事為宋所誘理當有之厥後地入于楚項氏世封于項其明證也豈當日魯滅之而不能有歟秋夫人姜氏㑹齊侯于卞九月公至自㑹孫氏復曰考之于經無魯侯見執之迹春秋雖曰為內諱亦不全沒其事若齊侯實嘗執公亦當異辭以見之如公弒書薨而不地奔書孫使後人因以可考今經無其辭則左氏未可據也若夫人因救解魯侯而㑹齊侯聖人亦當恕之未可便加以非禮之辭經言㑹齊侯于卞則非禮可知矣左氏之說恐未可信彚纂曰公以滅項而見止則夫人當往請于齊不能致齊侯于魯地公為齊所止而歸則當書至自齊以見意不必致㑹以沒其實十八年宋師及齊師戰于甗齊師敗績李氏亷曰公羊以為善宋非也春秋凡書及者皆惡之在主人而及客則非反已息爭之道在客而及主又豈仗義執言之師乎故春秋書伐而戰者三獨宋公以客及主乃變文以深貶之也榖梁之說精矣霞峯華氏曰宋襄之所以為此戰者其志在爭霸也而其所藉以為名者假齊桓托孤之說以納孝公也春秋不書納公子昭而但書伐齊則伐喪而已矣此誅心之法也詳宋楚爭盟表十九年夏六月宋公曹人邾人盟于曹南鄫子㑹盟于邾己酉邾人執鄫子用之李氏亷曰左氏以為宋公使邾執之若然春秋何以不蔽罪於宋何休以為魯本許嫁季姬于邾季姬淫泆使鄫子請已以此二國致忿臨江劉氏亦信其說而考之公羊傳文本無此言不知何氏何據家氏鉉翁曰宋襄之為人好名而畏義方其為太子以讓國聞其後與楚人戰欲以不禽二毛不鼓不成列而取仗義之名豈有用同盟國君于淫昏之社無道若此者乎且春秋書法全不及宋故公穀以為非宋之罪趙氏匡劉氏敞亦同此說劉氏權衡曰宋使邾文公用鄫子此大妄也果爾罪乃在宋不在邾今越宋理邾是為首惡者不誅而脅從者見討也詳驗經文是邾國自為盟㑹鄫子往參之因見執爾非復㑹向者曹南之盟也若即㑹向者曹南之盟應但云如㑹不得言㑹盟于邾二十四年西宫災孫氏覺曰是僖公所居之西宫以其在西故云西爾公羊說是也穀梁以為閔宫案僖公繼閔而立若實閔公何妨言新宫為其已久何妨言閔宫乎案何休每於公羊本文之外另造事端如十四年季姬使鄫子來朝公羊云使來請己何休遂生出要遮淫泆又云季姬本許嫁于邾因此兩國交忿而至邾人用鄫子于社八年禘于太廟用致夫人公羊云脅于齊媵女之先至者何休遂生出僖公本聘楚女為夫人後因脅于齊女而楚女廢居西宫怨曠以至此年西宫災以漫不相涉之事牽合傅㑹可發一笑不獨此二事為然也二十二年冬十有一月己巳朔宋公及楚人戰于泓宋師敗績案春秋于此戰書日書朔以楚之驕橫至此已極故謹而詳志之爾公羊云文王之戰不過是謬哉劉氏敞亦云忠厚有德之用心雖師敗國削猶非其恥而以榖梁之說為悖者愚不解其何意二十五年宋殺其大夫劉氏敞曰公羊以為三世無大夫三世內娶案經現書大夫則非無大夫明矣且君娶一卿而一國之內何得悉無大夫哉詭僻不經乃至于此榖梁曰以其在祖之位尊之春秋非孔氏家牒何得擅諱其祖名孫氏覺曰不書名簡失之爾案公榖之妄不待言何休更謂禮不臣妻之父母此出何經典聞天子有不臣父之文未聞不臣妻之父也此見漢世尊崇后族遂妄造此語爾二十六年齊人侵我西鄙公追齊師至酅弗及胡𫝊凡書追者在境內則譏其無備追戎于濟西是也在境外則譏其深入追齊師至酅是也酅齊地彚纂曰侵書人追書師榖梁謂以公之弗及大之蓋謂弗及為怯故大齊師以諱其怯即劉氏敞所謂為公之弗敢及張之公羊以至酅為侈意亦如此非如孔疏所云變文以美公能逐齊師也至胡𫝊謂齊為諼以為前書人見其弱以誘魯後書師是伏其衆以邀魯果爾則城濮柏舉二役俱戰書楚人敗書楚師豈亦楚為諼以誘晉與吳耶惟孫氏復蘇氏轍謂不可言公追齊人故曰師似為近理案至酅弗及胡𫝊深入之說為較得聖人之意魯以小國而敢與齊大國為仇乞哀于楚逺交近攻窮追深入見公之不量力而黷武召外夷而陵諸夏可恥之甚下連書如楚乞師以楚師伐齊取榖㑹諸侯盟于宋公子買戍衛仗楚之力惟命是聽合與國而與齊宋為難使非晉文之興齊宋又將折而入於楚周室之不亡幾希矣蓋自齊侯小白卒至晉侯侵曹伐衛統計厯十有二年中間連書數十事著楚頵暴橫諸夏瀾倒見晉文之一戰而霸為萬萬不可已或乃以復怨為晉文咎豈非信𫝊不信經之過哉二十八年春晉侯侵曹晉侯伐衛公子買戍衛不卒戍刺之楚人救衛趙氏匡曰公羊云致其意聖人不逆詐豈未行其事而先致其意乎榖梁曰惡也凡書侵伐皆罪之何得再方為惡乎家氏鉉翁曰楚攻宋不已勢將并兼文公首以救宋為事春秋不間事而重舉晉侯所謂言之不足而重言之謂其先天下之所難慰諸侯之望爾案侵曹伐衛胡氏以為譏復怨朱子又謂伐衛致楚為譎皆非也曹衛以諸姬且又北方大國非如陳蔡弱小密邇于楚者而相率從楚為之羽翼此門庭之冦勢不得不先除何得以復怨譏之哉且其時陳蔡鄭許從楚圍宋矣曹衛又即楚魯又乞師於楚伐齊未即楚者獨晉與齊宋而齊宋方有倒懸之急晉欲救宋則恐曹衛之議其後此即王者用師義當先討安得為譎文定又以書楚人救衛為豫楚而譏晉尤非也唐用兵討吳元濟而王承宗李師道救之豈得謂豫其當救哉書楚人救衛益著衛從楚之罪書公子買戍衛益見公黨楚之非三十一年夏四月四卜郊不從乃免牲猶三望張氏洽曰鄭杜恐臆說蓋天子四望魯比天子闕其一故三望書曰猶言不當望而望祭也如使魯望不出境何為言猶以譏之公羊之說必有所𫝊汪氏克寬曰周官四望蓋望四方今魯三望蓋泰山在魯西海在魯東河在魯北也廬陵李氏曰三望之異同左氏以為分野星及封內山川公羊以為泰山河海榖梁以為海岱淮據三家皆不以三望為非禮止譏其舍郊而望此已失之况望乃祭山川之名何得以為分野之星若三望為魯之封內魯所得祭則常事不書矣胡氏獨取公羊為得之泰山魯所得祀河海非魯封內也故不當祀猶者可已之辭春秋大事表卷四十二之二欽定四庫全書春秋大事表卷四十二之三國子監司業顧棟髙撰文公二年春王二月丁丑作僖公主案此後世祔廟除几筵之所以不一其說也左氏則以三年為斷榖梁則以練為斷而儀禮士虞禮記云卒哭明日以其班祔鄭康成注祔已主反于寢鄭蓋據左氏之說以釋儀禮而非儀禮之本文也至檀弓云殷練而祔周卒哭而祔孔子善殷蓋亦以周祔太蚤急於神其親則儀禮之云祔蓋即以卒哭之明日入主于廟矣殷練而祔即穀梁之說也賈公彥疏儀禮又云惟祔與練祭在廟祭訖主反于寢其大祥與禫祭其主自然在寢祭之楊士勛疏榖梁亦云作主壞廟不同時蓋俱以左氏三年之說為是故為勉强遷就其說而均于本文未順總之祔有三說謂卒哭而祔者儀禮明日以其班祔是也謂練而祔者榖梁于練壞廟是也謂三年而祔者左氏喪畢吉禘是也陸象山居母喪欲卒哭而祔除几筵其兄子夀疑之皆以書來問朱子朱子告以儀禮注祔已主反于寢象山謂非經之本文不足據信朱子痛闢之以為無論古禮但今卒哭之後便除靈席孝子之心豈能自安後儒多疑朱子謂喪事即逺有進而無退既祔廟而復反寢特出鄭氏之創說朱子乃棄經而信注可乎朱子又謂榖梁但言壞舊廟而不言遷新主安知其非于練而遷舊主于三年而納新主耶又謂祔與遷自是兩事祔者祔于所當入之祖廟并祭其祖是祖孫同廟而享至喪畢祖遷于髙祖廟髙祖藏于夾室然後奉新死者之主入廟榖梁謂壞廟易檐改塗正是祔以後遷以前之事此更融左榖之說而一之與楊疏亦大同小異以明卒哭而祔之必不可也汪氏克寬謂卒哭而遷廟遽用吉祭非人情故文定取榖梁之說家禮則告祔于卒哭而祔廟于大祥于儀禮左氏蓋兩從焉開元政和二禮卒哭之後不祔廟至三年禫後始祔自唐宋以後未之有易矣三年夏五月王子虎卒趙氏匡曰臣無外交之禮今死而赴故書以譏左傳曰禮非春秋之意陳氏傅良曰公榖以為叔服非是家氏鉉翁曰周綱既替王臣外交死無不赴者春秋皆削不書獨書王子虎賢也自晉文之霸辭命多出於虎嚴重有法得訓誥諸侯之體蓋王臣之賢有德者榖梁之說得之公羊以為嘗㑹葬私矣雨螽于宋王氏樵曰螽非上墜之物來多而墜故書雨見災甚耳既為災則非墜而死矣左氏因雨字而生說耳徐邈云禾稼既盡又食屋之茅茨驗嘗有之案果如左公羊之說則是螽不為災矣春秋何用書乎故當從榖梁四年夏逆婦姜于齊彚纂曰納幣卿行則逆婦必非微者蓋文公自行也聖人惡其成禮于齊故沒公不書以示貶榖梁得之而左氏非也公羊以為娶于大夫則失之逺矣先儒譏喪娶亦可兼用蓋圗昏于喪服而成禮於婦家所謂失禮之中又失禮也程氏端學曰春秋稱婦姜者三宣元年遂以夫人婦姜至自齊成十四年僑如以夫人婦姜氏至自齊皆以婦言之豈皆先成禮者哉蓋稱婦者有姑之辭非以成禮而稱婦也案積齊之辨甚明曉彚纂斥左氏而從榖梁非也從古人君無就婚贅壻之理此乃委巷之談烏得以榖梁為是哉先儒又謂出姜不書至為文公禫制未終思念娶事方逆而已成為婦未至而如在國中此因婦之一字遂併其不書至亦委曲以成文公之罪此真所謂憑空揑造也然則左氏之說得歟曰亦非也逆者安知其非卿則常事不書春秋書之者為十八年夫人歸于齊立案也婦者有姑之稱書逆婦姜以明其為嫡夫人非敬嬴之所得比也春秋因末以原其本特書之以正襄仲及敬嬴之罪先儒又謂不稱夫人不可為小君奉宗廟其說正相反如此則聖人乃是為襄仲出脫是與于亂賊之甚豈有此理哉方氏苞曰微者逆故不以名見不以夫人之禮致於廟故不書至蓋宣公之立也長此時敬嬴仲遂之邪謀已萌文公昏懦不能察是即他日子弒夫人大歸之兆端七年宋公王臣卒宋人殺其大夫趙氏匡曰若以殺大夫衆而不書名則晉殺三郤鄭盜殺大夫何又悉書乎若實殺有罪何不書死者之名左公羊之說皆非也吳氏澄曰宋人者非一人也見國亂無政而臣庶得以擅殺大夫也九年冬楚子使椒來聘椒榖梁作萩陸氏淳曰公羊云許夷狄案例凡未命之卿來魯皆書名無他義又文公巳前不書楚大夫者使命未通耳有何許之乎榖梁云以其來我褒之聖人設教豈以來我則褒之案是時秦楚交病列國以魯為周公之後故俱來通好以為逺交近攻之計楚欲圗北方而來聘秦欲伐晉而歸禭其情一也聖人書之以志夷狄之窺伺霸業之中衰若以為慕義而豫之商臣負滔天之惡豈區區一聘遂可云與其潔不保其往乎秦人來歸僖公成風之禭趙氏匡曰春秋之作以為經國大訓一字之義勸戒存焉若但以無忘舊好則書恐非聖人之訓啖氏助曰僖公成風與惠公仲子何殊公羊曰兩人誤也案榖梁之說諸儒多從之以為僖公以妾母稱夫人天子不能正而秦人能之故書法云云愚謂此義亦甚迂僻豈聖人欲正嫡妾之分必借秦人以立義且秦之弗以成風為夫人于何而見也善乎文定之言曰寵愛仲子以妾為妻者惠公也故書惠公仲子所以正後世為人夫者不可亂嫡妾之分以卑其身尊崇風氏立為夫人者僖公也故書僖公成風所以正後世為人子者不可行僭亂之禮以賤其父其義大而精矣十二年春王正月郕伯來奔郕公作盛趙氏匡曰諸侯嗣位未踰年稱子豈有君父病而不視死而不喪身未即位以邑出奔而稱郕伯且鄭忽曹羈莒展皆已即位及其出奔猶但稱名况未嗣位乎左氏之說非也失地之君例書名若以兄弟之國不名曹伯陽衛侯衎何以書乎公羊之說亦非也劉氏敞曰魯但以諸侯逆之便謂之郕伯春秋遂沒其専土叛君之罪反謂之諸侯而尊之何以稱不登叛人哉意者先郕伯以去年卒太子即位而不能自安遂出奔以其即位日淺或謂之太子而左氏則誤以為太子出奔也杞伯來朝二月庚子子叔姬卒啖氏助曰左氏此𫝊大誤當在成八年杞叔姬卒之下誤置此爾蓋當時有杞伯請無絶昏之語而作𫝊者見此年有杞伯來朝又有子叔姬卒遂妄置於此而更加請絶叔姬四字以牽合之其實此年來朝與子叔姬卒自是兩事初不相關也成公時叔姬自杞來歸此是别一叔姬六年七年中杞曽使使來請無絶昏故八年杞叔姬卒九年杞伯來逆其喪以歸若此年子叔姬自是魯女未嫁者爾與伯姬卒同義無他說也案左氏于叔姬前後事多牽合因此年來朝與子叔姬卒相連遂以叔姬為伯姬所求之婦以不繫杞為出而見絶又以成八年書卒之叔姬即杞桓所請續為昏者夫八年之叔姬係五年來歸見于經文為杞所出確有明據乃以一事分作兩事遂以杞為兩出魯女又以兩事聮作一事以兩女係姊妹世豈有絶一姬復請一姬逮後姬續昏矣又復出之至其喪而請之杞小國何肆無忌憚乃爾魯又懦弱惟命是聽耶其誣妄甚矣當以公榖許嫁之說為是另有論附凶禮後啖氏又曰榖梁云稱子者公之母姊妹案經文稱子明是時君之子乃云姊妹有何理哉十三年世室屋壞世左榖作大音泰吳氏澄曰左榖誤世為太榖梁謂太室猶世室以為伯禽廟字雖誤而義與公羊同杜氏以為太廟之室夫廟制中央一室謂之太室豈太廟之中前堂後寢左右夾室東西二廂皆不壞而唯中間一室獨壞也于義有不通矣十四年晉人納捷菑于邾弗克納捷公羊作接趙氏匡曰若實用諸侯師經不合不書公羊云大之此乃譏其不量事而勞師爾聞義能止差可補過何足大之哉又云不與大夫専廢置君縱令諸侯豈得専廢置何但大夫此乃譏辭非實與而文不與也彚纂曰經書弗克納者善之書人者貶之大夫興兵以廢置諸侯奉不正以奪正雖見義而徙不得無罪故榖梁責其知之晚而劉氏敞以為不免于貶也公羊雖以為貶而實與而文不與之說不可以訓趙氏鵬飛曰是時盾之意在晉而不在邾使克邾而失晉則為盾之損多矣盾之為此蓋欲釣反義之名聖人照見其真情竊君子之名而文小人之計故特書曰晉人公羊乃以為郤缺于時晉權在盾使郤缺在行則亦盾意耳左氏事實為詳且先於二𫝊當從左氏冬單伯如齊齊人執單伯齊人執子叔姬劉氏敞曰若單伯為周大夫何以明年書單伯至自齊乎公羊曰道淫齊舍未踰年魯人豈以女子之縱令世衰多居喪而娶者春秋猶當書子叔姬歸于齊榖梁曰私罪何不用陳袁濤塗鄭祭仲例以解齊人乎彚纂曰左氏因周有單子遂疑單伯為王臣公羊因單伯不稱行人疑為己罪又因經文執單伯與執子叔姬相連遂疑為道淫榖梁亦謂單伯私罪子叔姬同罪二𫝊之誣罔較左氏為尤甚使叔姬蒙不白之寃豈可訓哉趙氏鵬飛曰聖人再書齊人不曰執單伯及子叔姬嫌於淫也公榖反以淫目之不達經文妄疵人爾十五年三月宋司馬華孫來盟案孫氏覺謂昭公暗亂國事廢弛大臣外奔耦懼鄰國因間以謀其國于是請來盟以結好而紓難聖人善其憂國而舉職故稱其官而不書使見其合於事宜能其官也與屈完髙子來盟同一書法張氏洽趙氏鵬飛俱從之彚纂亦主其說而駁胡𫝊愚謂胡𫝊未可盡非也案八年書宋人殺其大夫司馬左氏云大司馬公子卬昭公之黨握節以死則此司馬華孫為公子鮑之黨可知矣明年書宋人弒其君晉衛陳鄭同興師致討而魯不與則此來盟為結援求免可知矣始也削其君之左右而大樹私人今也謀動于大惡而先求援列國則此盟之為専行無上不顯然乎不書使者明非昭公之意而公子鮑之意也與屈完髙子正自美惡不嫌同辭齊氏履謙曰特書其官是其為夫人之黨殺公子卬而代之位者家氏鉉翁謂耦實子鮑之私人使之厯使諸侯豫自結以免討與愚意合十六年秋八月辛未夫人姜氏薨毁泉臺案左𫝊注疏則泉宫當為聲姜所居如東宫西宫之屬在魯宫闈之內因姜氏薨而毁臺劉氏敞謂迷民以怪者是已公羊郎臺之說鑿空何休以意牽合甚屬費解另有論附凶禮表後黃氏仲炎曰申繻有言妖由人興人無釁焉妖不自作文公不知修德弭災乃歸咎于土木之無知而毁之非勝不祥之道也宣公元年三月遂以夫人婦姜至自齊啖氏助曰不稱公子夫人何以尊乎左氏不知有一事再見者第書名從省文之義故妄說爾案夫人不稱氏公榖俱以為貶夫人胡氏亦因之遂有夫人知惡無禮如野有死麕則可免之說固哉此見也孔氏頴達曰女之出嫁事由父母從夫喪娶父母之咎豈可貶責夫人此豈是宣公淫掠而欲令齊女守貞乎斯論最快趙氏鵬飛曰書婦姜誅敬嬴也婦者有姑之稱姜氏既絶而歸齊婦安得姑書婦姜所以見妾母専政著敬嬴之欲速以姑自居也黃氏仲炎曰宣之遂猶桓之翬也或曰譏喪娶或曰譏不親迎其猶放飯流啜而問無齒决者乎二年宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元陸氏淳曰軍士猶饗之况其御乎御既寡且親近必無不與左氏不可從也又言答城者之謳皆近誣榖梁言盡其衆以救其將此但緣師先敗績身乃見獲依次第書之有何褒貶乎晉侯夷吾之見獲自為馬陷濘中師實不敗各依事實而言無煩曲說四年公及齊侯平莒及郯莒人不肯公伐莒取向陸氏淳曰聖人設教豈為魯欲取向妄加莒事穀梁云弗肯者可以肯也案書不肯者明莒非以他事見伐且譏公爾劉氏敞曰公羊之問意欲發盾非弒君而不知非也弒君復見者寧止盾宋萬復見亦非弒君乎榖梁謂不言帥師不正其敗前事亦非也將卑師少稱將此通例耳八年冬十月己丑葬我小君敬嬴公榖作頃熊雨不克葬庚寅日中而克葬汪氏克寬曰榖梁譏不克葬而左氏以為得禮近世名儒亦有講于此者謂雨而無害于力役雖葬可也其或天變駭異雨甚水至不可以即土汲汲焉葬反為不可追之悔則左氏之說亦未為非然二者在子孫之誠敬何如爾夫國君之葬宜無所不備以雨故不克葬則無備可知謂之無貶不可也程氏端學曰劉氏敞有慎終追逺人情不忍遽之論引雨霑服失容則廢朝㑹以為證又謂潦車載簑笠特未葬遇雨之用然既至墓所亦當有覆墓之屋若今草舍之為豈得恝然不顧使雨水泥潦汚溼所穿之壙哉特禮經偶不載此耳且春秋不書常事劉氏嘗自言之使不克葬為得宜則春秋不書矣若胡氏謂敬嬴逆天理而大雨不克葬為咎徴夫雨者四時常有之物非若震雷疾風之為天變也據經但言雨不克葬是當責人事之未備不敢遽謂天道之變常也彚纂曰雨不克葬當徙穀梁喪不以制之說左氏之說非也九年秋取根牟案魯自中葉以後凡取邑皆不書不以取邑為重也故取鄟取邿皆國名况邾在魯南而根牟在魯東北邾小國邑豈能到此至趙氏木訥謂伐萊取根牟皆齊事但中間隔一秋字耳尤謬昭八年搜於紅自根牟至于商衛革車千乘明是魯地何得言齊取乎陳殺其大夫泄冶案泄冶以直諫死而杜氏承左𫝊之說言不為春秋所貴胡𫝊亦謂冶雖效忠猶在宋子哀魯叔肸之後仕昏亂之朝異姓宜如子哀潔身而去貴戚則不食其祿如叔肸焉可果爾則龍逢比干為沽直以取禍矣豈所以垂世立訓為此說者皆由執書名之例誤之也彚纂曰禮諸侯不生名死則名之諸侯死猶名則大夫死而名之宜矣子哀之奔未嘗死也季友仲遂叔肸之卒雖賢姦不同而生而賜氏不可以為例朱子釋危邦不入謂仕危邦者無可去之義在外則不入可耳泄冶為陳之臣食陳之祿以死生爭之而不悔此正盡道而死而乃傅㑹牽强煆鍊周內是使鄙夫藉口率天下而為頑鈍無恥也左氏所載孔子引詩黃氏仲炎以為非孔子之言其見卓矣今故以榖梁殺無罪之說為主方氏苞曰胡氏謂泄冶書名在子哀叔肸之後益誤矣叔氏也肸名也子哀亦名也春秋無書字之法十年春公如齊公至自齊齊人歸我濟西田趙氏匡曰已取之又言未絶公羊何迂誕之甚言我者為濟水長不必盡是魯田以别他爾榖梁言如齊受之案但言歸我則足知其來也省文爾哀八年歸歡及闡豈是公受之乎齊崔氏出奔衛胡𫝊書曰崔氏以族奔也許翰以為崔杼出而能反反而能弒者以其宗彊于此舉氏辨之早也其說得矣彚纂曰三𫝊及胡氏各執一說其理皆可通愚案榖梁之說最謬左氏亦未得大凡稱氏者亦只一人春秋時有此稱呼名號非謂舉族也如隱三年書尹氏卒豈謂舉族皆死乎詩稱尹氏太師豈舉族皆為太師乎大抵彊家而為世所指名則稱曰氏如晉韓氏趙氏之類當日崔宗强髙國惡之故赴告特曰放某氏于衛魯史亦順而書之耳亦非能舉族盡出之也如使舉族出之則當其入髙國見在何又聽其舉族復入乎約略是崔杼之祖父不必定其為何人也左氏以為崔杼考崔杼弒君去此凡五十一年則趙氏鵬飛駁之為是且既曰崔杼矣弒君之賊何足矜憫而于其出特書崔氏以明其非罪乎左氏泥于稱名不稱名之說故多此謬解家氏鉉翁曰春秋繼齊惠之死書崔氏出奔誅髙國也君肉未寒而逐君之黨併及其族惠死而齊人棄崔氏宣歿而魯人逐歸父皆志其無君不為崔氏與歸父書也似更得之十一年冬十月楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父于陳啖氏助曰若以納亂臣為有禮孰為非禮榖梁謂不言入外徵舒于陳案經文皆依先後次第而書耳何煩妄為異說徵舒弒君之賊其罪自顯何須外之凡稱日以隔文者以明先後其例甚多劉氏敞曰公羊以楚子稱人為貶非也此猶之蔡人殺陳他言人人之所得殺耳且外討弒君之罪有何不得乎榖梁言外徵舒于陳尤非也春秋係記事之書先殺而後入皆其實録豈紛紛然更易古事以便私意哉十五年六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸左六月癸卯晉荀林公羊潞何以稱子潞子榖梁滅國有三術中國案春秋所以書此者著晉之暴且譏其棄宋不救忘中國而事外夷逐利忘義為世戒爾至潞子之善何足褒哉其稱子爵自當子爾公羊泥于稱爵為褒之說榖梁専以日月生例遂以為賢而進之可笑殊甚本不足辨舉此以例其餘爾初稅畝霞峯華氏曰稅畝之說據左氏云縠出不過藉藉借也所借民力以耕之公田也公田藉民力以耕雖出榖以供上而非民田所出名曰藉不名曰稅故曰古者助而不稅然則稅者稅其私田也公羊云古者什一而藉什一者天下之中正也言什一而藉不言稅藉非稅也言什一者天下之中正則履畝而稅非什一也榖梁云非公之去公田而履畝什取一也去公田而履畝什取一則稅畝為稅其私田又斷可知也朱子所以取杜氏之說蓋據三𫝊之文合之孟子助而不稅之說為確而有徵矣案彚纂曰稅畝之說公榖皆以為稅而取一但廢古之助法爾杜氏預以為既取其公田又稅其私田什之一則為什而取二胡𫝊主公榖而朱子從杜氏霞峯華氏謂三𫝊本合一公榖云稅畝即稅其私田之什一公榖之說原不殊于什二之說也大快大快十六年成周宣榭火榭公作謝火公榖作災彚纂曰公羊以宣榭為宣宫之榭夫宣廟即或未毁何不在京師而在成周胡𫝊以廟制似榭故謂之榭亦非也爾雅所紀廟寢臺榭規模判然不同何得混而一之乎二𫝊又謂樂器存焉尤非也榭既無室何以藏樂器惟杜氏預以為講武屋而孔氏穎達引楚語以證之此為不易之論成周為周之東都吉日車攻咏宣王講武之盛則宣榭之為宣王無疑矣成公元年三月作丘甲胡氏寧白成公以前甸賦車一乘每乘七十二人甲士三人凡二十五人為一甲是四丘共出三甲爾今作丘甲即一丘出一甲其于賦增三分之一也杜征南最號知兵注此亦誤家氏鉉翁曰丘甲之說三𫝊不同公縠謂課丘民自為甲固未得經意杜氏謂使一丘出一甸之甲加四倍之斂亦不至若是之甚考周禮及司馬法四丘為甸共出甲士三人步卒七十二人今作丘甲云者每丘出一甲一甸出四甲而古兵制始壞于此矣張氏洽曰每一甲士統二十四人必無增甲士而不增步卒之理案如張氏之說則一丘之中平增二十五人一甸之中凡百人為兵矣趙氏鵬飛則謂止增甲士丘出甸之甲士三人而不增步卒之數蓋欲精悍多而冗卒少必于取勝明年鞍之戰果大敗齊師首增甲士亂先王之制故聖人書曰作譏作俑也如此說則甸出長轂四乘甲士十二人而步卒七十二人如故一甸之中止平增甲士九人其說甚創又古者兵制每乘七十二人蓋左右及後各二十四合成七十二之數今四分之每乘止得步卒十八人行陳步伍俱須改易未知有此理否姑存以備考黃氏仲炎曰丘出甸賦則什賦三四矣何至哀公時曰二吾猶不足曰魯為伐齊故作丘甲一時暴民非必以為常也惟初稅畝用田賦為常制爾秋王師敗績于茅戎公榖作貿戎家氏鉉翁曰榖梁為尊者諱敵不諱敗此義正矣但公榖皆以為晉敗王師則無是也啖子曰若晉敗王師而改曰貿戎是掩惡也如何懲勸乎方氏苞曰鄭伯敗王不書此何以書戎敗王師猶可言也諸侯敗王不可言也三年二月甲子新宫災三日哭家氏鉉翁曰公榖皆以為得禮惟常山劉氏以主未遷入不當哭書哭所以譏而胡𫝊從之愚竊以公穀之義為正也宣公之薨至是二十八月則主已入廟方入廟而遇災人子之痛切為甚成公可謂知所哀而哀矣焚先人之廬猶三日哭况廟為火所燬乎以為不合于禮大失聖人之旨案孫氏復曰三日哭哀則哀矣何所補也孫氏覺曰曷若無災而不哭之為愈也杜氏諤曰若以為禮則常事不書案春秋有合禮不書之說故諸儒多以為譏然所謂譏者一則謂宣公篡弒得國火焚其廟示有天道一則謂成公不謹于火備致有天災義俱可通若以新宫災為不當哭則大非矣六年二月辛巳立武宫啖子曰左𫝊之意以為武軍之宫如楚子所立者非也若然則煬宫復何謂乎劉氏敞曰丘明以武宫為武軍杜氏知其謬妄因護曰既立武軍又作先君武公之宫二說皆非是左氏欲解經以武宫為武軍杜氏欲解𫝊遂取武軍為武宫此難以通者也取鄟李氏亷曰鄟為微國左榖皆同公羊以為邾邑者非汪氏克寬謂春秋取人之地未有不繫國者茍以諱亟而不繫邾則僖公取須句訾婁可謂亟矣何以繫之邾耶八年夏宋公使公孫夀來納幣案東萊謂公孫以同族兄弟而為君納幣非逺嫌之道趙子亦謂若合禮則常事不書而劉氏敞則曰凡諸侯之大夫孰非公孫者昏禮稱父兄師友父兄猶稱之况公孫乎彚纂謂班馬以後皆以人之賢否繁殺其辭伯姬有賢行舊史特詳録之聖人因而不革書納幣書來媵書歸宋書致女辭繁而不殺皆緣末録本之意公羊以為録伯姬者得之胡𫝊以使卿納幣為越禮者非也秋七月天子使召伯來賜公命賜公榖作錫啖子曰二𫝊不知文之誤强穿鑿爾程氏端學曰啖說近是蓋天子天王雖同然春秋二百四十年之中天王之見經者三十有二惟此稱子爾故知誤也十二年夏公㑹晉侯衛侯于瑣澤故也趙子曰按此若實事則無不告諸侯之理經不應不書又曰㑹于瑣澤成故也按此㑹楚不與何以證其成乎故知並謬也劉氏敞曰瑣澤之㑹本以合楚鄭今楚鄭不至魯衛自盟何耶且合晉楚者宋宋亦不與又何耶凡晉楚為平則應大合諸侯以申成好今三國㑹而已又何耶然則𫝊之言未足信也彚纂云西門之盟左氏備載其事而不見于經趙氏匡遂以為左氏附㑹劉氏敞亦謂𫝊未可信然若果無此盟則郤至與公子罷交相往來何以歷歷如繪耶蓋晉楚為成春秋惡之故聖人削而不書耳案彚纂之言非也晉楚為成春秋所惡正當特書其事以示戒無為削之以諱其惡且此而可削何不併宋與虢之㑹削之學者寧信經而疑𫝊可也十四年秋叔孫僑如如齊逆女九月僑如以夫人婦黃氏仲炎曰春秋內大夫或稱族或舍族者以前後一事故後從省文爾豈復有意義其間哉左氏之說妄也彚纂曰先儒皆謂諸侯當親迎程子獨辨之以為親迎者迎于所館未有委宗廟社稷而逺適他國以逆婦者其說是也此條榖梁以為譏不親迎而胡氏從之又謂或迎于其國或迎于境上終似未有定見既曰迎于境上則未入境之先安得不以大夫迎之乎故當從程子十五年三月乙巳仲嬰齊卒劉氏敞曰榖梁謂子由父疏不得稱公孫則歸父何故稱公孫乎賀氏仲軾曰魯人立後重在仲遂不重在歸父謂魯人為歸父立後是閔歸父也季孫與仲遂同為逆原無惡于仲遂直因歸父欲去三桓故季孫怒而逐之安有為立後之理此亦事情之易見者蓋是時魯有兩嬰齊一為叔肸子一則仲嬰齊皆公孫也皆見于經如俱稱公孫則此卒者知為何嬰齊耶且以公族言則皆公孫以親踈言則仲遂為莊公之子叔肸為文公之子世次亦既有辨則仲嬰齊從君賜稱氏而叔嬰齊稱公孫亦情理所安宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚趙子云按經文云奔晉又云自晉歸于宋眀白可據𫝊乃云魚石自止華元于河上請討許之乃反顯與經背且魚石自請討山則是處無過之地何用復奔楚即令為與蕩氏同族慚而自去則是知恥之人後不應却入彭城為亂又云華元自止魚石按國亂用兵相攻是仇敵也如何自止之乎考之事理無非乖謬魚石直與蕩山同惡爾案經文則華元眀借晉力以討亂故元歸而山誅魚石出奔公羊注所云無可疑者二人蓋同惡相濟魚石更挾楚以叛釀成大禍故五大夫出奔而經獨書魚石為首惡如此安有請討山之事左氏之說妄爾且華元懼桓氏族大欲藉晉力以討此亦如石碏借陳力以除州吁亦何所不可而必穿鑿其說乎諸儒多以𫝊事强合經文謂華元本意欲求晉討彊臣以張公室既而為魚石所止遂討蕩山與晉討無異故春秋成其志而書曰自晉歸于宋如此則春秋紀事不以實也劉氏敞更謂華元內有魚石之援則不待挾晉為重以求入蘇子由謂鄭子産為政豐卷徵役將叛子産奔晉子皮止之歸而逐卷其事相類夫子皮忠臣魚石亂賊何可比例就使魚石果有止華元之事而華元為魚石止何足榮從晉而入何足病而必舍彼取此乎皆由信𫝊不信經之過也又案積齊或問山不氏左氏以為背其族何氏以為譖華元固不足信孫氏以為大夫之未命石氏又疑其脫竊意大夫三命者氏再命者族孫氏之說為近之木訥則謂聖人奪其族以示罪愚嘗折衷其說大夫未命不稱氏此只可論于隱桓之世齊桓以後列國皆命大夫無不稱氏况魚蕩向鱗皆桓族豈有三族皆稱氏而蕩獨未命不氏者木訥之說即杜氏之說杜氏以還害公室發明左氏背族之義甚明顯蓋擅殺命卿紊亂國典乃必誅不赦之賊不止背族與譖華元而已左氏失之晦何氏失之小木訥直斥為亂臣較杜氏更的當當以聖人削去之說為正冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離劉氏敞曰公榖俱云外吳非也一地而再言㑹者明一㑹爾趙氏鵬飛曰齊之盟盂之㑹春秋未嘗外楚此何獨外吳說者又謂尊吳故殊㑹與首止文同聖人豈以吳比王世子哉襄五年戚之㑹吳人在焉而不殊㑹蓋戚為衛地晉侯合諸侯于戚而吳以人來㑹故文不殊鍾離柤向皆近吳晉合諸侯往㑹之故曰㑹以㑹事殊文異其義甚顯無庸曲說十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績李氏亷曰公羊以晦為晝冥以上文丙寅朔考之則甲午正二十九日榖梁是也王氏樵曰楚子敗績不言師君重于師也泓之戰宋公傷股而不書宋公敗者泓之師亦大敗而鄢陵楚師未至大敗也十七年十一月公至自伐鄭壬申公孫嬰齊卒于貍脤脤公作軫榖作蜃陸氏淳曰榖梁謂致君而後録臣案春秋係編年月之書一例以先後書之且先言卿卒後言公至皆實事何傷教乎二𫝊總不達其文謬誤之理遂妄說爾劉氏敞曰待君命然後卒大夫公羊之說非也公既已許之則成大夫矣先公未至卒之何傷乎假令國人一時未知公命公至告之乃追録其卒亦宜追録在致公之前不宜移其日于公至之後也又公孫敖卒于齊彼不待公命何為卒之哉案此係春秋經文之錯簡詳見闕文表十八年春王正月晉殺其大夫胥童庚申晉弒其君州蒲彚纂曰稱國以弒榖梁以為君惡甚胡𫝊以為略之諸儒多主其說謂君為一國所共疾則與衆弒之所以分其惡于衆夫春秋以立臣子之防豈有為亂賊分惡者哉且即以晉論靈與厲相去不逺而靈則書盾厲則稱國何也蓋穿弒靈公時則有董狐之直筆趙盾遂受惡而不辭今書弒厲公史筆未必如董狐書亦未必受惡其赴告于列國必有所以諉其罪者魯之舊史從其所赴而書之矣春秋不與其諉也故書曰晉弒其君使天下後世考其被弒之實而真凶不得以漏網此聖人之特筆也案榖梁之說謬矣朱子謂晉字下應有弒君賊名亦未審當日之情勢也蓋春秋之經因舊史舊史之文從赴告里克殺卓子而立惠公惠公旋殺里克則以弒赴於諸侯曰里克弒其君卓及其大夫荀息本國既以弒赴魯史得有所據而書之矣若悼公當日未能誅欒書也既未能正書之罪則其赴告自必含糊其辭或稱衆弒或諉于他人弒俱未可知赴告既無欒書名氏魯史何從指實魯史向無指名春秋何從增造為書偃未减者固非謂春秋宜目書偃者則聖人不能違魯史而自定刑書也不然聖人豈嚴于里克而獨寬于書偃哉襄公元年仲孫蔑㑹晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城趙子曰按此乃是夫子裁其邪正不得不如此立文何關不登叛人與成宋志哉公羊曰不與楚専封此是楚取彭城令魚石守之耳豈名封國乎榖梁曰不與魚石正也與叛臣豈疑其為正哉意不應如此二年冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢趙氏匡曰公羊謂不書取諱也案夫子增損經文以示義覩文見義何諱之為劉氏敞曰榖梁云內鄭非也鄭不服晉諸侯伐之可謂外之矣反謂內之乎彚纂曰此舉扼楚制鄭實關天下之大計故不書城鄭虎牢况此時晉已取之非復鄭之所有自不得仍繫之于鄭也胡𫝊責鄭不能守恐于經旨未合春秋內晉外楚豈欲鄭守險以拒晉乎霞峯華氏曰城虎牢不繫鄭孔疏云大都以名通者不係國從史文也文定謂責鄭之不能有案虎牢係東虢舊封鄭奪而取之原非鄭所當有也聖人不責鄭之有虎牢而反責鄭之不能守虎牢决不然矣然則十年冬戍鄭虎牢何以繫鄭曰下書楚公子貞帥師救鄭則上不得不書戍鄭矣非後係之鄭為責晉之不當據前不係鄭為責鄭之不能有也說春秋者好以一字為穿鑿類如此五年叔孫豹鄫世子巫如晉案左𫝊謂莒實滅鄫公羊謂鄫取後乎莒與榖梁說同此𫝊乃其張本也詳見六年莒人滅鄫下冬戍陳趙子曰左氏云冬諸侯戍陳案經文無諸侯字奈何妄云諸侯乎公羊云離至不可得而序縱離至不得列序但云諸侯戍陳于理何傷若諸侯戍之如此為文即魯自戍之而將卑師少又如何立文乎且如諸侯盡戍之則兵力盛矣何得下文更為㑹以救之按僖十三年冬諸侯㑹于鹹明年城緣陵云諸侯此無諸侯字魯自戍之耳義亦昭然案趙子之說亦甚辨與榖梁說同然經文與僖二年城楚丘同義楚丘决非魯一國所能獨城也則左公羊之說更為得之且此時楚方爭陳合諸侯力且不足魯豈能獨力往戍晉亦無使魯人獨往之理趙子殆亦泥于經文而未審當日之大勢也六年秋莒人滅鄫趙子云公榖之意蓋因昭四年經云取鄫以為若今實滅之不應復書取所以云立異姓也按莒今滅鄫以為附庸後魯取得之何妨書取鄫乎且定六年鄭滅許哀元年許復見于經則鄫之滅而再見亦何足怪若鄫人實取外孫為國嗣罪自在鄫非莒之過則經文又當如梁亡之穎而書鄫亡不得言莒滅且以人情物理言之鄫雖小國亦有君臣社稷豈肯居然取于異姓為後案其事情莒人以兵破鄫立其子使守之而為附庸其子又鄫之外甥令奉鄫祀神不歆非類是使鄫絶祀又事須書滅耳公榖但𫝊得立鄫甥守祀故書曰滅而不究事實遂誤為立𫝊耳霞峯華氏曰此條文定取公榖之說案左氏前後𫝊莒人滅鄫及魯取鄫之始末情事瞭然各有來歷若公榖之說不知何據夫鄫取莒公子為後罪在鄫不在莒與黃歇吕不韋之事不同何也謀不自莒出也聖人不正鄫之罪以為寵愛妾立異姓以亡宗祀之戒而顧以滅鄫之罪加之未嘗與謀之莒用法可謂不平矣夫舍明白可據之左𫝊得一新竒可喜之說而附㑹之儒者之好異往往如此蓋不獨滅鄫一事然也案滅鄫斷宜從左𫝊而趙子所論公榖誤𫝊之因亦極有理當並存之七年冬鄭伯髠頑如㑹未見諸侯丙戌卒于鄵髠頑公榖作髡原鄵公榖作操劉氏敞曰此弒也曷為不言其弒以卒赴也以卒赴曷為遂書之遍絶其臣子也君弒臣不討賊命之曰非臣親弒子不復讐命之曰非子鄭非無臣子也君子即其所以赴于諸侯而遂書之見鄭之無臣子也案公榖之論極謬欲為中國諱惡而先為亂賊免罪既以中國之君見弒于夷狄之民為可惡反寬其罪而書卒使免於見討其為亂賊計何甚便乎而文定乃以為精論得聖人之旨此不可解至趙氏匡信經疑𫝊而諸儒多從之謂此與宋公佐卒于曲棘許男卒于師同則又非也趙氏之言曰若實弒而以卒赴便從而書之諸國弒君豈有實告者愚謂弒君而以實赴者或由當國之大臣明正其罪或秉筆之太史以死力爭不則弒賊先以僞赴而後之立君更誅之更以弒告魯史從而改正若舉國通同欺隱魯史何從訪聞得實遽正其罪乎若正其為弒便當興討賊之師未有寂然一無舉動而憑空加以弒君之名者也魯史既從赴書之夫子更何所據以改正乎今使後世有殺人者亦必因親戚之控告鄰里之舉首而後有司加訊鞠焉得其實而後可令抵罪若使全無舉發有司亦不能因道路之言而遽殺之也春秋弒君之赴告何以異是劉原父謂從赴書卒以見鄭無臣子斯言為斷不可易也九年春宋災災公作火彚纂曰此條當以杜氏預之說為正公榖以為外災不書非也至謂宋為王者之後孔子之先故書其災則鑿矣昭十八年衛陳鄭與宋同日災果如公榖之言春秋獨書宋可也何以合四國備書之乎冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲啖子曰十月十二月蓋誤重說也古史或有用周正者或有用夏正者故有兩月不同蓋作𫝊者承二國之舊史月數不同遂兩載之案啖氏與杜注說各不同亦各有義理然終不如杜注之精細從杜可也十年戍鄭虎牢楚公子貞帥師救鄭彚纂曰胡𫝊謂虎牢繫鄭為罪諸侯非也既城虎牢而不戍何貴乎城戍之所以庇鄭而抗楚三駕之績實本于此何罪之有又謂春秋許楚之救鄭尤非也此年書楚救鄭與僖二十八年書楚救衛義同蓋以見晉霸方興而楚不能爭耳案下書楚公子貞救鄭則上文自不得不書戍鄭以見救之之由文法當如此無他義也一切謂罪諸侯與善晉又謂棄鄭皆為曲說十一年春王正月作三軍趙氏匡曰魯卿素已有四五不止三也公羊此說適足令學者疑謬爾榖梁曰諸侯一軍案國有小大軍制當異而但云一軍無等差之異必無此理况魯初封時最為大國非一軍明矣李氏亷曰杜以為魯舊二軍今增立中軍為三軍胡氏以為魯本有三軍今不過廢公室之三軍而三家各有其一故謂之作其說小異然疏又曰魯初封時必有三軍後以軍多貢重故自減為二非是魯衆不滿三軍也若如此說亦無礙十四年春王正月季孫宿叔老㑹晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向劉氏敞曰左𫝊所載皆不實諸侯解體非此戎之過范宣子寧不知何以誣之哉去年搜于綿上𫝊曰諸侯遂睦到此一年爾何故遽有言語漏泄不如昔者之事又曰宣子使即事于㑹以成愷悌然則是諸戎列于㑹矣經又何以不序乎十五年劉夏逆王后于齊趙氏匡曰若實有單靖公逆王后經不應不書故知左氏妄也公榖皆曰過我亦非也豈有天子取后將為天下母而得云外逆女不書乎明是劉夏非卿使逆后為非禮乃書以示譏爾若使卿逆即常事不書矣所謂外逆女不書者謂諸侯于外國娶雖非禮亦不書案几出聘鄰國正與介兼行者單舉正若實有單靖公經何為略而不書而單舉劉夏乎况左𫝊亦自相抵牾既云從單靖公則靖公在行矣又何得云卿不行十六年三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于湨梁戊寅大夫盟趙氏匡曰平公父卒至此才五月豈有便行宴樂歌舞之理又云髙厚逃歸案若已在㑹而逃歸渝盟經文不合不書僖五年㑹首止鄭伯逃歸不盟襄七年㑹于鄬陳侯逃歸並書以明其罪何得獨此不書則知左氏此𫝊皆不足憑信也朱子曰諸侯出㑹而大夫自盟這箇自是差異不好案左傳及杜注孔疏皆曲為晉解釋云非大夫之專與公榖異彚纂亦兩存其說云揆之情事亦合然聖經于叙列諸侯下特著大夫盟三字不是無意自後平公失霸列國之大夫擅權皆自此唘則公榖之說精矣合之趙子之論則左氏尤不必泥也十九年晉士丐帥師侵齊至榖聞齊侯卒乃還陸氏淳曰榖梁云丐宜墠帷而歸命于介案不伐喪常禮也更待君命是詐讓小善非人臣盡忠之道劉氏敞曰榖梁謂還者事未畢以為貶士丐如公子遂至黃乃復公孫敖如周不至而復復者榖梁所謂事畢也然則春秋反不貶遂與敖乎朱子曰春秋分明處只是晉士丐侵齊至榖聞齊侯卒乃還這分明是與他黃氏仲炎曰後世若隋髙熲將兵伐陳㑹陳有喪必請于文帝奉詔而後班師庶幾春秋之義榖梁之說得之公羊云進退在大夫謬矣案黃氏泥于春秋合禮不書之義故每事皆從貶削如召陵城濮蕭魚皆多加責備未必合春秋之旨如此條尤顯與朱子異然亦可備一說二十三年八月叔孫豹帥師救晉次于雍榆彚纂曰救而書次遲回觀望非能救者也春秋譏之左氏以為禮公羊以為先通君命皆誤矣二十九年春王正月公在楚陳氏嶽曰如晉而不朝正者故不書如楚不朝正者非常也故書髙氏閌曰公不奔天王之喪而以俟楚子之葬久留於楚逮夏乃歸故聖人特于朝正之時書公所在與昭公失國在乾侯同金氏賢曰公羊曰存君榖梁曰閔公愚謂亦罪公也公在位三十年未聞有在京師者故曰亦罪公也吳子使札來聘程氏端學曰吳子使札來聘三𫝊賢之而胡𫝊及張氏諸儒以不稱公子為貶夫札以名見而不書氏與楚椒秦術等耳于褒貶兩無所取也且札讓國致亂在三十年之後孔子安得預去公子而貶之乎春秋即此事而論其曲直可矣未嘗因此而論他事之善惡也彚纂曰吳能以禮來聘春秋書子以進之札以名書當以杜注孔疏為正非褒貶之所係也公羊以札能讓國而賢之榖梁以吳能使賢而善之皆非經㫖至胡𫝊謂札以讓國階禍聖人特書名以示貶則鑿之甚矣三十年晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故劉氏敞曰左氏云罪失信非也失信者如清丘之盟直貶其人而已今獨舉其事又貶其人非特惡失信而已公羊云此大事卿不得憂諸侯夫諸侯相聚而更宋之所喪何大事之有大夫受君命以出即是諸侯耳何用必其非諸侯之命乎榖梁云善之亦非也一國失火自焚其財諸侯何至羣聚而謀之以此為善是春秋貴小惠而不貴道也朱子曰程子所謂春秋大義數十如成宋亂宋災故之類乃是聖人直著誅貶案劉氏原父駁三𫝊之說精矣然榖梁之尤舛者尤在善弭兵之策謂中國無侵伐八年是晉趙武之力此乃大謬夫釋蔡般弒君之賊不誅而沾沾於歸宋財使曰後楚䖍得借討亂為名而烹滅陳蔡此最害事然所以為此者亦由泥于弭兵之說謂蔡屬楚無用亟動干戈以渝盟第行小惠如承平故事此趙武之昧于理暗於事機謀國之最不善者何反善之乎春秋大事表卷四十二之三欽定四庫全書春秋大事表卷四十二之四國子監司業顧棟髙撰昭公二年冬公如晉至河乃復季孫宿如晉劉氏敞曰穀梁云著有疾非也但云至河乃復安知有疾乎李氏亷曰案左氏晉之辭公未為失春秋止罪公之輕動耳若胡𫝊無乃成少姜之為適乎又聞義不徙而强為非禮之行亦非也王氏錫爵曰失在公不能守正而妄動至季孫宿如晉蓋公既返而猶有所未盡於心故遣宿將命以終其事此理之易見者公榖之說反使經意晦而不明恐皆非也彚纂曰據事直書而公動不以禮自取其辱可知矣公羊以為不敢進釋公羊者以為晉將執公不亦謬乎是時魯晉方睦公即位踰年未聞獲罪於晉而晉欲執公何耶四年秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之彚纂曰慶封弒君之賊法所當討故書執書殺明其罪之可誅楚圍身為弒逆懷惡而討故不書楚子所以别於殺徵舒至公榖以為不與吳専封則失之矣既書伐吳則慶封所受之邑亦何必更言伐乎九月取鄫劉氏敞曰公羊云諱滅非也莒已滅鄫矣此又能重滅之乎公羊本謂鄫未滅故因而為之辭耳五年春王正月舍中軍汪氏克寬曰季氏以國民四分之而已取其半非獨欲弱公室亦欲乘叔孫婼之未定其位弱叔仲二家而强已公羊以為復古榖梁以為復正皆非也荀悅云春秋之義舍中軍則善之皆惑于公榖之說七年春王正月暨齊平家氏鉉翁曰左傳謂燕暨齊平穀梁以為魯暨齊平當從穀梁詳見杜注正訛表八年秋搜于紅李氏亷曰搜狩合禮者常事不書非時非地及越禮則書之穀梁以秋搜為正公羊以為以罕書者皆非也案春秋凡單書時者皆指首月此之秋蓋七月也周之秋七月夏之五月未當行搜之時穀梁以為正蓋穀梁主用夏時此亦其一證也葬陳哀公彚纂曰趙氏謂袁克非大臣何能辦葬死君又何能告諸侯使會葬黎氏謂陳為楚師所據魯豈于其葬而使臣往㑹之蓋楚靈滅陳而葬其故君以示恩猶齊襄之滅紀而葬紀伯姬耳至滅陳之後諸侯震恐故下文九年春魯使叔弓㑹楚子于陳以致其敬豈有未加敬于楚之前反先使人㑹葬陳君之理蓋常例必往㑹葬而後書獨此役以變例得書是亦所謂存陳之意而已矣案存陳之說亦未是愚另冇論附凶禮表後先母舅曰楚之葬也蒙上文言耳據左氏則陳袁克葬之魯决不敢往㑹胡以得書于經九年夏四月陳災公穀作火劉氏敞曰何休謂陳為天所存非也此是聖人欲存之故録耳安知天意髙氏閌曰如弼鄘二國既為衛所并聖人還存弼鄘之風亦不與衛人并諸侯而存天子之建國也朱子曰漢建安二十五年之初漢尚未亡通鑑便作魏黃初元年奪漢太速與魏太遽大非春秋存陳之意彚纂曰公榖皆以為存陳謂不與楚之滅陳是矣但公羊又謂執人之罪人云云則似楚之滅陳不失為仗義之師殊非經㫖案胡康侯謂楚已滅陳必不遣使告于諸侯言亡國之有天災也蓋當日叔弓㑹楚子于陳目擊其事歸語陳災魯史遂書之耳趙氏木訥則謂楚嫌天災之在楚而以陳赴聖人亦因其名而存陳案外災非赴不書木訥之說似更有理十一年冬十有一月丁酉楚師滅蔡執蔡世子有以歸劉氏敞曰公羊謂不君靈公不成其子豫謂不成其子而稱世子義與文反又曰用之築防此直似兒戲家氏鉉翁曰蔡有嬰城固守國亡身死特存其世子之名録其為宗社死也十三年夏四月楚公子比自晉歸于楚弒其君䖍於乾溪汪氏克寬曰弒逆天惡聖人不以妄加於人豈以無惡而稱弒乎公羊之說非也榖梁云不日比不弒里克商人陳乞之弒皆不日豈皆不弒乎棄疾脅比而君之與隋司馬德戡裴䖍通之于宇文化及相類雖化及聞謀變色流汗迎入朝堂戰栗不能言而綱目書化及弒其君且不以煬帝為弒君父之賊而末減也其得春秋書楚比之意矣蔡侯廬歸於蔡陳侯吳歸于陳陸氏淳曰公羊曰不與専封此本是列國今不過復其所爾何名専封榖梁曰不與楚滅今方記興復何關滅事責其滅時乎汪氏克寬曰不言自楚歸若二國之自能興復焉爾十九年夏五月戊辰許世子止弒其君買冬葬許悼公萬氏孝恭曰許止之事雖若可恕萬一後世臣子幸君父之疾進藥以斃之而自託于不知嘗藥之義是啓之為亂源也案三𫝊皆謂止非弒歐陽公謂止實非弒聖人不必妄加之名趙氏木訥力主其說愚考左氏𫝊及杜注孔疏止之罪狀已昭然歐陽公非刻論也另有論附亂賊表後黃氏仲炎亦曰如三𫝊之說則罪疑惟重非聖人忠厚之意蓋止進藥而藥殺與漢霍顯之行毒許后相似茍以不嘗藥而掩蓋其情則亂臣賊子皆得借是以逃罪矣二十年夏曹公孫㑹自鄸出奔宋鄸榖作夢陸氏淳曰榖梁云善㑹之不以邑叛夫臣不叛君常事爾豈有可褒之理其稱公孫蓋即王命之卿但以國小之故不能自崇樹其大夫請命于王者少惟此與成二年公子首凡二人耳其他無事不見於經不得謂之無大夫也言自鄸者緣先據以叛今力屈而奔與魚石自宋南里奔宋公之弟辰自蕭來奔義正同叛時不書不告耳公羊曰為賢者之後諱然則賢者之後便得恣其不臣乎此說尤鄙王氏樵曰公羊猶曰諱胡氏直謂其待放而後出奔得去國之禮而賢之又曰待放出奔臣子常禮免於貶足矣而何以賢之為公子喜時之後賢之也視公羊尤迂曲矣案公羊之說陸氏辨疑劉氏權衡俱駁之其理易明而胡傅仍其說而加甚至謂後世有乞録用賢者之後公臣之世蓋得春秋之㫖何見之頗哉黃氏仲炎曰自鄸出奔宋者蓋自其國都出止于鄸又自鄸而奔宋故春秋以自鄸書爾春秋叛則書叛奔則書奔未有奔而可誣為叛叛而可諱為奔者使叛而可諱周公當先為管叔諱之案公榖二家之說正相反一則曰叛一則曰力足以叛而不叛愚謂春秋止紀一奔大夫爾其曰自鄸者猶鄭詹自齊逃來春秋無叛文何從知其叛更何從知其力足以叛而不叛也陸氏淳比之魚石宋辰亦似硬坐此二人叛迹顯有可據烏得以自之一字偶同遂加以叛逆之罪乎文定據榖梁善之之說至謂待放出奔得去國之禮尤屬無據大抵諸儒泥於一字遂至褒貶如此相逺竊以黃氏之說為近之公榖及陸氏皆不免于鑿也二十一年冬蔡侯朱出奔楚案此係闕誤朱即東字之訛而又脫一國字耳當從榖梁說但其云貶去半名則非也餘詳見闕文表二十二年劉子單子以王猛居於皇劉氏敞曰公羊云當國非也王猛乃王矣未逾年不可稱天王又不可以諸侯例稱子何則獨言子則似魯之子冠王于子則又與他王子相亂故稱王繫猛耳榖梁曰王猛嫌非也若王猛嫌豈得云居乎嚴氏啓隆曰劉單以者言猛不能自立出入皆劉單之功非聖人貶之也胡𫝊泥于以之一字曰挾天子令諸侯而専國柄功罪倒置矣彚纂曰凡書以者美惡存乎其事非皆貶也單劉之以猛為正尹召之以朝則罪矣諸儒說皆謬秋劉子單子以王猛入于王城王城劉氏敞曰公羊曰篡辭非也必若以入為篡下有天王入於成周亦可云篡乎榖梁云內不受非也必以入為內弗受則天王入於成周亦弗受乎家氏鉉翁曰劉單守正者也春秋書以其所當以也冬十月王子猛卒劉氏敞曰公羊之說非也向言王猛者以文不可繫子今言王子者死當以子禮治之明是乃王之子也言卒者未踰年之君猶子赤子般皆言卒也榖梁曰失嫌亦非也猛未踰年不可言崩又不可言薨是以通言卒耳何嫌之失李氏亷曰公榖皆以子猛為篡故書卒義不可從髙氏攀龍曰前稱王猛此何以復稱王子猛於其卒從其恆稱義不在焉不沒其實而已髙紫超氏曰太子立未踰年不宜稱王春秋書王猛者為王子朝而起變例耳故于其居王城也書王而于其卒也仍書王子從其本也二十三年晉人圍郊趙氏匡曰案此實非伐天子也若實伐周豈為其掩惡哉戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞彚纂曰公羊謂此為偏戰而經以詐戰之辭書之非也蓋泥于日月之例而為此言耳榖梁謂言敗以釋其滅亦非也亦有師敗而君不滅者豈必言敗以釋其滅乎是役楚為戎首先儒皆以為楚師未與吳接故止書六國然𫝊稱楚師大奔則經亦當書敗楚聖人所以略楚不書者不與六國之從楚也二十四年叔孫舍至自晉左榖無叔孫字舍左作婼啖氏助曰左𫝊載叔孫婼欲殺晉士彌牟云云按叔孫忠賢以身體國豈肯殺彊國之大夫以賈禍而纍國乎案舍至書氏公羊與左榖不同胡𫝊獨取公羊而公羊又無𫝊疏者以為意如有罪故去氏叔孫賢故無貶胡氏蓋用劉原父因其可褒而褒之之意彚纂亦並存其說愚謂三𫝊皆不足憑也蓋去氏與不去氏三𫝊所𫝊授異爾由脫簡與不脫簡之分實非義所存叔孫雖賢不必以不去氏賢之至左氏以舍族為尊晉尤為無理春秋只據實而書以志魯之衰弱與晉霸之不綱爾豈以去氏與不去為叔孫一人之褒貶哉東萊吕氏謂原父能知他人之鑿而不自知其鑿蓋說經之通病也夫二十五年秋七月上辛大雩季辛又雩啖氏助曰案雩但禮官與女巫而已何足以攻季氏乎劉氏敞曰若七月聚衆則何至九月公乃出奔乎三十一年黑肱以濫來奔肱公作弓李氏亷曰此條大例本只與庶其牟夷書法同左氏得之但左氏于齊豹書盜之說先儒多不取汪氏克寬曰二𫝊皆云邾黑肱而經文不繫邾者闕文耳或以為通濫為國或以為别乎邾皆妄說也齊楚大國且未嘗分其地以封子弟况蕞爾之邾乎或曰又謂濫乃天子之地而黑肱乃天子之命吏此尤穿鑿之臆說夫王吏守土則得自専其地矣何為奔于諸侯耶彚纂曰叔術以弟妻嫂亂人倫也天子誅顔而叔術為顔報讎犯王命也其得罪于春秋大矣公羊乃以為賢不亦謬乎三十二年春王正月公在乾侯取闞孔氏穎達曰案𫝊定元年將葬昭公季孫使役如闞公氏將溝焉則闞是魯公葬地非是邾邑趙氏鵬飛曰三年之間嵗首皆書公在乾侯存公且誅季氏之不臣也而左氏每嵗各為之說鑿矣西亭辨疑曰公榖欲發定無正之義乃分春王二字為一節胡氏因之致使經義反晦定公即位于六月戊辰此時位尚未定春秋豈可預責其罪耶蓋是年正二月無事三月適有執仲幾事故書之其義責晉非責魯二節合看自明霞峰華氏曰定公即位于六月之戊辰則正月非定公之正月無緣削正月以見其無正經本以春王三月為句公穀自析而二之何與聖人事耶夫昭公薨于乾侯越明年六月而定公即位魯曠年無君統紀幾絶春秋備書于冊而魯君臣之罪著矣安用小巧穿鑿為哉三月晉人執宋仲幾于京師啖氏助曰前年冬十一月城成周左氏云㑹于狄泉此年正月又言合諸侯之大夫于狄泉一本用夏正一本用周正以此重叠致誤也據前已言魏子南面衛彪傒譏之此又重言與前不異故知必重也李氏亷曰此以事言之則以王事討有罪以義言之則大夫専執人于王側而不歸諸王吏故春秋亦不與以霸討榖梁胡氏是矣公羊以為大夫不得専執則是以于京師為霸討則非九月大雩啖氏助曰雩者以祈雨也若待毛澤盡人力竭雖雨何益哉榖梁以日月為例故有此分别爾又大雩凡山林川澤能興雲兩者皆祈焉不必専于上公也二年夏五月壬辰雉門及兩觀災趙氏匡曰此是雉門延及兩觀義理分明據實成文耳公榖乃曰自兩觀始違經妄說殊可怪也杜氏諤曰魯以周公之故立雉門兩觀僭天子也凡春秋譏魯之僭禮必因事而托義若雉門兩觀不災則不可得而録之今災及而書實譏其僭也四年劉卷卒家氏鉉翁曰劉子擁立二君卒安宗社二百四十年周家大臣未有其比故特書其卒葬彚纂曰召陵之盟劉子與焉故其卒也來赴于魯而魯史書之耳公羊以為我主之榖梁以為為諸侯主皆不可從十一月庚辰吳入郢趙氏匡曰楚君尋反國國不絶祀故不言滅榖梁妄為義說爾又云吳不稱子不正其乘人之敗而深為利則凡諸入者悉是乘人敗何不總狄之乎王氏樵曰公榖以前之稱子為褒後之不稱子為貶皆非也吳之為吳自若也以其師而敗楚者蔡人之憤利其有而入郢者吳人之志春秋前之稱子非進而褒之既書蔡侯之以則其立文不得不然耳後書吳入郢亦正為依實而書諸儒泥于一字見褒貶之說故忽而豫吳忽而貶吳而于聖人伸蔡侯傷中國之微意則莫能發也五年夏歸粟于蔡案公榖以為諸侯歸粟杜注以為魯歸粟二說不同彚纂並存之要之非義所存但左以為周急榖梁以歸粟為正似以此條為春秋褒辭則非也蔡自二百年來被楚之害亦屢矣前年棄疾圍蔡嬰城八月力屈被執何不以此時歸粟而歸粟于破楚入郢之後乎特書之而聖人之情見矣方氏苞曰魯獨歸之粟也歸粟必壤地相近水道可通魯歸蔡粟以淮也告糴于齊以濟也秦輸晉粟以河也若齊晉宋衛則但能歸蔡財安能輸之粟哉知與戌陳義異者戍非一國所能任八年冬從祀先公胡𫝊蜀人馮山曰昭公至是始得從祀于太廟其說是也季氏絶昭公兆域此時尚未得從昭穆而祔祭及陽虎欲殺季孫托于正以售其不正始以昭公之主從祀太廟蓋欲取媚于國人汪氏克寬曰昭公之葬稱諡疑已祔祭祖廟而從祀不稱昭公與禘于莊公書法不侔則當以三𫝊為是諸儒如髙氏閌薛氏季宣俱兩用之而彚纂亦並存四𫝊之說迄無一定愚謂胡氏之說非也蓋以從祀為袝祀係後世之俗稱如從祀孔廟及功臣從祀帝王廟之類春秋時文法未必有此也且果係昭公此時入廟則當大書特書以明著季氏之不臣及從前舉朝臣子莫肯面折廷諍之罪何為反隱昭公不言是欲為誰諱乎三𫝊之說必有所據無容另出新意為也荆南馬氏曰昭閔僖皆有諡安得統謂之先公据左氏順祀先公而祈馬蓋自逺及近而遍于羣公也盜竊寶玉大弓九年夏四月得寶玉大弓趙氏匡曰左氏凡獲器用曰得得者對失之辭若器必言得郜大鼎何以云取乎榖梁曰不地羞也案緣未出境而得故但以得為名且書以竊猶不羞書地有何羞乎髙氏閌曰書得寶玉大弓以見器之空還而不獲盜者以正典刑則亦幸而得之爾十三年秋晉趙鞅入于晉陽以叛冬晉趙鞅歸于晉髙氏閌曰先儒以歸為善辭遂謂鞅有叛迹而無叛心春秋先正其罪以厲臣節此許其歸以廣君恩是大不然人臣無君命輒據土興兵此豈可赦况衛孫林父亦書歸何善之有彚纂曰人臣之罪莫大于叛春秋所必誅趙鞅専地而結韓魏以脅其君復入于晉聖人書之所以譏晉侯之失刑而三卿分晉之禍實始于此公榖不察謂趙鞅以地正國陸氏淳遂云非叛君孫氏復云此王法所赦劉氏敞云其忠義足恃謬妄相承不可以訓案公羊謂趙鞅逐君側之惡人榖梁云許悔過范寧謂驅惡以安君側故于其釋兵言歸皆謬也据左氏趙鞅因誅殺不辜致與范中行為難范中行非有罪也特不當擅伐趙氏耳非君側之惡人與君父為難者也旋結韓魏脅君求入春秋書秋叛冬歸此與唐世牙將殺節度使即授之節度使相似著晉之無政刑也公榖以歸為赦辭諸儒相因至原父更謂其忠義足恃與經㫖大反矣哀公二年晉趙鞅帥師納衛世子蒯聵于戚三年春齊國夏衛石曼姑帥師圍戚程子曰為輒計者委于所可立使不失君之社稷而以身從父則義矣公榖王父命之說非是彚纂曰公羊以輒為可立胡𫝊辨之以為輒未受靈公之命二說皆非也即使受靈公之命便可拒蒯聵而不容其入乎又謂輒辭位避父則衛之臣子當拒蒯聵而輔之尤為悖理輔其子而拒其父天下豈有無父之國哉案衛輒拒父齊助其子以拒其父直書之而罪自見矣公羊謂為霸討謬極榖梁謂子不圍父極是但以齊先之遂得免于圍父之愆乎又何迂拙乃爾四年春盜殺蔡侯申殺公榖作弒案公羊以盜為罪人疑無據榖梁之說尤無理疏外弒者而反為寬其罪尊內其君而反為佚其賊何見疏者之幸而見尊者之不幸也至胡傳謂蔡侯背楚誑吳謀國不臧夫人得而害之故變文書盜翩弒君而略其名氏姓與霍皆翩之黨稱國以殺而不去其官此尤背理之甚君即無道臣不可以行弒况蔡侯將如吳諸大夫直恐其又遷非大惡也胡𫝊乃于君父求備為亂賊出脫如此則春秋為助亂之書矣豈可訓乎孫氏復謂責蔡之臣子不能距難家氏鉉翁謂亂黨衆不容悉書則得之矣互見刑賞表又案公孫翩非賤者况當日既已殺翩則罪人已得又何不書蔡公孫翩弒其君乎曰盜者不可得而指名之辭方氏苞曰書曰盜不知賊之在也若係公孫翩則直書其人可矣無為以盜書也惟不知賊之在故辰以懼罪而奔姓霍以見疑而殺也五年閏月葬齊景公徐氏彥曰鄭志趙商問曰文六年閏月不告朔猶朝於廟榖梁𫝊云閏月附月之餘日喪事不數又此條閏月葬齊景公公羊𫝊云喪以閏數此二𫝊義反於禮斷之何居答曰居喪之禮以月數者數閏以年數者不數閏鄭氏之意以為彼云喪事不數者謂期與三年也此云喪以閏數者謂大功以下也若榖梁之意以為大功以下及葬皆不數閏案數閏不數閏公榖二𫝊不同諸儒各有所主彚纂亦並存之愚謂榖梁之說為是此條書葬齊景公以示譏也今世五服之喪皆不數閏如榖梁說又案春秋凡書閏月皆指閏十二月置閏多在嵗終文六年閏月不告月左𫝊列在十一月丙寅晉殺續簡伯之後此年齊景公以九月卒併計閏月為五月而葬此皆置閏在嵗終之驗也七年秋公伐邾八月己酉入邾以邾子益來劉氏敞曰公羊之說非也邾魯相近故初秋伐之八月又入之此自兩事理當並書耳且入邾婁使若他人猶可諉以邾婁子益來又可云他人乎榖梁曰來者外魯之辭非也令春秋不外其君則當曰以邾子益歸乎王氏樵曰伐邾者三家也公雖在行而無與于其事魯自作三軍分公室以後權不在公凡納叛人叛邑內惡悉書而不諱以諱不在公也胡子謂書邾子來而不諱者欲見後書歸邾子之為能改其惡而與之也其義迂矣八年春王正月宋公入曹以曹伯陽歸劉氏敞曰此時魯自救不暇豈有不救同姓之滅春秋遂責之乎且責魯不救而諱曹之滅縱釋宋公之惡而反責無罪之魯乎鄭氏玉曰或謂滅者亡國之善辭上下能同力曹亡與虞同故不書滅案曹之與虞事既不同書法亦異難以例觀也或又以為曹亡於春秋之終興滅繼絶夫子嘗有此言至此不忍言滅義失之巧宋公既殺曹伯後又無復曹之事則竟滅矣入字疑誤彚纂曰虞不書滅者晉存其祀而不以滅告也宋之入曹或亦當然孟子時猶有曹交為曹君之弟則戰國之世曹尚未亡蓋滅而復存如陳蔡許之類夏齊人取歡及闡家氏鉉翁曰公榖以齊為邾故取歡闡左氏則以為季姬未歸故觀齊之兵端當從二𫝊非以女故蓋齊取二邑要魯以存邾爾十三年公㑹晉侯及吳子于黃池陸氏淳曰左云吳子將以公見晉侯啖子曰此時吳方爭長而不後晉豈肯帥魯侯以見晉乎又言將囚子服景伯以宗祝之言恐之尤近兒戲趙子曰左氏有單平公而不書于經者緣吳晉敵禮而㑹如今賓主對舉酒自然單子無坐位故不書且經文有及字是兩霸之義分明也公羊云吳為㑹主與經文背又云吳在是則天下諸侯莫敢不至趙云黃池魯地故魯獨㑹之耳若更有諸侯不當不序榖梁曰黃池之㑹吳子進矣趙子曰此為吳同為㑹主故不書人𫝊不達此理遂妄為說爾彚纂曰左氏曰先晉國語曰先吳二說諸儒互有所主夫宋之盟晉國方彊而卒先楚人則謂晉定之不能先吳似也吳方在㑹而邉遽以越亂告則謂吳子內惕而不敢復爭春秋所書次第乃其事實亦似也趙氏匡則謂吳晉敵禮而㑹如今賔主對舉酒故晉史即云晉為先吳語即云吳先歃各自護其主亦似有理孔氏頴達曰左氏經據魯史策書𫝊采魯之簡牘所書必是依實國語當國所記或可曲筆直已傅𤣥云國語非丘明所作凡有共說一事而其文不同必國語虛而左𫝊實案蠻夷雖大皆曰子此稱吳子者因上文公㑹晉侯吳不可單稱號若書吳人又沒夫差親在㑹之實據實而書無他義也或謂嘉其尊王進而書子或謂吳貶號從子皆失之鑿楚自入春秋即稱王而經俱書楚子未聞楚貶號也鄭氏玉謂齊桓之盛未能責楚僭王之罪豈以晉之衰弱反能使吳王黜其僭號乎其不然明矣十四年春西狩獲麟趙氏匡曰公榖二𫝊以經不言狩人之名故有薪采引取之說不知舉獸獲之義是以爾也汪氏克寬曰說左氏者以春秋感麟而作學公榖者以為春秋文成致麟竊疑聖人作經絶筆于獲麟之一句則非經成而麟至矣苟曰經成而後麟至則春秋絶筆于哀公十三年十二月螽殊無意義特世儒推尊孔子作經之效極其盛故云然耳陳氏際泰曰若謂春秋感麟而作獲麟之嵗距孔子之卒為時幾何而汲汲操筆乎且使麟不獲孔子遂終不作春秋否也一曰文成麟至麟而獲也烏在其為瑞而可以應文成也胡𫝊謂春秋以天道終是即文戎麟至之說而益張大之皆尊聖人而不得其實大抵孔子之作春秋或在定公末年或在哀公初年與夫哀十年之前後未可知也案諸說紛紛俱嫌穿鑿即朱子之解亦似未盡愚另有論附于左春秋絶筆獲麟論春秋二百四十二年終於獲麟說者謂夫子感麟而作又以為春秋文成致麟何休之說尤誕妄杜氏既絀之文定乃承其意謂春秋經成道備嘉瑞應焉而以天道終之比諸簫韶九奏鳳儀於庭魯史成經麟出於野無論不經而聖人毋乃涉於自誇大至宋鄭氏樵則以為終於獲麟聖人初無意歐陽氏謂義在春秋不在起止如此則春秋宜終於哀之十四年或十三年冬不宜以首春一事遽爾絶筆則又似非無意朱子謂某不敢指定是書成感麟亦不敢指定是感麟作大概出非其時被人殺了是不祥意謂感其不祥而遂絶筆則亦非無所寓意然愚嘗反覆通經而知諸儒之說非矣即朱子亦未為得蓋春秋之經因是年請討陳恆之不行而絶筆也夫春秋為天下之無王作臣弒其君子弒其父生人之道絶矣故不得已而作春秋汲汲乎别嫌明微正名定分其用於魯也則墮三都以張公室逮其歸老季氏伐顓㬰則沮旅泰山則沮口誅筆伐猶望人心懾於大義而不敢肆至十四年之四月陳恆執其君置於舒州六月行弒孔子是時年七十一沐浴請討而魯之君臣哆然不應則是人心死而天理絶天下無復知篡弒之為非者於是喟然太息曰已矣無為復望矣遂輟簡廢業而是春適有西狩獲麟一事春秋遂以是終焉是則春秋之絶筆者為大義之不復伸也豈區區為一物之微而漫托於不可知之氣數哉夫春秋責人事而不言災祥就使麟獲果不祥猶當勤人事為補救若以麟出非其時明已當退隱則是春秋撥亂世反之正之書而以一已之遇合終私而不公尤非聖人之志曰春秋之弒君多矣何獨於陳恆為兢兢曰諸國皆逺於魯而孔子是時猶望大行其道於天下起而正之即哀十年弒齊侯陽生而以卒赴猶懼人之見討至此顯然行弒魯與齊為唇齒且甥舅之邦聖人於此蓋日懼三桓之為陳氏也故其答季子然問仲由冉求曰弒父與君亦不從至請討不行顯然勢合而交成其絶筆也目不忍見口不忍言故斷其簡於春秋而著其事於魯論曰後世有能伸討賊之義者是即吾春秋之志也此即聖人未竟之心史也夫余作此論當乾隆之辛酉在鄧年丈悔廬學使署中時校士溫台山行篋中無書越明年掌教淮隂書院從李明府假得春秋經解獲覩宋家則堂先生春秋詳說內一條云春秋以誅亂賊而始亦以誅亂賊而終陳恆弒君孔子沐浴請討公不能用是嵗春秋以獲麟絶筆蓋魯大亂君以弒死者四世春秋所以始齊大亂君以弒死亦三世春秋所以終閲至此不覺大快知人心之同然雖距五百載如面質一堂自此紛紛以獲麟起義者可息矣因附識於此以明余之非臆說春秋入國滅國論案公羊曰入者得而不居此徴之秦人入滑楚入陳吳入郢魯入邾之事則信為得之矣然春秋之例合於此者則不可通於彼愚嘗合前後反覆觀之而知其非然也隱二年莒人入向無駭帥師入極此為書入之始考極地在今山東兖州府魚臺縣西近魯之棠地而終春秋世極不見於經則極為魯滅明矣莒人入向而宣四年公伐莒取向則向已為莒邑而隱二年向為莒滅明矣且即公羊創此例而於無駭不氏則又曰疾始滅榖梁又云以滅同姓貶則即一𫝊之中而前後自相矛盾如此而謂入非滅乎且秦人入滑而秦不能有後入於晉衛侯燬滅邢而衛亦不能有後亦入於晉同一得而不居也而於秦則曰入於衛則曰滅而謂滅與入有異乎無異乎楚莊縣陳聽申叔時之言而反之鄉取一人焉曰夏州以是為得而不居信矣楚靈王滅陳蔡而平王復封之亦未嘗遂有陳蔡之國而書曰滅陳滅蔡者何故然猶曰楚靈志在滅國終其世陳蔡為楚屬邑聖人第據楚靈之事書之爾至如哀八年宋景公滅曹執曹伯陽以歸殺之曹入於宋為邑後向魋入於曹以叛此其為滅斷斷無疑而反書曰入曹則入與滅之無分輕重顯然易明矣乃公羊創此例於隱二年春秋之始而復回護其說於哀八年春秋之終於宋入曹則曰不言其滅諱同姓之滅也蓋謂魯力能救而不之救以致見滅為魯諱然此時魯方自救不暇春秋豈宜厚責其救同姓之滅且欲為魯諱而反縱釋宋公滅國之大惡於法尤倒置蘇子由氏又謂曹伯陽無道自取滅亡與晉人執虞公不言滅同例則春秋何責曹大刻待宋太寬或又謂曹亡於春秋之終夫子嘗以興滅國繼絶世為言故於此不忍書滅尤為穿鑿總之皆誤於公羊之一言欲牽合其說輾轉入於支離而不自知也然則春秋之或書滅或書入或書遷者謂何曰此各就其實事書之爾無他義也固守力屈而就斃則書滅空虛無備而直入則書入空其地易其民毁其宗廟則書遷均為貶絶之甚辭而要非輕重之所在知此而於春秋之全㫖無不合矣書萬季野黃梨洲春秋祔廟問答後問云鄭注謂既祔主復返於寢後人多因之而朱子主之尤力惟陳用之吳幼清謂無復返寢之理今將從之先生以為何如答云諸儒總緣錯解左𫝊之文而誤也左言特祀于主似乎主不在廟故有祔已復寢之文不知既已復寢則蒸嘗禘於廟者為新主乎為祖廟乎為新主新主在寢不當言於廟若為祖廟則四時常祀不當繫之於此蓋祔者既虞之後埋重於祖廟門外即作新主以昭穆之班祔於皇祖廟中各主不動如故此時之祭只皇祖與新主兩位所謂兩告之也更不及别祖自此以後小祥大祥禫祭之類皆於祖廟特祭新死者并皇祖亦不及蒸嘗禘於廟者蒸嘗四時吉祭行於廟中亦不及新死者左氏言此者嫌新主在廟有礙於吉祭也三年喪畢親過髙祖者當祧於是改檐易塗群主合食於廟以次而遷而新主遷居禰廟矣案梨洲此條亦為有見其言卒哭而祔三年喪畢而遷正合朱子所謂祔與遷自是兩事之說且無礙于喪事即逺之義可謂圓通矣但其解特祀於主為特祀於祖廟中以翻鄭氏返主於寢之案究不能無疑何則古禮吉凶不相干故凶服不入廟門小祥大祥禫祭俱未即吉而可於廟中行受服釋服之禮乎疑一也特祀新死者於皇祖之廟并不及皇祖於皇祖不無漠然疑二也四時吉祭皇祖之廟亦與新死者之主在廟中而祭不及又不無漠然疑三也總之練與卒哭是殷周之祔之異制見於檀弓可考三年喪畢而遷當是殷周之禮所同至祔以後遷以前返主與不返主則姑存鄭氏之說為疑案不必更曲為之說矣春秋大事表卷四十二之四
